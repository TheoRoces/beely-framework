<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site System</title>

  <!-- CSS -->
  <script src="core/js/darkmode.js"></script>
  <script src="config-site.js"></script>
  <script src="core/js/site.js"></script>
  <link rel="stylesheet" href="core/css/tokens.css">
  <link rel="stylesheet" href="core/css/base.css">
  <link rel="stylesheet" href="core/css/animations.css">
  <link rel="stylesheet" href="core/css/elements.css">
  <link rel="stylesheet" href="core/css/forms.css">
  <link rel="stylesheet" href="core/css/cookies.css">

  <!-- Slots (doit &ecirc;tre charg&eacute; avant les composants) -->
  <script src="core/js/components.js"></script>

  <!-- Composants r&eacute;utilisables -->
  <script src="components/header.js"></script>
  <script src="components/footer.js"></script>

  <!-- JS interactifs -->
  <script src="core/js/animations.js" defer></script>
  <script src="core/js/elements.js" defer></script>
  <script src="core/js/forms.js" defer></script>
  <script src="core/js/params.js" defer></script>
  <script src="core/js/cookies.js" defer></script>

  <style>
    .hero {
      padding: var(--space-24) 0;
      text-align: center;
    }
    .hero__title { font-size: var(--text-5xl); font-weight: var(--font-weight-bold); margin-bottom: var(--space-4); }
    .hero__text { font-size: var(--text-lg); color: var(--color-text-light); max-width: 600px; margin: 0 auto var(--space-8); }
    .hero__actions { display: flex; gap: var(--space-4); justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div data-component="header"
       data-site-name="SiteSystem"
       data-logo-link="/index.html">
    <template data-slot="nav">
      <a href="/index.html">Accueil</a>
    </template>
    <template data-slot="cta">
      <button class="btn btn--primary anim-click-pulse" data-popup-target="contact-popup">Contact</button>
    </template>
  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="container">
      <h1 class="hero__title anim-fade-in-up">Site System</h1>
      <p class="hero__text anim-fade-in-up anim--delay-2">
        Boilerplate plug-and-play pour cr&eacute;er des sites et landing pages.
        Z&eacute;ro d&eacute;pendances. Pure JS/HTML/CSS.
      </p>
      <div class="hero__actions anim-fade-in-up anim--delay-4">
        <a href="#" class="btn btn--primary anim-click-ripple">D&eacute;couvrir</a>
        <button class="btn btn--secondary anim-click-pulse" data-popup-target="contact-popup">Contact</button>
      </div>
    </div>
  </section>

  <!-- Popup contact -->
  <div class="popup" data-popup="contact-popup">
    <div class="popup__overlay"></div>
    <div class="popup__content" style="max-width: 600px;">
      <button class="popup__close" data-popup-close>&times;</button>
      <h3 style="margin-bottom: var(--space-6);">Contact</h3>

      <form class="form" data-form-webhook="https://example.com/webhook">
        <div class="form__field">
          <label class="form__label">Nom</label>
          <input type="text" name="nom" class="form__input" required data-validate="required|min:2">
        </div>
        <div class="form__field">
          <label class="form__label">Email</label>
          <input type="email" name="email" class="form__input" required data-validate="required|email">
        </div>
        <div class="form__field">
          <label class="form__label">Message</label>
          <textarea name="message" class="form__textarea" required data-validate="required|min:10"></textarea>
        </div>
        <div class="form__nav">
          <button type="submit" class="form__submit">Envoyer</button>
        </div>
      </form>
    </div>
  </div>

  <!-- FOOTER -->
  <div data-component="footer"
       data-copyright="&copy; 2026 SiteSystem">
    <template data-slot="content">
      <nav class="footer__links">
        <a href="/mentions-legales.html">Mentions l&eacute;gales</a>
        <a href="/confidentialite.html">Politique de confidentialit&eacute;</a>
      </nav>
    </template>
  </div>

</body>
</html>
