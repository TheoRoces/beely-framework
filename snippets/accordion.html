<!--
  ACCORDION — Site System

  CSS : core/css/elements.css
  JS  : core/js/elements.js

  Classes :
    .accordion              — Conteneur principal
    .accordion__item        — Élément individuel
    .accordion__item--active — Élément ouvert (ajouté par JS ou en HTML)
    .accordion__header      — En-tête cliquable
    .accordion__body        — Contenu déroulable

  Attributs :
    data-accordion-multi  — Permet d'ouvrir plusieurs items simultanément
                               (sans cet attribut, un seul item ouvert à la fois)

  Les accordions sont imbriquables.
-->


<!-- ===== ACCORDION SIMPLE (un seul ouvert) ===== -->

<div class="accordion">
  <div class="accordion__item accordion__item--active">
    <div class="accordion__header">Section 1 (ouverte par défaut)</div>
    <div class="accordion__body">
      <p>Contenu de la section 1.</p>
    </div>
  </div>
  <div class="accordion__item">
    <div class="accordion__header">Section 2</div>
    <div class="accordion__body">
      <p>Contenu de la section 2.</p>
    </div>
  </div>
  <div class="accordion__item">
    <div class="accordion__header">Section 3</div>
    <div class="accordion__body">
      <p>Contenu de la section 3.</p>
    </div>
  </div>
</div>


<!-- ===== ACCORDION MULTIPLE (plusieurs ouverts) ===== -->

<div class="accordion" data-accordion-multi>
  <div class="accordion__item accordion__item--active">
    <div class="accordion__header">FAQ 1</div>
    <div class="accordion__body">
      <p>Réponse 1.</p>
    </div>
  </div>
  <div class="accordion__item accordion__item--active">
    <div class="accordion__header">FAQ 2</div>
    <div class="accordion__body">
      <p>Réponse 2.</p>
    </div>
  </div>
  <div class="accordion__item">
    <div class="accordion__header">FAQ 3</div>
    <div class="accordion__body">
      <p>Réponse 3.</p>
    </div>
  </div>
</div>
