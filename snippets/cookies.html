<!--
  COOKIES / RGPD — Site System

  CSS : core/css/cookies.css
  JS  : core/js/cookies.js
  Config : config-site.js (window.COOKIES_CONFIG)

  Le bandeau est généré automatiquement par cookies.js
  à partir de la configuration dans config-site.js.

  Attributs utilisables dans vos pages :
    data-cookies-settings  — Ouvre le panneau de paramétrage des cookies
                             (utile pour un lien "Gérer les cookies" dans le footer)

  Configuration (config-site.js) :
    ga4: 'G-XXXXXXXXXX'         — Google Analytics 4
    gtm: 'GTM-XXXXXXX'         — Google Tag Manager
    clarity: 'xxxxxxxxxx'       — Microsoft Clarity
    fbPixel: '123456789012345'  — Facebook Pixel
    hotjar: '1234567'           — Hotjar
    linkedin: '123456'          — LinkedIn Insight
    tiktok: 'XXXXXXXXXX'        — TikTok Pixel

  Catégories :
    functional  — Toujours actif (required: true)
    analytics   — GA4, GTM, Clarity, Hotjar
    marketing   — Facebook, LinkedIn, TikTok

  Bannière :
    banner.title / text / acceptText / rejectText / settingsText / saveText
    banner.cookieName — Nom du cookie de consentement
    banner.cookieDuration — Durée en jours (395 = ~13 mois CNIL)

  Webhook :
    consentWebhook: 'url'  — POST preuve de consentement (RGPD)
-->
