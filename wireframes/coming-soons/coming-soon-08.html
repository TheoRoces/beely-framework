<!-- coming-soon-08: Left half image + right half content -->
<style>
  .wf-coming-soon-08 {
    --wf-bg: var(--color-bg);
    --wf-text: var(--color-text);
    --wf-text-muted: var(--color-text-light);
    --wf-primary: var(--color-text);
    --wf-primary-hover: var(--color-neutral-700);
    --wf-primary-light: var(--color-bg-alt);
    --wf-border: var(--color-border);
    --wf-radius: 8px;
    --wf-image-bg: var(--color-neutral-300);
    --wf-countdown-bg: var(--color-bg-alt);
    --wf-font: var(--font-body);

    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    background-color: var(--wf-bg);
    color: var(--wf-text);
    font-family: var(--wf-font);
    box-sizing: border-box;
  }

  .wf-coming-soon-08 *,
  .wf-coming-soon-08 *::before,
  .wf-coming-soon-08 *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  .wf-coming-soon-08 .wf-image {
    background-color: var(--wf-image-bg);
    background-image: linear-gradient(135deg, var(--color-border) 0%, var(--color-border) 50%, var(--color-text-light) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100%;
  }

  .wf-coming-soon-08 .wf-image-placeholder {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background-color: rgba(255, 255, 255, 0.3);
  }

  .wf-coming-soon-08 .wf-content {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: clamp(2rem, 5vw, 5rem);
  }

  .wf-coming-soon-08 .wf-logo {
    width: 48px;
    height: 48px;
    background-color: var(--wf-primary);
    border-radius: var(--radius-lg, 0.75rem);
    margin-bottom: 2rem;
  }

  .wf-coming-soon-08 .wf-heading {
    font-size: clamp(1.75rem, 3.5vw, 2.75rem);
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 0.75rem;
    letter-spacing: -0.02em;
  }

  .wf-coming-soon-08 .wf-subheading {
    font-size: 1.0625rem;
    color: var(--wf-text-muted);
    line-height: 1.6;
    margin-bottom: 2rem;
    max-width: 400px;
  }

  .wf-coming-soon-08 .wf-countdown {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 2rem;
  }

  .wf-coming-soon-08 .wf-countdown-item {
    background-color: var(--wf-countdown-bg);
    border: 1px solid var(--wf-border);
    border-radius: var(--wf-radius);
    padding: 1rem;
    min-width: 70px;
    text-align: center;
  }

  .wf-coming-soon-08 .wf-countdown-value {
    display: block;
    font-size: 1.75rem;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 0.25rem;
  }

  .wf-coming-soon-08 .wf-countdown-label {
    font-size: 0.65rem;
    color: var(--wf-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  @media (max-width: 768px) {
    .wf-coming-soon-08 {
      grid-template-columns: 1fr;
    }

    .wf-coming-soon-08 .wf-image {
      min-height: 280px;
    }

    .wf-coming-soon-08 .wf-countdown {
      gap: 0.5rem;
    }

    .wf-coming-soon-08 .wf-countdown-item {
      min-width: 60px;
      padding: 0.75rem;
    }

  }
</style>

<section class="wf-coming-soon-08">
  <div class="wf-image">
    <div class="wf-image-placeholder"></div>
  </div>

  <div class="wf-content">
    <div class="wf-logo"></div>
    <h1 class="wf-heading">Bientot disponible</h1>
    <p class="wf-subheading">Nous preparons quelque chose d'exceptionnel. Soyez les premiers informes de notre lancement.</p>

    <div class="wf-countdown">
      <div class="wf-countdown-item">
        <span class="wf-countdown-value">12</span>
        <span class="wf-countdown-label">Jours</span>
      </div>
      <div class="wf-countdown-item">
        <span class="wf-countdown-value">08</span>
        <span class="wf-countdown-label">Heures</span>
      </div>
      <div class="wf-countdown-item">
        <span class="wf-countdown-value">34</span>
        <span class="wf-countdown-label">Minutes</span>
      </div>
      <div class="wf-countdown-item">
        <span class="wf-countdown-value">56</span>
        <span class="wf-countdown-label">Secondes</span>
      </div>
    </div>

    <form class="wf-signup-form">
      <input type="email" class="form__input" placeholder="Entrez votre email" />
      <button type="submit" class="btn btn--primary">Me notifier</button>
    </form>
  </div>
</section>
