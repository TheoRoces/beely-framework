<!-- coming-soon-02: Split layout with left text/countdown and right image -->
<style>
  .wf-coming-soon-02 {
    --wf-bg: var(--color-bg);
    --wf-text: var(--color-text);
    --wf-text-muted: var(--color-text-light);
    --wf-primary: var(--color-text);
    --wf-primary-hover: var(--color-neutral-800);
    --wf-border: var(--color-border);
    --wf-radius: 8px;
    --wf-countdown-bg: var(--color-neutral-100);
    --wf-image-bg: var(--color-border);
    --wf-font: var(--font-body);

    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    background-color: var(--wf-bg);
    color: var(--wf-text);
    font-family: var(--wf-font);
    box-sizing: border-box;
  }

  .wf-coming-soon-02 *,
  .wf-coming-soon-02 *::before,
  .wf-coming-soon-02 *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  .wf-coming-soon-02 .wf-content {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: clamp(2rem, 5vw, 5rem);
  }

  .wf-coming-soon-02 .wf-label {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--wf-primary);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
  }

  .wf-coming-soon-02 .wf-heading {
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 1rem;
    letter-spacing: -0.02em;
  }

  .wf-coming-soon-02 .wf-subheading {
    font-size: 1.125rem;
    color: var(--wf-text-muted);
    line-height: 1.6;
    margin-bottom: 2.5rem;
    max-width: 440px;
  }

  .wf-coming-soon-02 .wf-countdown {
    display: flex;
    gap: 1rem;
    margin-bottom: 2.5rem;
  }

  .wf-coming-soon-02 .wf-countdown-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    background-color: var(--wf-countdown-bg);
    border-radius: var(--wf-radius);
    padding: 1rem 1.25rem;
    min-width: 72px;
  }

  .wf-coming-soon-02 .wf-countdown-value {
    font-size: 2rem;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 0.25rem;
  }

  .wf-coming-soon-02 .wf-countdown-label {
    font-size: 0.7rem;
    color: var(--wf-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .wf-coming-soon-02 .wf-signup-form {
    display: flex;
    gap: 0.75rem;
    max-width: 440px;
  }

  .wf-coming-soon-02 .wf-input {
    flex: 1;
    padding: 0.875rem 1rem;
    border: 1px solid var(--wf-border);
    border-radius: var(--wf-radius);
    font-size: 1rem;
    font-family: var(--wf-font);
    outline: none;
    transition: border-color 0.2s;
  }

  .wf-coming-soon-02 .wf-input:focus {
    border-color: var(--wf-primary);
  }

  .wf-coming-soon-02 .wf-button {
    padding: 0.875rem 1.5rem;
    background-color: var(--wf-primary);
    color: var(--color-text-on-dark);
    border: none;
    border-radius: var(--wf-radius);
    font-size: 1rem;
    font-weight: 600;
    font-family: var(--wf-font);
    cursor: pointer;
    white-space: nowrap;
    transition: background-color 0.2s;
  }

  .wf-coming-soon-02 .wf-button:hover {
    background-color: var(--wf-primary-hover);
  }

  .wf-coming-soon-02 .wf-image {
    background-color: var(--wf-image-bg);
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .wf-coming-soon-02 .wf-image-placeholder {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background-color: var(--color-neutral-300);
  }

  @media (max-width: 768px) {
    .wf-coming-soon-02 {
      grid-template-columns: 1fr;
    }

    .wf-coming-soon-02 .wf-image {
      min-height: 300px;
      order: -1;
    }

    .wf-coming-soon-02 .wf-countdown {
      gap: 0.5rem;
    }

    .wf-coming-soon-02 .wf-countdown-item {
      min-width: 60px;
      padding: 0.75rem;
    }

    .wf-coming-soon-02 .wf-signup-form {
      flex-direction: column;
    }
  }
</style>

<section class="wf-coming-soon-02">
  <div class="wf-content">
    <span class="wf-label">Bientot disponible</span>
    <h1 class="wf-heading">Nous preparons quelque chose d'exceptionnel</h1>
    <p class="wf-subheading">Notre nouveau site arrive bientot. Inscrivez-vous pour etre notifie des notre lancement.</p>

    <div class="wf-countdown">
      <div class="wf-countdown-item">
        <span class="wf-countdown-value">12</span>
        <span class="wf-countdown-label">Jours</span>
      </div>
      <div class="wf-countdown-item">
        <span class="wf-countdown-value">08</span>
        <span class="wf-countdown-label">Heures</span>
      </div>
      <div class="wf-countdown-item">
        <span class="wf-countdown-value">34</span>
        <span class="wf-countdown-label">Minutes</span>
      </div>
      <div class="wf-countdown-item">
        <span class="wf-countdown-value">56</span>
        <span class="wf-countdown-label">Secondes</span>
      </div>
    </div>

    <form class="wf-signup-form">
      <input type="email" class="wf-input" placeholder="Entrez votre email pour etre notifie" />
      <button type="submit" class="wf-button">Me notifier</button>
    </form>
  </div>

  <div class="wf-image">
    <div class="wf-image-placeholder"></div>
  </div>
</section>
