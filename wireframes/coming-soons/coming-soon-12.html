<!-- coming-soon-12: Split layout with vidéo placeholder left and text/signup right -->
<style>
  .wf-coming-soon-12 {
    --wf-bg: var(--color-bg);
    --wf-text: var(--color-text);
    --wf-text-muted: var(--color-text-light);
    --wf-primary: var(--color-text-light);
    --wf-primary-hover: var(--color-neutral-700);
    --wf-border: var(--color-border);
    --wf-radius: 8px;
    --wf-vidéo-bg: var(--color-bg-dark);
    --wf-play-bg: rgba(255, 255, 255, 0.15);
    --wf-play-border: rgba(255, 255, 255, 0.3);
    --wf-font: var(--font-body);

    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    background-color: var(--wf-bg);
    color: var(--wf-text);
    font-family: var(--wf-font);
    box-sizing: border-box;
  }

  .wf-coming-soon-12 *,
  .wf-coming-soon-12 *::before,
  .wf-coming-soon-12 *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  .wf-coming-soon-12 .wf-vidéo {
    background-color: var(--wf-vidéo-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100%;
    position: relative;
  }

  .wf-coming-soon-12 .wf-play-button {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background-color: var(--wf-play-bg);
    border: 2px solid var(--wf-play-border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .wf-coming-soon-12 .wf-play-triangle {
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 12px 0 12px 22px;
    border-color: transparent transparent transparent var(--color-bg, var(--color-bg));
    margin-left: 4px;
  }

  .wf-coming-soon-12 .wf-content {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: clamp(2rem, 5vw, 5rem);
  }

  .wf-coming-soon-12 .wf-label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--wf-primary);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 1rem;
  }

  .wf-coming-soon-12 .wf-heading {
    font-size: clamp(1.75rem, 3.5vw, 2.75rem);
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 1rem;
    letter-spacing: -0.02em;
  }

  .wf-coming-soon-12 .wf-subheading {
    font-size: 1.0625rem;
    color: var(--wf-text-muted);
    line-height: 1.6;
    margin-bottom: 2rem;
    max-width: 420px;
  }

  .wf-coming-soon-12 .wf-countdown {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 2.5rem;
  }

  .wf-coming-soon-12 .wf-countdown-item {
    display: flex;
    flex-direction: column;
  }

  .wf-coming-soon-12 .wf-countdown-value {
    font-size: 2rem;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 0.25rem;
  }

  .wf-coming-soon-12 .wf-countdown-label {
    font-size: 0.7rem;
    color: var(--wf-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  @media (max-width: 768px) {
    .wf-coming-soon-12 {
      grid-template-columns: 1fr;
    }

    .wf-coming-soon-12 .wf-vidéo {
      min-height: 300px;
    }

    .wf-coming-soon-12 .wf-countdown {
      gap: 1rem;
    }
  }
</style>

<section class="wf-coming-soon-12">
  <div class="wf-vidéo">
    <div class="wf-play-button">
      <div class="wf-play-triangle"></div>
    </div>
  </div>

  <div class="wf-content">
    <span class="wf-label">Bientot disponible</span>
    <h1 class="wf-heading">Nous preparons quelque chose d'exceptionnel</h1>
    <p class="wf-subheading">Regardez notre teaser et inscrivez-vous pour etre parmi les premiers a découvrir notre produit.</p>

    <div class="wf-countdown">
      <div class="wf-countdown-item">
        <span class="wf-countdown-value">12</span>
        <span class="wf-countdown-label">Jours</span>
      </div>
      <div class="wf-countdown-item">
        <span class="wf-countdown-value">08</span>
        <span class="wf-countdown-label">Heures</span>
      </div>
      <div class="wf-countdown-item">
        <span class="wf-countdown-value">34</span>
        <span class="wf-countdown-label">Minutes</span>
      </div>
      <div class="wf-countdown-item">
        <span class="wf-countdown-value">56</span>
        <span class="wf-countdown-label">Secondes</span>
      </div>
    </div>

    <form class="wf-signup-form">
      <input type="email" class="form__input" placeholder="Entrez votre email pour etre notifie" />
      <button type="submit" class="btn btn--primary">Me notifier</button>
    </form>
  </div>
</section>
