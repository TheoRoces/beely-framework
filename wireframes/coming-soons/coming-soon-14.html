<!-- coming-soon-14: Coming soon with "notify me" button and social links -->
<style>
  .wf-coming-soon-14 {
    --wf-bg: var(--color-bg-alt);
    --wf-text: var(--color-text);
    --wf-text-muted: var(--color-text-light);
    --wf-primary: var(--color-text);
    --wf-primary-hover: var(--color-text);
    --wf-border: var(--color-border);
    --wf-radius: 10px;
    --wf-radius-sm: 8px;
    --wf-social-bg: var(--color-bg);
    --wf-social-hover: var(--color-neutral-50);
    --wf-social-border: var(--color-border);
    --wf-countdown-bg: var(--color-bg);
    --wf-font: var(--font-body);

    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 2rem;
    background-color: var(--wf-bg);
    color: var(--wf-text);
    font-family: var(--wf-font);
    text-align: center;
    box-sizing: border-box;
  }

  .wf-coming-soon-14 *,
  .wf-coming-soon-14 *::before,
  .wf-coming-soon-14 *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  .wf-coming-soon-14 .wf-logo {
    width: 52px;
    height: 52px;
    background-color: var(--wf-primary);
    border-radius: var(--radius-lg, 14px);
    margin-bottom: 2rem;
  }

  .wf-coming-soon-14 .wf-heading {
    font-size: clamp(2rem, 5vw, 3.25rem);
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 0.75rem;
    letter-spacing: -0.02em;
  }

  .wf-coming-soon-14 .wf-subheading {
    font-size: 1.0625rem;
    color: var(--wf-text-muted);
    max-width: 480px;
    line-height: 1.6;
    margin-bottom: 2.5rem;
  }

  .wf-coming-soon-14 .wf-countdown {
    display: flex;
    gap: 1rem;
    margin-bottom: 2.5rem;
  }

  .wf-coming-soon-14 .wf-countdown-item {
    background-color: var(--wf-countdown-bg);
    border: 1px solid var(--wf-border);
    border-radius: var(--wf-radius);
    padding: 1.25rem 1.5rem;
    min-width: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .wf-coming-soon-14 .wf-countdown-value {
    font-size: 2rem;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 0.25rem;
  }

  .wf-coming-soon-14 .wf-countdown-label {
    font-size: 0.7rem;
    color: var(--wf-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .wf-coming-soon-14 .wf-signup-form {
    display: flex;
    gap: 0.75rem;
    width: 100%;
    max-width: 440px;
    margin-bottom: 3rem;
  }

  .wf-coming-soon-14 .wf-input {
    flex: 1;
    padding: 0.875rem 1rem;
    border: 1px solid var(--wf-border);
    border-radius: var(--wf-radius-sm);
    font-size: 1rem;
    font-family: var(--wf-font);
    background: var(--color-bg);
    color: var(--color-text);
    outline: none;
    transition: border-color 0.2s;
  }

  .wf-coming-soon-14 .wf-input:focus {
    border-color: var(--wf-primary);
  }

  .wf-coming-soon-14 .wf-button {
    padding: 0.875rem 1.5rem;
    background-color: var(--wf-primary);
    color: var(--color-text-on-dark);
    border: none;
    border-radius: var(--wf-radius-sm);
    font-size: 1rem;
    font-weight: 600;
    font-family: var(--wf-font);
    cursor: pointer;
    white-space: nowrap;
    transition: background-color 0.2s;
  }

  .wf-coming-soon-14 .wf-button:hover {
    background-color: var(--wf-primary-hover);
  }

  .wf-coming-soon-14 .wf-divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    width: 100%;
    max-width: 440px;
    margin-bottom: 2rem;
  }

  .wf-coming-soon-14 .wf-divider-line {
    flex: 1;
    height: 1px;
    background-color: var(--wf-border);
  }

  .wf-coming-soon-14 .wf-divider-text {
    font-size: 0.8125rem;
    color: var(--wf-text-muted);
    white-space: nowrap;
  }

  .wf-coming-soon-14 .wf-social {
    display: flex;
    gap: 0.75rem;
  }

  .wf-coming-soon-14 .wf-social-link {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 48px;
    height: 48px;
    background-color: var(--wf-social-bg);
    border: 1px solid var(--wf-social-border);
    border-radius: var(--wf-radius-sm);
    text-decoration: none;
    color: var(--wf-text);
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    transition: background-color 0.2s;
  }

  .wf-coming-soon-14 .wf-social-link:hover {
    background-color: var(--wf-social-hover);
  }

  @media (max-width: 600px) {
    .wf-coming-soon-14 .wf-countdown {
      gap: 0.5rem;
    }

    .wf-coming-soon-14 .wf-countdown-item {
      min-width: 64px;
      padding: 1rem;
    }

    .wf-coming-soon-14 .wf-signup-form {
      flex-direction: column;
    }
  }
</style>

<section class="wf-coming-soon-14">
  <div class="wf-logo"></div>

  <h1 class="wf-heading">Bientot disponible</h1>
  <p class="wf-subheading">Nous preparons quelque chose d'exceptionnel. Soyez les premiers informes de notre lancement.</p>

  <div class="wf-countdown">
    <div class="wf-countdown-item">
      <span class="wf-countdown-value">12</span>
      <span class="wf-countdown-label">Jours</span>
    </div>
    <div class="wf-countdown-item">
      <span class="wf-countdown-value">08</span>
      <span class="wf-countdown-label">Heures</span>
    </div>
    <div class="wf-countdown-item">
      <span class="wf-countdown-value">34</span>
      <span class="wf-countdown-label">Minutes</span>
    </div>
    <div class="wf-countdown-item">
      <span class="wf-countdown-value">56</span>
      <span class="wf-countdown-label">Secondes</span>
    </div>
  </div>

  <form class="wf-signup-form">
    <input type="email" class="wf-input" placeholder="Entrez votre email pour etre notifie" />
    <button type="submit" class="wf-button">Me notifier</button>
  </form>

  <div class="wf-divider">
    <span class="wf-divider-line"></span>
    <span class="wf-divider-text">ou suivez-nous</span>
    <span class="wf-divider-line"></span>
  </div>

  <div class="wf-social">
    <a href="#" class="wf-social-link" aria-label="Facebook">Fb</a>
    <a href="#" class="wf-social-link" aria-label="Twitter">Tw</a>
    <a href="#" class="wf-social-link" aria-label="Instagram">Ig</a>
    <a href="#" class="wf-social-link" aria-label="LinkedIn">Li</a>
    <a href="#" class="wf-social-link" aria-label="YouTube">Yt</a>
  </div>
</section>
