<!-- coming-soon-03: Minimal layout with large "Bientot disponible" text and email signup -->
<style>
  .wf-coming-soon-03 {
    --wf-bg: var(--color-bg-alt);
    --wf-text: var(--color-neutral-900);
    --wf-text-muted: var(--color-text-light);
    --wf-primary: var(--color-neutral-900);
    --wf-primary-hover: var(--color-neutral-700);
    --wf-border: var(--color-neutral-300);
    --wf-radius: 0px;
    --wf-font: var(--font-body);

    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background-color: var(--wf-bg);
    color: var(--wf-text);
    font-family: var(--wf-font);
    text-align: center;
    box-sizing: border-box;
  }

  .wf-coming-soon-03 *,
  .wf-coming-soon-03 *::before,
  .wf-coming-soon-03 *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  .wf-coming-soon-03 .wf-heading {
    font-size: clamp(3rem, 10vw, 8rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.04em;
    margin-bottom: 2rem;
    max-width: 900px;
  }

  .wf-coming-soon-03 .wf-subheading {
    font-size: clamp(1rem, 2vw, 1.125rem);
    color: var(--wf-text-muted);
    margin-bottom: 2.5rem;
    line-height: 1.6;
  }

  @media (max-width: 600px) {

  }
</style>

<section class="wf-coming-soon-03">
  <h1 class="wf-heading">Bientot disponible</h1>
  <p class="wf-subheading">Entrez votre email pour etre notifie</p>

  <form class="wf-signup-form">
    <input type="email" class="form__input" placeholder="votre@email.com" />
    <button type="submit" class="btn btn--primary">Me notifier</button>
  </form>
</section>
