<!-- coming-soon-03: Minimal layout with large "Bientot disponible" text and email signup -->
<style>
  .wf-coming-soon-03 {
    --wf-bg: var(--color-bg-alt);
    --wf-text: var(--color-neutral-900);
    --wf-text-muted: var(--color-text-light);
    --wf-primary: var(--color-neutral-900);
    --wf-primary-hover: var(--color-neutral-700);
    --wf-border: var(--color-neutral-300);
    --wf-radius: 0px;
    --wf-font: var(--font-body);

    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background-color: var(--wf-bg);
    color: var(--wf-text);
    font-family: var(--wf-font);
    text-align: center;
    box-sizing: border-box;
  }

  .wf-coming-soon-03 *,
  .wf-coming-soon-03 *::before,
  .wf-coming-soon-03 *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  .wf-coming-soon-03 .wf-heading {
    font-size: clamp(3rem, 10vw, 8rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.04em;
    margin-bottom: 2rem;
    max-width: 900px;
  }

  .wf-coming-soon-03 .wf-subheading {
    font-size: clamp(1rem, 2vw, 1.125rem);
    color: var(--wf-text-muted);
    margin-bottom: 2.5rem;
    line-height: 1.6;
  }

  .wf-coming-soon-03 .wf-signup-form {
    display: flex;
    gap: 0;
    width: 100%;
    max-width: 440px;
    border: 1px solid var(--wf-border);
  }

  .wf-coming-soon-03 .wf-input {
    flex: 1;
    padding: 1rem 1.25rem;
    border: none;
    font-size: 1rem;
    font-family: var(--wf-font);
    background: transparent;
    outline: none;
  }

  .wf-coming-soon-03 .wf-button {
    padding: 1rem 2rem;
    background-color: var(--wf-primary);
    color: var(--color-text-on-dark);
    border: none;
    font-size: 0.875rem;
    font-weight: 600;
    font-family: var(--wf-font);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    transition: background-color 0.2s;
    white-space: nowrap;
  }

  .wf-coming-soon-03 .wf-button:hover {
    background-color: var(--wf-primary-hover);
  }

  @media (max-width: 600px) {
    .wf-coming-soon-03 .wf-signup-form {
      flex-direction: column;
      border: none;
    }

    .wf-coming-soon-03 .wf-input {
      border: 1px solid var(--wf-border);
    }

    .wf-coming-soon-03 .wf-button {
      padding: 1rem;
    }
  }
</style>

<section class="wf-coming-soon-03">
  <h1 class="wf-heading">Bientot disponible</h1>
  <p class="wf-subheading">Entrez votre email pour etre notifie</p>

  <form class="wf-signup-form">
    <input type="email" class="wf-input" placeholder="votre@email.com" />
    <button type="submit" class="wf-button">Me notifier</button>
  </form>
</section>
