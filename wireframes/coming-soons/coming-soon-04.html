<!-- coming-soon-04: Dark background with centered content and social media icons -->
<style>
  .wf-coming-soon-04 {
    --wf-bg: var(--color-bg-dark);
    --wf-text: var(--color-text-on-dark);
    --wf-text-muted: var(--color-neutral-400);
    --wf-primary: var(--color-text);
    --wf-primary-hover: var(--color-text);
    --wf-border: var(--color-neutral-800);
    --wf-radius: 8px;
    --wf-countdown-bg: var(--color-bg-dark);
    --wf-social-bg: var(--color-bg-dark);
    --wf-social-hover: var(--color-neutral-600);
    --wf-font: var(--font-body);

    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background-color: var(--wf-bg);
    color: var(--wf-text);
    font-family: var(--wf-font);
    text-align: center;
    box-sizing: border-box;
  }

  .wf-coming-soon-04 *,
  .wf-coming-soon-04 *::before,
  .wf-coming-soon-04 *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  .wf-coming-soon-04 .wf-heading {
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 1rem;
    letter-spacing: -0.02em;
  }

  .wf-coming-soon-04 .wf-subheading {
    font-size: clamp(1rem, 2vw, 1.25rem);
    color: var(--wf-text-muted);
    max-width: 520px;
    line-height: 1.6;
    margin-bottom: 3rem;
  }

  .wf-coming-soon-04 .wf-countdown {
    display: flex;
    gap: 1.25rem;
    margin-bottom: 3rem;
  }

  .wf-coming-soon-04 .wf-countdown-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    background-color: var(--wf-countdown-bg);
    border: 1px solid var(--wf-border);
    border-radius: var(--wf-radius);
    padding: 1.25rem 1.5rem;
    min-width: 80px;
  }

  .wf-coming-soon-04 .wf-countdown-value {
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    font-weight: 700;
    line-height: 1;
    margin-bottom: 0.25rem;
  }

  .wf-coming-soon-04 .wf-countdown-label {
    font-size: 0.7rem;
    color: var(--wf-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .wf-coming-soon-04 .wf-signup-form {
    display: flex;
    gap: 0.75rem;
    width: 100%;
    max-width: 460px;
    margin-bottom: 3rem;
  }

  .wf-coming-soon-04 .wf-input {
    flex: 1;
    padding: 0.875rem 1rem;
    border: 1px solid var(--wf-border);
    border-radius: var(--wf-radius);
    font-size: 1rem;
    font-family: var(--wf-font);
    background-color: var(--wf-countdown-bg);
    color: var(--wf-text);
    outline: none;
    transition: border-color 0.2s;
  }

  .wf-coming-soon-04 .wf-input::placeholder {
    color: var(--wf-text-muted);
  }

  .wf-coming-soon-04 .wf-input:focus {
    border-color: var(--wf-primary);
  }

  .wf-coming-soon-04 .wf-button {
    padding: 0.875rem 1.5rem;
    background-color: var(--wf-primary);
    color: var(--color-text-on-dark);
    border: none;
    border-radius: var(--wf-radius);
    font-size: 1rem;
    font-weight: 600;
    font-family: var(--wf-font);
    cursor: pointer;
    white-space: nowrap;
    transition: background-color 0.2s;
  }

  .wf-coming-soon-04 .wf-button:hover {
    background-color: var(--wf-primary-hover);
  }

  .wf-coming-soon-04 .wf-social {
    display: flex;
    gap: 0.75rem;
  }

  .wf-coming-soon-04 .wf-social-link {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    background-color: var(--wf-social-bg);
    border-radius: 50%;
    text-decoration: none;
    color: var(--wf-text);
    font-size: 0.75rem;
    font-weight: 600;
    transition: background-color 0.2s;
  }

  .wf-coming-soon-04 .wf-social-link:hover {
    background-color: var(--wf-social-hover);
  }

  @media (max-width: 600px) {
    .wf-coming-soon-04 .wf-countdown {
      gap: 0.5rem;
    }

    .wf-coming-soon-04 .wf-countdown-item {
      min-width: 64px;
      padding: 1rem;
    }

    .wf-coming-soon-04 .wf-signup-form {
      flex-direction: column;
    }
  }
</style>

<section class="wf-coming-soon-04">
  <h1 class="wf-heading">Bientot disponible</h1>
  <p class="wf-subheading">Nous preparons quelque chose d'exceptionnel. Soyez les premiers informes de notre lancement.</p>

  <div class="wf-countdown">
    <div class="wf-countdown-item">
      <span class="wf-countdown-value">12</span>
      <span class="wf-countdown-label">Jours</span>
    </div>
    <div class="wf-countdown-item">
      <span class="wf-countdown-value">08</span>
      <span class="wf-countdown-label">Heures</span>
    </div>
    <div class="wf-countdown-item">
      <span class="wf-countdown-value">34</span>
      <span class="wf-countdown-label">Minutes</span>
    </div>
    <div class="wf-countdown-item">
      <span class="wf-countdown-value">56</span>
      <span class="wf-countdown-label">Secondes</span>
    </div>
  </div>

  <form class="wf-signup-form">
    <input type="email" class="wf-input" placeholder="Entrez votre email pour etre notifie" />
    <button type="submit" class="wf-button">Me notifier</button>
  </form>

  <div class="wf-social">
    <a href="#" class="wf-social-link" aria-label="Facebook">Fb</a>
    <a href="#" class="wf-social-link" aria-label="Twitter">Tw</a>
    <a href="#" class="wf-social-link" aria-label="Instagram">Ig</a>
    <a href="#" class="wf-social-link" aria-label="LinkedIn">Li</a>
  </div>
</section>
