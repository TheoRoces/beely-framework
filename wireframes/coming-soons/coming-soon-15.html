<!-- coming-soon-15: Full-screen with rotating background colors (CSS animation) -->
<style>
  @keyframes wf-color-rotate {
    0% { background-color: var(--color-text); }
    15% { background-color: var(--color-text-light); }
    30% { background-color: var(--color-text-light); }
    45% { background-color: var(--color-text-light); }
    60% { background-color: var(--color-text); }
    75% { background-color: var(--color-text-light); }
    90% { background-color: var(--color-bg-dark); }
    100% { background-color: var(--color-bg-dark); }
  }

  .wf-coming-soon-15 {
    --wf-text: var(--color-text-on-dark);
    --wf-text-muted: rgba(255, 255, 255, 0.75);
    --wf-border: rgba(255, 255, 255, 0.25);
    --wf-input-bg: rgba(255, 255, 255, 0.12);
    --wf-button-bg: var(--color-bg);
    --wf-button-text: var(--color-text);
    --wf-radius: 8px;
    --wf-countdown-bg: rgba(255, 255, 255, 0.1);
    --wf-countdown-border: rgba(255, 255, 255, 0.15);
    --wf-font: var(--font-body);

    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background-color: var(--color-bg-dark);
    animation: wf-color-rotate 20s ease-in-out infinite;
    color: var(--wf-text);
    font-family: var(--wf-font);
    text-align: center;
    box-sizing: border-box;
    transition: background-color 0.5s;
  }

  .wf-coming-soon-15 *,
  .wf-coming-soon-15 *::before,
  .wf-coming-soon-15 *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  .wf-coming-soon-15 .wf-logo {
    width: 56px;
    height: 56px;
    background-color: rgba(255, 255, 255, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: var(--radius-lg, 14px);
    margin-bottom: 2.5rem;
    backdrop-filter: blur(8px);
  }

  .wf-coming-soon-15 .wf-heading {
    font-size: clamp(2.5rem, 7vw, 4.5rem);
    font-weight: 800;
    line-height: 1.05;
    margin-bottom: 1rem;
    letter-spacing: -0.03em;
  }

  .wf-coming-soon-15 .wf-subheading {
    font-size: clamp(1rem, 2vw, 1.25rem);
    color: var(--wf-text-muted);
    max-width: 500px;
    line-height: 1.6;
    margin-bottom: 3rem;
    font-weight: 300;
  }

  .wf-coming-soon-15 .wf-countdown {
    display: flex;
    gap: 1rem;
    margin-bottom: 3rem;
  }

  .wf-coming-soon-15 .wf-countdown-item {
    background-color: var(--wf-countdown-bg);
    border: 1px solid var(--wf-countdown-border);
    border-radius: var(--wf-radius);
    padding: 1.25rem 1.5rem;
    min-width: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    backdrop-filter: blur(8px);
  }

  .wf-coming-soon-15 .wf-countdown-value {
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    font-weight: 700;
    line-height: 1;
    margin-bottom: 0.25rem;
  }

  .wf-coming-soon-15 .wf-countdown-label {
    font-size: 0.7rem;
    color: var(--wf-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .wf-coming-soon-15 .wf-signup-form {
    display: flex;
    gap: 0.75rem;
    width: 100%;
    max-width: 460px;
    margin-bottom: 2.5rem;
  }

  .wf-coming-soon-15 .wf-input {
    flex: 1;
    padding: 0.875rem 1.25rem;
    border: 1px solid var(--wf-border);
    border-radius: var(--wf-radius);
    font-size: 1rem;
    font-family: var(--wf-font);
    background-color: var(--wf-input-bg);
    color: var(--wf-text);
    outline: none;
    backdrop-filter: blur(8px);
    transition: border-color 0.2s, background-color 0.2s;
  }

  .wf-coming-soon-15 .wf-input::placeholder {
    color: var(--wf-text-muted);
  }

  .wf-coming-soon-15 .wf-input:focus {
    border-color: rgba(255, 255, 255, 0.5);
    background-color: rgba(255, 255, 255, 0.18);
  }

  .wf-coming-soon-15 .wf-button {
    padding: 0.875rem 1.75rem;
    background-color: var(--wf-button-bg);
    color: var(--wf-button-text);
    border: none;
    border-radius: var(--wf-radius);
    font-size: 1rem;
    font-weight: 600;
    font-family: var(--wf-font);
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
  }

  .wf-coming-soon-15 .wf-button:hover {
    opacity: 0.9;
  }

  .wf-coming-soon-15 .wf-social {
    display: flex;
    gap: 0.75rem;
  }

  .wf-coming-soon-15 .wf-social-link {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 42px;
    height: 42px;
    background-color: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 50%;
    text-decoration: none;
    color: var(--wf-text);
    font-size: 0.7rem;
    font-weight: 600;
    backdrop-filter: blur(8px);
    transition: background-color 0.2s;
  }

  .wf-coming-soon-15 .wf-social-link:hover {
    background-color: rgba(255, 255, 255, 0.2);
  }

  @media (max-width: 600px) {
    .wf-coming-soon-15 .wf-countdown {
      gap: 0.5rem;
    }

    .wf-coming-soon-15 .wf-countdown-item {
      min-width: 64px;
      padding: 1rem;
    }

    .wf-coming-soon-15 .wf-signup-form {
      flex-direction: column;
    }
  }
</style>

<section class="wf-coming-soon-15">
  <div class="wf-logo"></div>

  <h1 class="wf-heading">Bientot disponible</h1>
  <p class="wf-subheading">Nous preparons quelque chose d'exceptionnel. Soyez les premiers informes.</p>

  <div class="wf-countdown">
    <div class="wf-countdown-item">
      <span class="wf-countdown-value">12</span>
      <span class="wf-countdown-label">Jours</span>
    </div>
    <div class="wf-countdown-item">
      <span class="wf-countdown-value">08</span>
      <span class="wf-countdown-label">Heures</span>
    </div>
    <div class="wf-countdown-item">
      <span class="wf-countdown-value">34</span>
      <span class="wf-countdown-label">Minutes</span>
    </div>
    <div class="wf-countdown-item">
      <span class="wf-countdown-value">56</span>
      <span class="wf-countdown-label">Secondes</span>
    </div>
  </div>

  <form class="wf-signup-form">
    <input type="email" class="wf-input" placeholder="Entrez votre email pour etre notifie" />
    <button type="submit" class="wf-button">Me notifier</button>
  </form>

  <div class="wf-social">
    <a href="#" class="wf-social-link" aria-label="Facebook">Fb</a>
    <a href="#" class="wf-social-link" aria-label="Twitter">Tw</a>
    <a href="#" class="wf-social-link" aria-label="Instagram">Ig</a>
    <a href="#" class="wf-social-link" aria-label="LinkedIn">Li</a>
  </div>
</section>
