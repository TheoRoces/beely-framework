<!-- coming-soon-05: Background image with overlay and centered text -->
<style>
  .wf-coming-soon-05 {
    --wf-bg: var(--color-bg-dark);
    --wf-overlay: rgba(0, 0, 0, 0.6);
    --wf-text: var(--color-text-on-dark);
    --wf-text-muted: rgba(255, 255, 255, 0.7);
    --wf-primary: var(--color-bg);
    --wf-primary-hover: var(--color-border);
    --wf-border: rgba(255, 255, 255, 0.2);
    --wf-radius: 8px;
    --wf-font: var(--font-body);

    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background-color: var(--wf-bg);
    background-image:
      linear-gradient(var(--wf-overlay), var(--wf-overlay)),
      linear-gradient(135deg, var(--color-bg-dark) 0%, var(--color-bg-dark) 50%, var(--color-text) 100%);
    background-size: cover;
    background-position: center;
    color: var(--wf-text);
    font-family: var(--wf-font);
    text-align: center;
    box-sizing: border-box;
    position: relative;
  }

  .wf-coming-soon-05 *,
  .wf-coming-soon-05 *::before,
  .wf-coming-soon-05 *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  .wf-coming-soon-05 .wf-label {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--wf-primary);
    margin-bottom: 1.5rem;
  }

  .wf-coming-soon-05 .wf-heading {
    font-size: clamp(2.5rem, 7vw, 5rem);
    font-weight: 800;
    line-height: 1.05;
    margin-bottom: 1.25rem;
    letter-spacing: -0.03em;
  }

  .wf-coming-soon-05 .wf-subheading {
    font-size: clamp(1rem, 2vw, 1.25rem);
    color: var(--wf-text-muted);
    max-width: 560px;
    line-height: 1.6;
    margin-bottom: 3rem;
  }

  .wf-coming-soon-05 .wf-countdown {
    display: flex;
    gap: 2rem;
    margin-bottom: 3rem;
  }

  .wf-coming-soon-05 .wf-countdown-item {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .wf-coming-soon-05 .wf-countdown-value {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .wf-coming-soon-05 .wf-countdown-label {
    font-size: 0.75rem;
    color: var(--wf-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .wf-coming-soon-05 .wf-countdown-separator {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 300;
    color: var(--wf-text-muted);
    align-self: flex-start;
  }

  @media (max-width: 600px) {
    .wf-coming-soon-05 .wf-countdown {
      gap: 1rem;
    }

    .wf-coming-soon-05 .wf-countdown-separator {
      display: none;
    }

  }
</style>

<section class="wf-coming-soon-05">
  <span class="wf-label">Lancement imminent</span>
  <h1 class="wf-heading">Bientot disponible</h1>
  <p class="wf-subheading">Nous preparons quelque chose d'exceptionnel. Soyez les premiers informes.</p>

  <div class="wf-countdown">
    <div class="wf-countdown-item">
      <span class="wf-countdown-value">12</span>
      <span class="wf-countdown-label">Jours</span>
    </div>
    <span class="wf-countdown-separator">:</span>
    <div class="wf-countdown-item">
      <span class="wf-countdown-value">08</span>
      <span class="wf-countdown-label">Heures</span>
    </div>
    <span class="wf-countdown-separator">:</span>
    <div class="wf-countdown-item">
      <span class="wf-countdown-value">34</span>
      <span class="wf-countdown-label">Minutes</span>
    </div>
    <span class="wf-countdown-separator">:</span>
    <div class="wf-countdown-item">
      <span class="wf-countdown-value">56</span>
      <span class="wf-countdown-label">Secondes</span>
    </div>
  </div>

  <form class="wf-signup-form">
    <input type="email" class="form__input" placeholder="Entrez votre email pour etre notifie" />
    <button type="submit" class="btn btn--primary">Me notifier</button>
  </form>
</section>
