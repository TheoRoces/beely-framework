<!-- coming-soon-06: Countdown boxes with newsletter signup and progress bar -->
<style>
  .wf-coming-soon-06 {
    --wf-bg: var(--color-bg);
    --wf-text: var(--color-text);
    --wf-text-muted: var(--color-text-light);
    --wf-primary: var(--color-text-light);
    --wf-primary-hover: var(--color-text-light);
    --wf-primary-light: var(--color-bg-alt);
    --wf-border: var(--color-border);
    --wf-radius: 12px;
    --wf-countdown-bg: var(--color-bg-alt);
    --wf-progress-bg: var(--color-border);
    --wf-font: var(--font-body);

    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background-color: var(--wf-bg);
    color: var(--wf-text);
    font-family: var(--wf-font);
    text-align: center;
    box-sizing: border-box;
  }

  .wf-coming-soon-06 *,
  .wf-coming-soon-06 *::before,
  .wf-coming-soon-06 *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  .wf-coming-soon-06 .wf-badge {
    display: inline-block;
    padding: 0.5rem 1rem;
    background-color: var(--wf-primary-light);
    color: var(--wf-primary);
    border-radius: 100px;
    font-size: 0.8rem;
    font-weight: 600;
    margin-bottom: 2rem;
  }

  .wf-coming-soon-06 .wf-heading {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 1rem;
    letter-spacing: -0.02em;
  }

  .wf-coming-soon-06 .wf-subheading {
    font-size: clamp(1rem, 2vw, 1.125rem);
    color: var(--wf-text-muted);
    max-width: 480px;
    line-height: 1.6;
    margin-bottom: 2.5rem;
  }

  .wf-coming-soon-06 .wf-countdown {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-bottom: 2.5rem;
    width: 100%;
    max-width: 520px;
  }

  .wf-coming-soon-06 .wf-countdown-item {
    background-color: var(--wf-countdown-bg);
    border: 1px solid var(--wf-border);
    border-radius: var(--wf-radius);
    padding: 1.5rem 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .wf-coming-soon-06 .wf-countdown-value {
    font-size: clamp(1.75rem, 4vw, 2.5rem);
    font-weight: 800;
    line-height: 1;
    margin-bottom: 0.5rem;
    color: var(--wf-primary);
  }

  .wf-coming-soon-06 .wf-countdown-label {
    font-size: 0.75rem;
    color: var(--wf-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 500;
  }

  .wf-coming-soon-06 .wf-progress-wrapper {
    width: 100%;
    max-width: 520px;
    margin-bottom: 2.5rem;
  }

  .wf-coming-soon-06 .wf-progress-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.5rem;
    font-size: 0.875rem;
  }

  .wf-coming-soon-06 .wf-progress-label {
    color: var(--wf-text-muted);
  }

  .wf-coming-soon-06 .wf-progress-percent {
    font-weight: 600;
    color: var(--wf-primary);
  }

  .wf-coming-soon-06 .wf-progress-bar {
    width: 100%;
    height: 8px;
    background-color: var(--wf-progress-bg);
    border-radius: 100px;
    overflow: hidden;
  }

  .wf-coming-soon-06 .wf-progress-fill {
    width: 72%;
    height: 100%;
    background-color: var(--wf-primary);
    border-radius: 100px;
  }

  .wf-coming-soon-06 .wf-signup-form {
    display: flex;
    gap: 0.75rem;
    width: 100%;
    max-width: 520px;
  }

  .wf-coming-soon-06 .wf-input {
    flex: 1;
    padding: 0.875rem 1rem;
    border: 1px solid var(--wf-border);
    border-radius: var(--wf-radius);
    font-size: 1rem;
    font-family: var(--wf-font);
    background: var(--color-bg);
    color: var(--color-text);
    outline: none;
    transition: border-color 0.2s;
  }

  .wf-coming-soon-06 .wf-input:focus {
    border-color: var(--wf-primary);
  }

  .wf-coming-soon-06 .wf-button {
    padding: 0.875rem 1.75rem;
    background-color: var(--wf-primary);
    color: var(--color-text-on-dark);
    border: none;
    border-radius: var(--wf-radius);
    font-size: 1rem;
    font-weight: 600;
    font-family: var(--wf-font);
    cursor: pointer;
    white-space: nowrap;
    transition: background-color 0.2s;
  }

  .wf-coming-soon-06 .wf-button:hover {
    background-color: var(--wf-primary-hover);
  }

  @media (max-width: 600px) {
    .wf-coming-soon-06 .wf-countdown {
      grid-template-columns: repeat(2, 1fr);
    }

    .wf-coming-soon-06 .wf-signup-form {
      flex-direction: column;
    }
  }
</style>

<section class="wf-coming-soon-06">
  <span class="wf-badge">Bientot disponible</span>

  <h1 class="wf-heading">Nous preparons quelque chose d'exceptionnel</h1>
  <p class="wf-subheading">Soyez les premiers informes de notre lancement. Inscrivez-vous a notre newsletter.</p>

  <div class="wf-countdown">
    <div class="wf-countdown-item">
      <span class="wf-countdown-value">12</span>
      <span class="wf-countdown-label">Jours</span>
    </div>
    <div class="wf-countdown-item">
      <span class="wf-countdown-value">08</span>
      <span class="wf-countdown-label">Heures</span>
    </div>
    <div class="wf-countdown-item">
      <span class="wf-countdown-value">34</span>
      <span class="wf-countdown-label">Minutes</span>
    </div>
    <div class="wf-countdown-item">
      <span class="wf-countdown-value">56</span>
      <span class="wf-countdown-label">Secondes</span>
    </div>
  </div>

  <div class="wf-progress-wrapper">
    <div class="wf-progress-header">
      <span class="wf-progress-label">Progression du projet</span>
      <span class="wf-progress-percent">72%</span>
    </div>
    <div class="wf-progress-bar">
      <div class="wf-progress-fill"></div>
    </div>
  </div>

  <form class="wf-signup-form">
    <input type="email" class="wf-input" placeholder="Entrez votre email pour etre notifie" />
    <button type="submit" class="wf-button">Me notifier</button>
  </form>
</section>
