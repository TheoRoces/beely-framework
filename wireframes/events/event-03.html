<!-- event-03.html | Single event spotlight (large image + details + register button) -->
<style>
  .wf-event-03 {
    --wf-bg: var(--color-bg, #ffffff);
    --wf-text: var(--color-text, #1a1a1a);
    --wf-text-muted: var(--color-text-light, #6b7280);
    --wf-accent: var(--color-text, #374151);
    --wf-accent-hover: var(--color-neutral-800, #1f2937);
    --wf-border: var(--color-border, #e5e7eb);
    --wf-radius: 16px;
    --wf-spacing: 2rem;
    padding: calc(var(--wf-spacing) * 3) var(--wf-spacing);
    background: var(--wf-bg);
    color: var(--wf-text);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-event-03__container {
    max-width: 1120px;
    margin: 0 auto;
  }

  .wf-event-03__tag {
    display: inline-block;
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--wf-accent);
    margin-bottom: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .wf-event-03__layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
    align-items: center;
  }

  .wf-event-03__image {
    width: 100%;
    aspect-ratio: 4 / 3;
    background: linear-gradient(135deg, var(--color-bg-alt, #f3f4f6) 0%, var(--color-border, #e5e7eb) 100%);
    border-radius: var(--wf-radius);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wf-event-03__image svg {
    width: 64px;
    height: 64px;
    color: var(--wf-accent);
    opacity: 0.3;
  }

  .wf-event-03__content {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .wf-event-03__badge {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    background: var(--color-bg-alt, #f3f4f6);
    color: var(--color-text, #374151);
    font-size: 0.8125rem;
    font-weight: 600;
    padding: 0.375rem 0.75rem;
    border-radius: 100px;
    width: fit-content;
  }

  .wf-event-03__title {
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.2;
    margin: 0;
  }

  .wf-event-03__description {
    font-size: 1rem;
    color: var(--wf-text-muted);
    line-height: 1.6;
    margin: 0;
  }

  .wf-event-03__details {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .wf-event-03__detail {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 0.9375rem;
  }

  .wf-event-03__detail-icon {
    width: 40px;
    height: 40px;
    background: var(--color-neutral-100, #f3f4f6);
    border-radius: var(--radius-lg, 0.75rem);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--wf-accent);
  }

  .wf-event-03__detail-icon svg {
    width: 20px;
    height: 20px;
  }

  .wf-event-03__detail-label {
    font-size: 0.75rem;
    color: var(--wf-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .wf-event-03__detail-value {
    font-weight: 600;
  }

  .wf-event-03__actions {
    display: flex;
    gap: 1rem;
    margin-top: 0.5rem;
  }

  .wf-event-03__btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.75rem 1.75rem;
    border-radius: var(--radius-lg, 0.75rem);
    font-size: 0.9375rem;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    border: none;
    transition: all 0.2s ease;
  }

  .wf-event-03__btn--primary {
    background: var(--wf-accent);
    color: var(--color-text-on-dark);
  }

  .wf-event-03__btn--primary:hover {
    background: var(--wf-accent-hover);
  }

  .wf-event-03__btn--secondary {
    background: transparent;
    color: var(--wf-text);
    border: 1px solid var(--wf-border);
  }

  .wf-event-03__btn--secondary:hover {
    background: var(--color-bg-alt, #f9fafb);
  }

  @media (max-width: 768px) {
    .wf-event-03__layout {
      grid-template-columns: 1fr;
      gap: 2rem;
    }

    .wf-event-03__title {
      font-size: 1.5rem;
    }

    .wf-event-03__actions {
      flex-direction: column;
    }

    .wf-event-03__btn {
      text-align: center;
    }
  }
</style>

<section class="wf-event-03">
  <div class="wf-event-03__container">
    <span class="wf-event-03__tag">Événement vedette</span>
    <div class="wf-event-03__layout">
      <div class="wf-event-03__image">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/></svg>
      </div>
      <div class="wf-event-03__content">
        <span class="wf-event-03__badge">Places limitees</span>
        <h2 class="wf-event-03__title">Conference annuelle</h2>
        <p class="wf-event-03__description">Rejoignez-nous pour une journee exceptionnelle dédiée aux innovations et aux tendances qui faconneront votre secteur en 2026.</p>
        <div class="wf-event-03__details">
          <div class="wf-event-03__detail">
            <div class="wf-event-03__detail-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/></svg>
            </div>
            <div>
              <div class="wf-event-03__detail-label">Date</div>
              <div class="wf-event-03__detail-value">15 Mars 2026</div>
            </div>
          </div>
          <div class="wf-event-03__detail">
            <div class="wf-event-03__detail-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>
            <div>
              <div class="wf-event-03__detail-label">Horaire</div>
              <div class="wf-event-03__detail-value">14h00 - 16h00</div>
            </div>
          </div>
          <div class="wf-event-03__detail">
            <div class="wf-event-03__detail-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
            </div>
            <div>
              <div class="wf-event-03__detail-label">Lieu</div>
              <div class="wf-event-03__detail-value">Paris, France</div>
            </div>
          </div>
        </div>
        <div class="wf-event-03__actions">
          <a href="#" class="wf-event-03__btn wf-event-03__btn--primary">Réserver ma place</a>
          <a href="#" class="wf-event-03__btn wf-event-03__btn--secondary">En savoir plus</a>
        </div>
      </div>
    </div>
  </div>
</section>
