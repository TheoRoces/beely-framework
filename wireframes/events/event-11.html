<!-- event-11.html | Event countdown hero + details below -->
<style>
  .wf-event-11 {
    --wf-bg: var(--color-bg-dark, #0f172a);
    --wf-bg-light: var(--color-bg, #ffffff);
    --wf-text: var(--color-text-inverse, #f8fafc);
    --wf-text-dark: var(--color-text, #1a1a1a);
    --wf-text-muted: var(--color-neutral-400, #94a3b8);
    --wf-text-muted-dark: var(--color-text-light, #6b7280);
    --wf-accent: var(--color-text, #374151);
    --wf-accent-hover: var(--color-text, #374151);
    --wf-border: var(--color-border, #e5e7eb);
    --wf-radius: 12px;
    --wf-spacing: 2rem;
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-event-11__hero {
    background: var(--wf-bg);
    color: var(--wf-text);
    padding: calc(var(--wf-spacing) * 4) var(--wf-spacing);
    text-align: center;
  }

  .wf-event-11__container {
    max-width: 800px;
    margin: 0 auto;
  }

  .wf-event-11__tag {
    display: inline-block;
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--color-border, #e5e7eb);
    margin-bottom: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .wf-event-11__title {
    font-size: 2.75rem;
    font-weight: 700;
    line-height: 1.15;
    margin: 0 0 1rem;
  }

  .wf-event-11__subtitle {
    font-size: 1.125rem;
    color: var(--wf-text-muted);
    margin: 0 0 2.5rem;
    max-width: 560px;
    margin-inline: auto;
    line-height: 1.6;
  }

  .wf-event-11__countdown {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-bottom: 2.5rem;
  }

  .wf-event-11__countdown-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 80px;
  }

  .wf-event-11__countdown-number {
    font-size: 3rem;
    font-weight: 700;
    line-height: 1;
    color: var(--color-text-on-dark);
  }

  .wf-event-11__countdown-label {
    font-size: 0.8125rem;
    color: var(--wf-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 0.5rem;
  }

  .wf-event-11__countdown-sep {
    font-size: 2.5rem;
    font-weight: 300;
    color: var(--color-text-light, #6b7280);
    line-height: 1;
    padding-top: 0.25rem;
  }

  .wf-event-11__hero-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.875rem 2rem;
    background: var(--color-bg, #ffffff);
    color: var(--color-bg-dark, #0f172a);
    border: none;
    border-radius: var(--radius-lg, 0.75rem);
    font-size: 1rem;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.2s ease;
  }

  .wf-event-11__hero-btn:hover {
    background: var(--color-border, #e5e7eb);
  }

  .wf-event-11__details {
    background: var(--wf-bg-light);
    color: var(--wf-text-dark);
    padding: calc(var(--wf-spacing) * 3) var(--wf-spacing);
  }

  .wf-event-11__details-container {
    max-width: 960px;
    margin: 0 auto;
  }

  .wf-event-11__details-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem;
  }

  .wf-event-11__detail-card {
    text-align: center;
    padding: 2rem 1.5rem;
    border: 1px solid var(--wf-border);
    border-radius: var(--wf-radius);
  }

  .wf-event-11__detail-icon {
    width: 48px;
    height: 48px;
    background: var(--color-neutral-100, #f3f4f6);
    border-radius: var(--radius-lg, 0.75rem);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
    color: var(--wf-accent);
  }

  .wf-event-11__detail-icon svg {
    width: 24px;
    height: 24px;
  }

  .wf-event-11__detail-label {
    font-size: 0.75rem;
    color: var(--wf-text-muted-dark);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.375rem;
  }

  .wf-event-11__detail-value {
    font-size: 1.125rem;
    font-weight: 600;
    margin: 0;
  }

  @media (max-width: 768px) {
    .wf-event-11__title {
      font-size: 2rem;
    }

    .wf-event-11__countdown {
      gap: 0.75rem;
    }

    .wf-event-11__countdown-number {
      font-size: 2rem;
    }

    .wf-event-11__countdown-item {
      min-width: 60px;
    }

    .wf-event-11__countdown-sep {
      font-size: 1.5rem;
    }

    .wf-event-11__details-grid {
      grid-template-columns: 1fr;
      max-width: 400px;
      margin-inline: auto;
    }
  }
</style>

<section class="wf-event-11">
  <!-- Hero with countdown -->
  <div class="wf-event-11__hero">
    <div class="wf-event-11__container">
      <span class="wf-event-11__tag">Événement à venir</span>
      <h2 class="wf-event-11__title">Conference annuelle</h2>
      <p class="wf-event-11__subtitle">Rejoignez-nous pour une journee exceptionnelle dédiée aux innovations et aux tendances qui faconneront votre secteur en 2026.</p>

      <div class="wf-event-11__countdown">
        <div class="wf-event-11__countdown-item">
          <span class="wf-event-11__countdown-number">17</span>
          <span class="wf-event-11__countdown-label">Jours</span>
        </div>
        <span class="wf-event-11__countdown-sep">:</span>
        <div class="wf-event-11__countdown-item">
          <span class="wf-event-11__countdown-number">08</span>
          <span class="wf-event-11__countdown-label">Heures</span>
        </div>
        <span class="wf-event-11__countdown-sep">:</span>
        <div class="wf-event-11__countdown-item">
          <span class="wf-event-11__countdown-number">42</span>
          <span class="wf-event-11__countdown-label">Minutes</span>
        </div>
        <span class="wf-event-11__countdown-sep">:</span>
        <div class="wf-event-11__countdown-item">
          <span class="wf-event-11__countdown-number">15</span>
          <span class="wf-event-11__countdown-label">Secondes</span>
        </div>
      </div>

      <a href="#" class="wf-event-11__hero-btn">Réserver ma place</a>
    </div>
  </div>

  <!-- Details below -->
  <div class="wf-event-11__details">
    <div class="wf-event-11__details-container">
      <div class="wf-event-11__details-grid">
        <div class="wf-event-11__detail-card">
          <div class="wf-event-11__detail-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/></svg>
          </div>
          <div class="wf-event-11__detail-label">Date</div>
          <p class="wf-event-11__detail-value">15 Mars 2026</p>
        </div>
        <div class="wf-event-11__detail-card">
          <div class="wf-event-11__detail-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </div>
          <div class="wf-event-11__detail-label">Horaire</div>
          <p class="wf-event-11__detail-value">14h00 - 16h00</p>
        </div>
        <div class="wf-event-11__detail-card">
          <div class="wf-event-11__detail-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
          </div>
          <div class="wf-event-11__detail-label">Lieu</div>
          <p class="wf-event-11__detail-value">Paris, France</p>
        </div>
      </div>
    </div>
  </div>
</section>
