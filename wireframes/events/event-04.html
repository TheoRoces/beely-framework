<!-- event-04.html | Calendar month view grid (simplified) -->
<style>
  .wf-event-04 {
    --wf-bg: var(--color-bg, #ffffff);
    --wf-text: var(--color-text, #1a1a1a);
    --wf-text-muted: var(--color-text-light, #6b7280);
    --wf-accent: var(--color-text, #374151);
    --wf-accent-light: var(--color-neutral-100, #e5e7eb);
    --wf-border: var(--color-border, #e5e7eb);
    --wf-radius: 12px;
    --wf-spacing: 2rem;
    --wf-day-empty: var(--color-bg-alt, #f9fafb);
    padding: calc(var(--wf-spacing) * 3) var(--wf-spacing);
    background: var(--wf-bg);
    color: var(--wf-text);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-event-04__container {
    max-width: 960px;
    margin: 0 auto;
  }

  .wf-event-04__header {
    text-align: center;
    margin-bottom: calc(var(--wf-spacing) * 2);
  }

  .wf-event-04__tag {
    display: inline-block;
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--wf-accent);
    margin-bottom: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .wf-event-04__title {
    font-size: 2.25rem;
    font-weight: 700;
    line-height: 1.2;
    margin: 0 0 0.75rem;
  }

  .wf-event-04__nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .wf-event-04__nav-btn {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-lg, 0.75rem);
    border: 1px solid var(--wf-border);
    background: var(--wf-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 1.25rem;
    color: var(--wf-text);
    transition: background 0.2s;
  }

  .wf-event-04__nav-btn:hover {
    background: var(--color-bg-alt, #f9fafb);
  }

  .wf-event-04__month-label {
    font-size: 1.25rem;
    font-weight: 600;
    min-width: 180px;
    text-align: center;
  }

  .wf-event-04__calendar {
    border: 1px solid var(--wf-border);
    border-radius: var(--wf-radius);
    overflow: hidden;
  }

  .wf-event-04__weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: var(--color-bg-alt, #f9fafb);
    border-bottom: 1px solid var(--wf-border);
  }

  .wf-event-04__weekday {
    padding: 0.75rem 0.5rem;
    text-align: center;
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--wf-text-muted);
    text-transform: uppercase;
  }

  .wf-event-04__days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }

  .wf-event-04__day {
    min-height: 80px;
    padding: 0.5rem;
    border-right: 1px solid var(--wf-border);
    border-bottom: 1px solid var(--wf-border);
    font-size: 0.875rem;
  }

  .wf-event-04__day:nth-child(7n) {
    border-right: none;
  }

  .wf-event-04__day--empty {
    background: var(--wf-day-empty);
  }

  .wf-event-04__day-number {
    font-weight: 600;
    margin-bottom: 0.25rem;
    font-size: 0.8125rem;
  }

  .wf-event-04__day-number--today {
    width: 24px;
    height: 24px;
    background: var(--wf-accent);
    color: var(--color-text-on-dark);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
  }

  .wf-event-04__day-event {
    font-size: 0.6875rem;
    padding: 2px 6px;
    border-radius: var(--radius-sm, 0.25rem);
    background: var(--wf-accent-light);
    color: var(--wf-accent);
    font-weight: 500;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
  }

  .wf-event-04__day-event--alt {
    background: var(--color-bg-alt, #f3f4f6);
    color: var(--color-text, #374151);
  }

  @media (max-width: 768px) {
    .wf-event-04__title {
      font-size: 1.75rem;
    }

    .wf-event-04__day {
      min-height: 60px;
      padding: 0.25rem;
    }

    .wf-event-04__weekday {
      font-size: 0.6875rem;
      padding: 0.5rem 0.25rem;
    }

    .wf-event-04__day-event {
      font-size: 0.5625rem;
      padding: 1px 3px;
    }
  }
</style>
