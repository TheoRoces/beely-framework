<!-- intro-01.html | Centered eyebrow + large title + subtitle paragraph -->
<style>
  .wf-intro-01 {
    --wf-section-padding: 6rem 1.5rem;
    --wf-max-width: 52rem;
    --wf-eyebrow-color: var(--color-text);
    --wf-eyebrow-size: 0.875rem;
    --wf-title-size: clamp(2.25rem, 5vw, 3.75rem);
    --wf-title-color: var(--color-neutral-900);
    --wf-subtitle-size: 1.125rem;
    --wf-subtitle-color: var(--color-neutral-600);
    --wf-font-family: var(--font-body);

    padding: var(--wf-section-padding);
    font-family: var(--wf-font-family);
    text-align: center;
  }

  .wf-intro-01__container {
    max-width: var(--wf-max-width);
    margin: 0 auto;
  }

  .wf-intro-01__eyebrow {
    display: inline-block;
    font-size: var(--wf-eyebrow-size);
    font-weight: 600;
    color: var(--wf-eyebrow-color);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
  }

  .wf-intro-01__title {
    font-size: var(--wf-title-size);
    font-weight: 700;
    color: var(--wf-title-color);
    line-height: 1.15;
    margin: 0 0 1.5rem 0;
    letter-spacing: -0.02em;
  }

  .wf-intro-01__subtitle {
    font-size: var(--wf-subtitle-size);
    color: var(--wf-subtitle-color);
    line-height: 1.7;
    margin: 0 auto;
    max-width: 40rem;
  }
</style>

<section class="wf-intro-01">
  <div class="wf-intro-01__container">
    <span class="wf-intro-01__eyebrow">A propos de nous</span>
    <h1 class="wf-intro-01__title">Nous accompagnons les entreprises dans leur transformation digitale</h1>
    <p class="wf-intro-01__subtitle">Depuis 2015, nous accompagnons les entreprises dans leur transformation digitale. Notre équipe d'experts met son savoir-faire au service de votre réussite, avec une approche sur mesure adaptée à vos besoins.</p>
  </div>
</section>
