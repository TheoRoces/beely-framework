<!-- intro-11.html | Intro with animated typing effect placeholder (CSS only) -->
<style>
  .wf-intro-11 {
    --wf-section-padding: 7rem 1.5rem;
    --wf-max-width: 52rem;
    --wf-title-size: clamp(2rem, 4.5vw, 3.25rem);
    --wf-title-color: var(--color-neutral-900);
    --wf-typed-color: var(--color-text);
    --wf-text-size: 1.0625rem;
    --wf-text-color: var(--color-neutral-600);
    --wf-cursor-color: var(--color-text);
    --wf-font-family: var(--font-body);

    padding: var(--wf-section-padding);
    font-family: var(--wf-font-family);
    text-align: center;
  }

  .wf-intro-11__container {
    max-width: var(--wf-max-width);
    margin: 0 auto;
  }

  .wf-intro-11__eyebrow {
    display: inline-block;
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--wf-typed-color);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 1.25rem;
  }

  .wf-intro-11__title {
    font-size: var(--wf-title-size);
    font-weight: 700;
    color: var(--wf-title-color);
    line-height: 1.2;
    margin: 0 0 1.5rem 0;
    letter-spacing: -0.02em;
  }

  .wf-intro-11__typed {
    color: var(--wf-typed-color);
    display: inline-block;
    position: relative;
    overflow: hidden;
    white-space: nowrap;
    border-right: 3px solid var(--wf-cursor-color);
    animation:
      wf-typing 3.5s steps(22, end) infinite,
      wf-blink 0.75s step-end infinite;
    max-width: 22ch;
    width: 0;
    vertical-align: bottom;
  }

  @keyframes wf-typing {
    0% { width: 0; }
    50% { width: 22ch; }
    70% { width: 22ch; }
    100% { width: 0; }
  }

  @keyframes wf-blink {
    from, to { border-color: transparent; }
    50% { border-color: var(--wf-cursor-color); }
  }

  .wf-intro-11__subtitle {
    font-size: var(--wf-text-size);
    color: var(--wf-text-color);
    line-height: 1.75;
    margin: 0 auto;
    max-width: 38rem;
  }

  .wf-intro-11__actions {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-top: 2rem;
    flex-wrap: wrap;
  }

  .wf-intro-11__btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 1.75rem;
    font-size: 0.9375rem;
    font-weight: 600;
    font-family: inherit;
    text-decoration: none;
    border-radius: var(--radius-md, 0.5rem);
    cursor: pointer;
    border: none;
    transition: opacity 0.2s ease;
  }

  .wf-intro-11__btn:hover {
    opacity: 0.9;
  }

  .wf-intro-11__btn--primary {
    background-color: var(--wf-typed-color);
    color: var(--color-text-on-dark);
  }

  .wf-intro-11__btn--secondary {
    background-color: transparent;
    color: var(--wf-title-color);
    border: 1px solid var(--color-neutral-300);
  }
</style>

<section class="wf-intro-11">
  <div class="wf-intro-11__container">
    <span class="wf-intro-11__eyebrow">À propos de nous</span>
    <h2 class="wf-intro-11__title">
      Nous creons des solutions<br>
      <span class="wf-intro-11__typed">d'innovation digitale</span>
    </h2>
    <p class="wf-intro-11__subtitle">Depuis 2015, nous accompagnons les entreprises dans leur transformation digitale. Innovation, excellence et engagement sont les moteurs de chacun de nos projets.</p>
    <div class="wf-intro-11__actions">
      <a href="#" class="wf-intro-11__btn wf-intro-11__btn--primary">Découvrir nos services</a>
      <a href="#" class="wf-intro-11__btn wf-intro-11__btn--secondary">Nous contacter</a>
    </div>
  </div>
</section>
