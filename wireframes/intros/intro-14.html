<!-- intro-14.html | Intro with gradient text title (CSS) -->
<style>
  .wf-intro-14 {
    --wf-section-padding: 7rem 1.5rem;
    --wf-max-width: 56rem;
    --wf-title-size: clamp(2.5rem, 6vw, 4.5rem);
    --wf-gradient-start: var(--color-bg-dark);
    --wf-gradient-mid: var(--color-text);
    --wf-gradient-end: var(--color-text-light);
    --wf-text-size: 1.125rem;
    --wf-text-color: var(--color-neutral-600);
    --wf-eyebrow-color: var(--color-text);
    --wf-font-family: var(--font-body);

    padding: var(--wf-section-padding);
    font-family: var(--wf-font-family);
    text-align: center;
  }

  .wf-intro-14__container {
    max-width: var(--wf-max-width);
    margin: 0 auto;
  }

  .wf-intro-14__eyebrow {
    display: inline-block;
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--wf-eyebrow-color);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 1.5rem;
    padding: 0.375rem 1rem;
    background-color: var(--color-neutral-100);
    border-radius: var(--radius-full, 9999px);
  }

  .wf-intro-14__title {
    font-size: var(--wf-title-size);
    font-weight: 800;
    line-height: 1.1;
    margin: 0 0 1.75rem 0;
    letter-spacing: -0.03em;
    background: linear-gradient(
      135deg,
      var(--wf-gradient-start) 0%,
      var(--wf-gradient-mid) 50%,
      var(--wf-gradient-end) 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .wf-intro-14__subtitle {
    font-size: var(--wf-text-size);
    color: var(--wf-text-color);
    line-height: 1.75;
    margin: 0 auto 2.5rem auto;
    max-width: 40rem;
  }

  .wf-intro-14__tags {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.75rem;
  }

  .wf-intro-14__tag {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--color-text-light);
    background-color: var(--color-bg-alt);
    padding: 0.5rem 1rem;
    border-radius: var(--radius-full, 9999px);
  }

  .wf-intro-14__tag-dot {
    width: 0.5rem;
    height: 0.5rem;
    border-radius: 50%;
    background: linear-gradient(
      135deg,
      var(--wf-gradient-start),
      var(--wf-gradient-end)
    );
  }
</style>

<section class="wf-intro-14">
  <div class="wf-intro-14__container">
    <span class="wf-intro-14__eyebrow">À propos de nous</span>
    <h2 class="wf-intro-14__title">Innovation. Excellence. Engagement.</h2>
    <p class="wf-intro-14__subtitle">Depuis 2015, nous accompagnons les entreprises dans leur transformation digitale. Trois mots définissent notre identité et guident chacune de nos actions au quotidien.</p>
    <div class="wf-intro-14__tags">
      <span class="wf-intro-14__tag">
        <span class="wf-intro-14__tag-dot"></span>
        10+ années d'expérience
      </span>
      <span class="wf-intro-14__tag">
        <span class="wf-intro-14__tag-dot"></span>
        500+ projets réalisés
      </span>
      <span class="wf-intro-14__tag">
        <span class="wf-intro-14__tag-dot"></span>
        98% de clients satisfaits
      </span>
    </div>
  </div>
</section>
