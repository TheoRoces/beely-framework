<!-- intro-15.html | Compact intro bar with title + description + CTA inline -->
<style>
  .wf-intro-15 {
    --wf-section-padding: 2.5rem 1.5rem;
    --wf-max-width: 72rem;
    --wf-bg-color: var(--color-bg-alt);
    --wf-title-size: 1.375rem;
    --wf-title-color: var(--color-neutral-900);
    --wf-text-size: 0.9375rem;
    --wf-text-color: var(--color-neutral-600);
    --wf-accent-color: var(--color-text);
    --wf-border-color: var(--color-border);
    --wf-font-family: var(--font-body);

    padding: var(--wf-section-padding);
    font-family: var(--wf-font-family);
    background-color: var(--wf-bg-color);
    border-bottom: 1px solid var(--wf-border-color);
  }

  .wf-intro-15__container {
    max-width: var(--wf-max-width);
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    align-items: flex-start;
  }

  @media (min-width: 768px) {
    .wf-intro-15__container {
      flex-direction: row;
      align-items: center;
      gap: 2rem;
    }
  }

  .wf-intro-15__indicator {
    width: 4px;
    height: 2.5rem;
    background-color: var(--wf-accent-color);
    border-radius: 2px;
    flex-shrink: 0;
    display: none;
  }

  @media (min-width: 768px) {
    .wf-intro-15__indicator {
      display: block;
    }
  }

  .wf-intro-15__title {
    font-size: var(--wf-title-size);
    font-weight: 700;
    color: var(--wf-title-color);
    margin: 0;
    white-space: nowrap;
    letter-spacing: -0.01em;
  }

  .wf-intro-15__divider {
    display: none;
    width: 1px;
    height: 2rem;
    background-color: var(--wf-border-color);
    flex-shrink: 0;
  }

  @media (min-width: 768px) {
    .wf-intro-15__divider {
      display: block;
    }
  }

  .wf-intro-15__text {
    font-size: var(--wf-text-size);
    color: var(--wf-text-color);
    line-height: 1.6;
    margin: 0;
    flex: 1;
  }

  .wf-intro-15__cta {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.625rem 1.5rem;
    font-size: 0.875rem;
    font-weight: 600;
    font-family: inherit;
    color: var(--color-text-on-dark);
    background-color: var(--wf-accent-color);
    text-decoration: none;
    border-radius: var(--radius-md, 0.5rem);
    white-space: nowrap;
    flex-shrink: 0;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s ease;
  }

  .wf-intro-15__cta:hover {
    opacity: 0.9;
  }
</style>

<section class="wf-intro-15">
  <div class="wf-intro-15__container">
    <span class="wf-intro-15__indicator"></span>
    <h2 class="wf-intro-15__title">A propos de nous</h2>
    <span class="wf-intro-15__divider"></span>
    <p class="wf-intro-15__text">Depuis 2015, nous accompagnons les entreprises dans leur transformation digitale avec innovation, excellence et engagement.</p>
    <a href="#" class="wf-intro-15__cta">En savoir plus &rarr;</a>
  </div>
</section>
