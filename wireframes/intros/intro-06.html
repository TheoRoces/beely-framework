<!-- intro-06.html | Dark section with centered intro text -->
<style>
  .wf-intro-06 {
    --wf-section-padding: 7rem 1.5rem;
    --wf-max-width: 50rem;
    --wf-bg-color: var(--color-bg-dark);
    --wf-eyebrow-color: var(--color-text-light);
    --wf-title-size: clamp(2.25rem, 5vw, 3.5rem);
    --wf-title-color: var(--color-text-on-dark);
    --wf-subtitle-size: 1.125rem;
    --wf-subtitle-color: var(--color-neutral-400);
    --wf-divider-color: var(--color-text);
    --wf-font-family: var(--font-body);

    padding: var(--wf-section-padding);
    font-family: var(--wf-font-family);
    background-color: var(--wf-bg-color);
    text-align: center;
  }

  .wf-intro-06__container {
    max-width: var(--wf-max-width);
    margin: 0 auto;
  }

  .wf-intro-06__eyebrow {
    display: inline-block;
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--wf-eyebrow-color);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 1.25rem;
    padding: 0.375rem 1rem;
    border: 1px solid rgba(107, 114, 128, 0.3);
    border-radius: var(--radius-full, 9999px);
  }

  .wf-intro-06__title {
    font-size: var(--wf-title-size);
    font-weight: 700;
    color: var(--wf-title-color);
    line-height: 1.15;
    margin: 0 0 1.5rem 0;
    letter-spacing: -0.02em;
  }

  .wf-intro-06__divider {
    width: 3rem;
    height: 2px;
    background-color: var(--wf-divider-color);
    border: none;
    margin: 0 auto 1.5rem auto;
  }

  .wf-intro-06__subtitle {
    font-size: var(--wf-subtitle-size);
    color: var(--wf-subtitle-color);
    line-height: 1.75;
    margin: 0 auto;
    max-width: 40rem;
  }
</style>

<section class="wf-intro-06">
  <div class="wf-intro-06__container">
    <span class="wf-intro-06__eyebrow">A propos de nous</span>
    <h2 class="wf-intro-06__title">L'innovation au service de votre croissance</h2>
    <hr class="wf-intro-06__divider">
    <p class="wf-intro-06__subtitle">Depuis 2015, nous accompagnons les entreprises dans leur transformation digitale. Nous concevons des solutions sur mesure qui allient performance technique et expérience utilisateur exceptionnelle.</p>
  </div>
