<!-- intro-10.html | Page header: breadcrumb + title + meta -->
<style>
  .wf-intro-10 {
    --wf-section-padding: 4rem 1.5rem 3rem;
    --wf-max-width: 72rem;
    --wf-bg-color: var(--color-bg-alt);
    --wf-breadcrumb-color: var(--color-neutral-500);
    --wf-breadcrumb-active: var(--color-text);
    --wf-title-size: clamp(2rem, 4.5vw, 3rem);
    --wf-title-color: var(--color-neutral-900);
    --wf-meta-color: var(--color-neutral-500);
    --wf-border-color: var(--color-border);
    --wf-tag-bg: var(--color-bg-alt);
    --wf-tag-color: var(--color-text);
    --wf-font-family: var(--font-body);

    padding: var(--wf-section-padding);
    font-family: var(--wf-font-family);
    background-color: var(--wf-bg-color);
    border-bottom: 1px solid var(--wf-border-color);
  }

  .wf-intro-10__container {
    max-width: var(--wf-max-width);
    margin: 0 auto;
  }

  .wf-intro-10__breadcrumb {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.8125rem;
    color: var(--wf-breadcrumb-color);
    margin-bottom: 1.5rem;
    list-style: none;
    padding: 0;
    margin-top: 0;
    flex-wrap: wrap;
  }

  .wf-intro-10__breadcrumb li {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .wf-intro-10__breadcrumb li:not(:last-child)::after {
    content: '/';
    color: var(--wf-border-color);
  }

  .wf-intro-10__breadcrumb a {
    color: var(--wf-breadcrumb-color);
    text-decoration: none;
  }

  .wf-intro-10__breadcrumb a:hover {
    color: var(--wf-breadcrumb-active);
  }

  .wf-intro-10__breadcrumb li:last-child {
    color: var(--wf-breadcrumb-active);
    font-weight: 500;
  }

  .wf-intro-10__title {
    font-size: var(--wf-title-size);
    font-weight: 700;
    color: var(--wf-title-color);
    line-height: 1.2;
    margin: 0 0 1.25rem 0;
    letter-spacing: -0.02em;
  }

  .wf-intro-10__meta {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 1.5rem;
    font-size: 0.875rem;
    color: var(--wf-meta-color);
  }

  .wf-intro-10__meta-item {
    display: flex;
    align-items: center;
    gap: 0.375rem;
  }

  .wf-intro-10__meta-item svg {
    width: 1rem;
    height: 1rem;
    flex-shrink: 0;
  }

  .wf-intro-10__tag {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--wf-tag-color);
    background-color: var(--wf-tag-bg);
    padding: 0.25rem 0.625rem;
    border-radius: var(--radius-full, 9999px);
  }
</style>

<section class="wf-intro-10">
  <div class="wf-intro-10__container">
    <ul class="wf-intro-10__breadcrumb">
      <li><a href="#">Accueil</a></li>
      <li><a href="#">Entreprise</a></li>
      <li>À propos de nous</li>
    </ul>
    <h1 class="wf-intro-10__title">À propos de nous</h1>
    <div class="wf-intro-10__meta">
      <span class="wf-intro-10__tag">Entreprise</span>
      <span class="wf-intro-10__meta-item">
        <span data-icon="calendar" data-icon-type="outline" data-icon-size="24"></span>
        Fondee en 2015
      </span>
      <span class="wf-intro-10__meta-item">
        <span data-icon="academic-cap" data-icon-type="outline" data-icon-size="24"></span>
        500+ projets réalisés
      </span>
      <span class="wf-intro-10__meta-item">
        <span data-icon="map-pin" data-icon-type="outline" data-icon-size="24"></span>
        Paris, France
      </span>
    </div>
  </div>
</section>
