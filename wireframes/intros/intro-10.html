<!-- intro-10.html | Page header: breadcrumb + title + meta -->
<style>
  .wf-intro-10 {
    --wf-section-padding: 4rem 1.5rem 3rem;
    --wf-max-width: 72rem;
    --wf-bg-color: var(--color-bg-alt);
    --wf-breadcrumb-color: var(--color-neutral-500);
    --wf-breadcrumb-active: var(--color-text);
    --wf-title-size: clamp(2rem, 4.5vw, 3rem);
    --wf-title-color: var(--color-neutral-900);
    --wf-meta-color: var(--color-neutral-500);
    --wf-border-color: var(--color-border);
    --wf-tag-bg: var(--color-bg-alt);
    --wf-tag-color: var(--color-text);
    --wf-font-family: var(--font-body);

    padding: var(--wf-section-padding);
    font-family: var(--wf-font-family);
    background-color: var(--wf-bg-color);
    border-bottom: 1px solid var(--wf-border-color);
  }

  .wf-intro-10__container {
    max-width: var(--wf-max-width);
    margin: 0 auto;
  }

  .wf-intro-10__breadcrumb {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.8125rem;
    color: var(--wf-breadcrumb-color);
    margin-bottom: 1.5rem;
    list-style: none;
    padding: 0;
    margin-top: 0;
    flex-wrap: wrap;
  }

  .wf-intro-10__breadcrumb li {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .wf-intro-10__breadcrumb li:not(:last-child)::after {
    content: '/';
    color: var(--wf-border-color);
  }

  .wf-intro-10__breadcrumb a {
    color: var(--wf-breadcrumb-color);
    text-decoration: none;
  }

  .wf-intro-10__breadcrumb a:hover {
    color: var(--wf-breadcrumb-active);
  }

  .wf-intro-10__breadcrumb li:last-child {
    color: var(--wf-breadcrumb-active);
    font-weight: 500;
  }

  .wf-intro-10__title {
    font-size: var(--wf-title-size);
    font-weight: 700;
    color: var(--wf-title-color);
    line-height: 1.2;
    margin: 0 0 1.25rem 0;
    letter-spacing: -0.02em;
  }

  .wf-intro-10__meta {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 1.5rem;
    font-size: 0.875rem;
    color: var(--wf-meta-color);
  }

  .wf-intro-10__meta-item {
    display: flex;
    align-items: center;
    gap: 0.375rem;
  }

  .wf-intro-10__meta-item svg {
    width: 1rem;
    height: 1rem;
    flex-shrink: 0;
  }

  .wf-intro-10__tag {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--wf-tag-color);
    background-color: var(--wf-tag-bg);
    padding: 0.25rem 0.625rem;
    border-radius: var(--radius-full, 9999px);
  }
</style>

<section class="wf-intro-10">
  <div class="wf-intro-10__container">
    <ul class="wf-intro-10__breadcrumb">
      <li><a href="#">Accueil</a></li>
      <li><a href="#">Entreprise</a></li>
      <li>A propos de nous</li>
    </ul>
    <h1 class="wf-intro-10__title">A propos de nous</h1>
    <div class="wf-intro-10__meta">
      <span class="wf-intro-10__tag">Entreprise</span>
      <span class="wf-intro-10__meta-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" />
        </svg>
        Fondee en 2015
      </span>
      <span class="wf-intro-10__meta-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z" />
        </svg>
        500+ projets réalisés
      </span>
      <span class="wf-intro-10__meta-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
        </svg>
        Paris, France
      </span>
    </div>
  </div>
</section>
