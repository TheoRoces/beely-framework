<!-- contact-06: Minimal - email + phone + address inline row + form below -->
<style>
  .wf-contact-06 {
    --wf-section-padding: 5rem 1.5rem;
    --wf-bg: var(--color-bg);
    --wf-text: var(--color-text);
    --wf-text-muted: var(--color-text-light);
    --wf-border: var(--color-border);
    --wf-accent: var(--color-text);
    --wf-input-bg: var(--color-bg-alt);
    --wf-input-border: var(--color-border);
    --wf-input-radius: 0.5rem;
    --wf-btn-bg: var(--color-text);
    --wf-btn-text: var(--color-bg);
    --wf-btn-radius: 0.5rem;
    --wf-icon-size: 20px;
    padding: var(--wf-section-padding);
    background: var(--wf-bg);
    color: var(--wf-text);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-contact-06 .wf-container {
    max-width: 720px;
    margin: 0 auto;
  }

  .wf-contact-06 .wf-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .wf-contact-06 h2 {
    font-size: 2.5rem;
    font-weight: 700;
    line-height: 1.2;
    margin: 0 0 1rem;
  }

  .wf-contact-06 .wf-info-row {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 2rem;
    margin-bottom: 2.5rem;
    padding-bottom: 2.5rem;
    border-bottom: 1px solid var(--wf-border);
  }

  .wf-contact-06 .wf-info-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .wf-contact-06 .wf-icon {
    width: var(--wf-icon-size);
    height: var(--wf-icon-size);
    color: var(--wf-accent);
    flex-shrink: 0;
  }

  .wf-contact-06 .wf-info-item span {
    font-size: 0.9375rem;
    color: var(--wf-text-muted);
  }

  .wf-contact-06 form {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  @media (max-width: 768px) {
    .wf-contact-06 h2 {
      font-size: 2rem;
    }
    .wf-contact-06 .wf-info-row {
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
  }
</style>

<section class="wf-contact-06">
  <div class="wf-container">
    <div class="wf-header">
      <h2>Contactez-nous</h2>
    </div>

    <div class="wf-info-row">
      <div class="wf-info-item">
        <span data-icon="envelope" data-icon-type="outline" data-icon-size="24"></span>
        <span>contact@monsite.fr</span>
      </div>
      <div class="wf-info-item">
        <span data-icon="phone" data-icon-type="outline" data-icon-size="24"></span>
        <span>+33 1 23 45 67 89</span>
      </div>
      <div class="wf-info-item">
        <span data-icon="map-pin" data-icon-type="outline" data-icon-size="24"></span>
        <span>123 rue Exemple, 75000 Paris</span>
      </div>
    </div>

    <form>
      <div class="grid" data-cols="2" data-gap="md">
        <input type="text" class="form__input" placeholder="Nom complet" />
        <input type="email" class="form__input" placeholder="Adresse email" />
      </div>
      <input type="text" class="form__input" placeholder="Sujet" />
      <textarea class="form__textarea" placeholder="Votre message"></textarea>
      <button type="submit" class="btn btn--primary">Envoyer le message</button>
    </form>
  </div>
</section>
