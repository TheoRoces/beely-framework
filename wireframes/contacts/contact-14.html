<!-- contact-14: Contact with team member selection (who to contact) -->
<style>
  .wf-contact-14 {
    --wf-section-padding: 5rem 1.5rem;
    --wf-bg: var(--color-bg);
    --wf-text: var(--color-text);
    --wf-text-muted: var(--color-text-light);
    --wf-border: var(--color-border);
    --wf-accent: var(--color-text);
    --wf-card-bg: var(--color-bg-alt);
    --wf-input-bg: var(--color-bg-alt);
    --wf-input-border: var(--color-border);
    --wf-input-radius: 0.5rem;
    --wf-btn-bg: var(--color-text);
    --wf-btn-text: var(--color-bg);
    --wf-btn-radius: 0.5rem;
    --wf-avatar-size: 48px;
    padding: var(--wf-section-padding);
    background: var(--wf-bg);
    color: var(--wf-text);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-contact-14 .wf-container {
    max-width: 1000px;
    margin: 0 auto;
  }

  .wf-contact-14 .wf-header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .wf-contact-14 h2 {
    font-size: 2.5rem;
    font-weight: 700;
    line-height: 1.2;
    margin: 0 0 0.75rem;
  }

  .wf-contact-14 .wf-subtitle {
    color: var(--wf-text-muted);
    font-size: 1.125rem;
    line-height: 1.6;
    margin: 0;
  }

  .wf-contact-14 .wf-team-label {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 1rem;
  }

  .wf-contact-14 .wf-team-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-bottom: 2.5rem;
  }

  .wf-contact-14 .wf-team-card {
    background: var(--wf-card-bg);
    border: 2px solid transparent;
    border-radius: var(--radius-lg, 0.75rem);
    padding: 1.25rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .wf-contact-14 .wf-team-card:hover {
    border-color: var(--wf-border);
  }

  .wf-contact-14 .wf-team-card--selected {
    border-color: var(--wf-accent);
    box-shadow: 0 0 0 1px var(--wf-accent);
  }

  .wf-contact-14 .wf-avatar {
    width: var(--wf-avatar-size);
    height: var(--wf-avatar-size);
    border-radius: 50%;
    background: var(--wf-border);
    margin: 0 auto 0.75rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--wf-text-muted);
  }

  .wf-contact-14 .wf-team-card h4 {
    font-size: 0.9375rem;
    font-weight: 600;
    margin: 0 0 0.25rem;
  }

  .wf-contact-14 .wf-team-card p {
    font-size: 0.8125rem;
    color: var(--wf-text-muted);
    margin: 0;
  }

  .wf-contact-14 .wf-form-section {
    max-width: 640px;
    margin: 0 auto;
  }

  .wf-contact-14 form {
    display: flex;
    flex-direction: column;
    gap: 1.125rem;
  }

  .wf-contact-14 .wf-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.125rem;
  }

  .wf-contact-14 .wf-input,
  .wf-contact-14 .wf-textarea {
    width: 100%;
    padding: 0.875rem 1rem;
    font-size: 1rem;
    font-family: inherit;
    border: 1px solid var(--wf-input-border);
    border-radius: var(--wf-input-radius);
    background: var(--wf-input-bg);
    color: var(--wf-text);
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }

  .wf-contact-14 .wf-input:focus,
  .wf-contact-14 .wf-textarea:focus {
    border-color: var(--wf-accent);
  }

  .wf-contact-14 .wf-textarea {
    min-height: 130px;
    resize: vertical;
  }

  .wf-contact-14 .wf-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 0.875rem 2rem;
    font-size: 1rem;
    font-weight: 600;
    font-family: inherit;
    background: var(--wf-btn-bg);
    color: var(--wf-btn-text);
    border: none;
    border-radius: var(--wf-btn-radius);
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .wf-contact-14 .wf-btn:hover {
    opacity: 0.85;
  }

  @media (max-width: 768px) {
    .wf-contact-14 .wf-team-grid {
      grid-template-columns: 1fr 1fr;
    }
    .wf-contact-14 h2 {
      font-size: 2rem;
    }
    .wf-contact-14 .wf-row {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 480px) {
    .wf-contact-14 .wf-team-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<section class="wf-contact-14">
  <div class="wf-container">
    <div class="wf-header">
      <h2>Contactez-nous</h2>
      <p class="wf-subtitle">Choisissez la personne a contacter et envoyez-nous votre message.</p>
    </div>

    <p class="wf-team-label">Qui souhaitez-vous contacter ?</p>
    <div class="wf-team-grid">
      <div class="wf-team-card wf-team-card--selected">
        <div class="wf-avatar">MC</div>
        <h4>Marie Curie</h4>
        <p>Directrice commerciale</p>
      </div>
      <div class="wf-team-card">
        <div class="wf-avatar">JD</div>
        <h4>Jean Dupont</h4>
        <p>Support technique</p>
      </div>
      <div class="wf-team-card">
        <div class="wf-avatar">SL</div>
        <h4>Sophie Laurent</h4>
        <p>Relations partenaires</p>
      </div>
      <div class="wf-team-card">
        <div class="wf-avatar">PM</div>
        <h4>Pierre Martin</h4>
        <p>Service facturation</p>
      </div>
    </div>

    <div class="wf-form-section">
      <form>
        <div class="wf-row">
          <input type="text" class="wf-input" placeholder="Nom complet" />
          <input type="email" class="wf-input" placeholder="Adresse email" />
        </div>
        <input type="tel" class="wf-input" placeholder="Téléphone" />
        <input type="text" class="wf-input" placeholder="Sujet" />
        <textarea class="wf-textarea" placeholder="Votre message"></textarea>
        <button type="submit" class="wf-btn">Envoyer le message</button>
      </form>
    </div>
  </div>
</section>
