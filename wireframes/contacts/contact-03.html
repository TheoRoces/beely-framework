<!-- contact-03: 3 contact info cards on top + form below -->
<style>
  .wf-contact-03 {
    --wf-section-padding: 5rem 1.5rem;
    --wf-bg: var(--color-bg);
    --wf-text: var(--color-text);
    --wf-text-muted: var(--color-text-light);
    --wf-border: var(--color-border);
    --wf-accent: var(--color-text);
    --wf-card-bg: var(--color-bg-alt);
    --wf-input-bg: var(--color-bg);
    --wf-input-border: var(--color-border);
    --wf-input-radius: 0.5rem;
    --wf-btn-bg: var(--color-text);
    --wf-btn-text: var(--color-bg);
    --wf-btn-radius: 0.5rem;
    --wf-icon-size: 24px;
    padding: var(--wf-section-padding);
    background: var(--wf-bg);
    color: var(--wf-text);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-contact-03 .wf-container {
    max-width: 1000px;
    margin: 0 auto;
  }

  .wf-contact-03 .wf-header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .wf-contact-03 h2 {
    font-size: 2.5rem;
    font-weight: 700;
    line-height: 1.2;
    margin: 0 0 1rem;
  }

  .wf-contact-03 .wf-subtitle {
    color: var(--wf-text-muted);
    font-size: 1.125rem;
    line-height: 1.6;
    margin: 0;
  }

  .wf-contact-03 .wf-cards {
    margin-bottom: 3rem;
  }

  .wf-contact-03 .wf-card {
    background: var(--wf-card-bg);
    border-radius: var(--radius-lg, 0.75rem);
    padding: 2rem;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
  }

  .wf-contact-03 .wf-icon {
    width: var(--wf-icon-size);
    height: var(--wf-icon-size);
    color: var(--wf-accent);
    margin-bottom: 0.25rem;
  }

  .wf-contact-03 .wf-card h3 {
    font-size: 1.125rem;
    font-weight: 600;
    margin: 0;
  }

  .wf-contact-03 .wf-card p {
    color: var(--wf-text-muted);
    font-size: 0.9375rem;
    margin: 0;
  }

  .wf-contact-03 form {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    max-width: 700px;
    margin: 0 auto;
  }

  @media (max-width: 768px) {
    .wf-contact-03 
    .wf-contact-03 h2 {
      font-size: 2rem;
    }
  }
</style>

<section class="wf-contact-03 grid" data-cols="3" data-gap="md">
  <div class="wf-container">
    <div class="wf-header">
      <h2>Contactez-nous</h2>
      <p class="wf-subtitle">Envoyez-nous un message et nous vous repondrons dans les plus brefs délais.</p>
    </div>

    <div class="wf-cards grid" data-cols="3" data-gap="md">
      <div class="wf-card">
        <span data-icon="envelope" data-icon-type="outline" data-icon-size="24"></span>
        <h3>Email</h3>
        <p>contact@monsite.fr</p>
      </div>
      <div class="wf-card">
        <span data-icon="phone" data-icon-type="outline" data-icon-size="24"></span>
        <h3>Téléphone</h3>
        <p>+33 1 23 45 67 89</p>
      </div>
      <div class="wf-card">
        <span data-icon="map-pin" data-icon-type="outline" data-icon-size="24"></span>
        <h3>Adresse</h3>
        <p>123 rue Exemple, 75000 Paris</p>
      </div>
    </div>

    <form>
      <div class="grid" data-cols="2" data-gap="md">
        <input type="text" class="form__input" placeholder="Nom complet" />
        <input type="email" class="form__input" placeholder="Adresse email" />
      </div>
      <input type="tel" class="form__input" placeholder="Téléphone" />
      <textarea class="form__textarea" placeholder="Votre message"></textarea>
      <button type="submit" class="btn btn--primary">Envoyer le message</button>
    </form>
  </div>
</section>
