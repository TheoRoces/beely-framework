<!-- contact-03: 3 contact info cards on top + form below -->
<style>
  .wf-contact-03 {
    --wf-section-padding: 5rem 1.5rem;
    --wf-bg: var(--color-bg);
    --wf-text: var(--color-text);
    --wf-text-muted: var(--color-text-light);
    --wf-border: var(--color-border);
    --wf-accent: var(--color-text);
    --wf-card-bg: var(--color-bg-alt);
    --wf-input-bg: var(--color-bg);
    --wf-input-border: var(--color-border);
    --wf-input-radius: 0.5rem;
    --wf-btn-bg: var(--color-text);
    --wf-btn-text: var(--color-bg);
    --wf-btn-radius: 0.5rem;
    --wf-icon-size: 24px;
    padding: var(--wf-section-padding);
    background: var(--wf-bg);
    color: var(--wf-text);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-contact-03 .wf-container {
    max-width: 1000px;
    margin: 0 auto;
  }

  .wf-contact-03 .wf-header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .wf-contact-03 h2 {
    font-size: 2.5rem;
    font-weight: 700;
    line-height: 1.2;
    margin: 0 0 1rem;
  }

  .wf-contact-03 .wf-subtitle {
    color: var(--wf-text-muted);
    font-size: 1.125rem;
    line-height: 1.6;
    margin: 0;
  }

  .wf-contact-03 .wf-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
    margin-bottom: 3rem;
  }

  .wf-contact-03 .wf-card {
    background: var(--wf-card-bg);
    border-radius: var(--radius-lg, 0.75rem);
    padding: 2rem;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
  }

  .wf-contact-03 .wf-icon {
    width: var(--wf-icon-size);
    height: var(--wf-icon-size);
    color: var(--wf-accent);
    margin-bottom: 0.25rem;
  }

  .wf-contact-03 .wf-card h3 {
    font-size: 1.125rem;
    font-weight: 600;
    margin: 0;
  }

  .wf-contact-03 .wf-card p {
    color: var(--wf-text-muted);
    font-size: 0.9375rem;
    margin: 0;
  }

  .wf-contact-03 form {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    max-width: 700px;
    margin: 0 auto;
  }

  .wf-contact-03 .wf-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
  }

  .wf-contact-03 .wf-input,
  .wf-contact-03 .wf-textarea {
    width: 100%;
    padding: 0.875rem 1rem;
    font-size: 1rem;
    font-family: inherit;
    border: 1px solid var(--wf-input-border);
    border-radius: var(--wf-input-radius);
    background: var(--wf-input-bg);
    color: var(--wf-text);
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }

  .wf-contact-03 .wf-input:focus,
  .wf-contact-03 .wf-textarea:focus {
    border-color: var(--wf-accent);
  }

  .wf-contact-03 .wf-textarea {
    min-height: 150px;
    resize: vertical;
  }

  .wf-contact-03 .wf-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 0.875rem 2rem;
    font-size: 1rem;
    font-weight: 600;
    font-family: inherit;
    background: var(--wf-btn-bg);
    color: var(--wf-btn-text);
    border: none;
    border-radius: var(--wf-btn-radius);
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .wf-contact-03 .wf-btn:hover {
    opacity: 0.85;
  }

  @media (max-width: 768px) {
    .wf-contact-03 .wf-cards {
      grid-template-columns: 1fr;
    }
    .wf-contact-03 h2 {
      font-size: 2rem;
    }
    .wf-contact-03 .wf-row {
      grid-template-columns: 1fr;
    }
  }
</style>

<section class="wf-contact-03">
  <div class="wf-container">
    <div class="wf-header">
      <h2>Contactez-nous</h2>
      <p class="wf-subtitle">Envoyez-nous un message et nous vous repondrons dans les plus brefs delais.</p>
    </div>

    <div class="wf-cards">
      <div class="wf-card">
        <svg class="wf-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
        <h3>Email</h3>
        <p>contact@monsite.fr</p>
      </div>
      <div class="wf-card">
        <svg class="wf-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/></svg>
        <h3>Téléphone</h3>
        <p>+33 1 23 45 67 89</p>
      </div>
      <div class="wf-card">
        <svg class="wf-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
        <h3>Adresse</h3>
        <p>123 rue Exemple, 75000 Paris</p>
      </div>
    </div>

    <form>
      <div class="wf-row">
        <input type="text" class="wf-input" placeholder="Nom complet" />
        <input type="email" class="wf-input" placeholder="Adresse email" />
      </div>
      <input type="tel" class="wf-input" placeholder="Téléphone" />
      <textarea class="wf-textarea" placeholder="Votre message"></textarea>
      <button type="submit" class="wf-btn">Envoyer le message</button>
    </form>
  </div>
</section>
