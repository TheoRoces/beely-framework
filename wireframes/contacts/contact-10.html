<!-- contact-10: Split form with booking calendar placeholder -->
<style>
  .wf-contact-10 {
    --wf-section-padding: 5rem 1.5rem;
    --wf-gap: 3rem;
    --wf-bg: var(--color-bg);
    --wf-text: var(--color-text);
    --wf-text-muted: var(--color-text-light);
    --wf-border: var(--color-border);
    --wf-accent: var(--color-text);
    --wf-calendar-bg: var(--color-bg-alt);
    --wf-input-bg: var(--color-bg-alt);
    --wf-input-border: var(--color-border);
    --wf-input-radius: 0.5rem;
    --wf-btn-bg: var(--color-text);
    --wf-btn-text: var(--color-bg);
    --wf-btn-radius: 0.5rem;
    padding: var(--wf-section-padding);
    background: var(--wf-bg);
    color: var(--wf-text);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-contact-10 .wf-container {
    max-width: 1200px;
    margin: 0 auto;
  }

  .wf-contact-10 .wf-header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .wf-contact-10 h2 {
    font-size: 2.5rem;
    font-weight: 700;
    line-height: 1.2;
    margin: 0 0 0.75rem;
  }

  .wf-contact-10 .wf-subtitle {
    color: var(--wf-text-muted);
    font-size: 1.125rem;
    line-height: 1.6;
    margin: 0;
  }

  .wf-contact-10 .wf-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--wf-gap);
    align-items: start;
  }

  .wf-contact-10 .wf-form-side h3 {
    font-size: 1.375rem;
    font-weight: 600;
    margin: 0 0 1.5rem;
  }

  .wf-contact-10 form {
    display: flex;
    flex-direction: column;
    gap: 1.125rem;
  }

  .wf-contact-10 .wf-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.125rem;
  }

  .wf-contact-10 .wf-input,
  .wf-contact-10 .wf-textarea {
    width: 100%;
    padding: 0.875rem 1rem;
    font-size: 1rem;
    font-family: inherit;
    border: 1px solid var(--wf-input-border);
    border-radius: var(--wf-input-radius);
    background: var(--wf-input-bg);
    color: var(--wf-text);
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }

  .wf-contact-10 .wf-input:focus,
  .wf-contact-10 .wf-textarea:focus {
    border-color: var(--wf-accent);
  }

  .wf-contact-10 .wf-textarea {
    min-height: 100px;
    resize: vertical;
  }

  .wf-contact-10 .wf-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 0.875rem 2rem;
    font-size: 1rem;
    font-weight: 600;
    font-family: inherit;
    background: var(--wf-btn-bg);
    color: var(--wf-btn-text);
    border: none;
    border-radius: var(--wf-btn-radius);
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .wf-contact-10 .wf-btn:hover {
    opacity: 0.85;
  }

  .wf-contact-10 .wf-calendar-side h3 {
    font-size: 1.375rem;
    font-weight: 600;
    margin: 0 0 1.5rem;
  }

  .wf-contact-10 .wf-calendar-placeholder {
    background: var(--wf-calendar-bg);
    border-radius: var(--radius-lg, 0.75rem);
    padding: 2rem;
    min-height: 380px;
  }

  .wf-contact-10 .wf-cal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
  }

  .wf-contact-10 .wf-cal-header span {
    font-weight: 600;
    font-size: 1rem;
  }

  .wf-contact-10 .wf-cal-nav {
    display: flex;
    gap: 0.5rem;
  }

  .wf-contact-10 .wf-cal-nav-btn {
    width: 32px;
    height: 32px;
    border: 1px solid var(--wf-border);
    border-radius: 0.375rem;
    background: var(--color-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 0.875rem;
    color: var(--wf-text);
  }

  .wf-contact-10 .wf-cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0.25rem;
    text-align: center;
  }

  .wf-contact-10 .wf-cal-day-label {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--wf-text-muted);
    padding: 0.5rem 0;
  }

  .wf-contact-10 .wf-cal-day {
    padding: 0.5rem;
    font-size: 0.875rem;
    border-radius: 0.375rem;
    color: var(--wf-text);
  }

  .wf-contact-10 .wf-cal-day--muted {
    color: var(--wf-border);
  }

  .wf-contact-10 .wf-cal-day--active {
    background: var(--wf-accent);
    color: var(--color-text-on-dark);
    font-weight: 600;
  }

  .wf-contact-10 .wf-time-slots {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem;
    margin-top: 1.5rem;
  }

  .wf-contact-10 .wf-time-slot {
    padding: 0.5rem;
    border: 1px solid var(--wf-border);
    border-radius: 0.375rem;
    text-align: center;
    font-size: 0.875rem;
    background: var(--color-bg);
    color: var(--wf-text);
    cursor: pointer;
  }

  .wf-contact-10 .wf-time-slot--active {
    background: var(--wf-accent);
    color: var(--color-text-on-dark);
    border-color: var(--wf-accent);
  }

  @media (max-width: 768px) {
    .wf-contact-10 .wf-grid {
      grid-template-columns: 1fr;
    }
    .wf-contact-10 h2 {
      font-size: 2rem;
    }
    .wf-contact-10 .wf-row {
      grid-template-columns: 1fr;
    }
  }
</style>

<section class="wf-contact-10">

            <span class="wf-cal-day">3</span>
            <span class="wf-cal-day">4</span>

            <span class="wf-cal-day">18</span>
            <span class="wf-cal-day">19</span>
            <span class="wf-cal-day">20</span>
            <span class="wf-cal-day">21</span>
          </div>
          <div class="wf-time-slots">
            <span class="wf-time-slot">09:00</span>
            <span class="wf-time-slot wf-time-slot--active">10:00</span>
            <span class="wf-time-slot">11:00</span>
            <span class="wf-time-slot">14:00</span>
            <span class="wf-time-slot">15:00</span>
            <span class="wf-time-slot">16:00</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
