<!-- contact-11: Contact card floating over background image placeholder -->
<style>
  .wf-contact-11 {
    --wf-section-padding: 5rem 1.5rem;
    --wf-bg: var(--color-bg-dark);
    --wf-text: var(--color-text);
    --wf-text-muted: var(--color-text-light);
    --wf-accent: var(--color-text);
    --wf-card-bg: var(--color-bg);
    --wf-input-bg: var(--color-bg-alt);
    --wf-input-border: var(--color-border);
    --wf-input-radius: 0.5rem;
    --wf-btn-bg: var(--color-bg);
    --wf-btn-text: var(--color-text);
    --wf-btn-radius: 0.5rem;
    --wf-icon-size: 24px;
    padding: var(--wf-section-padding);
    background: var(--wf-bg);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    position: relative;
    min-height: 600px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wf-contact-11 .wf-bg-image {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--color-text) 0%, var(--color-bg-dark) 50%, var(--color-bg-dark) 100%);
    opacity: 0.6;
  }

  .wf-contact-11 .wf-bg-pattern {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(255,255,255,0.03) 0%, transparent 50%);
  }

  .wf-contact-11 .wf-card {
    position: relative;
    z-index: 1;
    background: var(--wf-card-bg);
    color: var(--wf-text);
    border-radius: var(--radius-xl, 1rem);
    padding: 3rem;
    max-width: 900px;
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1.3fr;
    gap: 3rem;
    box-shadow: var(--shadow-xl);
  }

  .wf-contact-11 .wf-info-side h2 {
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.2;
    margin: 0 0 0.75rem;
  }

  .wf-contact-11 .wf-info-side .wf-subtitle {
    color: var(--wf-text-muted);
    font-size: 1rem;
    line-height: 1.6;
    margin: 0 0 2rem;
  }

  .wf-contact-11 .wf-info-list {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .wf-contact-11 .wf-info-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .wf-contact-11 .wf-icon {
    flex-shrink: 0;
    width: var(--wf-icon-size);
    height: var(--wf-icon-size);
    color: var(--wf-accent);
  }

  .wf-contact-11 .wf-info-item span {
    font-size: 0.9375rem;
    color: var(--wf-text-muted);
  }

  .wf-contact-11 form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  @media (max-width: 768px) {
    .wf-contact-11 .wf-card {
      grid-template-columns: 1fr;
      gap: 2rem;
      padding: 2rem;
    }
    .wf-contact-11 .wf-info-side h2 {
      font-size: 1.75rem;
    }
  }
</style>

<section class="wf-contact-11">
  <div class="wf-bg-image"></div>
  <div class="wf-bg-pattern"></div>
  <div class="wf-card">
    <div class="wf-info-side">
      <h2>Contactez-nous</h2>
      <p class="wf-subtitle">Envoyez-nous un message et nous vous repondrons rapidement.</p>
      <div class="wf-info-list">
        <div class="wf-info-item">
          <span data-icon="envelope" data-icon-type="outline" data-icon-size="24"></span>
          <span>contact@monsite.fr</span>
        </div>
        <div class="wf-info-item">
          <span data-icon="phone" data-icon-type="outline" data-icon-size="24"></span>
          <span>+33 1 23 45 67 89</span>
        </div>
        <div class="wf-info-item">
          <span data-icon="map-pin" data-icon-type="outline" data-icon-size="24"></span>
          <span>123 rue Exemple, 75000 Paris</span>
        </div>
      </div>
    </div>
    <div class="wf-form-side">
      <form>
        <input type="text" class="form__input" placeholder="Nom complet" />
        <input type="email" class="form__input" placeholder="Adresse email" />
        <input type="tel" class="form__input" placeholder="Téléphone" />
        <input type="text" class="form__input" placeholder="Sujet" />
        <textarea class="form__textarea" placeholder="Votre message"></textarea>
        <button type="submit" class="btn btn--primary">Envoyer le message</button>
      </form>
    </div>
  </div>
</section>
