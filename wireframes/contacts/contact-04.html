<!-- contact-04: Split layout - left form + right map placeholder -->
<style>
  .wf-contact-04 {
    --wf-section-padding: 5rem 1.5rem;
    --wf-gap: 3rem;
    --wf-bg: var(--color-bg);
    --wf-text: var(--color-text);
    --wf-text-muted: var(--color-text-light);
    --wf-accent: var(--color-text);
    --wf-map-bg: var(--color-border);
    --wf-input-bg: var(--color-bg-alt);
    --wf-input-border: var(--color-border);
    --wf-input-radius: 0.5rem;
    --wf-btn-bg: var(--color-text);
    --wf-btn-text: var(--color-bg);
    --wf-btn-radius: 0.5rem;
    padding: var(--wf-section-padding);
    background: var(--wf-bg);
    color: var(--wf-text);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-contact-04 .wf-container {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--wf-gap);
    align-items: stretch;
  }

  .wf-contact-04 .wf-form-side h2 {
    font-size: 2.5rem;
    font-weight: 700;
    line-height: 1.2;
    margin: 0 0 0.75rem;
  }

  .wf-contact-04 .wf-form-side .wf-subtitle {
    color: var(--wf-text-muted);
    font-size: 1.125rem;
    line-height: 1.6;
    margin: 0 0 2rem;
  }

  .wf-contact-04 form {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .wf-contact-04 .wf-map-side {
    background: var(--wf-map-bg);
    border-radius: var(--radius-lg, 0.75rem);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 400px;
    position: relative;
    overflow: hidden;
  }

  .wf-contact-04 .wf-map-placeholder {
    color: var(--wf-text-muted);
    font-size: 1rem;
    font-weight: 500;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
  }

  .wf-contact-04 .wf-map-placeholder svg {
    width: 48px;
    height: 48px;
    opacity: 0.5;
  }

  @media (max-width: 768px) {
    .wf-contact-04 .wf-container {
      grid-template-columns: 1fr;
    }
    .wf-contact-04 .wf-form-side h2 {
      font-size: 2rem;
    }
    .wf-contact-04 .wf-map-side {
      min-height: 300px;
    }
  }
</style>

<section class="wf-contact-04">
  <div class="wf-container">
    <div class="wf-form-side">
      <h2>Contactez-nous</h2>
      <p class="wf-subtitle">Envoyez-nous un message et nous vous repondrons rapidement.</p>
      <form>
        <div class="grid" data-cols="2" data-gap="md">
          <input type="text" class="form__input" placeholder="Nom complet" />
          <input type="email" class="form__input" placeholder="Adresse email" />
        </div>
        <input type="tel" class="form__input" placeholder="Téléphone" />
        <input type="text" class="form__input" placeholder="Sujet" />
        <textarea class="form__textarea" placeholder="Votre message"></textarea>
        <button type="submit" class="btn btn--primary">Envoyer le message</button>
      </form>
    </div>
    <div class="wf-map-side">
      <div class="wf-map-placeholder">
        <span data-icon="map-pin" data-icon-type="outline" data-icon-size="24"></span>
        <span>Carte interactive</span>
        <span>123 rue Exemple, 75000 Paris</span>
      </div>
    </div>
  </div>
</section>
