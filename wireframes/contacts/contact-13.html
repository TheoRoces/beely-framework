<!-- contact-13: Contact with social media links row -->
<style>
  .wf-contact-13 {
    --wf-section-padding: 5rem 1.5rem;
    --wf-bg: var(--color-bg);
    --wf-text: var(--color-text);
    --wf-text-muted: var(--color-text-light);
    --wf-border: var(--color-border);
    --wf-accent: var(--color-text);
    --wf-input-bg: var(--color-bg-alt);
    --wf-input-border: var(--color-border);
    --wf-input-radius: 0.5rem;
    --wf-btn-bg: var(--color-text);
    --wf-btn-text: var(--color-bg);
    --wf-btn-radius: 0.5rem;
    --wf-icon-size: 24px;
    --wf-social-size: 44px;
    padding: var(--wf-section-padding);
    background: var(--wf-bg);
    color: var(--wf-text);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-contact-13 .wf-container {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 4rem;
    align-items: start;
  }

  .wf-contact-13 .wf-info-side h2 {
    font-size: 2.5rem;
    font-weight: 700;
    line-height: 1.2;
    margin: 0 0 0.75rem;
  }

  .wf-contact-13 .wf-info-side .wf-subtitle {
    color: var(--wf-text-muted);
    font-size: 1.125rem;
    line-height: 1.6;
    margin: 0 0 2rem;
  }

  .wf-contact-13 .wf-info-list {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    margin-bottom: 2.5rem;
    padding-bottom: 2.5rem;
    border-bottom: 1px solid var(--wf-border);
  }

  .wf-contact-13 .wf-info-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .wf-contact-13 .wf-icon {
    flex-shrink: 0;
    width: var(--wf-icon-size);
    height: var(--wf-icon-size);
    color: var(--wf-accent);
  }

  .wf-contact-13 .wf-info-item span {
    font-size: 1rem;
    color: var(--wf-text-muted);
  }

  .wf-contact-13 .wf-social-label {
    font-size: 0.9375rem;
    font-weight: 600;
    margin-bottom: 1rem;
  }

  .wf-contact-13 .wf-social-links {
    display: flex;
    gap: 0.75rem;
  }

  .wf-contact-13 .wf-social-link {
    width: var(--wf-social-size);
    height: var(--wf-social-size);
    border-radius: 50%;
    border: 1px solid var(--wf-border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--wf-text);
    text-decoration: none;
    transition: background 0.2s, border-color 0.2s;
  }

  .wf-contact-13 .wf-social-link:hover {
    background: var(--wf-input-bg);
    border-color: var(--wf-accent);
  }

  .wf-contact-13 .wf-social-link svg {
    width: 20px;
    height: 20px;
  }

  .wf-contact-13 form {
    display: flex;
    flex-direction: column;
    gap: 1.125rem;
  }

  .wf-contact-13 .wf-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.125rem;
  }

  .wf-contact-13 .wf-input,
  .wf-contact-13 .wf-textarea {
    width: 100%;
    padding: 0.875rem 1rem;
    font-size: 1rem;
    font-family: inherit;
    border: 1px solid var(--wf-input-border);
    border-radius: var(--wf-input-radius);
    background: var(--wf-input-bg);
    color: var(--wf-text);
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }

  .wf-contact-13 .wf-input:focus,
  .wf-contact-13 .wf-textarea:focus {
    border-color: var(--wf-accent);
  }

  .wf-contact-13 .wf-textarea {
    min-height: 140px;
    resize: vertical;
  }

  .wf-contact-13 .wf-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 0.875rem 2rem;
    font-size: 1rem;
    font-weight: 600;
    font-family: inherit;
    background: var(--wf-btn-bg);
    color: var(--wf-btn-text);
    border: none;
    border-radius: var(--wf-btn-radius);
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .wf-contact-13 .wf-btn:hover {
    opacity: 0.85;
  }

  @media (max-width: 768px) {
    .wf-contact-13 .wf-container {
      grid-template-columns: 1fr;
      gap: 2.5rem;
    }
    .wf-contact-13 .wf-info-side h2 {
      font-size: 2rem;
    }
    .wf-contact-13 .wf-row {
      grid-template-columns: 1fr;
    }
  }
</style>
