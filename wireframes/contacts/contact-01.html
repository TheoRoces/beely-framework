<!-- contact-01: Split layout - left contact info + right form -->
<style>
  .wf-contact-01 {
    --wf-section-padding: 5rem 1.5rem;
    --wf-bg: var(--color-bg);
    --wf-text: var(--color-text);
    --wf-text-muted: var(--color-text-light);
    --wf-border: var(--color-border);
    --wf-accent: var(--color-text);
    --wf-input-bg: var(--color-bg-alt);
    --wf-input-border: var(--color-border);
    --wf-input-radius: 0.5rem;
    --wf-btn-bg: var(--color-text);
    --wf-btn-text: var(--color-bg);
    --wf-btn-radius: 0.5rem;
    --wf-icon-size: 24px;
    padding: var(--wf-section-padding);
    background: var(--wf-bg);
    color: var(--wf-text);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-contact-01 .wf-container {
    max-width: 1200px;
    margin: 0 auto;
    align-items: start;
  }

  .wf-contact-01 .wf-info-side h2 {
    font-size: 2.5rem;
    font-weight: 700;
    line-height: 1.2;
    margin: 0 0 1rem;
  }

  .wf-contact-01 .wf-info-side p {
    color: var(--wf-text-muted);
    font-size: 1.125rem;
    line-height: 1.6;
    margin: 0 0 2.5rem;
  }

  .wf-contact-01 .wf-info-list {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .wf-contact-01 .wf-info-item {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
  }

  .wf-contact-01 .wf-icon {
    flex-shrink: 0;
    width: var(--wf-icon-size);
    height: var(--wf-icon-size);
    color: var(--wf-accent);
  }

  .wf-contact-01 .wf-info-item-text span {
    display: block;
    font-weight: 600;
    font-size: 0.875rem;
    margin-bottom: 0.25rem;
  }

  .wf-contact-01 .wf-info-item-text a,
  .wf-contact-01 .wf-info-item-text p {
    margin: 0;
    color: var(--wf-text-muted);
    text-decoration: none;
    font-size: 1rem;
  }

  .wf-contact-01 .wf-form-side form {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  @media (max-width: 768px) {
        .wf-contact-01 .wf-info-side h2 {
      font-size: 2rem;
    }
  }
</style>

<section class="wf-contact-01">
  <div class="wf-container grid" data-cols="2" data-gap="md">
    <div class="wf-info-side">
      <h2>Contactez-nous</h2>
      <p>Envoyez-nous un message et nous vous repondrons dans les plus brefs délais.</p>
      <div class="wf-info-list">
        <div class="wf-info-item">
          <span data-icon="envelope" data-icon-type="outline" data-icon-size="24"></span>
          <div class="wf-info-item-text">
            <span>Email</span>
            <a href="mailto:contact@monsite.fr">contact@monsite.fr</a>
          </div>
        </div>
        <div class="wf-info-item">
          <span data-icon="phone" data-icon-type="outline" data-icon-size="24"></span>
          <div class="wf-info-item-text">
            <span>Téléphone</span>
            <a href="tel:+33123456789">+33 1 23 45 67 89</a>
          </div>
        </div>
        <div class="wf-info-item">
          <span data-icon="map-pin" data-icon-type="outline" data-icon-size="24"></span>
          <div class="wf-info-item-text">
            <span>Adresse</span>
            <p>123 rue Exemple, 75000 Paris</p>
          </div>
        </div>
      </div>
    </div>
    <div class="wf-form-side">
      <form>
        <div class="grid" data-cols="2" data-gap="md">
          <input type="text" class="form__input" placeholder="Nom complet" />
          <input type="email" class="form__input" placeholder="Adresse email" />
        </div>
        <input type="tel" class="form__input" placeholder="Téléphone" />
        <input type="text" class="form__input" placeholder="Sujet" />
        <textarea class="form__textarea" placeholder="Votre message"></textarea>
        <button type="submit" class="btn btn--primary">Envoyer le message</button>
      </form>
    </div>
  </div>
</section>
