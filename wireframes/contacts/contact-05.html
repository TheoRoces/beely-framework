<!-- contact-05: Dark background with light form card -->
<style>
  .wf-contact-05 {
    --wf-section-padding: 5rem 1.5rem;
    --wf-bg: var(--color-bg-dark);
    --wf-text: var(--color-text-on-dark);
    --wf-text-muted: var(--color-text-light);
    --wf-card-bg: var(--color-bg);
    --wf-card-text: var(--color-text);
    --wf-card-muted: var(--color-text-light);
    --wf-accent: var(--color-text);
    --wf-input-bg: var(--color-bg-alt);
    --wf-input-border: var(--color-border);
    --wf-input-radius: 0.5rem;
    --wf-btn-bg: var(--color-bg);
    --wf-btn-text: var(--color-text);
    --wf-btn-radius: 0.5rem;
    --wf-icon-size: 24px;
    padding: var(--wf-section-padding);
    background: var(--wf-bg);
    color: var(--wf-text);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-contact-05 .wf-container {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 4rem;
    align-items: center;
  }

  .wf-contact-05 .wf-info-side h2 {
    font-size: 2.5rem;
    font-weight: 700;
    line-height: 1.2;
    margin: 0 0 1rem;
  }

  .wf-contact-05 .wf-info-side .wf-subtitle {
    color: var(--wf-text-muted);
    font-size: 1.125rem;
    line-height: 1.6;
    margin: 0 0 2.5rem;
  }

  .wf-contact-05 .wf-info-list {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .wf-contact-05 .wf-info-item {
    display: flex;
    align-items: center;
    gap: 0.875rem;
  }

  .wf-contact-05 .wf-icon {
    flex-shrink: 0;
    width: var(--wf-icon-size);
    height: var(--wf-icon-size);
    color: var(--wf-text-muted);
  }

  .wf-contact-05 .wf-info-item span {
    font-size: 1rem;
    color: var(--wf-text-muted);
  }

  .wf-contact-05 .wf-form-card {
    background: var(--wf-card-bg);
    color: var(--wf-card-text);
    border-radius: var(--radius-xl, 1rem);
    padding: 2.5rem;
  }

  .wf-contact-05 .wf-form-card h3 {
    font-size: 1.5rem;
    font-weight: 600;
    margin: 0 0 1.5rem;
  }

  .wf-contact-05 form {
    display: flex;
    flex-direction: column;
    gap: 1.125rem;
  }

  @media (max-width: 768px) {
    .wf-contact-05 .wf-container {
      grid-template-columns: 1fr;
      gap: 2.5rem;
    }
    .wf-contact-05 .wf-info-side h2 {
      font-size: 2rem;
    }
  }
</style>

<section class="wf-contact-05">
  <div class="wf-container">
    <div class="wf-info-side">
      <h2>Contactez-nous</h2>
      <p class="wf-subtitle">Envoyez-nous un message et nous vous repondrons dans les plus brefs délais.</p>
      <div class="wf-info-list">
        <div class="wf-info-item">
          <svg class="wf-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
          <span>contact@monsite.fr</span>
        </div>
        <div class="wf-info-item">
          <svg class="wf-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/></svg>
          <span>+33 1 23 45 67 89</span>
        </div>
        <div class="wf-info-item">
          <svg class="wf-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
          <span>123 rue Exemple, 75000 Paris</span>
        </div>
      </div>
    </div>
    <div class="wf-form-card">
      <h3>Envoyez-nous un message</h3>
      <form>
        <input type="text" class="form__input" placeholder="Nom complet" />
        <input type="email" class="form__input" placeholder="Adresse email" />
        <input type="tel" class="form__input" placeholder="Téléphone" />
        <textarea class="form__textarea" placeholder="Votre message"></textarea>
        <button type="submit" class="btn btn--primary">Envoyer le message</button>
      </form>
    </div>
  </div>
</section>
