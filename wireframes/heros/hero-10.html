<!-- Hero 10 : Split with form on right (newsletter/contact) -->
<style>

.wf-hero-10 {
  display: flex;
  align-items: center;
  gap: var(--space-8, 3rem);
  padding: var(--space-12, 5rem) var(--space-6, 2rem);
  max-width: 1280px;
  margin: 0 auto;
}
.wf-hero-10__content {
  flex: 1 1 50%;
  display: flex;
  flex-direction: column;
  gap: var(--space-4, 1.5rem);
}
.wf-hero-10__eyebrow {
  font-size: 0.875rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--color-text, #374151);
}
.wf-hero-10__title {
  font-size: clamp(2rem, 4vw, 3.25rem);
  font-weight: 700;
  line-height: 1.15;
  color: var(--color-text, #111827);
  margin: 0;
}
.wf-hero-10__subtitle {
  font-size: 1.125rem;
  line-height: 1.6;
  color: var(--color-text-muted, #6b7280);
  margin: 0;
}
.wf-hero-10__form-wrapper {
  flex: 1 1 45%;
  max-width: 480px;
}
.wf-hero-10__form {
  background: var(--color-neutral-50, #f9fafb);
  border: 1px solid var(--color-neutral-200, #e5e7eb);
  border-radius: var(--radius-lg, 0.75rem);
  padding: var(--space-6, 2rem);
  display: flex;
  flex-direction: column;
  gap: var(--space-4, 1rem);
}
.wf-hero-10__form-title {
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--color-text, #111827);
  margin: 0;
}
.wf-hero-10__form-group {
  display: flex;
  flex-direction: column;
  gap: 0.375rem;
}
.wf-hero-10__form-label {
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--color-text, #374151);
}
.wf-hero-10__form-input {
  padding: 0.75rem 1rem;
  border: 1px solid var(--color-neutral-300, #e5e7eb);
  border-radius: var(--radius-md, 0.375rem);
  background: var(--color-bg, #ffffff);
  font-size: 0.9375rem;
  color: var(--color-text, #111827);
}
.wf-hero-10__form-input::placeholder {
  color: var(--color-text-muted, #9ca3af);
}
.wf-hero-10__form-textarea {
  padding: 0.75rem 1rem;
  border: 1px solid var(--color-neutral-300, #e5e7eb);
  border-radius: var(--radius-md, 0.375rem);
  background: var(--color-bg, #ffffff);
  font-size: 0.9375rem;
  color: var(--color-text, #111827);
  resize: vertical;
  min-height: 100px;
  font-family: inherit;
}
.wf-hero-10__form-note {
  font-size: 0.75rem;
  color: var(--color-text-muted, #9ca3af);
  margin: 0;
}
@media (max-width: 768px) {
  .wf-hero-10 {
    flex-direction: column;
    text-align: center;
    padding: var(--space-8, 3rem) var(--space-4, 1rem);
  }
  .wf-hero-10__form-wrapper {
    width: 100%;
    max-width: none;
  }
  .wf-hero-10__form {
    text-align: left;
  }
}
</style>

<section class="wf-hero-10">
  <div class="wf-hero-10__content">
    <span class="wf-hero-10__eyebrow">Contactez-nous</span>
    <h1 class="wf-hero-10__title">Transformez votre vision en réalité numérique</h1>
    <p class="wf-hero-10__subtitle">Nous concevons des expériences digitales qui allient esthétique et performance pour propulser votre activité.</p>
  </div>
  <div class="wf-hero-10__form-wrapper">
    <form class="wf-hero-10__form">
      <h2 class="wf-hero-10__form-title">Parlons de votre projet</h2>
      <div class="wf-hero-10__form-group">
        <label class="wf-hero-10__form-label">Nom complet</label>
        <input type="text" class="wf-hero-10__form-input form__input" placeholder="Jean Dupont">
      </div>
      <div class="wf-hero-10__form-group">
        <label class="wf-hero-10__form-label">Email</label>
        <input type="email" class="wf-hero-10__form-input form__input" placeholder="jean@exemple.fr">
      </div>
      <div class="wf-hero-10__form-group">
        <label class="wf-hero-10__form-label">Message</label>
        <textarea class="wf-hero-10__form-textarea form__textarea" placeholder="Decrivez brievement votre projet..."></textarea>
      </div>
      <button type="submit" class="btn btn--primary">Envoyer</button>
      <p class="wf-hero-10__form-note">Reponse garantie sous 24h. Aucun engagement.</p>
    </form>
  </div>
</section>
