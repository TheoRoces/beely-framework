<!-- Hero 03 : Full-screen background image with overlay + centered text -->
<style>

.btn { display: inline-flex; align-items: center; justify-content: center; padding: 0.75rem 1.5rem; border-radius: var(--radius-md, 0.5rem); font-size: 0.9375rem; font-weight: 600; text-decoration: none; cursor: pointer; border: 1px solid transparent; transition: background 0.2s, border-color 0.2s; font-family: inherit; }
.btn--primary { background: var(--color-text, #374151); color: var(--color-bg, #ffffff); border-color: var(--color-text, #374151); }
.btn--primary:hover { background: var(--color-primary-hover); }
.btn--secondary { background: transparent; color: var(--color-text, #374151); border-color: var(--color-border, #e5e7eb); box-shadow: none; }
.btn--secondary:hover { background: var(--color-bg-alt); }
.wf-hero-03 {
  position: relative;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: var(--space-12, 5rem) var(--space-6, 2rem);
  overflow: hidden;
}
.wf-hero-03__bg {
  position: absolute;
  inset: 0;
  background-color: var(--color-neutral-200, #e5e7eb);
  z-index: 0;
}
.wf-hero-03__bg::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.7));
  z-index: 1;
}
.wf-hero-03__bg .wf-img {
  width: 100%;
  height: 100%;
  background-color: var(--color-neutral-300, #d1d5db);
}
.wf-hero-03__content {
  position: relative;
  z-index: 2;
  max-width: 760px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-4, 1.5rem);
}
.wf-hero-03__eyebrow {
  font-size: 0.875rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: rgba(255, 255, 255, 0.8);
}
.wf-hero-03__title {
  font-size: clamp(2.25rem, 5vw, 4rem);
  font-weight: 700;
  line-height: 1.1;
  color: var(--color-text-on-dark, #fff);
  margin: 0;
}
.wf-hero-03__subtitle {
  font-size: 1.125rem;
  line-height: 1.6;
  color: rgba(255, 255, 255, 0.85);
  margin: 0;
  max-width: 600px;
}
.wf-hero-03__actions {
  display: flex;
  gap: var(--space-3, 0.75rem);
  flex-wrap: wrap;
  justify-content: center;
  padding-top: var(--space-2, 0.5rem);
}
@media (max-width: 768px) {
  .wf-hero-03 {
    min-height: 80vh;
    padding: var(--space-8, 3rem) var(--space-4, 1rem);
  }
}

  .wf-hero-03 .btn--primary { background-color: var(--white); color: var(--color-bg-dark); border-color: var(--white); }
  .wf-hero-03 .btn--primary:hover { background-color: var(--color-neutral-200); border-color: var(--color-neutral-200); }
  .wf-hero-03 .btn--secondary { color: var(--color-text-on-dark, #fff); border-color: rgba(255,255,255,0.4); }
  .wf-hero-03 .btn--secondary:hover { border-color: var(--color-text-on-dark, #fff); background: rgba(255,255,255,0.1); }
</style>

<section class="wf-hero-03">
  <div class="wf-hero-03__bg">
    <div class="wf-img">Background image</div>
  </div>
  <div class="wf-hero-03__content">
    <span class="wf-hero-03__eyebrow">Agence digitale</span>
    <h1 class="wf-hero-03__title">Transformez votre vision en realite numerique</h1>
    <p class="wf-hero-03__subtitle">Nous concevons des experiences digitales qui allient esthetique et performance pour propulser votre activite.</p>
    <div class="wf-hero-03__actions">
      <a href="#" class="btn btn--primary">Decouvrir nos services</a>
      <a href="#" class="btn btn--secondary">Nous contacter</a>
    </div>
  </div>
</section>
