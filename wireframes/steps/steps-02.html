<!-- steps-02 : 3 steps vertical — number left + content right -->
<style>
  .wf-steps-02 {
    --wf-color-bg: var(--color-bg, #ffffff);
    --wf-color-text: var(--color-text, #1a1a1a);
    --wf-color-muted: var(--color-text-light, #6b7280);
    --wf-color-accent: var(--color-text, #1a1a1a);
    --wf-color-border: var(--color-border, #e5e7eb);
    --wf-color-number-text: var(--color-text, #1a1a1a);
    --wf-font-heading: var(--font-heading);
    --wf-font-body: var(--font-body);
    --wf-section-py: 6rem;
    --wf-max-width: 800px;
  }

  .wf-steps-02 {
    padding: var(--wf-section-py) 1.5rem;
    background: var(--wf-color-bg);
    color: var(--wf-color-text);
    font-family: var(--wf-font-body);
  }

  .wf-steps-02__container {
    max-width: var(--wf-max-width);
    margin: 0 auto;
  }

  .wf-steps-02__header {
    margin-bottom: 4rem;
  }

  .wf-steps-02__tagline {
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--color-text-light);
    margin: 0 0 0.75rem;
  }

  .wf-steps-02__title {
    font-family: var(--wf-font-heading);
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 700;
    margin: 0;
    line-height: 1.15;
  }

  .wf-steps-02__list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .wf-steps-02__step {
    display: grid;
    grid-template-columns: 5rem 1fr;
    gap: 2rem;
    padding: 2.5rem 0;
    border-top: 1px solid var(--wf-color-border);
    align-items: start;
  }

  .wf-steps-02__step:last-child {
    border-bottom: 1px solid var(--wf-color-border);
  }

  .wf-steps-02 .wf-step__number {
    font-family: var(--wf-font-heading);
    font-size: 3rem;
    font-weight: 800;
    color: var(--wf-color-number-text);
    line-height: 1;
  }

  .wf-steps-02__content {
    padding-top: 0.25rem;
  }

  .wf-steps-02__step-title {
    font-family: var(--wf-font-heading);
    font-size: 1.25rem;
    font-weight: 600;
    margin: 0 0 0.5rem;
  }

  .wf-steps-02__step-text {
    font-size: 1rem;
    color: var(--color-text-light);
    line-height: 1.6;
    margin: 0;
  }

  @media (max-width: 600px) {
    .wf-steps-02__step {
      grid-template-columns: 3.5rem 1fr;
      gap: 1.25rem;
    }
    .wf-steps-02 .wf-step__number {
      font-size: 2.25rem;
    }
  }
</style>

<section class="wf-steps-02">
  <div class="wf-steps-02__container">
    <header class="wf-steps-02__header">
      <p class="wf-steps-02__tagline">Comment ca marché</p>
      <h2 class="wf-steps-02__title">Notre processus</h2>
    </header>
    <div class="wf-steps-02__list">
      <div class="wf-steps-02__step">
        <div class="wf-step__number">01</div>
        <div class="wf-steps-02__content">
          <h3 class="wf-steps-02__step-title">Découverte</h3>
          <p class="wf-steps-02__step-text">Nous analysons vos besoins et definissons les objectifs du projet.</p>
        </div>
      </div>
      <div class="wf-steps-02__step">
        <div class="wf-step__number">02</div>
        <div class="wf-steps-02__content">
          <h3 class="wf-steps-02__step-title">Conception</h3>
          <p class="wf-steps-02__step-text">Création des maquettes et prototypes interactifs.</p>
        </div>
      </div>
      <div class="wf-steps-02__step">
        <div class="wf-step__number">03</div>
        <div class="wf-steps-02__content">
          <h3 class="wf-steps-02__step-title">Développement</h3>
          <p class="wf-steps-02__step-text">Integration et développement technique de votre solution.</p>
        </div>
      </div>
    </div>
  </div>
</section>
