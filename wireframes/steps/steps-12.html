<!-- steps-12 : Minimal — just numbered list, large text -->
<style>
  .wf-steps-12 {
    --wf-color-bg: var(--color-bg, #ffffff);
    --wf-color-text: var(--color-text, #1a1a1a);
    --wf-color-muted: var(--color-text-light, #6b7280);
    --wf-color-border: var(--color-border, #e5e7eb);
    --wf-color-number: var(--color-neutral-300, #d1d5db);
    --wf-font-heading: var(--font-heading);
    --wf-font-body: var(--font-body);
    --wf-section-py: 6rem;
    --wf-max-width: 800px;
  }

  .wf-steps-12 {
    padding: var(--wf-section-py) 1.5rem;
    background: var(--wf-color-bg);
    color: var(--wf-color-text);
    font-family: var(--wf-font-body);
  }

  .wf-steps-12__container {
    max-width: var(--wf-max-width);
    margin: 0 auto;
  }

  .wf-steps-12__header {
    margin-bottom: 4rem;
  }

  .wf-steps-12__tagline {
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--color-text-light);
    margin: 0 0 0.75rem;
  }

  .wf-steps-12__title {
    font-family: var(--wf-font-heading);
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 700;
    margin: 0;
    line-height: 1.15;
  }

  .wf-steps-12__list {
    display: flex;
    flex-direction: column;
  }

  .wf-steps-12__step {
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    padding: 2rem 0;
    border-bottom: 1px solid var(--wf-color-border);
  }

  .wf-steps-12__step:first-child {
    border-top: 1px solid var(--wf-color-border);
  }

  .wf-steps-12 .wf-step__number {
    font-family: var(--wf-font-heading);
    font-size: 1rem;
    font-weight: 600;
    color: var(--wf-color-number);
    flex-shrink: 0;
    min-width: 2rem;
  }

  .wf-steps-12__step-title {
    font-family: var(--wf-font-heading);
    font-size: clamp(1.25rem, 3vw, 2rem);
    font-weight: 600;
    margin: 0;
    line-height: 1.3;
  }

  .wf-steps-12__step-text {
    display: none;
  }

  @media (min-width: 600px) {
    .wf-steps-12__step {
      gap: 2rem;
    }
    .wf-steps-12 .wf-step__number {
      font-size: 1.125rem;
    }
  }
</style>

<section class="wf-steps-12">
  <div class="wf-steps-12__container">
    <header class="wf-steps-12__header">
      <p class="wf-steps-12__tagline">Comment ca marche</p>
      <h2 class="wf-steps-12__title">Notre processus</h2>
    </header>
    <div class="wf-steps-12__list">
      <div class="wf-steps-12__step">
        <div class="wf-step__number">01</div>
        <h3 class="wf-steps-12__step-title">Decouverte et analyse des besoins</h3>
      </div>
      <div class="wf-steps-12__step">
        <div class="wf-step__number">02</div>
        <h3 class="wf-steps-12__step-title">Conception et prototypage</h3>
      </div>
      <div class="wf-steps-12__step">
        <div class="wf-step__number">03</div>
        <h3 class="wf-steps-12__step-title">Développement technique</h3>
      </div>
      <div class="wf-steps-12__step">
        <div class="wf-step__number">04</div>
        <h3 class="wf-steps-12__step-title">Tests et mise en production</h3>
      </div>
    </div>
  </div>
</section>
