<!-- Content 07 : Section stats - 4 grands chiffres en ligne -->
<style>
  .wf-content-07 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    --wf-section-padding: 5rem 1.5rem;
    --wf-text-color: var(--color-text, #1a1a1a);
    --wf-text-secondary: var(--color-text-light, #555);
    --wf-accent: var(--color-text, #374151);
    --wf-bg: var(--color-bg, #ffffff);
    --wf-max-width: 1200px;
    --wf-border: var(--color-border, #e5e7eb);

    background: var(--wf-bg);
    color: var(--wf-text-color);
    padding: var(--wf-section-padding);
  }

  .wf-content-07__container {
    max-width: var(--wf-max-width);
    margin: 0 auto;
  }

  .wf-content-07__header {
    text-align: center;
    max-width: 600px;
    margin: 0 auto 3.5rem auto;
  }

  .wf-content-07__label {
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--wf-accent);
    margin-bottom: 0.75rem;
  }

  .wf-content-07__title {
    font-size: 2.25rem;
    font-weight: 700;
    line-height: 1.2;
    margin: 0;
  }

  

  .wf-content-07__stat {
    text-align: center;
    padding: 2rem 1.5rem;
    border-right: 1px solid var(--wf-border);
  }

  .wf-content-07__stat:last-child {
    border-right: none;
  }

  .wf-content-07__value {
    font-size: 3.5rem;
    font-weight: 800;
    line-height: 1;
    margin: 0 0 0.5rem 0;
    color: var(--wf-accent);
  }

  .wf-content-07__stat-label {
    font-size: 1rem;
    font-weight: 600;
    margin: 0 0 0.35rem 0;
  }

  .wf-content-07__stat-text {
    color: var(--wf-text-secondary);
    font-size: 0.875rem;
    line-height: 1.5;
    margin: 0;
  }

  @media (max-width: 900px) {
    
    .wf-content-07__stat {
      border-right: none;
      border-bottom: 1px solid var(--wf-border);
    }
    .wf-content-07__stat:nth-child(odd) {
      border-right: 1px solid var(--wf-border);
    }
    .wf-content-07__stat:nth-last-child(-n+2) {
      border-bottom: none;
    }
  }

  @media (max-width: 480px) {
    .wf-content-07 {
      --wf-section-padding: 3rem 1.25rem;
    }
    
    .wf-content-07__stat {
      border-right: none;
    }
    .wf-content-07__stat:last-child {
      border-bottom: none;
    }
    .wf-content-07__value {
      font-size: 2.75rem;
    }
    .wf-content-07__title {
      font-size: 1.75rem;
    }
  }
</style>

<section class="wf-content-07">
  <div class="wf-content-07__container">
    <div class="wf-content-07__header">
      <p class="wf-content-07__label">Nos chiffres</p>
      <h2 class="wf-content-07__title">Les résultats parlent d'eux-memes</h2>
    </div>
    <div class="wf-content-07__grid grid" data-cols="4" data-gap="md">
      <div class="wf-content-07__stat">
        <p class="wf-content-07__value">200+</p>
        <h3 class="wf-content-07__stat-label">Clients accompagnes</h3>
        <p class="wf-content-07__stat-text">Entreprises de toutes tailles</p>
      </div>
      <div class="wf-content-07__stat">
        <p class="wf-content-07__value">98%</p>
        <h3 class="wf-content-07__stat-label">Taux de satisfaction</h3>
        <p class="wf-content-07__stat-text">Clients fideles et satisfaits</p>
      </div>
      <div class="wf-content-07__stat">
        <p class="wf-content-07__value">12</p>
        <h3 class="wf-content-07__stat-label">Annees d'expérience</h3>
        <p class="wf-content-07__stat-text">Expertise eprouvee</p>
      </div>
      <div class="wf-content-07__stat">
        <p class="wf-content-07__value">35</p>
        <h3 class="wf-content-07__stat-label">Experts dédiés</h3>
        <p class="wf-content-07__stat-text">Passionnes et certifies</p>
      </div>
    </div>
  </div>
</section>
