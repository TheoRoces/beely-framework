<!-- Content 10 : Grande citation / declaration de mission + signature -->
<style>
  .wf-content-10 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    --wf-section-padding: 6rem 1.5rem;
    --wf-text-color: var(--color-text, #1a1a1a);
    --wf-text-secondary: var(--color-text-light, #555);
    --wf-accent: var(--color-text, #374151);
    --wf-bg: var(--color-bg-alt, #f9fafb);
    --wf-max-width: 900px;
    --wf-border: var(--color-border, #e5e7eb);

    background: var(--wf-bg);
    color: var(--wf-text-color);
    padding: var(--wf-section-padding);
  }

  .wf-content-10__container {
    max-width: var(--wf-max-width);
    margin: 0 auto;
    text-align: center;
  }

  .wf-content-10__icon {
    color: var(--wf-accent);
    margin-bottom: 2rem;
    opacity: 0.3;
  }

  .wf-content-10__quote {
    font-size: 2rem;
    font-weight: 600;
    line-height: 1.45;
    margin: 0 0 2.5rem 0;
    font-style: italic;
    letter-spacing: -0.01em;
  }

  .wf-content-10__divider {
    width: 3rem;
    height: 2px;
    background: var(--wf-border);
    border: none;
    margin: 0 auto 2rem auto;
  }

  .wf-content-10__author {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
  }

  .wf-content-10__avatar {
    width: 3.5rem;
    height: 3.5rem;
    border-radius: 50%;
    object-fit: cover;
    background: var(--color-neutral-200, #e5e7eb);
  }

  .wf-content-10__author-info {
    text-align: left;
  }

  .wf-content-10__author-name {
    font-size: 1rem;
    font-weight: 700;
    margin: 0 0 0.15rem 0;
  }

  .wf-content-10__author-role {
    font-size: 0.875rem;
    color: var(--wf-text-secondary);
    margin: 0;
  }

  @media (max-width: 768px) {
    .wf-content-10 {
      --wf-section-padding: 3.5rem 1.25rem;
    }
    .wf-content-10__quote {
      font-size: 1.375rem;
    }
  }
</style>

<section class="wf-content-10">
  <div class="wf-content-10__container">
    <div class="wf-content-10__icon">
      <svg viewBox="0 0 24 24" fill="currentColor" width="48" height="48"><path d="M4.583 17.321C3.553 16.227 3 15 3 13.011c0-3.5 2.457-6.637 6.03-8.188l.893 1.378c-3.335 1.804-3.987 4.145-4.247 5.621.537-.278 1.24-.375 1.929-.311 1.804.167 3.226 1.648 3.226 3.489a3.5 3.5 0 01-3.5 3.5c-1.073 0-2.099-.49-2.748-1.179zm10 0C13.553 16.227 13 15 13 13.011c0-3.5 2.457-6.637 6.03-8.188l.893 1.378c-3.335 1.804-3.987 4.145-4.247 5.621.537-.278 1.24-.375 1.929-.311 1.804.167 3.226 1.648 3.226 3.489a3.5 3.5 0 01-3.5 3.5c-1.073 0-2.099-.49-2.748-1.179z"/></svg>
    </div>
    <blockquote class="wf-content-10__quote">
      Notre mission est simple : transformer chaque defi digital en une opportunite
      de croissance pour nos clients. Nous ne nous contentons pas de livrer des
      projets, nous construisons des partenariats durables.
    </blockquote>
    <hr class="wf-content-10__divider" />
    <div class="wf-content-10__author">
      <img src="https://placehold.co/80x80/e5e7eb/999?text=Photo" alt="Fondateur" class="wf-content-10__avatar" />
      <div class="wf-content-10__author-info">
        <p class="wf-content-10__author-name">Jean-Pierre Martin</p>
        <p class="wf-content-10__author-role">Fondateur et Directeur General</p>
      </div>
    </div>
  </div>
</section>
