<!-- Content 15 : Section sombre avec texte centre + image en dessous -->
<style>
  .wf-content-15 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    --wf-section-padding: 5rem 1.5rem;
    --wf-text-color: var(--color-text, #ffffff);
    --wf-text-secondary: rgba(255, 255, 255, 0.7);
    --wf-accent: var(--color-text-light);
    --wf-bg: var(--color-bg-dark, #111827);
    --wf-radius: 0.75rem;
    --wf-max-width: 1200px;

    background: var(--wf-bg);
    color: var(--wf-text-color);
    padding: var(--wf-section-padding);
  }

  .wf-content-15__container {
    max-width: var(--wf-max-width);
    margin: 0 auto;
  }

  .wf-content-15__header {
    text-align: center;
    max-width: 720px;
    margin: 0 auto 3rem auto;
  }

  .wf-content-15__label {
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--wf-accent);
    margin-bottom: 0.75rem;
  }

  .wf-content-15__title {
    font-size: 2.75rem;
    font-weight: 700;
    line-height: 1.15;
    margin: 0 0 1.25rem 0;
  }

  .wf-content-15__text {
    color: var(--wf-text-secondary);
    font-size: 1.125rem;
    line-height: 1.7;
    margin: 0 0 2rem 0;
  }

  .wf-content-15__actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .wf-content-15__btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.8rem 1.75rem;
    border-radius: var(--radius-md, 0.5rem);
    font-size: 0.9375rem;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    border: none;
    transition: opacity 0.2s;
  }

  .wf-content-15__btn--primary {
    background: var(--wf-accent);
    color: var(--color-bg-dark);
  }

  .wf-content-15__btn--secondary {
    background: transparent;
    color: var(--wf-text-color);
    border: 1.5px solid rgba(255, 255, 255, 0.25);
  }

  .wf-content-15__btn:hover {
    opacity: 0.85;
  }

  .wf-content-15__media {
    margin-top: 3.5rem;
    border-radius: var(--wf-radius);
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .wf-content-15__image {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    display: block;
    background: var(--color-bg-dark);
  }

  @media (max-width: 768px) {
    .wf-content-15 {
      --wf-section-padding: 3rem 1.25rem;
    }
    .wf-content-15__title {
      font-size: 1.875rem;
    }
    .wf-content-15__media {
      margin-top: 2.5rem;
    }
  }
</style>

<section class="wf-content-15">
  <div class="wf-content-15__container">
    <div class="wf-content-15__header">
      <p class="wf-content-15__label">A propos de nous</p>
      <h2 class="wf-content-15__title">Ensemble, construisons le digital de demain</h2>
      <p class="wf-content-15__text">
        Notre équipe d'experts passionnes combine créativité et expertise technique
        pour transformer vos idées en expériences digitales performantes. De la
        stratégie au deploiement, nous sommes à vos cotes.
      </p>
      <div class="wf-content-15__actions">
        <a href="#" class="wf-content-15__btn wf-content-15__btn--primary">
          Demarrer un projet
          <span data-icon="arrow-right" data-icon-type="outline" data-icon-size="24"></span>
        </a>
        <a href="#" class="wf-content-15__btn wf-content-15__btn--secondary">En savoir plus</a>
      </div>
    </div>
    <div class="wf-content-15__media">
      <img src="https://placehold.co/1200x675/1f2937/555?text=Image+showcase" alt="Notre travail" class="wf-content-15__image" />
    </div>
  </div>
</section>
