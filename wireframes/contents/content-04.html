<!-- Content 04 : Image pleine largeur + texte en overlay en bas -->
<style>
  .wf-content-04 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    --wf-section-padding: 0;
    --wf-text-color: var(--color-text, #ffffff);
    --wf-text-secondary: rgba(255, 255, 255, 0.8);
    --wf-accent: rgba(255, 255, 255, 0.7);
    --wf-radius: 0;
    --wf-max-width: 1200px;

    position: relative;
    overflow: hidden;
    color: var(--wf-text-color);
  }

  .wf-content-04__image {
    width: 100%;
    min-height: 550px;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: var(--color-bg-dark);
  }

  .wf-content-04__overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0, 0, 0, 0.75) 0%, rgba(0, 0, 0, 0.1) 60%, transparent 100%);
  }

  .wf-content-04__body {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 3rem 1.5rem;
  }

  .wf-content-04__inner {
    max-width: var(--wf-max-width);
    margin: 0 auto;
  }

  .wf-content-04__label {
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--wf-accent);
    margin-bottom: 0.75rem;
  }

  .wf-content-04__title {
    font-size: 2.75rem;
    font-weight: 700;
    line-height: 1.15;
    margin: 0 0 1rem 0;
    max-width: 700px;
  }

  .wf-content-04__text {
    color: var(--wf-text-secondary);
    font-size: 1.125rem;
    line-height: 1.7;
    margin: 0;
    max-width: 600px;
  }

  .wf-content-04__link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--color-text-on-dark, #fff);
    font-weight: 600;
    text-decoration: none;
    margin-top: 1.25rem;
    font-size: 1rem;
    border-bottom: 1.5px solid rgba(255,255,255,0.4);
    padding-bottom: 0.15rem;
  }

  .wf-content-04__link:hover {
    border-bottom-color: var(--color-bg, #fff);
  }

  @media (max-width: 768px) {
    .wf-content-04__image {
      min-height: 420px;
    }
    .wf-content-04__title {
      font-size: 1.75rem;
    }
    .wf-content-04__body {
      padding: 2rem 1.25rem;
    }
  }
</style>

<section class="wf-content-04">
  <div class="wf-content-04__image" role="img" aria-label="Notre vision">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="64" height="64" opacity="0.2" style="color: var(--color-text-light)"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0022.5 18.75V5.25A2.25 2.25 0 0020.25 3H3.75A2.25 2.25 0 001.5 5.25v13.5A2.25 2.25 0 003.75 21z"/></svg>
  </div>
  <div class="wf-content-04__overlay"></div>
  <div class="wf-content-04__body">
    <div class="wf-content-04__inner">
      <p class="wf-content-04__label">Notre vision</p>
      <h2 class="wf-content-04__title">Creer des expériences digitales qui marquent les esprits</h2>
      <p class="wf-content-04__text">
        Nous croyons que le design et la technologie peuvent transformer
        la manière dont les marques interagissent avec leur audience.
      </p>
      <a href="#" class="wf-content-04__link">
        Découvrir notre approche
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
      </a>
    </div>
  </div>
</section>
