<!-- Portfolio 09: 4-column grid, square images, minimal -->
<style>
  .wf-portfolio-09 {
    --wf-bg: var(--color-bg, #ffffff);
    --wf-text: var(--color-text, #1a1a1a);
    --wf-text-muted: var(--color-text-light, #6b7280);
    --wf-accent: var(--color-text, #374151);
    --wf-card-bg: var(--color-bg-alt, #f9fafb);
    --wf-border: var(--color-border, #e5e7eb);
    --wf-radius: 0.5rem;
    --wf-gap: 1rem;
    padding: 5rem 1.5rem;
    background: var(--wf-bg);
    color: var(--wf-text);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }
  .wf-portfolio-09 .wf-portfolio-09__header {
    max-width: 72rem;
    margin: 0 auto 3rem;
    text-align: center;
  }
  .wf-portfolio-09 .wf-portfolio-09__subtitle {
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--wf-accent);
    margin-bottom: 0.75rem;
  }
  .wf-portfolio-09 .wf-portfolio-09__title {
    font-size: 2.5rem;
    font-weight: 700;
    line-height: 1.2;
    margin: 0;
  }
  .wf-portfolio-09 .wf-portfolio-09__grid {
    max-width: 72rem;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--wf-gap);
  }
  .wf-portfolio-09 .wf-card {
    border-radius: var(--wf-radius);
    overflow: hidden;
    background: var(--wf-card-bg);
  }
  .wf-portfolio-09 .wf-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--wf-card-bg);
    color: var(--wf-text-muted);
  }
  .wf-portfolio-09 .wf-card__body {
    padding: 0.875rem;
  }
  .wf-portfolio-09 .wf-card__title {
    font-size: 0.875rem;
    font-weight: 600;
    margin: 0 0 0.125rem;
  }
  .wf-portfolio-09 .wf-card__cat {
    font-size: 0.75rem;
    color: var(--wf-text-muted);
  }
  @media (max-width: 640px) {
    .wf-portfolio-09 .wf-portfolio-09__grid { grid-template-columns: repeat(2, 1fr); }
    .wf-portfolio-09 .wf-portfolio-09__title { font-size: 1.75rem; }
    .wf-portfolio-09 { padding: 3rem 1rem; }
  }
  @media (min-width: 641px) and (max-width: 1024px) {
    .wf-portfolio-09 .wf-portfolio-09__grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
