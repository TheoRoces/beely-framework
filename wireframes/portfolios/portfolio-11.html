<!-- Portfolio 11: Before/after split layout for projects -->
<style>
  .wf-portfolio-11 {
    --wf-bg: var(--color-bg, #ffffff);
    --wf-text: var(--color-text, #1a1a1a);
    --wf-text-muted: var(--color-text-light, #6b7280);
    --wf-accent: var(--color-text, #374151);
    --wf-card-bg: var(--color-bg-alt, #f9fafb);
    --wf-card-bg-alt: var(--color-neutral-200, #e8edf5);
    --wf-border: var(--color-border, #e5e7eb);
    --wf-radius: 0.75rem;
    --wf-padding: 5rem 1.5rem;
    background: var(--wf-bg);
    color: var(--wf-text);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }
  .wf-portfolio-11 .wf-portfolio-11__header {
    max-width: 72rem;
    margin: 0 auto 3rem;
    text-align: center;
  }
  .wf-portfolio-11 .wf-portfolio-11__subtitle {
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--wf-accent);
    margin-bottom: 0.75rem;
  }
  .wf-portfolio-11 .wf-portfolio-11__title {
    font-size: 2.5rem;
    font-weight: 700;
    line-height: 1.2;
    margin: 0 0 1rem;
  }
  .wf-portfolio-11 .wf-portfolio-11__desc {
    font-size: 1.125rem;
    color: var(--wf-text-muted);
    max-width: 40rem;
    margin: 0 auto;
    line-height: 1.6;
  }
  .wf-portfolio-11 .wf-portfolio-11__projects {
    max-width: 72rem;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 3rem;
  }
  .wf-portfolio-11 .wf-portfolio-11__project {
    border: 1px solid var(--wf-border);
    border-radius: var(--wf-radius);
    overflow: hidden;
  }
  .wf-portfolio-11 .wf-portfolio-11__project-header {
    padding: 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--wf-border);
  }
  .wf-portfolio-11 .wf-portfolio-11__project-name {
    font-size: 1.25rem;
    font-weight: 700;
    margin: 0;
  }
  .wf-portfolio-11 .wf-badge {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--wf-accent);
    background: var(--color-bg-alt, #f9fafb);
    padding: 0.25rem 0.75rem;
    border-radius: var(--radius-full, 9999px);
  }
  .wf-portfolio-11 
  .wf-portfolio-11 .wf-portfolio-11__before,
  .wf-portfolio-11 .wf-portfolio-11__after {
    position: relative;
  }
  .wf-portfolio-11 .wf-portfolio-11__label {
    position: absolute;
    top: 1rem;
    left: 1rem;
    font-size: 0.6875rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 0.25rem 0.625rem;
    border-radius: var(--radius-sm, 0.25rem);
    z-index: 1;
  }
  .wf-portfolio-11 .wf-portfolio-11__label--before {
    background: var(--color-text-light, #6b7280);
    color: var(--color-text-on-dark);
  }
  .wf-portfolio-11 .wf-portfolio-11__label--after {
    background: var(--color-text, #374151);
    color: var(--color-text-on-dark);
  }
  .wf-portfolio-11 .wf-img {
    width: 100%;
    min-height: 18rem;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--wf-text-muted);
  }
  .wf-portfolio-11 .wf-portfolio-11__before .wf-img {
    background: var(--wf-card-bg);
  }
  .wf-portfolio-11 .wf-portfolio-11__after .wf-img {
    background: var(--wf-card-bg-alt);
  }
  .wf-portfolio-11 .wf-portfolio-11__divider {
    width: 2px;
    background: var(--wf-border);
    position: relative;
  }
  @media (max-width: 768px) {
    .wf-portfolio-11 
    .wf-portfolio-11 .wf-portfolio-11__title { font-size: 1.75rem; }
    .wf-portfolio-11 .wf-portfolio-11__project-header { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
    .wf-portfolio-11 { padding: 3rem 1rem; }
  }
</style>
