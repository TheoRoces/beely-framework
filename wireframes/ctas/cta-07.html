<!-- CTA-07 : Split layout - left text with CTA button + right image -->
<style>

.btn { display: inline-flex; align-items: center; justify-content: center; padding: 0.75rem 1.5rem; border-radius: var(--radius-md, 0.5rem); font-size: 0.9375rem; font-weight: 600; text-decoration: none; cursor: pointer; border: 1px solid transparent; transition: background 0.2s, border-color 0.2s; font-family: inherit; }

.btn--secondary { background: transparent; color: var(--color-text, #374151); border-color: var(--color-border, #e5e7eb); box-shadow: none; }

  .wf-cta-07 {
    padding: var(--space-20, 5rem) var(--space-6, 1.5rem);

  .wf-cta-07__container {
    max-width: var(--container-max, 72rem);
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-8, 3rem);
    align-items: center;
  }

  .wf-cta-07__content {
    order: 2;
  }

  .wf-cta-07__tagline {
    font-size: var(--text-sm, 0.875rem);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--color-text, #374151);
    margin-bottom: var(--space-3, 0.75rem);
  }

  .wf-cta-07__heading {
    font-size: var(--text-3xl, 2.25rem);
    font-weight: 700;
    line-height: 1.2;
    color: var(--color-text, #111827);
    margin: 0 0 var(--space-5, 1rem);
  }

  .wf-cta-07__text {
    font-size: var(--font-size-md, 1rem);
    line-height: 1.6;
    color: var(--color-text-muted, #6b7280);
    margin: 0 0 var(--space-6, 2rem);
  }

  .wf-cta-07__media {
    order: 1;
  }

  .wf-cta-07__image {
    width: 100%;
    aspect-ratio: 4 / 3;
    background-color: var(--color-placeholder, #e5e7eb);
    border-radius: var(--radius-lg, 0.75rem);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-text-muted, #9ca3af);
    font-size: var(--text-sm, 0.875rem);
  }

  @media (min-width: 768px) {
    .wf-cta-07__container {
      grid-template-columns: 1fr 1fr;
    }

    .wf-cta-07__content {

    }

    .wf-cta-07__media {

    }

    .wf-cta-07__heading {
