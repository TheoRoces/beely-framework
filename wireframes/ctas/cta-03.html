<!-- CTA-03 : Dark background, centered, two buttons (primary + secondary) -->
<style>

  .wf-cta-03 {
    padding: var(--space-20, 5rem) var(--space-6, 1.5rem);
    background-color: var(--color-bg-dark, #111827);
    text-align: center;
  }

  .wf-cta-03__container {
    max-width: var(--container-max, 48rem);
    margin: 0 auto;
  }

  .wf-cta-03__heading {
    font-size: var(--text-3xl, 2.25rem);
    font-weight: 700;
    line-height: 1.2;
    color: var(--color-text-on-dark, #ffffff);
    margin: 0 0 var(--space-5, 1rem);
  }

  .wf-cta-03__text {
    font-size: var(--text-lg, 1.125rem);
    line-height: 1.6;
    color: var(--color-text-light);
    margin: 0 0 var(--space-8, 2.5rem);
  }

  .wf-cta-03__buttons {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-4, 1rem);
  }

  @media (min-width: 768px) {
    .wf-cta-03__heading {
      font-size: var(--text-4xl, 3rem);
    }

    .wf-cta-03__buttons {
      flex-direction: row;
      justify-content: center;
    }
  }

  .wf-cta-03 .btn--primary { background-color: var(--white); color: var(--color-bg-dark); border-color: var(--white); }
  .wf-cta-03 .btn--primary:hover { background-color: var(--color-neutral-200); border-color: var(--color-neutral-200); }
  .wf-cta-03 .btn--secondary { color: var(--color-text-on-dark, #fff); border-color: rgba(255,255,255,0.4); }
  .wf-cta-03 .btn--secondary:hover { border-color: var(--color-text-on-dark, #fff); background: rgba(255,255,255,0.1); }
</style>

<section class="wf-cta-03">
  <div class="wf-cta-03__container">
    <h2 class="wf-cta-03__heading">Pret a transformer votre projet ?</h2>
    <p class="wf-cta-03__text">
      Découvrez comment nous pouvons vous aider a atteindre vos objectifs. Consultation gratuite et sans engagement.
    </p>
    <div class="wf-cta-03__buttons">
      <a href="#" class="btn btn--primary">Commencer maintenant</a>
      <a href="#" class="btn btn--secondary">Réservez un appel découverte</a>
    </div>
  </div>
</section>
