<!-- Logos 04 : Two rows of logos, staggered -->
<style>
  .wf-logos-04 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    padding: var(--wf-spacing-xl, 4rem) var(--wf-spacing-md, 1.5rem);
    text-align: center;
  }

  .wf-logos-04__title {
    font-size: var(--wf-font-size-sm, 0.875rem);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--color-text-light, #6b7280);
    margin: 0 0 var(--wf-spacing-lg, 2.5rem) 0;
  }

  .wf-logos-04__row {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    gap: var(--wf-spacing-lg, 3rem);
    max-width: 960px;
    margin: 0 auto var(--wf-spacing-md, 1.5rem) auto;
  }

  .wf-logos-04__row--offset {
    padding-left: var(--wf-spacing-xl, 4rem);
    padding-right: var(--wf-spacing-xl, 4rem);
  }

  .wf-logos-04 .wf-logo {
    color: var(--color-text-light, #9ca3af);
    opacity: 0.5;
    flex-shrink: 0;
  }

  @media (max-width: 768px) {
    .wf-logos-04__row {
      gap: var(--wf-spacing-md, 1.5rem);
    }

    .wf-logos-04__row--offset {
      padding-left: 0;
      padding-right: 0;
    }

    .wf-logos-04 .wf-logo svg {
      width: 96px;
      height: 26px;
    }
  }
</style>
