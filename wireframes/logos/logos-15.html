<!-- Logos 15 : Vertical stack on mobile, horizontal on desktop, with eyebrow text -->
<style>
  .wf-logos-15 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    padding: var(--wf-spacing-xl, 4rem) var(--wf-spacing-md, 1.5rem);
  }

  .wf-logos-15__inner {
    max-width: 1080px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: var(--wf-spacing-xl, 3rem);
  }

  .wf-logos-15__text {
    flex-shrink: 0;
    max-width: 200px;
  }

  .wf-logos-15__eyebrow {
    font-size: var(--wf-font-size-xs, 0.75rem);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--color-text, #374151);
    margin: 0 0 var(--wf-spacing-2xs, 0.25rem) 0;
  }

  .wf-logos-15__heading {
    font-size: var(--wf-font-size-sm, 0.875rem);
    font-weight: 500;
    color: var(--color-text-light, #6b7280);
    margin: 0;
    line-height: 1.5;
  }

  .wf-logos-15__divider {
    width: 1px;
    height: 48px;
    background-color: var(--color-border, #e5e7eb);
    flex-shrink: 0;
  }

  .wf-logos-15__row {
    display: flex;
    align-items: center;
    gap: var(--wf-spacing-lg, 2.5rem);
    flex-wrap: wrap;
    flex: 1;
  }

  .wf-logos-15 .wf-logo {
    color: var(--color-text-light, #9ca3af);
    opacity: 0.5;
    flex-shrink: 0;
  }

  @media (max-width: 768px) {
    .wf-logos-15__inner {
      flex-direction: column;
      text-align: center;
    }

    .wf-logos-15__text {
      max-width: none;
    }

    .wf-logos-15__divider {
      width: 40px;
      height: 1px;
    }

    .wf-logos-15__row {
      flex-direction: column;
      gap: var(--wf-spacing-md, 1.5rem);
    }

    .wf-logos-15 .wf-logo svg {
      width: 96px;
      height: 26px;
    }
  }
</style>

<section class="wf-logos-15">
  <div class="wf-logos-15__inner">
    <div class="wf-logos-15__text">
      <p class="wf-logos-15__eyebrow">Nos partenaires</p>
      <p class="wf-logos-15__heading">Plus de 500 entreprises nous font confiance</p>
    </div>
    <div class="wf-logos-15__divider"></div>
    <div class="wf-logos-15__row">
      <div class="wf-logo"><svg width="120" height="32" viewBox="0 0 120 32" fill="currentColor" opacity="0.7"><rect width="120" height="32" rx="4"/></svg></div>
      <div class="wf-logo"><svg width="120" height="32" viewBox="0 0 120 32" fill="currentColor" opacity="0.7"><rect width="120" height="32" rx="4"/></svg></div>
      <div class="wf-logo"><svg width="120" height="32" viewBox="0 0 120 32" fill="currentColor" opacity="0.7"><rect width="120" height="32" rx="4"/></svg></div>
      <div class="wf-logo"><svg width="120" height="32" viewBox="0 0 120 32" fill="currentColor" opacity="0.7"><rect width="120" height="32" rx="4"/></svg></div>
      <div class="wf-logo"><svg width="120" height="32" viewBox="0 0 120 32" fill="currentColor" opacity="0.7"><rect width="120" height="32" rx="4"/></svg></div>
    </div>
  </div>
</section>
