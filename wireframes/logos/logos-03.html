<!-- Logos 03 : Infinite scroll marquee (CSS animation) of logos -->
<style>
  .wf-logos-03 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    padding: var(--wf-spacing-xl, 4rem) 0;
    overflow: hidden;
  }

  .wf-logos-03__title {
    font-size: var(--wf-font-size-sm, 0.875rem);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--color-text-light, #6b7280);
    text-align: center;
    margin: 0 0 var(--wf-spacing-lg, 2.5rem) 0;
  }

  .wf-logos-03__track {
    display: flex;
    width: max-content;
    animation: wf-marquee 20s linear infinite;
  }

  .wf-logos-03__set {
    display: flex;
    align-items: center;
    gap: var(--wf-spacing-xl, 4rem);
    padding-right: var(--wf-spacing-xl, 4rem);
  }

  .wf-logos-03 .wf-logo {
    color: var(--color-text-light, #9ca3af);
    opacity: 0.5;
    flex-shrink: 0;
  }

  .wf-logos-03__track:hover {
    animation-play-state: paused;
  }

  @keyframes wf-marquee {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .wf-logos-03__fade {
    position: relative;
  }

  .wf-logos-03__fade::before,
  .wf-logos-03__fade::after {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    width: 100px;
    z-index: 1;
    pointer-events: none;
  }

  .wf-logos-03__fade::before {
    left: 0;
    background: linear-gradient(to right, var(--color-bg, #ffffff), transparent);
  }

  .wf-logos-03__fade::after {
    right: 0;
    background: linear-gradient(to left, var(--color-bg, #ffffff), transparent);
  }
</style>
