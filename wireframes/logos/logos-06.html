<!-- Logos 06 : Logos with separator lines between them -->
<style>
  .wf-logos-06 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    padding: var(--wf-spacing-xl, 4rem) var(--wf-spacing-md, 1.5rem);
    text-align: center;
  }

  .wf-logos-06__title {
    font-size: var(--wf-font-size-sm, 0.875rem);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--color-text-light, #6b7280);
    margin: 0 0 var(--wf-spacing-lg, 2.5rem) 0;
  }

  .wf-logos-06__row {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    max-width: 1080px;
    margin: 0 auto;
  }

  .wf-logos-06__item {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 var(--wf-spacing-lg, 2.5rem);
    border-right: 1px solid var(--color-border, #e5e7eb);
  }

  .wf-logos-06__item:last-child {
    border-right: none;
  }

  .wf-logos-06 .wf-logo {
    color: var(--color-text-light, #9ca3af);
    opacity: 0.5;
    flex-shrink: 0;
  }

  @media (max-width: 768px) {
    .wf-logos-06__item {
      padding: var(--wf-spacing-sm, 0.75rem) var(--wf-spacing-md, 1.5rem);
      border-right: none;
      border-bottom: 1px solid var(--color-border, #e5e7eb);
    }

    .wf-logos-06__item:last-child {
      border-bottom: none;
    }

    .wf-logos-06 .wf-logo svg {
      width: 96px;
      height: 26px;
    }
  }
</style>
