<!-- Logos 09 : Logos grid (3x2) with hover color reveal -->
<style>
  .wf-logos-09 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    padding: var(--wf-spacing-xl, 4rem) var(--wf-spacing-md, 1.5rem);
    text-align: center;
  }

  .wf-logos-09__title {
    font-size: var(--wf-font-size-sm, 0.875rem);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--color-text-light, #6b7280);
    margin: 0 0 var(--wf-spacing-lg, 2.5rem) 0;
  }

  .wf-logos-09__grid {
    max-width: 720px;
    margin: 0 auto;
    background-color: var(--color-border, #e5e7eb);
    border: 1px solid var(--color-border, #e5e7eb);
    border-radius: var(--wf-radius-md, 8px);
    overflow: hidden;
  }

  .wf-logos-09__cell {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--wf-spacing-lg, 2.5rem) var(--wf-spacing-md, 1.5rem);
    background-color: var(--color-bg, #ffffff);
    transition: background-color 0.3s ease;
  }

  .wf-logos-09__cell:hover {
    background-color: var(--color-bg-alt, #f9fafb);
  }

  .wf-logos-09 .wf-logo {
    color: var(--color-text-light, #9ca3af);
    opacity: 0.35;
    transition: opacity 0.3s ease, filter 0.3s ease;
    filter: grayscale(1);
  }

  .wf-logos-09__cell:hover .wf-logo {
    opacity: 0.85;
    filter: grayscale(0);
    color: var(--color-text, #374151);
  }

  @media (max-width: 480px) {
    
  }
</style>
