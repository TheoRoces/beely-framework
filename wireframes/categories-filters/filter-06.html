<!-- filter-06.html — Category cards (icon + title + count) in a grid -->
<style>
  .wf-filter-06 {
    --wf-bg: var(--color-bg-alt, #f9fafb);
    --wf-text: var(--color-text, #1a1a1a);
    --wf-muted: var(--color-text-light, #6b7280);
    --wf-border: var(--color-border, #e5e7eb);
    --wf-accent: var(--color-text, #1a1a1a);
    --wf-card-bg: var(--color-bg, #ffffff);
    --wf-radius: 0.75rem;
    --wf-gap: 1.5rem;
    --wf-section-py: 5rem;

    background: var(--wf-bg);
    color: var(--wf-text);
    padding: var(--wf-section-py) 5%;
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-filter-06__header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .wf-filter-06__title {
    font-size: clamp(1.75rem, 3vw, 2.5rem);
    font-weight: 700;
    margin: 0 0 0.5rem;
  }

  .wf-filter-06__subtitle {
    color: var(--wf-muted);
    font-size: 1.125rem;
    margin: 0;
  }

  .wf-filter-06__grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--wf-gap);
    max-width: 900px;
    margin: 0 auto;
  }

  .wf-filter-06 .wf-card {
    background: var(--wf-card-bg);
    border-radius: var(--wf-radius);
    border: 1px solid var(--wf-border);
    padding: 2rem 1.5rem;
    text-align: center;
    text-decoration: none;
    color: var(--wf-text);
    transition: box-shadow 0.2s, transform 0.2s;
    display: block;
    cursor: pointer;
  }

  .wf-filter-06 .wf-card:hover {
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    transform: translateY(-2px);
  }

  .wf-filter-06__icon {
    width: 3rem;
    height: 3rem;
    background: var(--wf-bg);
    border-radius: 0.625rem;
    margin: 0 auto 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wf-filter-06__icon svg {
    width: 1.5rem;
    height: 1.5rem;
    color: var(--wf-accent);
  }

  .wf-filter-06 .wf-card__title {
    font-size: 1.125rem;
    font-weight: 600;
    margin: 0 0 0.375rem;
  }

  .wf-filter-06 .wf-card__count {
    color: var(--wf-muted);
    font-size: 0.875rem;
    margin: 0;
  }

  @media (max-width: 640px) {
    .wf-filter-06__grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }
</style>
