<!-- Header 14 : Header sticky avec fine bordure basse, compact -->
<style>
.btn--primary { background: var(--color-text); color: var(--color-bg); border-color: var(--color-text); }
.btn--primary:hover { background: var(--color-primary-hover); }
.btn--secondary { background: transparent; color: var(--color-text); border-color: var(--color-border); box-shadow: none; }
.btn--secondary:hover { background: var(--color-bg-alt); }
  .wf-header-14 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    position: sticky;
    top: 0;
    z-index: 100;
    background-color: var(--color-bg);
    border-bottom: 1px solid var(--color-border);
    padding: var(--space-2) 0;
    backdrop-filter: blur(8px);
    background-color: var(--color-bg, rgba(255, 255, 255, 0.95));
  }
  .wf-header-14 .container {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .wf-header-14__logo {
    font-size: var(--text-base);
    font-weight: var(--font-weight-bold);
    color: var(--color-text);
    text-decoration: none;
    flex-shrink: 0;
  }
  .wf-header-14__nav {
    display: flex;
    align-items: center;
    gap: var(--space-5);
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .wf-header-14__nav a {
    font-size: var(--text-xs);
    font-weight: var(--font-weight-medium);
    color: var(--color-text-light);
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    transition: color var(--transition-fast);
  }
  .wf-header-14__nav a:hover {
    color: var(--color-text);
  }
  .wf-header-14 .btn {
    padding: var(--space-1) var(--space-4);
    font-size: var(--text-xs);
  }
  @media (max-width: 768px) {
    .wf-header-14__nav {
      display: none;
    }
  }
</style>

<header class="wf-header-14">
  <div class="container">
    <a href="#" class="wf-header-14__logo">Logo</a>
    <nav>
      <ul class="wf-header-14__nav">
        <li><a href="#">Accueil</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Portfolio</a></li>
        <li><a href="#">Blog</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
    <a href="#" class="btn btn--primary">Nous contacter</a>
  </div>
</header>
