<!-- Header 15 : Logo + tagline a gauche, nav a droite, selecteur de langue -->
<style>
  .wf-header-15 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    background-color: var(--color-bg);
    border-bottom: 1px solid var(--color-border);
    padding: var(--space-4) 0;
  }
  .wf-header-15 .container {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .wf-header-15__brand {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    text-decoration: none;
  }
  .wf-header-15__logo {
    font-size: var(--text-xl);
    font-weight: var(--font-weight-bold);
    color: var(--color-text);
  }
  .wf-header-15__divider {
    width: 1px;
    height: 24px;
    background-color: var(--color-border);
  }
  .wf-header-15__tagline {
    font-size: var(--text-xs);
    color: var(--color-text-light);
    max-width: 140px;
    line-height: 1.3;
  }
  .wf-header-15__right {
    display: flex;
    align-items: center;
    gap: var(--space-6);
  }
  .wf-header-15__nav {
    display: flex;
    align-items: center;
    gap: var(--space-6);
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .wf-header-15__nav a {
    font-size: var(--text-sm);
    font-weight: var(--font-weight-medium);
    color: var(--color-text);
    text-decoration: none;
    transition: color var(--transition-fast);
  }
  .wf-header-15__nav a:hover {
    color: var(--color-text-light);
  }
  .wf-header-15__lang {
    display: flex;
    align-items: center;
    gap: var(--space-1);
    padding: var(--space-1) var(--space-3);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    background: var(--color-bg);
    font-size: var(--text-xs);
    font-weight: var(--font-weight-medium);
    color: var(--color-text);
    cursor: pointer;
    transition: border-color var(--transition-fast);
  }
  .wf-header-15__lang:hover {
    border-color: var(--color-border-dark);
  }
  .wf-header-15__lang svg {
    width: 16px;
    height: 16px;
  }
  .wf-header-15__lang-chevron {
    width: 12px;
    height: 12px;
    color: var(--color-text-light);
  }
  @media (max-width: 768px) {
    .wf-header-15__nav {
      display: none;
    }
    .wf-header-15__tagline,
    .wf-header-15__divider {
      display: none;
    }
  }
</style>

<header class="wf-header-15">
  <div class="container">
    <a href="#" class="wf-header-15__brand">
      <span class="wf-header-15__logo">Logo</span>
      <span class="wf-header-15__divider"></span>
      <span class="wf-header-15__tagline">Solutions digitales sur mesure</span>
    </a>
    <div class="wf-header-15__right">
      <nav>
        <ul class="wf-header-15__nav">
          <li><a href="#">Accueil</a></li>
          <li><a href="#">Services</a></li>
          <li><a href="#">Portfolio</a></li>
          <li><a href="#">Blog</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
      <button class="wf-header-15__lang" aria-label="Changer de langue">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        FR
        <svg class="wf-header-15__lang-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>
  </div>
</header>
