<!-- Header 13 : Logo a gauche, barre de recherche centre, nav + CTA a droite -->
<style>

  .wf-header-13 {
    background-color: var(--color-bg);
    border-bottom: 1px solid var(--color-border);
    padding: var(--space-4) 0;
  }
  .wf-header-13 .container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-6);
  }
  .wf-header-13__logo {
    font-size: var(--text-xl);
    font-weight: var(--font-weight-bold);
    color: var(--color-text);
    text-decoration: none;
    flex-shrink: 0;
  }
  .wf-header-13__search {
    flex: 1;
    max-width: 400px;
    position: relative;
  }
  .wf-header-13__search-input {
    width: 100%;
    padding: var(--space-2) var(--space-4) var(--space-2) var(--space-10);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-full);
    font-size: var(--text-sm);
    background-color: var(--color-bg-alt);
    color: var(--color-text);
    transition: border-color var(--transition-fast), background-color var(--transition-fast);
  }
  .wf-header-13__search-input:focus {
    outline: none;
    border-color: var(--color-text);
    background-color: var(--color-bg);
  }
  .wf-header-13__search-icon {
    position: absolute;
    left: var(--space-3);
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    color: var(--color-text-light);
    pointer-events: none;
  }
  .wf-header-13__right {
    display: flex;
    align-items: center;
    gap: var(--space-6);
    flex-shrink: 0;
  }
  .wf-header-13__nav {
    display: flex;
    align-items: center;
    gap: var(--space-5);
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .wf-header-13__nav a {
    font-size: var(--text-sm);
    font-weight: var(--font-weight-medium);
    color: var(--color-text);
    text-decoration: none;
    transition: color var(--transition-fast);
    white-space: nowrap;
  }
  .wf-header-13__nav a:hover {
    color: var(--color-text-light);
  }
  @media (max-width: 1024px) {
    .wf-header-13__search {
      max-width: 260px;
    }
  }
  @media (max-width: 768px) {
    .wf-header-13__nav {
      display: none;
    }
    .wf-header-13__search {
      max-width: none;
    }
  }
</style>

<header class="wf-header-13">
  <div class="container">
    <a href="#" class="wf-header-13__logo">Logo</a>
    <div class="wf-header-13__search">
      <span data-icon="magnifying-glass" data-icon-type="outline" data-icon-size="24"></span>
      <input type="search" class="wf-header-13__search-input form__input" placeholder="Rechercher..." aria-label="Rechercher">
    </div>
    <div class="wf-header-13__right">
      <nav>
        <ul class="wf-header-13__nav">
          <li><a href="#">Accueil</a></li>
          <li><a href="#">Services</a></li>
          <li><a href="#">Portfolio</a></li>
          <li><a href="#">Blog</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
      <a href="#" class="btn btn--primary">Commencer</a>
    </div>
  </div>
</header>
