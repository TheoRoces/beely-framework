<!-- Header 07 : Barre superieure (infos contact) + header principal en dessous -->
<style>

  .wf-header-07__topbar {
    background-color: var(--neutral);
    color: var(--white-t-1, rgba(255,255,255,0.8));
    font-size: var(--text-xs);
    padding: var(--space-2) 0;
  }
  .wf-header-07__topbar .container {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .wf-header-07__topbar-left,
  .wf-header-07__topbar-right {
    display: flex;
    align-items: center;
    gap: var(--space-4);
  }
  .wf-header-07__topbar a {
    color: var(--white-t-2, rgba(255,255,255,0.6));
    text-decoration: none;
    transition: color var(--transition-fast);
  }
  .wf-header-07__topbar a:hover {
    color: var(--white);
  }
  .wf-header-07__topbar-item {
    display: flex;
    align-items: center;
    gap: var(--space-2);
  }
  .wf-header-07__topbar-item svg {
    width: 14px;
    height: 14px;
  }
  .wf-header-07__main {
    background-color: var(--color-bg);
    border-bottom: 1px solid var(--color-border);
    padding: var(--space-4) 0;
  }
  .wf-header-07__main .container {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .wf-header-07__logo {
    font-size: var(--text-xl);
    font-weight: var(--font-weight-bold);
    color: var(--color-text);
    text-decoration: none;
  }
  .wf-header-07__nav {
    display: flex;
    align-items: center;
    gap: var(--space-6);
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .wf-header-07__nav a {
    font-size: var(--text-sm);
    font-weight: var(--font-weight-medium);
    color: var(--color-text);
    text-decoration: none;
    transition: color var(--transition-fast);
  }
  .wf-header-07__nav a:hover {
    color: var(--color-text);
  }
  @media (max-width: 768px) {
    .wf-header-07__topbar {
      display: none;
    }
    .wf-header-07__nav {
      display: none;
    }
  }
</style>

<header>
  <div class="wf-header-07__topbar">
    <div class="container">
      <div class="wf-header-07__topbar-left">
        <span class="wf-header-07__topbar-item">
          <span data-icon="phone" data-icon-type="outline" data-icon-size="24"></span>
          +33 1 23 45 67 89
        </span>
        <span class="wf-header-07__topbar-item">
          <span data-icon="envelope" data-icon-type="outline" data-icon-size="24"></span>
          contact@example.com
        </span>
      </div>
      <div class="wf-header-07__topbar-right">
        <a href="#">Lun - Ven : 9h - 18h</a>
      </div>
    </div>
  </div>
  <div class="wf-header-07__main">
    <div class="container">
      <a href="#" class="wf-header-07__logo">Logo</a>
      <nav>
        <ul class="wf-header-07__nav">
          <li><a href="#">Accueil</a></li>
          <li><a href="#">Services</a></li>
          <li><a href="#">Portfolio</a></li>
          <li><a href="#">Blog</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
      <a href="#" class="btn btn--primary">Nous contacter</a>
    </div>
  </div>
</header>
