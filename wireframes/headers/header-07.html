<!-- Header 07 : Barre superieure (infos contact) + header principal en dessous -->
<style>

.btn { display: inline-flex; align-items: center; justify-content: center; padding: 0.75rem 1.5rem; border-radius: var(--radius-md, 0.5rem); font-size: 0.9375rem; font-weight: 600; text-decoration: none; cursor: pointer; border: 1px solid transparent; transition: background 0.2s, border-color 0.2s; font-family: inherit; }
.btn--primary { background: var(--color-text); color: var(--color-bg); border-color: var(--color-text); }
.btn--primary:hover { background: var(--color-primary-hover); }
.btn--secondary { background: transparent; color: var(--color-text); border-color: var(--color-border); box-shadow: none; }
.btn--secondary:hover { background: var(--color-bg-alt); }
  .wf-header-07__topbar {
    background-color: var(--neutral);
    color: var(--white-t-1, rgba(255,255,255,0.8));
    font-size: var(--text-xs);
    padding: var(--space-2) 0;
  }
  .wf-header-07__topbar .container {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .wf-header-07__topbar-left,
  .wf-header-07__topbar-right {
    display: flex;
    align-items: center;
    gap: var(--space-4);
  }
  .wf-header-07__topbar a {
    color: var(--white-t-2, rgba(255,255,255,0.6));
    text-decoration: none;
    transition: color var(--transition-fast);
  }
  .wf-header-07__topbar a:hover {
    color: var(--white);
  }
  .wf-header-07__topbar-item {
    display: flex;
    align-items: center;
    gap: var(--space-2);
  }
  .wf-header-07__topbar-item svg {
    width: 14px;
    height: 14px;
  }
  .wf-header-07__main {
    background-color: var(--color-bg);
    border-bottom: 1px solid var(--color-border);
    padding: var(--space-4) 0;
  }
  .wf-header-07__main .container {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .wf-header-07__logo {
    font-size: var(--text-xl);
    font-weight: var(--font-weight-bold);
    color: var(--color-text);
    text-decoration: none;
  }
  .wf-header-07__nav {
    display: flex;
    align-items: center;
    gap: var(--space-6);
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .wf-header-07__nav a {
    font-size: var(--text-sm);
    font-weight: var(--font-weight-medium);
    color: var(--color-text);
    text-decoration: none;
    transition: color var(--transition-fast);
  }
  .wf-header-07__nav a:hover {
    color: var(--color-text);
  }
  @media (max-width: 768px) {
    .wf-header-07__topbar {
      display: none;
    }
    .wf-header-07__nav {
      display: none;
    }
  }
</style>

<header>
  <div class="wf-header-07__topbar">
    <div class="container">
      <div class="wf-header-07__topbar-left">
        <span class="wf-header-07__topbar-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          +33 1 23 45 67 89
        </span>
        <span class="wf-header-07__topbar-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          contact@example.com
        </span>
      </div>
      <div class="wf-header-07__topbar-right">
        <a href="#">Lun - Ven : 9h - 18h</a>
      </div>
    </div>
  </div>
  <div class="wf-header-07__main">
    <div class="container">
      <a href="#" class="wf-header-07__logo">Logo</a>
      <nav>
        <ul class="wf-header-07__nav">
          <li><a href="#">Accueil</a></li>
          <li><a href="#">Services</a></li>
          <li><a href="#">Portfolio</a></li>
          <li><a href="#">Blog</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
      <a href="#" class="btn btn--primary">Nous contacter</a>
    </div>
  </div>
</header>
