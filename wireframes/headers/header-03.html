<!-- Header 03 : Logo centre, nav en dessous centrée -->
<style>
  .wf-header-03 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    background-color: var(--color-bg);
    border-bottom: 1px solid var(--color-border);
    padding: var(--space-6) 0 0;
  }
  .wf-header-03 .container {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .wf-header-03__logo {
    font-size: var(--text-2xl);
    font-weight: var(--font-weight-bold);
    color: var(--color-text);
    text-decoration: none;
    margin-bottom: var(--space-4);
  }
  .wf-header-03__nav-wrapper {
    width: 100%;
    border-top: 1px solid var(--color-border);
    padding: var(--space-3) 0;
  }
  .wf-header-03__nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-8);
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .wf-header-03__nav a {
    font-size: var(--text-sm);
    font-weight: var(--font-weight-medium);
    color: var(--color-text-light);
    text-decoration: none;
    transition: color var(--transition-fast);
  }
  .wf-header-03__nav a:hover {
    color: var(--color-text);
  }
  @media (max-width: 768px) {
    .wf-header-03__nav {
      gap: var(--space-4);
      flex-wrap: wrap;
    }
  }
</style>

<header class="wf-header-03">
  <div class="container">
    <a href="#" class="wf-header-03__logo">Logo</a>
    <div class="wf-header-03__nav-wrapper">
      <nav>
        <ul class="wf-header-03__nav">
          <li><a href="#">Accueil</a></li>

          <li><a href="#">Portfolio</a></li>

      </nav>
    </div>
  </div>
