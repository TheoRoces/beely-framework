<!-- Header 01 : Simple - logo texte a gauche, nav centre, CTA bouton a droite -->
<style>

  .wf-header-01 {
    background-color: var(--color-bg);
    border-bottom: 1px solid var(--color-border);
    padding: var(--space-4) 0;
  }
  .wf-header-01 .container {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .wf-header-01__logo {
    font-size: var(--text-xl);
    font-weight: var(--font-weight-bold);
    color: var(--color-text);
    text-decoration: none;
  }
  .wf-header-01__nav {
    display: flex;
    align-items: center;
    gap: var(--space-6);
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .wf-header-01__nav a {
    font-size: var(--text-sm);
    font-weight: var(--font-weight-medium);
    color: var(--color-text);
    text-decoration: none;
    transition: color var(--transition-fast);
  }
  .wf-header-01__nav a:hover {
    color: var(--color-text-light);
  }
  @media (max-width: 768px) {
    .wf-header-01__nav {
      display: none;
    }
  }
</style>

<header class="wf-header-01">
  <div class="container">
    <a href="#" class="wf-header-01__logo">Logo</a>
    <nav>
      <ul class="wf-header-01__nav">
        <li><a href="#">Accueil</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Portfolio</a></li>
        <li><a href="#">Blog</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
    <a href="#" class="btn btn--primary">Nous contacter</a>
  </div>
</header>
