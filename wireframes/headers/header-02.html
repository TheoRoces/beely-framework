<!-- Header 02 : Logo a gauche, nav a droite, sans CTA -->
<style>
  .wf-header-02 {
    background-color: var(--color-bg);
    border-bottom: 1px solid var(--color-border);
    padding: var(--space-4) 0;
  }
  .wf-header-02 .container {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .wf-header-02__logo {
    display: flex;
    align-items: center;
    text-decoration: none;
  }
  .wf-header-02__nav {
    display: flex;
    align-items: center;
    gap: var(--space-6);
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .wf-header-02__nav a {
    font-size: var(--text-sm);
    font-weight: var(--font-weight-medium);
    color: var(--color-text);
    text-decoration: none;
    transition: color var(--transition-fast);
    position: relative;
  }
  .wf-header-02__nav a::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 0;
    height: 2px;
    background-color: var(--color-text);
    transition: width var(--transition-base);
  }
  .wf-header-02__nav a:hover::after {
    width: 100%;
  }
  @media (max-width: 768px) {
    .wf-header-02__nav {
      display: none;
    }
  }
</style>

<header class="wf-header-02">
  <div class="container">
    <a href="#" class="wf-header-02__logo">
      <svg width="120" height="32" viewBox="0 0 120 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="6" fill="var(--color-text)"/>
        <text x="42" y="22" font-family="var(--font-body)" font-size="18" font-weight="700" fill="var(--color-text)">Logo</text>
      </svg>
    </a>
    <nav>
      <ul class="wf-header-02__nav">
        <li><a href="#">Accueil</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Portfolio</a></li>
        <li><a href="#">Blog</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </div>
</header>
