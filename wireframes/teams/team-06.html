<!-- team-06: Circular avatars in a row with name below -->
<style>
  .wf-team-06 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    padding: var(--wf-spacing-section, 5rem) var(--wf-spacing-gutter, 1.5rem);
    max-width: var(--wf-max-width, 1200px);
    margin: 0 auto;
  }
  .wf-team-06__header {
    text-align: center;
    margin-bottom: var(--wf-spacing-lg, 3rem);
  }
  .wf-team-06__title {
    font-size: var(--wf-font-size-3xl, 2.5rem);
    font-weight: 700;
    color: var(--color-text, #111);
    margin: 0 0 0.5rem;
    line-height: 1.2;
  }
  .wf-team-06__subtitle {
    font-size: var(--wf-font-size-md, 1.125rem);
    color: var(--color-text-light, #6b7280);
    margin: 0;
  }
  .wf-team-06__row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: var(--wf-spacing-lg, 3rem);
  }
  .wf-team-06__member {
    text-align: center;
    flex: 0 0 auto;
  }
  .wf-team-06__avatar {
    width: 8rem;
    height: 8rem;
    border-radius: 50%;
    background: var(--color-bg-alt, #f3f4f6);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
    overflow: hidden;
  }
  .wf-team-06__name {
    font-size: var(--wf-font-size-base, 1rem);
    font-weight: 600;
    color: var(--color-text, #111);
    margin: 0 0 0.25rem;
  }
  .wf-team-06__role {
    font-size: var(--wf-font-size-sm, 0.875rem);
    color: var(--color-text-light, #6b7280);
    margin: 0;
  }
  @media (max-width: 600px) {
    .wf-team-06__row { gap: 2rem; }
    .wf-team-06__avatar { width: 6rem; height: 6rem; }
    .wf-team-06__title { font-size: 2rem; }
  }
</style>
