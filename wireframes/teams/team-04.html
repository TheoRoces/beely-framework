<!-- team-04: Horizontal scroll of team member cards -->
<style>
  .wf-team-04 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    padding: var(--wf-spacing-section, 5rem) 0;
  }
  .wf-team-04__header {
    text-align: center;
    margin-bottom: var(--wf-spacing-lg, 3rem);
    padding: 0 var(--wf-spacing-gutter, 1.5rem);
  }
  .wf-team-04__title {
    font-size: var(--wf-font-size-3xl, 2.5rem);
    font-weight: 700;
    color: var(--color-text, #111);
    margin: 0 0 0.5rem;
    line-height: 1.2;
  }
  .wf-team-04__subtitle {
    font-size: var(--wf-font-size-md, 1.125rem);
    color: var(--color-text-light, #6b7280);
    margin: 0;
  }
  .wf-team-04__scroll {
    display: flex;
    gap: var(--wf-spacing-md, 1.5rem);
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    padding: 0 var(--wf-spacing-gutter, 1.5rem) 1rem;
    -webkit-overflow-scrolling: touch;
  }
  .wf-team-04__scroll::-webkit-scrollbar {
    height: 4px;
  }
  .wf-team-04__scroll::-webkit-scrollbar-track {
    background: var(--color-bg-alt, #f3f4f6);
    border-radius: 2px;
  }
  .wf-team-04__scroll::-webkit-scrollbar-thumb {
    background: var(--color-text-light);
    border-radius: 2px;
  }
  .wf-team-04__card {
    flex: 0 0 280px;
    scroll-snap-align: start;
    background: var(--color-bg, #fff);
    border: 1px solid var(--color-border, #e5e7eb);
    border-radius: var(--wf-radius-lg, 0.75rem);
    overflow: hidden;
  }
  .wf-team-04__photo {
    width: 100%;
    aspect-ratio: 3 / 4;
    background: var(--color-bg-alt, #f3f4f6);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wf-team-04__info {
    padding: 1.25rem;
  }
  .wf-team-04__name {
    font-size: var(--wf-font-size-lg, 1.25rem);
    font-weight: 600;
    color: var(--color-text, #111);
    margin: 0 0 0.25rem;
  }
  .wf-team-04__role {
    font-size: var(--wf-font-size-sm, 0.875rem);
    color: var(--color-text-light, #6b7280);
    margin: 0;
  }
  @media (max-width: 600px) {
    .wf-team-04__card { flex: 0 0 240px; }
    .wf-team-04__title { font-size: 2rem; }
  }
</style>

<section class="wf-team-04">
  <header class="wf-team-04__header">
