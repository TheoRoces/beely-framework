<!-- team-02: 3-column grid with square photo, name, role, and social icons -->
<style>
  .wf-team-02 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    padding: var(--wf-spacing-section, 5rem) var(--wf-spacing-gutter, 1.5rem);
    max-width: var(--wf-max-width, 1200px);
    margin: 0 auto;
  }
  .wf-team-02__header {
    text-align: center;
    margin-bottom: var(--wf-spacing-lg, 3rem);
  }
  .wf-team-02__title {
    font-size: var(--wf-font-size-3xl, 2.5rem);
    font-weight: 700;
    color: var(--color-text, #111);
    margin: 0 0 0.5rem;
    line-height: 1.2;
  }
  .wf-team-02__subtitle {
    font-size: var(--wf-font-size-md, 1.125rem);
    color: var(--color-text-light, #6b7280);
    margin: 0;
  }
  .wf-team-02__grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--wf-spacing-md, 2rem);
  }
  .wf-team-02__member {
    text-align: center;
  }
  .wf-team-02__photo {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--color-bg-alt, #f3f4f6);
    border-radius: var(--wf-radius-md, 0.5rem);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1rem;
    overflow: hidden;
  }
  .wf-team-02__name {
    font-size: var(--wf-font-size-lg, 1.25rem);
    font-weight: 600;
    color: var(--color-text, #111);
    margin: 0 0 0.25rem;
  }
  .wf-team-02__role {
    font-size: var(--wf-font-size-sm, 0.875rem);
    color: var(--color-text-light, #6b7280);
    margin: 0 0 0.75rem;
  }
  .wf-team-02__social {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
  }
  .wf-team-02__social-link {
    color: var(--color-text-light, #6b7280);
    transition: color 0.2s;
    text-decoration: none;
  }
  .wf-team-02__social-link:hover {
    color: var(--color-text, #111);
  }
  @media (max-width: 768px) {
    .wf-team-02__grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 480px) {
    .wf-team-02__grid { grid-template-columns: 1fr; max-width: 20rem; margin: 0 auto; }
    .wf-team-02__title { font-size: 2rem; }
  }
</style>
