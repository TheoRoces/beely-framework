<!-- team-12: Card with photo left, info right, horizontal layout -->
<style>
  .wf-team-12 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    padding: var(--wf-spacing-section, 5rem) var(--wf-spacing-gutter, 1.5rem);
    max-width: var(--wf-max-width, 1200px);
    margin: 0 auto;
  }
  .wf-team-12__header {
    text-align: center;
    margin-bottom: var(--wf-spacing-lg, 3rem);
  }
  .wf-team-12__title {
    font-size: var(--wf-font-size-3xl, 2.5rem);
    font-weight: 700;
    color: var(--color-text, #111);
    margin: 0 0 0.5rem;
    line-height: 1.2;
  }
  .wf-team-12__subtitle {
    font-size: var(--wf-font-size-md, 1.125rem);
    color: var(--color-text-light, #6b7280);
    margin: 0;
  }
  .wf-team-12__grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--wf-spacing-md, 1.5rem);
  }
  .wf-team-12__card {
    display: flex;
    gap: 1.25rem;
    align-items: center;
    background: var(--color-bg, #fff);
    border: 1px solid var(--color-border, #e5e7eb);
    border-radius: var(--wf-radius-lg, 0.75rem);
    padding: 1.25rem;
  }
  .wf-team-12__photo {
    flex: 0 0 5rem;
    width: 5rem;
    height: 5rem;
    background: var(--color-bg-alt, #f3f4f6);
    border-radius: var(--wf-radius-md, 0.5rem);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .wf-team-12__info {
    flex: 1;
    min-width: 0;
  }
  .wf-team-12__name {
    font-size: var(--wf-font-size-base, 1rem);
    font-weight: 600;
    color: var(--color-text, #111);
    margin: 0 0 0.25rem;
  }
  .wf-team-12__role {
    font-size: var(--wf-font-size-sm, 0.875rem);
    color: var(--color-text-light, #6b7280);
    margin: 0 0 0.5rem;
  }
  .wf-team-12__social {
    display: flex;
    gap: 0.5rem;
  }
  .wf-team-12__social-link {
    color: var(--color-text-light, #6b7280);
    text-decoration: none;
    transition: color 0.2s;
  }
  .wf-team-12__social-link:hover {
    color: var(--color-text, #111);
  }
  @media (max-width: 768px) {
    .wf-team-12__grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 480px) {
    .wf-team-12__title { font-size: 2rem; }
  }
</style>
