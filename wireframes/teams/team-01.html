<!-- team-01: 4-column grid with portrait photo, name, and role -->
<style>
  .wf-team-01 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    padding: var(--wf-spacing-section, 5rem) var(--wf-spacing-gutter, 1.5rem);
    max-width: var(--wf-max-width, 1200px);
    margin: 0 auto;
  }
  .wf-team-01__header {
    text-align: center;
    margin-bottom: var(--wf-spacing-lg, 3rem);
  }
  .wf-team-01__title {
    font-size: var(--wf-font-size-3xl, 2.5rem);
    font-weight: 700;
    color: var(--color-text, #111);
    margin: 0 0 0.5rem;
    line-height: 1.2;
  }
  .wf-team-01__subtitle {
    font-size: var(--wf-font-size-md, 1.125rem);
    color: var(--color-text-light, #6b7280);
    margin: 0;
  }
  .wf-team-01__grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--wf-spacing-md, 2rem);
  }
  .wf-team-01__member {
    text-align: center;
  }
  .wf-team-01__photo {
    width: 100%;
    aspect-ratio: 3 / 4;
    background: var(--color-bg-alt, #f3f4f6);
    border-radius: var(--wf-radius-md, 0.5rem);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1rem;
    overflow: hidden;
  }
  .wf-team-01__name {
    font-size: var(--wf-font-size-lg, 1.25rem);
    font-weight: 600;
    color: var(--color-text, #111);
    margin: 0 0 0.25rem;
  }
  .wf-team-01__role {
    font-size: var(--wf-font-size-sm, 0.875rem);
    color: var(--color-text-light, #6b7280);
    margin: 0;
  }
  @media (max-width: 1024px) {
    .wf-team-01__grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px) {
    .wf-team-01__grid { grid-template-columns: 1fr; max-width: 20rem; margin: 0 auto; }
    .wf-team-01__title { font-size: 2rem; }
  }
</style>

<section class="wf-team-01">
  <header class="wf-team-01__header">
    <h2 class="wf-team-01__title">Notre équipe</h2>
    <p class="wf-team-01__subtitle">Les talents derriere le projet</p>
  </header>
  <div class="wf-team-01__grid">
    <div class="wf-team-01__member">
      <div class="wf-team-01__photo wf-img--portrait">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48" opacity="0.3"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0"/></svg>
      </div>
      <h3 class="wf-team-01__name">Marie Dupont</h3>
      <p class="wf-team-01__role">Directrice Generale</p>
    </div>
    <div class="wf-team-01__member">
      <div class="wf-team-01__photo wf-img--portrait">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48" opacity="0.3"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0"/></svg>
      </div>
      <h3 class="wf-team-01__name">Jean Martin</h3>
      <p class="wf-team-01__role">Lead Developer</p>
    </div>
    <div class="wf-team-01__member">
      <div class="wf-team-01__photo wf-img--portrait">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48" opacity="0.3"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0"/></svg>
      </div>
      <h3 class="wf-team-01__name">Sophie Bernard</h3>
      <p class="wf-team-01__role">Designer UI/UX</p>
    </div>
    <div class="wf-team-01__member">
      <div class="wf-team-01__photo wf-img--portrait">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48" opacity="0.3"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0"/></svg>
      </div>
      <h3 class="wf-team-01__name">Lucas Petit</h3>
      <p class="wf-team-01__role">Chef de Projet</p>
    </div>
  </div>
</section>
