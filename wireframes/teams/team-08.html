<!-- team-08: Dark section with light team cards -->
<style>
  .wf-team-08 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    padding: var(--wf-spacing-section, 5rem) var(--wf-spacing-gutter, 1.5rem);
    background: var(--color-bg-dark, #111827);
  }
  .wf-team-08__inner {
    max-width: var(--wf-max-width, 1200px);
    margin: 0 auto;
  }
  .wf-team-08__header {
    text-align: center;
    margin-bottom: var(--wf-spacing-lg, 3rem);
  }
  .wf-team-08__title {
    font-size: var(--wf-font-size-3xl, 2.5rem);
    font-weight: 700;
    color: var(--color-text-on-dark);
    margin: 0 0 0.5rem;
    line-height: 1.2;
  }
  .wf-team-08__subtitle {
    font-size: var(--wf-font-size-md, 1.125rem);
    color: rgba(255, 255, 255, 0.6);
    margin: 0;
  }
  
  .wf-team-08__card {
    background: var(--color-bg);
    border-radius: var(--wf-radius-lg, 0.75rem);
    overflow: hidden;
    text-align: center;
  }
  .wf-team-08__photo {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--color-bg-alt);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wf-team-08__info {
    padding: 1.25rem;
  }
  .wf-team-08__name {
    font-size: var(--wf-font-size-lg, 1.25rem);
    font-weight: 600;
    color: var(--color-text, #111);
    margin: 0 0 0.25rem;
  }
  .wf-team-08__role {
    font-size: var(--wf-font-size-sm, 0.875rem);
    color: var(--color-text-light, #6b7280);
    margin: 0 0 0.75rem;
  }
  .wf-team-08__social {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
  }
  .wf-team-08__social-link {
    color: var(--color-text-light, #6b7280);
    text-decoration: none;
    transition: color 0.2s;
  }
  .wf-team-08__social-link:hover {
    color: var(--color-text, #111);
  }
  @media (max-width: 768px) {
    
  }
  @media (max-width: 480px) {
    .wf-team-08__grid { max-width: 20rem; margin: 0 auto; }
    .wf-team-08__title { font-size: 2rem; }
  }
</style>
