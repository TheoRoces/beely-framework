<!-- thank-you-11: Thank you card floating on gradient background -->
<style>
  .wf-thank-you-11 {
    --wf-bg-start: var(--color-text);
    --wf-bg-end: var(--color-text-light);
    --wf-text: var(--color-text);
    --wf-text-muted: var(--color-text-light);
    --wf-icon-color: var(--color-text);
    --wf-card-bg: var(--color-bg);
    --wf-primary: var(--color-text);
    --wf-primary-hover: var(--color-neutral-800);
    --wf-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    --wf-radius: 16px;
    --wf-font: var(--font-body);

    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--wf-bg-start), var(--wf-bg-end));
    font-family: var(--wf-font);
    color: var(--wf-text);
    padding: 2rem;
    box-sizing: border-box;
  }

  .wf-thank-you-11__card {
    background-color: var(--wf-card-bg);
    border-radius: var(--wf-radius);
    box-shadow: var(--wf-shadow);
    padding: 3rem 2.5rem;
    text-align: center;
    max-width: 460px;
    width: 100%;
  }

  .wf-thank-you-11__icon {
    color: var(--wf-icon-color);
    margin-bottom: 1.5rem;
  }

  .wf-thank-you-11__title {
    font-size: 2.25rem;
    font-weight: 700;
    margin: 0 0 0.75rem 0;
    letter-spacing: -0.02em;
  }

  .wf-thank-you-11__text {
    font-size: 1.0625rem;
    color: var(--wf-text-muted);
    line-height: 1.6;
    margin: 0 0 0.5rem 0;
  }

  .wf-thank-you-11__subtext {
    font-size: 0.9375rem;
    color: var(--wf-text-muted);
    line-height: 1.6;
    margin: 0 0 2rem 0;
  }

  .wf-thank-you-11__divider {
    width: 40px;
    height: 3px;
    background: linear-gradient(90deg, var(--wf-bg-start), var(--wf-bg-end));
    border-radius: 2px;
    margin: 0 auto 2rem auto;
  }

  .wf-thank-you-11__button {
    display: inline-block;
    padding: 0.875rem 2rem;
    background-color: var(--wf-primary);
    color: var(--color-text-on-dark);
    text-decoration: none;
    border-radius: var(--radius-md, 0.5rem);
    font-size: 1rem;
    font-weight: 500;
    transition: background-color 0.2s ease;
  }

  .wf-thank-you-11__button:hover {
    background-color: var(--wf-primary-hover);
  }

  @media (max-width: 640px) {
    .wf-thank-you-11__card {
      padding: 2rem 1.5rem;
    }

    .wf-thank-you-11__title {
      font-size: 1.75rem;
    }
  }
</style>

<section class="wf-thank-you-11">
  <div class="wf-thank-you-11__card">
    <div class="wf-thank-you-11__icon">
      <span data-icon="check-circle" data-icon-type="outline" data-icon-size="2"></span>
    </div>
    <h1 class="wf-thank-you-11__title">Merci !</h1>
    <p class="wf-thank-you-11__text">Votre message a bien ete envoye.</p>
    <p class="wf-thank-you-11__subtext">Nous vous repondrons dans les 24 heures.</p>
    <div class="wf-thank-you-11__divider"></div>
    <a href="#" class="wf-thank-you-11__button">Retour a l'accueil</a>
  </div>
</section>
