<!-- thank-you-10: Thank you with countdown to redirect (CSS-only visual countdown) -->
<style>
  .wf-thank-you-10 {
    --wf-bg: var(--color-bg);
    --wf-text: var(--color-text);
    --wf-text-muted: var(--color-text-light);
    --wf-icon-color: var(--color-text);
    --wf-primary: var(--color-text);
    --wf-primary-hover: var(--color-neutral-800);
    --wf-progress-bg: var(--color-border);
    --wf-progress-fill: var(--color-text);
    --wf-radius: 8px;
    --wf-font: var(--font-body);

    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: var(--wf-bg);
    font-family: var(--wf-font);
    color: var(--wf-text);
    padding: 2rem;
    box-sizing: border-box;
  }

  .wf-thank-you-10__container {
    text-align: center;
    max-width: 480px;
    width: 100%;
  }

  .wf-thank-you-10__icon {
    color: var(--wf-icon-color);
    margin-bottom: 1.5rem;
  }

  .wf-thank-you-10__title {
    font-size: 2.25rem;
    font-weight: 700;
    margin: 0 0 0.75rem 0;
    letter-spacing: -0.02em;
  }

  .wf-thank-you-10__text {
    font-size: 1.125rem;
    color: var(--wf-text-muted);
    line-height: 1.6;
    margin: 0 0 2.5rem 0;
  }

  .wf-thank-you-10__countdown-wrap {
    margin-bottom: 1.5rem;
  }

  .wf-thank-you-10__countdown-label {
    font-size: 0.875rem;
    color: var(--wf-text-muted);
    margin: 0 0 0.75rem 0;
  }

  @keyframes wf-progress-fill {
    0% {
      width: 0%;
    }
    100% {
      width: 100%;
    }
  }

  .wf-thank-you-10__progress-bar {
    width: 100%;
    height: 6px;
    background-color: var(--wf-progress-bg);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 0.75rem;
  }

  .wf-thank-you-10__progress-fill {
    height: 100%;
    background-color: var(--wf-progress-fill);
    border-radius: 3px;
    animation: wf-progress-fill 10s linear forwards;
  }

  @keyframes wf-count-10 {
    0% { content: "10"; }
    10% { content: "9"; }
    20% { content: "8"; }
    30% { content: "7"; }
    40% { content: "6"; }
    50% { content: "5"; }
    60% { content: "4"; }
    70% { content: "3"; }
    80% { content: "2"; }
    90% { content: "1"; }
    100% { content: "0"; }
  }

  .wf-thank-you-10__countdown-number {
    font-size: 2rem;
    font-weight: 700;
    color: var(--wf-primary);
    font-variant-numeric: tabular-nums;
  }

  .wf-thank-you-10__countdown-number::after {
    content: "10";
    animation: wf-count-10 10s step-end forwards;
  }

  .wf-thank-you-10__countdown-unit {
    font-size: 0.875rem;
    color: var(--wf-text-muted);
    margin-left: 0.25rem;
  }

  .wf-thank-you-10__redirect-text {
    font-size: 0.875rem;
    color: var(--wf-text-muted);
    margin: 0 0 2rem 0;
  }

  .wf-thank-you-10__button {
    display: inline-block;
    padding: 0.875rem 2rem;
    background-color: var(--wf-primary);
    color: var(--color-text-on-dark);
    text-decoration: none;
    border-radius: var(--wf-radius);
    font-size: 1rem;
    font-weight: 500;
    transition: background-color 0.2s ease;
  }

  .wf-thank-you-10__button:hover {
    background-color: var(--wf-primary-hover);
  }

  @media (max-width: 640px) {
    .wf-thank-you-10__title {
      font-size: 1.75rem;
    }
  }
</style>

<section class="wf-thank-you-10">
  <div class="wf-thank-you-10__container">
    <div class="wf-thank-you-10__icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="48" height="48"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    </div>
    <h1 class="wf-thank-you-10__title">Merci !</h1>
    <p class="wf-thank-you-10__text">Votre message a bien ete envoye. Nous vous repondrons dans les 24 heures.</p>

    <div class="wf-thank-you-10__countdown-wrap">
      <p class="wf-thank-you-10__countdown-label">Redirection automatique dans</p>
      <div class="wf-thank-you-10__progress-bar">
        <div class="wf-thank-you-10__progress-fill"></div>
      </div>
      <span class="wf-thank-you-10__countdown-number"></span>
      <span class="wf-thank-you-10__countdown-unit">secondes</span>
    </div>

    <p class="wf-thank-you-10__redirect-text">Ou cliquez ci-dessous pour y aller maintenant.</p>

    <a href="#" class="wf-thank-you-10__button">Retour a l'accueil</a>
  </div>
</section>
