<!-- thank-you-07: Thank you with order/reference number -->
<style>
  .wf-thank-you-07 {
    --wf-bg: var(--color-bg);
    --wf-text: var(--color-text);
    --wf-text-muted: var(--color-text-light);
    --wf-icon-color: var(--color-text);
    --wf-card-bg: var(--color-bg-alt);
    --wf-border: var(--color-border);
    --wf-primary: var(--color-text);
    --wf-primary-hover: var(--color-neutral-800);
    --wf-ref-bg: var(--color-bg-alt);
    --wf-ref-text: var(--color-neutral-800);
    --wf-radius: 12px;
    --wf-font: var(--font-body);

    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: var(--wf-bg);
    font-family: var(--wf-font);
    color: var(--wf-text);
    padding: 2rem;
    box-sizing: border-box;
  }

  .wf-thank-you-07__container {
    text-align: center;
    max-width: 520px;
    width: 100%;
  }

  .wf-thank-you-07__icon {
    color: var(--wf-icon-color);
    margin-bottom: 1.5rem;
  }

  .wf-thank-you-07__title {
    font-size: 2.25rem;
    font-weight: 700;
    margin: 0 0 0.75rem 0;
    letter-spacing: -0.02em;
  }

  .wf-thank-you-07__text {
    font-size: 1.125rem;
    color: var(--wf-text-muted);
    line-height: 1.6;
    margin: 0 0 2rem 0;
  }

  .wf-thank-you-07__ref-card {
    background-color: var(--wf-card-bg);
    border: 1px solid var(--wf-border);
    border-radius: var(--wf-radius);
    padding: 1.5rem;
    margin-bottom: 2rem;
  }

  .wf-thank-you-07__ref-label {
    font-size: 0.8125rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--wf-text-muted);
    margin: 0 0 0.75rem 0;
  }

  .wf-thank-you-07__ref-number {
    display: inline-block;
    padding: 0.5rem 1.25rem;
    background-color: var(--wf-ref-bg);
    color: var(--wf-ref-text);
    border-radius: var(--radius-md, 0.5rem);
    font-size: 1.5rem;
    font-weight: 700;
    font-family: var(--font-mono, monospace);
    letter-spacing: 0.05em;
  }

  .wf-thank-you-07__ref-note {
    font-size: 0.875rem;
    color: var(--wf-text-muted);
    margin: 1rem 0 0 0;
    line-height: 1.5;
  }

  .wf-thank-you-07__actions {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .wf-thank-you-07__button {
    display: inline-block;
    padding: 0.875rem 2rem;
    background-color: var(--wf-primary);
    color: var(--color-text-on-dark);
    text-decoration: none;
    border-radius: var(--radius-md, 0.5rem);
    font-size: 1rem;
    font-weight: 500;
    transition: background-color 0.2s ease;
  }

  .wf-thank-you-07__button:hover {
    background-color: var(--wf-primary-hover);
  }

  .wf-thank-you-07__button--outline {
    background-color: transparent;
    color: var(--wf-primary);
    border: 1px solid var(--wf-primary);
  }

  .wf-thank-you-07__button--outline:hover {
    background-color: var(--wf-ref-bg);
  }

  @media (max-width: 640px) {
    .wf-thank-you-07__title {
      font-size: 1.75rem;
    }

    .wf-thank-you-07__ref-number {
      font-size: 1.25rem;
    }

    .wf-thank-you-07__actions {
      flex-direction: column;
    }
  }
</style>

<section class="wf-thank-you-07">
  <div class="wf-thank-you-07__container">
    <div class="wf-thank-you-07__icon">
      <span data-icon="check-circle" data-icon-type="outline" data-icon-size="64"></span>
    </div>
    <h1 class="wf-thank-you-07__title">Merci !</h1>
    <p class="wf-thank-you-07__text">Votre message a bien ete envoye.</p>

    <div class="wf-thank-you-07__ref-card">
      <p class="wf-thank-you-07__ref-label">Votre référence</p>
      <span class="wf-thank-you-07__ref-number">#12345</span>
      <p class="wf-thank-you-07__ref-note">Conservez ce numero pour suivre votre demande. Un email de confirmation vous a ete envoye.</p>
    </div>

    <div class="wf-thank-you-07__actions">
      <a href="#" class="wf-thank-you-07__button">Retour à l'accueil</a>
      <a href="#" class="wf-thank-you-07__button wf-thank-you-07__button--outline">Suivre ma demande</a>
    </div>
  </div>
</section>
