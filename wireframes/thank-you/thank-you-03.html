<!-- thank-you-03: Thank you with social sharing buttons -->
<style>
  .wf-thank-you-03 {
    --wf-bg: var(--color-bg);
    --wf-text: var(--color-text);
    --wf-text-muted: var(--color-text-light);
    --wf-icon-color: var(--color-text);
    --wf-border: var(--color-border);
    --wf-social-bg: var(--color-neutral-100);
    --wf-social-hover: var(--color-border);
    --wf-primary: var(--color-text);
    --wf-primary-hover: var(--color-neutral-800);
    --wf-radius: 8px;
    --wf-font: var(--font-body);

    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: var(--wf-bg);
    font-family: var(--wf-font);
    color: var(--wf-text);
    padding: 2rem;
    box-sizing: border-box;
  }

  .wf-thank-you-03__container {
    max-width: 480px;
    width: 100%;
    text-align: center;
  }

  .wf-thank-you-03__icon {
    color: var(--wf-icon-color);
    margin-bottom: 1.5rem;
  }

  .wf-thank-you-03__title {
    font-size: 2.25rem;
    font-weight: 700;
    margin: 0 0 0.75rem 0;
    letter-spacing: -0.02em;
  }

  .wf-thank-you-03__text {
    font-size: 1.125rem;
    color: var(--wf-text-muted);
    line-height: 1.6;
    margin: 0 0 2.5rem 0;
  }

  .wf-thank-you-03__divider {
    height: 1px;
    background-color: var(--wf-border);
    margin: 0 0 2rem 0;
  }

  .wf-thank-you-03__share-label {
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--wf-text-muted);
    margin: 0 0 1.25rem 0;
  }

  .wf-thank-you-03__social {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
  }

  .wf-thank-you-03__social-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 1.25rem;
    background-color: var(--wf-social-bg);
    color: var(--wf-text);
    text-decoration: none;
    border-radius: var(--wf-radius);
    font-size: 0.875rem;
    font-weight: 500;
    transition: background-color 0.2s ease;
  }

  .wf-thank-you-03__social-btn:hover {
    background-color: var(--wf-social-hover);
  }

  .wf-thank-you-03__social-icon {
    width: 18px;
    height: 18px;
  }

  .wf-thank-you-03__home {
    display: inline-block;
    padding: 0.875rem 2rem;
    background-color: var(--wf-primary);
    color: var(--color-text-on-dark);
    text-decoration: none;
    border-radius: var(--wf-radius);
    font-size: 1rem;
    font-weight: 500;
    transition: background-color 0.2s ease;
  }

  .wf-thank-you-03__home:hover {
    background-color: var(--wf-primary-hover);
  }

  @media (max-width: 640px) {
    .wf-thank-you-03__title {
      font-size: 1.75rem;
    }

    .wf-thank-you-03__social {
      flex-direction: column;
      align-items: center;
    }

    .wf-thank-you-03__social-btn {
      width: 100%;
      justify-content: center;
    }
  }
</style>

<section class="wf-thank-you-03">
  <div class="wf-thank-you-03__container">
    <div class="wf-thank-you-03__icon">
      <span data-icon="check-circle" data-icon-type="outline" data-icon-size="64"></span>
    </div>
    <h1 class="wf-thank-you-03__title">Merci !</h1>
    <p class="wf-thank-you-03__text">Votre message a bien ete envoye. Nous vous repondrons dans les 24 heures.</p>

    <div class="wf-thank-you-03__divider"></div>

    <p class="wf-thank-you-03__share-label">Partager</p>
    <div class="wf-thank-you-03__social">
      <a href="#" class="wf-thank-you-03__social-btn">
        <svg class="wf-thank-you-03__social-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M24 4.557a9.83 9.83 0 01-2.828.775 4.932 4.932 0 002.165-2.724 9.864 9.864 0 01-3.127 1.195 4.916 4.916 0 00-8.384 4.482A13.944 13.944 0 011.671 3.149a4.916 4.916 0 001.523 6.574 4.897 4.897 0 01-2.229-.616v.062a4.918 4.918 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.937 4.937 0 004.604 3.417 9.868 9.868 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.054 0 14.002-7.496 14.002-13.986 0-.21 0-.423-.015-.634A9.935 9.935 0 0024 4.557z"/></svg>
        Twitter
      </a>
      <a href="#" class="wf-thank-you-03__social-btn">
        <svg class="wf-thank-you-03__social-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M22.675 0H1.325C.593 0 0 .593 0 1.325v21.351C0 23.407.593 24 1.325 24H12.82v-9.294H9.692v-3.622h3.128V8.413c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12V24h6.116c.73 0 1.323-.593 1.323-1.325V1.325C24 .593 23.407 0 22.675 0z"/></svg>
        Facebook
      </a>
      <a href="#" class="wf-thank-you-03__social-btn">
        <svg class="wf-thank-you-03__social-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        LinkedIn
      </a>
    </div>

    <a href="#" class="wf-thank-you-03__home">Retour a l'accueil</a>
  </div>
</section>
