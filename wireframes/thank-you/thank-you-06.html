<!-- thank-you-06: Dark background, centered thank you -->
<style>
  .wf-thank-you-06 {
    --wf-bg: var(--color-bg-dark);
    --wf-text: var(--color-text-on-dark);
    --wf-text-muted: var(--color-neutral-400);
    --wf-icon-color: var(--color-text-light);
    --wf-primary: var(--color-bg);
    --wf-primary-hover: var(--color-text-light);
    --wf-border: var(--color-neutral-800);
    --wf-radius: 8px;
    --wf-font: var(--font-body);

    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: var(--wf-bg);
    font-family: var(--wf-font);
    color: var(--wf-text);
    padding: 2rem;
    box-sizing: border-box;
  }

  .wf-thank-you-06__container {
    text-align: center;
    max-width: 520px;
    width: 100%;
  }

  .wf-thank-you-06__icon {
    color: var(--wf-icon-color);
    margin-bottom: 2rem;
  }

  .wf-thank-you-06__title {
    font-size: 3rem;
    font-weight: 700;
    margin: 0 0 1rem 0;
    letter-spacing: -0.03em;
  }

  .wf-thank-you-06__text {
    font-size: 1.25rem;
    color: var(--wf-text-muted);
    line-height: 1.6;
    margin: 0 0 1rem 0;
  }

  .wf-thank-you-06__subtext {
    font-size: 0.9375rem;
    color: var(--wf-text-muted);
    line-height: 1.6;
    margin: 0 0 2.5rem 0;
  }

  .wf-thank-you-06__divider {
    width: 48px;
    height: 2px;
    background-color: var(--wf-border);
    margin: 0 auto 2.5rem auto;
  }

  .wf-thank-you-06__button {
    display: inline-block;
    padding: 0.875rem 2rem;
    background-color: var(--wf-primary);
    color: var(--color-text);
    text-decoration: none;
    border-radius: var(--wf-radius);
    font-size: 1rem;
    font-weight: 500;
    transition: background-color 0.2s ease;
  }

  .wf-thank-you-06__button:hover {
    background-color: var(--wf-primary-hover);
  }

  @media (max-width: 640px) {
    .wf-thank-you-06__title {
      font-size: 2rem;
    }

    .wf-thank-you-06__text {
      font-size: 1.0625rem;
    }
  }
</style>

<section class="wf-thank-you-06">
  <div class="wf-thank-you-06__container">
    <div class="wf-thank-you-06__icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="48" height="48"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    </div>
    <h1 class="wf-thank-you-06__title">Merci !</h1>
    <p class="wf-thank-you-06__text">Votre message a bien ete envoye.</p>
    <div class="wf-thank-you-06__divider"></div>
    <p class="wf-thank-you-06__subtext">Nous vous repondrons dans les 24 heures. Verifiez votre boite email pour la confirmation.</p>
    <a href="#" class="wf-thank-you-06__button">Retour a l'accueil</a>
  </div>
</section>
