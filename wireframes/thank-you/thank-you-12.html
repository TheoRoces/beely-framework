<!-- thank-you-12: Thank you with newsletter signup -->
<style>
  .wf-thank-you-12 {
    --wf-bg: var(--color-bg);
    --wf-text: var(--color-text);
    --wf-text-muted: var(--color-text-light);
    --wf-icon-color: var(--color-text);
    --wf-border: var(--color-border);
    --wf-input-bg: var(--color-bg-alt);
    --wf-primary: var(--color-text);
    --wf-primary-hover: var(--color-neutral-800);
    --wf-newsletter-bg: var(--color-bg-alt);
    --wf-newsletter-border: var(--color-border);
    --wf-radius: 8px;
    --wf-font: var(--font-body);

    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: var(--wf-bg);
    font-family: var(--wf-font);
    color: var(--wf-text);
    padding: 2rem;
    box-sizing: border-box;
  }

  .wf-thank-you-12__container {
    text-align: center;
    max-width: 520px;
    width: 100%;
  }

  .wf-thank-you-12__icon {
    color: var(--wf-icon-color);
    margin-bottom: 1.5rem;
  }

  .wf-thank-you-12__title {
    font-size: 2.25rem;
    font-weight: 700;
    margin: 0 0 0.75rem 0;
    letter-spacing: -0.02em;
  }

  .wf-thank-you-12__text {
    font-size: 1.125rem;
    color: var(--wf-text-muted);
    line-height: 1.6;
    margin: 0 0 2.5rem 0;
  }

  .wf-thank-you-12__newsletter {
    background-color: var(--wf-newsletter-bg);
    border: 1px solid var(--wf-newsletter-border);
    border-radius: var(--radius-lg, 0.75rem);
    padding: 2rem;
    margin-bottom: 2rem;
    text-align: left;
  }

  .wf-thank-you-12__newsletter-title {
    font-size: 1.125rem;
    font-weight: 600;
    margin: 0 0 0.5rem 0;
  }

  .wf-thank-you-12__newsletter-text {
    font-size: 0.9375rem;
    color: var(--wf-text-muted);
    line-height: 1.5;
    margin: 0 0 1.25rem 0;
  }

  .wf-thank-you-12__form {
    display: flex;
    gap: 0.5rem;
  }

  .wf-thank-you-12__input {
    flex: 1;
    padding: 0.75rem 1rem;
    border: 1px solid var(--wf-border);
    border-radius: var(--wf-radius);
    font-size: 0.9375rem;
    font-family: var(--wf-font);
    background-color: var(--wf-input-bg);
    color: var(--wf-text);
    outline: none;
  }

  .wf-thank-you-12__input:focus {
    border-color: var(--wf-primary);
  }

  .wf-thank-you-12__subscribe {
    padding: 0.75rem 1.5rem;
    background-color: var(--wf-primary);
    color: var(--color-text-on-dark);
    border: none;
    border-radius: var(--wf-radius);
    font-size: 0.9375rem;
    font-weight: 500;
    font-family: var(--wf-font);
    cursor: pointer;
    transition: background-color 0.2s ease;
    white-space: nowrap;
  }

  .wf-thank-you-12__subscribe:hover {
    background-color: var(--wf-primary-hover);
  }

  .wf-thank-you-12__home {
    display: inline-block;
    color: var(--wf-primary);
    text-decoration: none;
    font-size: 0.9375rem;
    font-weight: 500;
  }

  .wf-thank-you-12__home:hover {
    text-decoration: underline;
  }

  @media (max-width: 640px) {
    .wf-thank-you-12__title {
      font-size: 1.75rem;
    }

    .wf-thank-you-12__form {
      flex-direction: column;
    }

    .wf-thank-you-12__newsletter {
      padding: 1.5rem;
    }
  }
</style>

<section class="wf-thank-you-12">
  <div class="wf-thank-you-12__container">
    <div class="wf-thank-you-12__icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="48" height="48"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    </div>
    <h1 class="wf-thank-you-12__title">Merci !</h1>
    <p class="wf-thank-you-12__text">Votre message a bien ete envoye. Nous vous repondrons dans les 24 heures.</p>

    <div class="wf-thank-you-12__newsletter">
      <h2 class="wf-thank-you-12__newsletter-title">Restez informe</h2>
      <p class="wf-thank-you-12__newsletter-text">Inscrivez-vous a notre newsletter pour recevoir nos dernieres actualites et conseils directement dans votre boite email.</p>
      <form class="wf-thank-you-12__form" action="#" method="post">
        <input type="email" class="wf-thank-you-12__input" placeholder="votre@email.com" aria-label="Adresse email" />
        <button type="submit" class="wf-thank-you-12__subscribe">S'inscrire</button>
      </form>
    </div>

    <a href="#" class="wf-thank-you-12__home">Retour a l'accueil</a>
  </div>
</section>
