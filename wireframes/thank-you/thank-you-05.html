<!-- thank-you-05: Animated checkmark (CSS keyframe) + message -->
<style>
  .wf-thank-you-05 {
    --wf-bg: var(--color-bg);
    --wf-text: var(--color-text);
    --wf-text-muted: var(--color-text-light);
    --wf-icon-color: var(--color-text);
    --wf-icon-circle-bg: var(--color-bg-alt);
    --wf-primary: var(--color-text);
    --wf-primary-hover: var(--color-neutral-800);
    --wf-radius: 8px;
    --wf-font: var(--font-body);

    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: var(--wf-bg);
    font-family: var(--wf-font);
    color: var(--wf-text);
    padding: 2rem;
    box-sizing: border-box;
  }

  .wf-thank-you-05__container {
    text-align: center;
    max-width: 480px;
    width: 100%;
  }

  @keyframes wf-scale-in {
    0% {
      transform: scale(0);
      opacity: 0;
    }
    50% {
      transform: scale(1.15);
    }
    100% {
      transform: scale(1);
      opacity: 1;
    }
  }

  @keyframes wf-draw-check {
    0% {
      stroke-dashoffset: 40;
    }
    100% {
      stroke-dashoffset: 0;
    }
  }

  @keyframes wf-fade-up {
    0% {
      opacity: 0;
      transform: translateY(16px);
    }
    100% {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .wf-thank-you-05__icon-wrap {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background-color: var(--wf-icon-circle-bg);
    margin-bottom: 2rem;
    animation: wf-scale-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  .wf-thank-you-05__icon-wrap svg {
    color: var(--wf-icon-color);
  }

  .wf-thank-you-05__icon-wrap svg path {
    stroke-dasharray: 40;
    stroke-dashoffset: 40;
    animation: wf-draw-check 0.5s ease-out 0.4s forwards;
  }

  .wf-thank-you-05__title {
    font-size: 2.5rem;
    font-weight: 700;
    margin: 0 0 1rem 0;
    letter-spacing: -0.02em;
    opacity: 0;
    animation: wf-fade-up 0.5s ease-out 0.6s forwards;
  }

  .wf-thank-you-05__text {
    font-size: 1.125rem;
    color: var(--wf-text-muted);
    line-height: 1.6;
    margin: 0 0 2rem 0;
    opacity: 0;
    animation: wf-fade-up 0.5s ease-out 0.8s forwards;
  }

  .wf-thank-you-05__button {
    display: inline-block;
    padding: 0.875rem 2rem;
    background-color: var(--wf-primary);
    color: var(--color-text-on-dark);
    text-decoration: none;
    border-radius: var(--wf-radius);
    font-size: 1rem;
    font-weight: 500;
    transition: background-color 0.2s ease;
    opacity: 0;
    animation: wf-fade-up 0.5s ease-out 1s forwards;
  }

  .wf-thank-you-05__button:hover {
    background-color: var(--wf-primary-hover);
  }

  @media (max-width: 640px) {
    .wf-thank-you-05__title {
      font-size: 1.75rem;
    }

    .wf-thank-you-05__icon-wrap {
      width: 72px;
      height: 72px;
    }

    .wf-thank-you-05__icon-wrap svg {
      width: 36px;
      height: 36px;
    }
  }
</style>

<section class="wf-thank-you-05">
  <div class="wf-thank-you-05__container">
    <div class="wf-thank-you-05__icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="48" height="48"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    </div>
    <h1 class="wf-thank-you-05__title">Merci !</h1>
    <p class="wf-thank-you-05__text">Votre message a bien ete envoye. Nous vous repondrons dans les 24 heures.</p>
    <a href="#" class="wf-thank-you-05__button">Retour a l'accueil</a>
  </div>
</section>
