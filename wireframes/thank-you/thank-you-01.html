<!-- thank-you-01: Centered checkmark icon + title + text + home button -->
<style>
  .wf-thank-you-01 {
    --wf-bg: var(--color-bg);
    --wf-text: var(--color-text);
    --wf-text-muted: var(--color-text-light);
    --wf-primary: var(--color-text);
    --wf-primary-hover: var(--color-neutral-800);
    --wf-icon-color: var(--color-text);
    --wf-radius: 8px;
    --wf-font: var(--font-body);

    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: var(--wf-bg);
    font-family: var(--wf-font);
    color: var(--wf-text);
    padding: 2rem;
    box-sizing: border-box;
  }

  .wf-thank-you-01__container {
    text-align: center;
    max-width: 480px;
    width: 100%;
  }

  .wf-thank-you-01__icon {
    color: var(--wf-icon-color);
    margin-bottom: 1.5rem;
  }

  .wf-thank-you-01__title {
    font-size: 2.5rem;
    font-weight: 700;
    margin: 0 0 1rem 0;
    letter-spacing: -0.02em;
  }

  .wf-thank-you-01__text {
    font-size: 1.125rem;
    color: var(--wf-text-muted);
    line-height: 1.6;
    margin: 0 0 2rem 0;
  }

  .wf-thank-you-01__button {
    display: inline-block;
    padding: 0.875rem 2rem;
    background-color: var(--wf-primary);
    color: var(--color-text-on-dark);
    text-decoration: none;
    border-radius: var(--wf-radius);
    font-size: 1rem;
    font-weight: 500;
    transition: background-color 0.2s ease;
  }

  .wf-thank-you-01__button:hover {
    background-color: var(--wf-primary-hover);
  }

  @media (max-width: 640px) {
    .wf-thank-you-01__title {
      font-size: 1.75rem;
    }

    .wf-thank-you-01__text {
      font-size: 1rem;
    }
  }
</style>

<section class="wf-thank-you-01">
  <div class="wf-thank-you-01__container">
    <div class="wf-thank-you-01__icon">
      <span data-icon="check-circle" data-icon-type="outline" data-icon-size="2"></span>
    </div>
    <h1 class="wf-thank-you-01__title">Merci !</h1>
    <p class="wf-thank-you-01__text">Votre message a bien ete envoye. Nous vous repondrons dans les 24 heures.</p>
    <a href="#" class="wf-thank-you-01__button">Retour a l'accueil</a>
  </div>
</section>
