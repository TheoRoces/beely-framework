<!-- Gallery 04: Grille Bento (tailles mixtes : 1 grande + 4 petites) -->
<!-- Section galerie avec disposition bento asymetrique -->

<style>
  .wf-gallery-04 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    --wf-gallery-04-gap: 1rem;
    --wf-gallery-04-radius: 0.75rem;
    --wf-gallery-04-bg: var(--color-bg);
    --wf-gallery-04-text: var(--color-text);
    --wf-gallery-04-muted: var(--color-text-light);
    --wf-gallery-04-img-bg: var(--color-border);
    --wf-gallery-04-padding-x: 5%;
    --wf-gallery-04-padding-y: 5rem;
  }

  .wf-gallery-04 {
    background-color: var(--wf-gallery-04-bg);
    padding: var(--wf-gallery-04-padding-y) var(--wf-gallery-04-padding-x);
  }

  .wf-gallery-04__header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .wf-gallery-04__tagline {
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--wf-gallery-04-muted);
    margin: 0 0 0.75rem 0;
  }

  .wf-gallery-04__title {
    font-size: clamp(1.75rem, 3vw, 2.5rem);
    font-weight: 700;
    color: var(--wf-gallery-04-text);
    margin: 0 0 1rem 0;
    line-height: 1.2;
  }

  .wf-gallery-04__description {
    font-size: 1.125rem;
    color: var(--wf-gallery-04-muted);
    margin: 0 auto;
    max-width: 40rem;
    line-height: 1.6;
  }

  .wf-gallery-04__grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: var(--wf-gallery-04-gap);
    max-width: 80rem;
    margin: 0 auto;
  }

  .wf-gallery-04__grid .wf-img {
    background-color: var(--wf-gallery-04-img-bg);
    border-radius: var(--wf-gallery-04-radius);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    min-height: 0;
  }

  .wf-gallery-04__grid .wf-img--large {
    grid-column: 1 / 3;
    grid-row: 1 / 3;
  }

  .wf-gallery-04__cta {
    text-align: center;
    margin-top: 3rem;
  }

  .wf-gallery-04__btn {
    display: inline-block;
    padding: 0.875rem 2rem;
    border: 2px solid var(--wf-gallery-04-text);
    border-radius: var(--wf-gallery-04-radius);
    color: var(--wf-gallery-04-text);
    font-size: 1rem;
    font-weight: 600;
    text-decoration: none;
    transition: background-color 0.2s, color 0.2s;
    cursor: pointer;
    background: none;
  }

  .wf-gallery-04__btn:hover {
    background-color: var(--wf-gallery-04-text);
    color: var(--wf-gallery-04-bg);
  }

  @media (max-width: 768px) {
    .wf-gallery-04__grid {
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: auto;
    }

    .wf-gallery-04__grid .wf-img--large {
      grid-column: 1 / -1;
      min-height: 20rem;
    }

    .wf-gallery-04__grid .wf-img {
      min-height: 12rem;
    }
  }

  @media (max-width: 480px) {
    .wf-gallery-04__grid {
      grid-template-columns: 1fr;
    }

    .wf-gallery-04__grid .wf-img--large {
      grid-column: 1;
    }
  }
</style>

<section class="wf-gallery-04">
  <div class="wf-gallery-04__header">
    <p class="wf-gallery-04__tagline">Galerie</p>
    <h2 class="wf-gallery-04__title">Nos réalisations en images</h2>
    <p class="wf-gallery-04__description">Une disposition bento moderne mettant en avant une image principale accompagnee de vignettes.</p>
  </div>

  <div class="wf-gallery-04__grid">
    <div class="wf-img wf-img--large">
      <span data-icon="photo" data-icon-type="outline" data-icon-size="48" style="opacity:0.3"></span>
    </div>
    <div class="wf-img">
      <span data-icon="photo" data-icon-type="outline" data-icon-size="48" style="opacity:0.3"></span>
    </div>
    <div class="wf-img">
      <span data-icon="photo" data-icon-type="outline" data-icon-size="48" style="opacity:0.3"></span>
    </div>
    <div class="wf-img">
      <span data-icon="photo" data-icon-type="outline" data-icon-size="48" style="opacity:0.3"></span>
    </div>
    <div class="wf-img">
      <span data-icon="photo" data-icon-type="outline" data-icon-size="48" style="opacity:0.3"></span>
    </div>
  </div>

  <div class="wf-gallery-04__cta">
    <a href="#" class="wf-gallery-04__btn">Voir plus</a>
  </div>
</section>
