<!-- Gallery 07: Bande galerie pleine largeur -->
<!-- Section galerie en bande continue occupant toute la largeur de l'ecran -->

<style>
  .wf-gallery-07 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    --wf-gallery-07-gap: 0.5rem;
    --wf-gallery-07-bg: var(--color-bg);
    --wf-gallery-07-text: var(--color-text);
    --wf-gallery-07-muted: var(--color-text-light);
    --wf-gallery-07-img-bg: var(--color-border);
    --wf-gallery-07-padding-y: 5rem;
    --wf-gallery-07-strip-height: 20rem;
  }

  .wf-gallery-07 {
    background-color: var(--wf-gallery-07-bg);
    padding: var(--wf-gallery-07-padding-y) 0;
  }

  .wf-gallery-07__header {
    text-align: center;
    margin-bottom: 3rem;
    padding: 0 5%;
  }

  .wf-gallery-07__tagline {
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--wf-gallery-07-muted);
    margin: 0 0 0.75rem 0;
  }

  .wf-gallery-07__title {
    font-size: clamp(1.75rem, 3vw, 2.5rem);
    font-weight: 700;
    color: var(--wf-gallery-07-text);
    margin: 0 0 1rem 0;
    line-height: 1.2;
  }

  .wf-gallery-07__strip {
    display: flex;
    gap: var(--wf-gallery-07-gap);
    width: 100%;
    overflow: hidden;
  }

  .wf-gallery-07__strip .wf-img {
    flex: 1 1 0;
    min-width: 0;
    height: var(--wf-gallery-07-strip-height);
    background-color: var(--wf-gallery-07-img-bg);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wf-gallery-07__strip .wf-img:first-child {
    flex: 1.5 1 0;
  }

  .wf-gallery-07__strip .wf-img:nth-child(3) {
    flex: 1.3 1 0;
  }

  .wf-gallery-07__cta {
    text-align: center;
    margin-top: 3rem;
    padding: 0 5%;
  }

  .wf-gallery-07__btn {
    display: inline-block;
    padding: 0.875rem 2rem;
    border: 2px solid var(--wf-gallery-07-text);
    border-radius: var(--radius-md, 0.5rem);
    color: var(--wf-gallery-07-text);
    font-size: 1rem;
    font-weight: 600;
    text-decoration: none;
    transition: background-color 0.2s, color 0.2s;
    cursor: pointer;
    background: none;
  }

  .wf-gallery-07__btn:hover {
    background-color: var(--wf-gallery-07-text);
    color: var(--wf-gallery-07-bg);
  }

  @media (max-width: 768px) {
    .wf-gallery-07 {
      --wf-gallery-07-strip-height: 12rem;
    }

    .wf-gallery-07__strip {
      flex-wrap: wrap;
    }

    .wf-gallery-07__strip .wf-img {
      flex: 1 1 calc(50% - var(--wf-gallery-07-gap));
      min-width: calc(50% - var(--wf-gallery-07-gap));
    }

    .wf-gallery-07__strip .wf-img:first-child,
    .wf-gallery-07__strip .wf-img:nth-child(3) {
      flex: 1 1 calc(50% - var(--wf-gallery-07-gap));
    }
  }
</style>
