<!-- Gallery 03: Grille 4 colonnes avec effet zoom au survol -->
<!-- Section galerie avec grille de 4 colonnes et animation de zoom au hover -->

<style>
  .wf-gallery-03 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    --wf-gallery-03-gap: 1rem;
    --wf-gallery-03-columns: 4;
    --wf-gallery-03-radius: 0.5rem;
    --wf-gallery-03-bg: var(--color-bg);
    --wf-gallery-03-text: var(--color-text);
    --wf-gallery-03-muted: var(--color-text-light);
    --wf-gallery-03-img-bg: var(--color-border);
    --wf-gallery-03-padding-x: 5%;
    --wf-gallery-03-padding-y: 5rem;
    --wf-gallery-03-zoom: 1.08;
  }

  .wf-gallery-03 {
    background-color: var(--wf-gallery-03-bg);
    padding: var(--wf-gallery-03-padding-y) var(--wf-gallery-03-padding-x);
  }

  .wf-gallery-03__header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .wf-gallery-03__tagline {
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--wf-gallery-03-muted);
    margin: 0 0 0.75rem 0;
  }

  .wf-gallery-03__title {
    font-size: clamp(1.75rem, 3vw, 2.5rem);
    font-weight: 700;
    color: var(--wf-gallery-03-text);
    margin: 0 0 1rem 0;
    line-height: 1.2;
  }

  .wf-gallery-03__description {
    font-size: 1.125rem;
    color: var(--wf-gallery-03-muted);
    margin: 0 auto;
    max-width: 40rem;
    line-height: 1.6;
  }

  .wf-gallery-03__grid {
    display: grid;
    grid-template-columns: repeat(var(--wf-gallery-03-columns), 1fr);
    gap: var(--wf-gallery-03-gap);
    max-width: 80rem;
    margin: 0 auto;
  }

  .wf-gallery-03__item {
    border-radius: var(--wf-gallery-03-radius);
    overflow: hidden;
    cursor: pointer;
  }

  .wf-gallery-03__item .wf-img {
    aspect-ratio: 1 / 1;
    background-color: var(--wf-gallery-03-img-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .wf-gallery-03__item:hover .wf-img {
    transform: scale(var(--wf-gallery-03-zoom));
  }

  .wf-gallery-03__cta {
    text-align: center;
    margin-top: 3rem;
  }

  .wf-gallery-03__btn {
    display: inline-block;
    padding: 0.875rem 2rem;
    border: 2px solid var(--wf-gallery-03-text);
    border-radius: var(--wf-gallery-03-radius);
    color: var(--wf-gallery-03-text);
    font-size: 1rem;
    font-weight: 600;
    text-decoration: none;
    transition: background-color 0.2s, color 0.2s;
    cursor: pointer;
    background: none;
  }

  .wf-gallery-03__btn:hover {
    background-color: var(--wf-gallery-03-text);
    color: var(--wf-gallery-03-bg);
  }

  @media (max-width: 1024px) {
    .wf-gallery-03__grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  @media (max-width: 768px) {
    .wf-gallery-03__grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 480px) {
    .wf-gallery-03__grid {
      grid-template-columns: 1fr;
    }
  }
</style>
