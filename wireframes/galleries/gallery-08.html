<style>
  .wf-gallery-08 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    background-color: var(--color-bg);
    padding: 5rem 5%;
  }
  .wf-gallery-08__header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .wf-gallery-08__tagline {
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--color-text-light, #6b7280);
    margin: 0 0 0.75rem 0;
  }
  .wf-gallery-08__title {
    font-size: clamp(1.75rem, 3vw, 2.5rem);
    font-weight: 700;
    color: var(--color-text, #1a1a1a);
    margin: 0 0 1rem 0;
    line-height: 1.2;
  }
  .wf-gallery-08__description {
    font-size: 1.125rem;
    color: var(--color-text-light, #6b7280);
    margin: 0 auto;
    max-width: 40rem;
    line-height: 1.6;
  }
  .wf-gallery-08__grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
    max-width: 80rem;
    margin: 0 auto;
  }
  .wf-gallery-08__grid .wf-img {
    aspect-ratio: 4 / 3;
    background-color: var(--color-border, #e5e7eb);
    border-radius: 0.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .wf-gallery-08__cta {
    text-align: center;
    margin-top: 3rem;
  }
  @media (max-width: 768px) {
    .wf-gallery-08__grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }
  @media (max-width: 480px) {
    .wf-gallery-08__grid {
      grid-template-columns: 1fr;
    }
  }
</style>
