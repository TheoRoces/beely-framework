<style>
  .wf-gallery-08 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    --wf-gallery-08-gap: 1.5rem;
    --wf-gallery-08-radius: 0.5rem;
    --wf-gallery-08-bg: var(--color-bg);
    --wf-gallery-08-text: var(--color-text);
    --wf-gallery-08-muted: var(--color-text-light);
    --wf-gallery-08-img-bg: var(--color-border);
    --wf-gallery-08-padding-x: 5%;
    --wf-gallery-08-padding-y: 5rem;
    --wf-gallery-08-accent: var(--color-text);
    --wf-gallery-08-tab-bg: var(--color-neutral-100)
  }

  .wf-gallery-08 {
    background-color: var(--wf-gallery-08-bg);
    padding: var(--wf-gallery-08-padding-y) var(--wf-gallery-08-padding-x);
  }

  .wf-gallery-08__header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .wf-gallery-08__tagline {
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--wf-gallery-08-muted);
    margin: 0 0 0.75rem 0;
  }

  .wf-gallery-08__title {
    font-size: clamp(1.75rem, 3vw, 2.5rem);
    font-weight: 700;
    color: var(--wf-gallery-08-text);
    margin: 0 0 1rem 0;
    line-height: 1.2;
  }

  .wf-gallery-08__description {
    font-size: 1.125rem;
    color: var(--wf-gallery-08-muted);
    margin: 0 auto;
    max-width: 40rem;
    line-height: 1.6;
  }

  .wf-gallery-08__tabs {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
  }

  .wf-gallery-08__tab {
    padding: 0.625rem 1.5rem;
    border-radius: 100px;
    font-size: 0.875rem;
    font-weight: 500;
    text-decoration: none;
    color: var(--wf-gallery-08-muted);
    background-color: var(--wf-gallery-08-tab-bg);
    border: none;
    cursor: pointer;
    transition: background-color 0.2s, color 0.2s;
  }

  .wf-gallery-08__tab:hover {
    color: var(--wf-gallery-08-text);
    background-color: var(--color-neutral-200);
  }

  .wf-gallery-08__tab--active {
    background-color: var(--wf-gallery-08-accent);
    color: var(--color-text-on-dark);
  }

  .wf-gallery-08__tab--active:hover {
    background-color: var(--wf-gallery-08-accent);
    color: var(--color-text-on-dark);
  }

  .wf-gallery-08__grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--wf-gallery-08-gap);
    max-width: 80rem;
    margin: 0 auto;
  }

  .wf-gallery-08__grid .wf-img {
    aspect-ratio: 4 / 3;
    background-color: var(--wf-gallery-08-img-bg);
    border-radius: var(--wf-gallery-08-radius);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .wf-gallery-08__cta {
    text-align: center;
    margin-top: 3rem;
  }

  .wf-gallery-08__btn {
    display: inline-block;
    padding: 0.875rem 2rem;
    border: 2px solid var(--wf-gallery-08-text);
    border-radius: var(--wf-gallery-08-radius);
    color: var(--wf-gallery-08-text);
    font-size: 1rem;
    font-weight: 600;
    text-decoration: none;
    transition: background-color 0.2s, color 0.2s;
    cursor: pointer;
    background: none;
  }

  .wf-gallery-08__btn:hover {
    background-color: var(--wf-gallery-08-text);
    color: var(--wf-gallery-08-bg);
  }

  @media (max-width: 768px) {
    .wf-gallery-08__grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 480px) {
    .wf-gallery-08__grid {
      grid-template-columns: 1fr;
    }

    .wf-gallery-08__tabs {
      gap: 0.375rem;
    }

    .wf-gallery-08__tab {
      padding: 0.5rem 1rem;
      font-size: 0.8125rem;
    }
  }
</style>
