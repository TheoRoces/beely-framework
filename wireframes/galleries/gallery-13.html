<!-- Gallery 13: Carrousel galerie avec points de navigation -->
<!-- Section galerie en format carrousel avec indicateurs de pagination (CSS only) -->

<style>
  .wf-gallery-13 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    --wf-gallery-13-radius: 0.75rem;
    --wf-gallery-13-bg: var(--color-bg);
    --wf-gallery-13-text: var(--color-text);
    --wf-gallery-13-muted: var(--color-text-light);
    --wf-gallery-13-img-bg: var(--color-border);
    --wf-gallery-13-padding-x: 5%;
    --wf-gallery-13-padding-y: 5rem;
    --wf-gallery-13-dot-size: 0.625rem;
    --wf-gallery-13-dot-active: var(--color-text);
    --wf-gallery-13-dot-inactive: var(--color-neutral-300)
  }

  .wf-gallery-13 {
    background-color: var(--wf-gallery-13-bg);
    padding: var(--wf-gallery-13-padding-y) var(--wf-gallery-13-padding-x);
  }

  .wf-gallery-13__header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .wf-gallery-13__tagline {
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--wf-gallery-13-muted);
    margin: 0 0 0.75rem 0;
  }

  .wf-gallery-13__title {
    font-size: clamp(1.75rem, 3vw, 2.5rem);
    font-weight: 700;
    color: var(--wf-gallery-13-text);
    margin: 0 0 1rem 0;
    line-height: 1.2;
  }

  .wf-gallery-13__description {
    font-size: 1.125rem;
    color: var(--wf-gallery-13-muted);
    margin: 0 auto;
    max-width: 40rem;
    line-height: 1.6;
  }

  .wf-gallery-13__carousel {
    position: relative;
    max-width: 64rem;
    margin: 0 auto;
  }

  .wf-gallery-13__track {
    display: flex;
    gap: 1.5rem;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  .wf-gallery-13__track::-webkit-scrollbar {
    display: none;
  }

  .wf-gallery-13__slide {
    flex: 0 0 100%;
    scroll-snap-align: center;
  }

  .wf-gallery-13__slide .wf-img {
    width: 100%;
    aspect-ratio: 16 / 9;
    background-color: var(--wf-gallery-13-img-bg);
    border-radius: var(--wf-gallery-13-radius);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .wf-gallery-13__arrows {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    transform: translateY(-50%);
    display: flex;
    justify-content: space-between;
    pointer-events: none;
    padding: 0 1rem;
  }

  .wf-gallery-13__arrow {
    width: 3rem;
    height: 3rem;
    border-radius: 50%;
    background-color: rgba(255, 255, 255, 0.9);
    border: 1px solid var(--color-border);
    color: var(--wf-gallery-13-text);
    font-size: 1.25rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
    transition: background-color 0.2s;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }

  .wf-gallery-13__arrow:hover {
    background-color: var(--color-bg);
  }

  .wf-gallery-13__dots {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 1.5rem;
  }

  .wf-gallery-13__dot {
    width: var(--wf-gallery-13-dot-size);
    height: var(--wf-gallery-13-dot-size);
    border-radius: 50%;
    background-color: var(--wf-gallery-13-dot-inactive);
    border: none;
    cursor: pointer;
    padding: 0;
    transition: background-color 0.2s, transform 0.2s;
  }

  .wf-gallery-13__dot--active {
    background-color: var(--wf-gallery-13-dot-active);
    transform: scale(1.3);
  }

  .wf-gallery-13__dot:hover {
    background-color: var(--wf-gallery-13-dot-active);
  }

  @media (max-width: 768px) {
    .wf-gallery-13__arrows {
      display: none;
    }
  }
</style>
