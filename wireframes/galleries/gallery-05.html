<!-- Gallery 05: Galerie a defilement horizontal -->
<!-- Section galerie avec scroll horizontal natif -->

<style>
  .wf-gallery-05 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    --wf-gallery-05-gap: 1.5rem;
    --wf-gallery-05-radius: 0.75rem;
    --wf-gallery-05-bg: var(--color-bg);
    --wf-gallery-05-text: var(--color-text);
    --wf-gallery-05-muted: var(--color-text-light);
    --wf-gallery-05-img-bg: var(--color-border);
    --wf-gallery-05-padding-y: 5rem;
    --wf-gallery-05-card-width: 22rem;
    --wf-gallery-05-card-height: 16rem;
  }

  .wf-gallery-05 {
    background-color: var(--wf-gallery-05-bg);
    padding: var(--wf-gallery-05-padding-y) 0;
  }

  .wf-gallery-05__header {
    text-align: center;
    margin-bottom: 3rem;
    padding: 0 5%;
  }

  .wf-gallery-05__tagline {
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--wf-gallery-05-muted);
    margin: 0 0 0.75rem 0;
  }

  .wf-gallery-05__title {
    font-size: clamp(1.75rem, 3vw, 2.5rem);
    font-weight: 700;
    color: var(--wf-gallery-05-text);
    margin: 0 0 1rem 0;
    line-height: 1.2;
  }

  .wf-gallery-05__description {
    font-size: 1.125rem;
    color: var(--wf-gallery-05-muted);
    margin: 0 auto;
    max-width: 40rem;
    line-height: 1.6;
  }

  .wf-gallery-05__scroll {
    display: flex;
    gap: var(--wf-gallery-05-gap);
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    padding: 0 5% 1.5rem 5%;
    -webkit-overflow-scrolling: touch;
  }

  .wf-gallery-05__scroll::-webkit-scrollbar {
    height: 6px;
  }

  .wf-gallery-05__scroll::-webkit-scrollbar-track {
    background: var(--color-bg-alt);
    border-radius: 3px;
  }

  .wf-gallery-05__scroll::-webkit-scrollbar-thumb {
    background: var(--color-neutral-300);
    border-radius: 3px;
  }

  .wf-gallery-05__scroll .wf-img {
    flex: 0 0 var(--wf-gallery-05-card-width);
    height: var(--wf-gallery-05-card-height);
    background-color: var(--wf-gallery-05-img-bg);
    border-radius: var(--wf-gallery-05-radius);
    display: flex;
    align-items: center;
    justify-content: center;
    scroll-snap-align: start;
  }

  .wf-gallery-05__hint {
    text-align: center;
    margin-top: 1.5rem;
    padding: 0 5%;
  }

  .wf-gallery-05__hint-text {
    font-size: 0.875rem;
    color: var(--wf-gallery-05-muted);
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }

  .wf-gallery-05__hint-arrow {
    display: inline-block;
    width: 2rem;
    height: 2px;
    background-color: var(--wf-gallery-05-muted);
    position: relative;
  }

  .wf-gallery-05__hint-arrow::after {
    content: "";
    position: absolute;
    right: 0;
    top: -3px;
    width: 8px;
    height: 8px;
    border-right: 2px solid var(--wf-gallery-05-muted);
    border-top: 2px solid var(--wf-gallery-05-muted);
    transform: rotate(45deg);
  }

  @media (max-width: 768px) {
    .wf-gallery-05 {
      --wf-gallery-05-card-width: 16rem;
      --wf-gallery-05-card-height: 12rem;
    }
  }
</style>
