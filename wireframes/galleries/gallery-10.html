<!-- Gallery 10: Galerie 2 colonnes decalees/alternees -->
<!-- Section galerie avec disposition en 2 colonnes decalees verticalement -->

<style>
  .wf-gallery-10 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    --wf-gallery-10-gap: 2rem;
    --wf-gallery-10-radius: 0.75rem;
    --wf-gallery-10-bg: var(--color-bg);
    --wf-gallery-10-text: var(--color-text);
    --wf-gallery-10-muted: var(--color-text-light);
    --wf-gallery-10-img-bg: var(--color-border);
    --wf-gallery-10-padding-x: 5%;
    --wf-gallery-10-padding-y: 5rem;
    --wf-gallery-10-offset: 4rem;
  }

  .wf-gallery-10 {
    background-color: var(--wf-gallery-10-bg);
    padding: var(--wf-gallery-10-padding-y) var(--wf-gallery-10-padding-x);
  }

  .wf-gallery-10__header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .wf-gallery-10__tagline {
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--wf-gallery-10-muted);
    margin: 0 0 0.75rem 0;
  }

  .wf-gallery-10__title {
    font-size: clamp(1.75rem, 3vw, 2.5rem);
    font-weight: 700;
    color: var(--wf-gallery-10-text);
    margin: 0 0 1rem 0;
    line-height: 1.2;
  }

  .wf-gallery-10__description {
    font-size: 1.125rem;
    color: var(--wf-gallery-10-muted);
    margin: 0 auto;
    max-width: 40rem;
    line-height: 1.6;
  }

  .wf-gallery-10__grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--wf-gallery-10-gap);
    max-width: 64rem;
    margin: 0 auto;
  }

  .wf-gallery-10__col {
    display: flex;
    flex-direction: column;
    gap: var(--wf-gallery-10-gap);
  }

  .wf-gallery-10__col:nth-child(2) {
    padding-top: var(--wf-gallery-10-offset);
  }

  .wf-gallery-10__col .wf-img {
    background-color: var(--wf-gallery-10-img-bg);
    border-radius: var(--wf-gallery-10-radius);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .wf-gallery-10__col .wf-img:nth-child(odd) {
    aspect-ratio: 3 / 4;
  }

  .wf-gallery-10__col .wf-img:nth-child(even) {
    aspect-ratio: 4 / 3;
  }

  .wf-gallery-10__cta {
    text-align: center;
    margin-top: 3rem;
  }

  .wf-gallery-10__btn {
    display: inline-block;
    padding: 0.875rem 2rem;
    border: 2px solid var(--wf-gallery-10-text);
    border-radius: var(--wf-gallery-10-radius);
    color: var(--wf-gallery-10-text);
    font-size: 1rem;
    font-weight: 600;
    text-decoration: none;
    transition: background-color 0.2s, color 0.2s;
    cursor: pointer;
    background: none;
  }

  .wf-gallery-10__btn:hover {
    background-color: var(--wf-gallery-10-text);
    color: var(--wf-gallery-10-bg);
  }

  @media (max-width: 768px) {
    .wf-gallery-10__grid {
      grid-template-columns: 1fr;
    }

    .wf-gallery-10__col:nth-child(2) {
      padding-top: 0;
    }
  }
</style>

<section class="wf-gallery-10">
  <div class="wf-gallery-10__header">
    <p class="wf-gallery-10__tagline">Galerie</p>
    <h2 class="wf-gallery-10__title">Nos réalisations en images</h2>
    <p class="wf-gallery-10__description">Une disposition decalee pour un rendu elegant et dynamique.</p>
  </div>

  <div class="wf-gallery-10__grid">
    <div class="wf-gallery-10__col">
      <div class="wf-img">
        <span data-icon="photo" data-icon-type="outline" data-icon-size="48" style="opacity:0.3"></span>
      </div>
      <div class="wf-img">
        <span data-icon="photo" data-icon-type="outline" data-icon-size="48" style="opacity:0.3"></span>
      </div>
      <div class="wf-img">
        <span data-icon="photo" data-icon-type="outline" data-icon-size="48" style="opacity:0.3"></span>
      </div>
    </div>
    <div class="wf-gallery-10__col">
      <div class="wf-img">
        <span data-icon="photo" data-icon-type="outline" data-icon-size="48" style="opacity:0.3"></span>
      </div>
      <div class="wf-img">
        <span data-icon="photo" data-icon-type="outline" data-icon-size="48" style="opacity:0.3"></span>
      </div>
      <div class="wf-img">
        <span data-icon="photo" data-icon-type="outline" data-icon-size="48" style="opacity:0.3"></span>
      </div>
    </div>
  </div>

  <div class="wf-gallery-10__cta">
    <a href="#" class="wf-gallery-10__btn">Voir plus</a>
  </div>
</section>
