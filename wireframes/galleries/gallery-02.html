<!-- Gallery 02: Disposition Masonry (colonnes CSS) -->
<!-- Section galerie avec effet masonry utilisant CSS columns -->

<style>
  .wf-gallery-02 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    --wf-gallery-02-gap: 1.5rem;
    --wf-gallery-02-columns: 3;
    --wf-gallery-02-radius: 0.5rem;
    --wf-gallery-02-bg: var(--color-bg);
    --wf-gallery-02-text: var(--color-text);
    --wf-gallery-02-muted: var(--color-text-light);
    --wf-gallery-02-img-bg: var(--color-border);
    --wf-gallery-02-padding-x: 5%;
    --wf-gallery-02-padding-y: 5rem;
  }

  .wf-gallery-02 {
    background-color: var(--wf-gallery-02-bg);
    padding: var(--wf-gallery-02-padding-y) var(--wf-gallery-02-padding-x);
  }

  .wf-gallery-02__header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .wf-gallery-02__tagline {
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--wf-gallery-02-muted);
    margin: 0 0 0.75rem 0;
  }

  .wf-gallery-02__title {
    font-size: clamp(1.75rem, 3vw, 2.5rem);
    font-weight: 700;
    color: var(--wf-gallery-02-text);
    margin: 0 0 1rem 0;
    line-height: 1.2;
  }

  .wf-gallery-02__description {
    font-size: 1.125rem;
    color: var(--wf-gallery-02-muted);
    margin: 0 auto;
    max-width: 40rem;
    line-height: 1.6;
  }

  .wf-gallery-02__masonry {
    column-count: var(--wf-gallery-02-columns);
    column-gap: var(--wf-gallery-02-gap);
    max-width: 80rem;
    margin: 0 auto;
  }

  .wf-gallery-02__masonry .wf-img {
    break-inside: avoid;
    margin-bottom: var(--wf-gallery-02-gap);
    background-color: var(--wf-gallery-02-img-bg);
    border-radius: var(--wf-gallery-02-radius);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .wf-gallery-02__masonry .wf-img:nth-child(1) { height: 18rem; }
  .wf-gallery-02__masonry .wf-img:nth-child(2) { height: 24rem; }
  .wf-gallery-02__masonry .wf-img:nth-child(3) { height: 14rem; }
  .wf-gallery-02__masonry .wf-img:nth-child(4) { height: 20rem; }
  .wf-gallery-02__masonry .wf-img:nth-child(5) { height: 28rem; }
  .wf-gallery-02__masonry .wf-img:nth-child(6) { height: 16rem; }
  .wf-gallery-02__masonry .wf-img:nth-child(7) { height: 22rem; }
  .wf-gallery-02__masonry .wf-img:nth-child(8) { height: 18rem; }
  .wf-gallery-02__masonry .wf-img:nth-child(9) { height: 26rem; }

  .wf-gallery-02__cta {
    text-align: center;
    margin-top: 3rem;
  }

  .wf-gallery-02__btn {
    display: inline-block;
    padding: 0.875rem 2rem;
    border: 2px solid var(--wf-gallery-02-text);
    border-radius: var(--wf-gallery-02-radius);
    color: var(--wf-gallery-02-text);
    font-size: 1rem;
    font-weight: 600;
    text-decoration: none;
    transition: background-color 0.2s, color 0.2s;
    cursor: pointer;
    background: none;
  }

  .wf-gallery-02__btn:hover {
    background-color: var(--wf-gallery-02-text);
    color: var(--wf-gallery-02-bg);
  }

  @media (max-width: 768px) {
    .wf-gallery-02__masonry {
      column-count: 2;
    }
  }

  @media (max-width: 480px) {
    .wf-gallery-02__masonry {
      column-count: 1;
    }
  }
</style>
