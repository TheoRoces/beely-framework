<!-- Gallery 01: Grille 3 colonnes d'images egales -->
<!-- Section galerie avec disposition en grille reguliere de 3 colonnes -->

<style>
  .wf-gallery-01 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    --wf-gallery-01-gap: 1.5rem;
    --wf-gallery-01-columns: 3;
    --wf-gallery-01-radius: 0.5rem;
    --wf-gallery-01-bg: var(--color-bg);
    --wf-gallery-01-text: var(--color-text);
    --wf-gallery-01-muted: var(--color-text-light);
    --wf-gallery-01-img-bg: var(--color-border);
    --wf-gallery-01-padding-x: 5%;
    --wf-gallery-01-padding-y: 5rem;
  }

  .wf-gallery-01 {
    background-color: var(--wf-gallery-01-bg);
    padding: var(--wf-gallery-01-padding-y) var(--wf-gallery-01-padding-x);
  }

  .wf-gallery-01__header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .wf-gallery-01__tagline {
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--wf-gallery-01-muted);
    margin: 0 0 0.75rem 0;
  }

  .wf-gallery-01__title {
    font-size: clamp(1.75rem, 3vw, 2.5rem);
    font-weight: 700;
    color: var(--wf-gallery-01-text);
    margin: 0 0 1rem 0;
    line-height: 1.2;
  }

  .wf-gallery-01__description {
    font-size: 1.125rem;
    color: var(--wf-gallery-01-muted);
    margin: 0 auto;
    max-width: 40rem;
    line-height: 1.6;
  }

  .wf-gallery-01__grid {
    display: grid;
    grid-template-columns: repeat(var(--wf-gallery-01-columns), 1fr);
    gap: var(--wf-gallery-01-gap);
    max-width: 80rem;
    margin: 0 auto;
  }

  .wf-gallery-01 .wf-img {
    aspect-ratio: 1 / 1;
    background-color: var(--wf-gallery-01-img-bg);
    border-radius: var(--wf-gallery-01-radius);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .wf-gallery-01__cta {
    text-align: center;
    margin-top: 3rem;
  }

  .wf-gallery-01__btn {
    display: inline-block;
    padding: 0.875rem 2rem;
    border: 2px solid var(--wf-gallery-01-text);
    border-radius: var(--wf-gallery-01-radius);
    color: var(--wf-gallery-01-text);
    font-size: 1rem;
    font-weight: 600;
    text-decoration: none;
    transition: background-color 0.2s, color 0.2s;
    cursor: pointer;
    background: none;
  }

  .wf-gallery-01__btn:hover {
    background-color: var(--wf-gallery-01-text);
    color: var(--wf-gallery-01-bg);
  }

  @media (max-width: 768px) {
    .wf-gallery-01__grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 480px) {
    .wf-gallery-01__grid {
      grid-template-columns: 1fr;
    }
  }
</style>
