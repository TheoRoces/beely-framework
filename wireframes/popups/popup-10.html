<!-- popup-10.html | Discount / Promo Popup | Wireframe -->
<style>
  .wf-popup-preview--10 {
    --popup-bg: var(--color-bg);
    --popup-overlay: rgba(0, 0, 0, 0.55);
    --popup-radius: 12px;
    --popup-padding: 2.5rem;
    --popup-max-width: 440px;
    --popup-text: var(--color-text);
    --popup-muted: var(--color-text-light);
    --popup-border: var(--color-border);
    --popup-accent: var(--color-text);
    --popup-accent-text: var(--color-bg);
    --popup-coupon-bg: var(--color-bg-alt);

    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 500px;
    background: var(--popup-overlay);
    padding: 1.5rem;
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-popup-preview--10 .wf-popup-box {
    background: var(--popup-bg);
    border-radius: var(--popup-radius);
    padding: var(--popup-padding);
    max-width: var(--popup-max-width);
    width: 100%;
    position: relative;
    box-shadow: var(--shadow-xl);
    text-align: center;
  }

  .wf-popup-preview--10 .wf-popup-badge {
    display: inline-block;
    background: var(--popup-accent);
    color: var(--popup-accent-text);
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 0.375rem 1rem;
    border-radius: 100px;
    margin-bottom: 1.25rem;
  }

  .wf-popup-preview--10 .wf-popup-discount {
    font-size: 3.5rem;
    font-weight: 800;
    color: var(--popup-text);
    line-height: 1;
    margin: 0 0 0.5rem 0;
    letter-spacing: -0.03em;
  }

  .wf-popup-preview--10 .wf-popup-title {
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--popup-text);
    margin: 0 0 0.5rem 0;
  }

  .wf-popup-preview--10 .wf-popup-desc {
    font-size: 0.9375rem;
    color: var(--popup-muted);
    line-height: 1.6;
    margin: 0 0 1.5rem 0;
  }

  .wf-popup-preview--10 .wf-popup-coupon {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    background: var(--popup-coupon-bg);
    border: 2px dashed var(--popup-border);
    border-radius: var(--radius-md, 0.5rem);
    padding: 0.875rem 1.25rem;
    margin-bottom: 1.5rem;
  }

  .wf-popup-preview--10 .wf-popup-coupon-code {
    font-size: 1.125rem;
    font-weight: 700;
    color: var(--popup-text);
    letter-spacing: 0.1em;
    font-family: ui-monospace, monospace;
  }

  .wf-popup-preview--10 .wf-popup-coupon-copy {
    font-size: 0.8125rem;
    color: var(--popup-muted);
    text-decoration: underline;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
  }

  .wf-popup-preview--10 .wf-popup-expire {
    font-size: 0.8125rem;
    color: var(--popup-muted);
    margin-top: 1rem;
  }

  @media (max-width: 480px) {
    .wf-popup-preview--10 .wf-popup-box {
      padding: 1.5rem;
    }
    .wf-popup-preview--10 .wf-popup-discount {
      font-size: 2.5rem;
    }
  }
</style>

<div class="wf-popup-preview wf-popup-preview--10">
  <div class="wf-popup-box">
    <button class="popup__close" data-popup-close aria-label="Fermer">
      <span data-icon="x-mark" data-icon-type="outline" data-icon-size="24"></span>
    </button>
    <span class="wf-popup-badge">Offre speciale</span>
    <p class="wf-popup-discount">-20%</p>
    <h2 class="wf-popup-title">Sur votre première commande</h2>
    <p class="wf-popup-desc">Utilisez le code ci-dessous pour bénéficier de cette offre exclusive reservee aux nouveaux clients.</p>
    <div class="wf-popup-coupon">
      <span class="wf-popup-coupon-code">BIENVENUE20</span>
      <button class="wf-popup-coupon-copy">Copier</button>
    </div>
    <button class="btn btn--primary">Acheter maintenant</button>
    <p class="wf-popup-expire">Offre valable jusqu'au 31 mars 2026</p>
  </div>
</div>
