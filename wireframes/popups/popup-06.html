<!-- popup-06.html | Video Popup | Wireframe -->
<style>
  .wf-popup-preview--06 {
    --popup-overlay: rgba(0, 0, 0, 0.8);
    --popup-radius: 12px;
    --popup-max-width: 800px;
    --popup-border: rgba(255, 255, 255, 0.15);
    --popup-muted: rgba(255, 255, 255, 0.6);

    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 500px;
    background: var(--popup-overlay);
    padding: 1.5rem;
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-popup-preview--06 .wf-popup-box {
    max-width: var(--popup-max-width);
    width: 100%;
    position: relative;
  }

  .wf-popup-preview--06 .wf-popup-video {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: var(--color-bg-dark);
    border-radius: var(--popup-radius);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .wf-popup-preview--06 .wf-popup-play {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.15);
    border: 2px solid rgba(255, 255, 255, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(4px);
  }

  .wf-popup-preview--06 .wf-popup-play svg {
    width: 28px;
    height: 28px;
    color: var(--color-text-on-dark);
    margin-left: 3px;
  }

  .wf-popup-preview--06 .wf-popup-video-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 1rem 1.25rem;
    background: linear-gradient(transparent, rgba(0, 0, 0, 0.6));
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .wf-popup-preview--06 .wf-popup-video-title {
    font-size: 0.875rem;
    color: var(--color-text-on-dark);
    font-weight: 500;
  }

  .wf-popup-preview--06 .wf-popup-video-time {
    font-size: 0.8125rem;
    color: rgba(255, 255, 255, 0.6);
  }

  @media (max-width: 600px) {
    .wf-popup-preview--06 .wf-popup-play {
      width: 56px;
      height: 56px;
    }
    .wf-popup-preview--06 .wf-popup-play svg {
      width: 22px;
      height: 22px;
    }
  }
</style>

<div class="wf-popup-preview wf-popup-preview--06">
  <div class="wf-popup-box">
    <button class="popup__close" data-popup-close aria-label="Fermer">
      <span data-icon="x-mark" data-icon-type="outline" data-icon-size="24"></span>
    </button>
    <div class="wf-popup-video">
      <button class="wf-popup-play" aria-label="Lire la vidéo">
        <span data-icon="play" data-icon-type="outline" data-icon-size="24"></span>
      </button>
      <div class="wf-popup-video-bar">
        <span class="wf-popup-video-title">Presentation du projet</span>
        <span class="wf-popup-video-time">2:34</span>
      </div>
    </div>
  </div>
</div>
