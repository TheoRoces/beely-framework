<!-- popup-05.html | Success / Thank You Popup | Wireframe -->
<style>
  .wf-popup-preview--05 {
    --popup-bg: var(--color-bg);
    --popup-overlay: rgba(0, 0, 0, 0.55);
    --popup-radius: 12px;
    --popup-padding: 2.5rem;
    --popup-max-width: 420px;
    --popup-text: var(--color-text);
    --popup-muted: var(--color-text-light);
    --popup-border: var(--color-border);
    --popup-accent: var(--color-text);
    --popup-accent-text: var(--color-bg);
    --popup-success: var(--color-text);

    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 500px;
    background: var(--popup-overlay);
    padding: 1.5rem;
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-popup-preview--05 .wf-popup-box {
    background: var(--popup-bg);
    border-radius: var(--popup-radius);
    padding: var(--popup-padding);
    max-width: var(--popup-max-width);
    width: 100%;
    position: relative;
    box-shadow: var(--shadow-xl);
    text-align: center;
  }

  .wf-popup-preview--05 .wf-popup-check {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--color-bg-alt);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
  }

  .wf-popup-preview--05 .wf-popup-check svg {
    width: 32px;
    height: 32px;
    color: var(--popup-success);
  }

  .wf-popup-preview--05 .wf-popup-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--popup-text);
    margin: 0 0 0.75rem 0;
    line-height: 1.3;
  }

  .wf-popup-preview--05 .wf-popup-desc {
    font-size: 0.9375rem;
    color: var(--popup-muted);
    line-height: 1.6;
    margin: 0 0 2rem 0;
  }

  @media (max-width: 480px) {
    .wf-popup-preview--05 .wf-popup-box {
      padding: 1.5rem;
    }
  }
</style>

<div class="wf-popup-preview wf-popup-preview--05">
  <div class="wf-popup-box">
    <button class="popup__close" data-popup-close aria-label="Fermer">
      <span data-icon="x-mark" data-icon-type="outline" data-icon-size="24"></span>
    </button>
    <div class="wf-popup-check">
      <span data-icon="check" data-icon-type="outline" data-icon-size="24"></span>
    </div>
    <h2 class="wf-popup-title">Merci !</h2>
    <p class="wf-popup-desc">Votre inscription a bien ete prise en compte. Vous recevrez bientot un email de confirmation dans votre boite mail.</p>
    <button class="btn btn--primary">Fermer</button>
  </div>
</div>
