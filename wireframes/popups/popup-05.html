<!-- popup-05.html | Success / Thank You Popup | Wireframe -->
<style>
  .wf-popup-preview--05 {
    --popup-bg: var(--color-bg);
    --popup-overlay: rgba(0, 0, 0, 0.55);
    --popup-radius: 12px;
    --popup-padding: 2.5rem;
    --popup-max-width: 420px;
    --popup-text: var(--color-text);
    --popup-muted: var(--color-text-light);
    --popup-border: var(--color-border);
    --popup-accent: var(--color-text);
    --popup-accent-text: var(--color-bg);
    --popup-success: var(--color-text);

    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 500px;
    background: var(--popup-overlay);
    padding: 1.5rem;
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-popup-preview--05 .wf-popup-box {
    background: var(--popup-bg);
    border-radius: var(--popup-radius);
    padding: var(--popup-padding);
    max-width: var(--popup-max-width);
    width: 100%;
    position: relative;
    box-shadow: var(--shadow-xl);
    text-align: center;
  }

  .wf-popup-preview--05 .wf-popup-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: none;
    border: 1px solid var(--popup-border);
    border-radius: 50%;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--popup-muted);
  }

  .wf-popup-preview--05 .wf-popup-check {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--color-bg-alt);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
  }

  .wf-popup-preview--05 .wf-popup-check svg {
    width: 32px;
    height: 32px;
    color: var(--popup-success);
  }

  .wf-popup-preview--05 .wf-popup-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--popup-text);
    margin: 0 0 0.75rem 0;
    line-height: 1.3;
  }

  .wf-popup-preview--05 .wf-popup-desc {
    font-size: 0.9375rem;
    color: var(--popup-muted);
    line-height: 1.6;
    margin: 0 0 2rem 0;
  }

  .wf-popup-preview--05 .wf-popup-btn {
    display: inline-block;
    padding: 0.8125rem 2rem;
    background: var(--popup-accent);
    color: var(--popup-accent-text);
    border: none;
    border-radius: var(--radius-md, 0.5rem);
    font-size: 0.9375rem;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
  }

  @media (max-width: 480px) {
    .wf-popup-preview--05 .wf-popup-box {
      padding: 1.5rem;
    }
  }
</style>

<div class="wf-popup-preview wf-popup-preview--05">
  <div class="wf-popup-box">
    <button class="wf-popup-close" aria-label="Fermer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <div class="wf-popup-check">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
    </div>
    <h2 class="wf-popup-title">Merci !</h2>
    <p class="wf-popup-desc">Votre inscription a bien ete prise en compte. Vous recevrez bientot un email de confirmation dans votre boite mail.</p>
    <button class="wf-popup-btn">Fermer</button>
  </div>
</div>
