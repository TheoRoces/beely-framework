<!-- popup-03.html | Image + Text Side by Side Popup | Wireframe -->
<style>
  .wf-popup-preview--03 {
    --popup-bg: var(--color-bg);
    --popup-overlay: rgba(0, 0, 0, 0.55);
    --popup-radius: 12px;
    --popup-max-width: 720px;
    --popup-text: var(--color-text);
    --popup-muted: var(--color-text-light);
    --popup-border: var(--color-border);
    --popup-accent: var(--color-text);
    --popup-accent-text: var(--color-bg);
    --popup-placeholder: var(--color-border);

    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 500px;
    background: var(--popup-overlay);
    padding: 1.5rem;
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-popup-preview--03 .wf-popup-box {
    background: var(--popup-bg);
    border-radius: var(--popup-radius);
    max-width: var(--popup-max-width);
    width: 100%;
    position: relative;
    box-shadow: var(--shadow-xl);
    overflow: hidden;
  }

  .wf-popup-preview--03 .wf-popup-image {
    background: var(--popup-placeholder);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 340px;
  }

  .wf-popup-preview--03 .wf-popup-image svg {
    width: 48px;
    height: 48px;
    color: var(--color-text-light);
  }

  .wf-popup-preview--03 .wf-popup-content {
    padding: 2.5rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .wf-popup-preview--03 .wf-popup-tag {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--popup-muted);
    margin-bottom: 0.75rem;
  }

  .wf-popup-preview--03 .wf-popup-title {
    font-size: 1.375rem;
    font-weight: 700;
    color: var(--popup-text);
    margin: 0 0 0.75rem 0;
    line-height: 1.3;
  }

  .wf-popup-preview--03 .wf-popup-desc {
    font-size: 0.9375rem;
    color: var(--popup-muted);
    line-height: 1.6;
    margin: 0 0 1.5rem 0;
  }

  @media (max-width: 600px) {
        .wf-popup-preview--03 .wf-popup-image {
      min-height: 180px;
    }
    .wf-popup-preview--03 .wf-popup-content {
      padding: 1.5rem;
    }
  }
</style>

<div class="wf-popup-preview wf-popup-preview--03 grid" data-cols="2" data-gap="md">
  <div class="wf-popup-box grid" data-cols="2" data-gap="md">
    <button class="popup__close" data-popup-close aria-label="Fermer">
      <span data-icon="x-mark" data-icon-type="outline" data-icon-size="24"></span>
    </button>
    <div class="wf-popup-image">
      <span data-icon="photo" data-icon-type="outline" data-icon-size="18" style="opacity:0.3"></span>
    </div>
    <div class="wf-popup-content">
      <span class="wf-popup-tag">Découverte</span>
      <h2 class="wf-popup-title">Explorez notre nouvelle collection</h2>
      <p class="wf-popup-desc">Découvrez des pieces uniques selectionnees avec soin pour vous inspirer au quotidien.</p>
      <button class="btn btn--primary">En savoir plus</button>
    </div>
  </div>
</div>
