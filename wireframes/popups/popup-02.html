<!-- popup-02.html | Cookie Consent Popup | Wireframe -->
<style>
  .wf-popup-preview--02 {
    --popup-bg: var(--color-bg);
    --popup-overlay: rgba(0, 0, 0, 0.55);
    --popup-radius: 12px;
    --popup-padding: 2rem;
    --popup-max-width: 520px;
    --popup-text: var(--color-text);
    --popup-muted: var(--color-text-light);
    --popup-border: var(--color-border);
    --popup-accent: var(--color-text);
    --popup-accent-text: var(--color-bg);

    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    min-height: 500px;
    background: var(--popup-overlay);
    padding: 1.5rem;
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-popup-preview--02 .wf-popup-box {
    background: var(--popup-bg);
    border-radius: var(--popup-radius);
    padding: var(--popup-padding);
    max-width: var(--popup-max-width);
    width: 100%;
    position: relative;
    box-shadow: var(--shadow-xl);
  }

  .wf-popup-preview--02 .wf-popup-icon {
    width: 40px;
    height: 40px;
    margin-bottom: 1rem;
    font-size: 2rem;
    line-height: 1;
  }

  .wf-popup-preview--02 .wf-popup-title {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--popup-text);
    margin: 0 0 0.5rem 0;
    line-height: 1.3;
  }

  .wf-popup-preview--02 .wf-popup-desc {
    font-size: 0.9375rem;
    color: var(--popup-muted);
    line-height: 1.6;
    margin: 0 0 1.5rem 0;
  }

  .wf-popup-preview--02 .wf-popup-desc a {
    color: var(--popup-text);
    text-decoration: underline;
  }

  .wf-popup-preview--02 .wf-popup-actions {
    display: flex;
    gap: 0.75rem;
  }

  .wf-popup-preview--02 .wf-popup-btn--primary {
    background: var(--popup-accent);
    color: var(--popup-accent-text);
  }

  .wf-popup-preview--02 .wf-popup-btn--secondary {
    background: none;
    color: var(--popup-text);
    border: 1px solid var(--popup-border);
  }

  @media (max-width: 480px) {
    .wf-popup-preview--02 .wf-popup-actions {
      flex-direction: column;
    }
  }
</style>

<div class="wf-popup-preview wf-popup-preview--02">
  <div class="wf-popup-box">
    <button class="popup__close" data-popup-close aria-label="Fermer">
      <span data-icon="x-mark" data-icon-type="outline" data-icon-size="24"></span>
    </button>
    <div class="wf-popup-icon">🍪</div>
    <h2 class="wf-popup-title">Accepter les cookies</h2>
    <p class="wf-popup-desc">Nous utilisons des cookies pour améliorer votre expérience de navigation et analyser le trafic du site. En savoir plus dans notre <a href="#">politique de confidentialité</a>.</p>
    <div class="wf-popup-actions">
      <button class="btn btn--primary">Accepter</button>
      <button class="btn btn--secondary">Refuser</button>
    </div>
  </div>
</div>
