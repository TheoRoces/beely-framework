<!-- popup-11.html | Exit Intent Popup | Wireframe -->
<style>
  .wf-popup-preview--11 {
    --popup-bg: var(--color-bg);
    --popup-overlay: rgba(0, 0, 0, 0.55);
    --popup-radius: 12px;
    --popup-max-width: 580px;
    --popup-text: var(--color-text);
    --popup-muted: var(--color-text-light);
    --popup-border: var(--color-border);
    --popup-accent: var(--color-text);
    --popup-accent-text: var(--color-bg);
    --popup-input-bg: var(--color-bg-alt);
    --popup-highlight: var(--color-bg-alt);

    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 500px;
    background: var(--popup-overlay);
    padding: 1.5rem;
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-popup-preview--11 .wf-popup-box {
    background: var(--popup-bg);
    border-radius: var(--popup-radius);
    max-width: var(--popup-max-width);
    width: 100%;
    position: relative;
    box-shadow: var(--shadow-xl);
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
  }

  .wf-popup-preview--11 .wf-popup-visual {
    background: var(--popup-highlight);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2.5rem;
    gap: 1.25rem;
  }

  .wf-popup-preview--11 .wf-popup-visual-icon {
    width: 56px;
    height: 56px;
    color: var(--popup-text);
  }

  .wf-popup-preview--11 .wf-popup-visual-text {
    font-size: 2rem;
    font-weight: 800;
    color: var(--popup-text);
    text-align: center;
    line-height: 1.15;
    letter-spacing: -0.02em;
  }

  .wf-popup-preview--11 .wf-popup-visual-sub {
    font-size: 0.9375rem;
    color: var(--popup-muted);
    text-align: center;
  }

  .wf-popup-preview--11 .wf-popup-content {
    padding: 2.5rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .wf-popup-preview--11 .wf-popup-title {
    font-size: 1.375rem;
    font-weight: 700;
    color: var(--popup-text);
    margin: 0 0 0.5rem 0;
    line-height: 1.3;
  }

  .wf-popup-preview--11 .wf-popup-desc {
    font-size: 0.9375rem;
    color: var(--popup-muted);
    line-height: 1.6;
    margin: 0 0 1.5rem 0;
  }

  .wf-popup-preview--11 .wf-popup-form {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .wf-popup-preview--11 .wf-popup-skip {
    font-size: 0.8125rem;
    color: var(--popup-muted);
    text-align: center;
    margin-top: 0.75rem;
    cursor: pointer;
    text-decoration: underline;
  }

  @media (max-width: 600px) {
    .wf-popup-preview--11 .wf-popup-box {
      grid-template-columns: 1fr;
    }
    .wf-popup-preview--11 .wf-popup-visual {
      padding: 1.5rem;
    }
    .wf-popup-preview--11 .wf-popup-content {
      padding: 1.5rem;
    }
  }
</style>

<div class="wf-popup-preview wf-popup-preview--11">
  <div class="wf-popup-box">
    <button class="popup__close" data-popup-close aria-label="Fermer">
      <span data-icon="x-mark" data-icon-type="outline" data-icon-size="24"></span>
    </button>
    <div class="wf-popup-visual">
      <span data-icon="heart" data-icon-type="outline" data-icon-size="24"></span>
      <p class="wf-popup-visual-text">-15%</p>
      <p class="wf-popup-visual-sub">Offre exclusive</p>
    </div>
    <div class="wf-popup-content">
      <h2 class="wf-popup-title">Avant de partir...</h2>
      <p class="wf-popup-desc">Profitez de 15% de reduction sur votre première commande. Inscrivez-vous maintenant !</p>
      <form class="wf-popup-form">
        <input type="email" class="form__input" placeholder="Votre email" />
        <button type="submit" class="btn btn--primary">S'inscrire</button>
      </form>
      <p class="wf-popup-skip">Non merci, je prefere payer plein tarif</p>
    </div>
  </div>
</div>
