<!-- popup-15.html | Bottom Sheet Popup (Mobile-style) | Wireframe -->
<style>
  .wf-popup-preview--15 {
    --popup-bg: var(--color-bg);
    --popup-overlay: rgba(0, 0, 0, 0.45);
    --popup-radius: 20px 20px 0 0;
    --popup-padding: 1.5rem;
    --popup-text: var(--color-text);
    --popup-muted: var(--color-text-light);
    --popup-border: var(--color-border);
    --popup-accent: var(--color-text);
    --popup-accent-text: var(--color-bg);

    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    min-height: 600px;
    max-width: 420px;
    margin: 0 auto;
    background: var(--popup-overlay);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-popup-preview--15 .wf-popup-box {
    background: var(--popup-bg);
    border-radius: var(--popup-radius);
    padding: var(--popup-padding);
    padding-bottom: 2rem;
    width: 100%;
    position: relative;
    box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.1);
  }

  .wf-popup-preview--15 .wf-popup-handle {
    width: 36px;
    height: 4px;
    background: var(--popup-border);
    border-radius: 100px;
    margin: 0 auto 1.25rem;
  }

  .wf-popup-preview--15 .wf-popup-title {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--popup-text);
    margin: 0 0 0.375rem 0;
    line-height: 1.3;
  }

  .wf-popup-preview--15 .wf-popup-desc {
    font-size: 0.9375rem;
    color: var(--popup-muted);
    line-height: 1.6;
    margin: 0 0 1.5rem 0;
  }

  .wf-popup-preview--15 .wf-popup-options {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .wf-popup-preview--15 .wf-popup-option {
    display: flex;
    align-items: center;
    gap: 0.875rem;
    padding: 0.875rem 1rem;
    border: 1px solid var(--popup-border);
    border-radius: var(--radius-lg, 0.75rem);
    cursor: pointer;
    background: none;
    text-align: left;
    width: 100%;
    box-sizing: border-box;
  }

  .wf-popup-preview--15 .wf-popup-option--active {
    border-color: var(--popup-accent);
    background: var(--color-bg-alt);
  }

  .wf-popup-preview--15 .wf-popup-option-icon {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-lg, 0.75rem);
    background: var(--color-bg-alt);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .wf-popup-preview--15 .wf-popup-option-icon svg {
    width: 20px;
    height: 20px;
    color: var(--popup-text);
  }

  .wf-popup-preview--15 .wf-popup-option-content {
    flex: 1;
    min-width: 0;
  }

  .wf-popup-preview--15 .wf-popup-option-title {
    font-size: 0.9375rem;
    font-weight: 600;
    color: var(--popup-text);
    margin: 0;
  }

  .wf-popup-preview--15 .wf-popup-option-desc {
    font-size: 0.8125rem;
    color: var(--popup-muted);
    margin: 0.125rem 0 0 0;
  }

  .wf-popup-preview--15 .wf-popup-option-arrow {
    width: 16px;
    height: 16px;
    color: var(--popup-muted);
    flex-shrink: 0;
  }

</style>

<div class="wf-popup-preview wf-popup-preview--15">
  <div class="wf-popup-box">
    <div class="wf-popup-handle"></div>
    <button class="popup__close" data-popup-close aria-label="Fermer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <h2 class="wf-popup-title">Partager</h2>
    <p class="wf-popup-desc">Choisissez comment partager ce contenu.</p>
    <div class="wf-popup-options">
      <button class="wf-popup-option wf-popup-option--active">
        <span class="wf-popup-option-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 0 1 1.242 7.244l-4.5 4.5a4.5 4.5 0 0 1-6.364-6.364l1.757-1.757m9.86-2.54a4.5 4.5 0 0 0-1.242-7.244l4.5-4.5a4.5 4.5 0 1 0-6.364 6.364L9.11 8.688"/></svg>
        </span>
        <span class="wf-popup-option-content">
          <p class="wf-popup-option-title">Copier le lien</p>
          <p class="wf-popup-option-desc">Partager via un lien direct</p>
        </span>
        <svg class="wf-popup-option-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
      </button>
      <button class="wf-popup-option">
        <span class="wf-popup-option-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/></svg>
        </span>
        <span class="wf-popup-option-content">
          <p class="wf-popup-option-title">Email</p>
          <p class="wf-popup-option-desc">Envoyer par email</p>
        </span>
        <svg class="wf-popup-option-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
      </button>
      <button class="wf-popup-option">
        <span class="wf-popup-option-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M7.217 10.907a2.25 2.25 0 1 0 0 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186 9.566-5.314m-9.566 7.5 9.566 5.314m0 0a2.25 2.25 0 1 0 3.935 2.186 2.25 2.25 0 0 0-3.935-2.186Zm0-12.814a2.25 2.25 0 1 0 3.933-2.185 2.25 2.25 0 0 0-3.933 2.185Z"/></svg>
        </span>
        <span class="wf-popup-option-content">
          <p class="wf-popup-option-title">Reseaux sociaux</p>
          <p class="wf-popup-option-desc">Partager sur les réseaux</p>
        </span>
        <svg class="wf-popup-option-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
      </button>
    </div>
    <button class="btn btn--primary">Confirmer</button>
  </div>
</div>
