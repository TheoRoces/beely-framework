<!-- popup-15.html | Bottom Sheet Popup (Mobile-style) | Wireframe -->
<style>
  .wf-popup-preview--15 {
    --popup-bg: var(--color-bg);
    --popup-overlay: rgba(0, 0, 0, 0.45);
    --popup-radius: 20px 20px 0 0;
    --popup-padding: 1.5rem;
    --popup-text: var(--color-text);
    --popup-muted: var(--color-text-light);
    --popup-border: var(--color-border);
    --popup-accent: var(--color-text);
    --popup-accent-text: var(--color-bg);

    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    min-height: 600px;
    max-width: 420px;
    margin: 0 auto;
    background: var(--popup-overlay);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-popup-preview--15 .wf-popup-box {
    background: var(--popup-bg);
    border-radius: var(--popup-radius);
    padding: var(--popup-padding);
    padding-bottom: 2rem;
    width: 100%;
    position: relative;
    box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.1);
  }

  .wf-popup-preview--15 .wf-popup-handle {
    width: 36px;
    height: 4px;
    background: var(--popup-border);
    border-radius: var(--radius-full, 100px);
    margin: 0 auto 1.25rem;
  }

  .wf-popup-preview--15 .wf-popup-title {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--popup-text);
    margin: 0 0 0.375rem 0;
    line-height: 1.3;
  }

  .wf-popup-preview--15 .wf-popup-desc {
    font-size: 0.9375rem;
    color: var(--popup-muted);
    line-height: 1.6;
    margin: 0 0 1.5rem 0;
  }

  .wf-popup-preview--15 .wf-popup-options {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .wf-popup-preview--15 .wf-popup-option {
    display: flex;
    align-items: center;
    gap: 0.875rem;
    padding: 0.875rem 1rem;
    border: 1px solid var(--popup-border);
    border-radius: var(--radius-lg, 0.75rem);
    cursor: pointer;
    background: none;
    text-align: left;
    width: 100%;
    box-sizing: border-box;
  }

  .wf-popup-preview--15 .wf-popup-option--active {
    border-color: var(--popup-accent);
    background: var(--color-bg-alt);
  }

  .wf-popup-preview--15 .wf-popup-option-icon {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-lg, 0.75rem);
    background: var(--color-bg-alt);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .wf-popup-preview--15 .wf-popup-option-icon svg {
    width: 20px;
    height: 20px;
    color: var(--popup-text);
  }

  .wf-popup-preview--15 .wf-popup-option-content {
    flex: 1;
    min-width: 0;
  }

  .wf-popup-preview--15 .wf-popup-option-title {
    font-size: 0.9375rem;
    font-weight: 600;
    color: var(--popup-text);
    margin: 0;
  }

  .wf-popup-preview--15 .wf-popup-option-desc {
    font-size: 0.8125rem;
    color: var(--popup-muted);
    margin: 0.125rem 0 0 0;
  }

  .wf-popup-preview--15 .wf-popup-option-arrow {
    width: 16px;
    height: 16px;
    color: var(--popup-muted);
    flex-shrink: 0;
  }

</style>

<div class="wf-popup-preview wf-popup-preview--15">
  <div class="wf-popup-box">
    <div class="wf-popup-handle"></div>
    <button class="popup__close" data-popup-close aria-label="Fermer">
      <span data-icon="x-mark" data-icon-type="outline" data-icon-size="24"></span>
    </button>
    <h2 class="wf-popup-title">Partager</h2>
    <p class="wf-popup-desc">Choisissez comment partager ce contenu.</p>
    <div class="wf-popup-options">
      <button class="wf-popup-option wf-popup-option--active">
        <span class="wf-popup-option-icon">
          <span data-icon="link" data-icon-type="outline" data-icon-size="24"></span>
        </span>
        <span class="wf-popup-option-content">
          <p class="wf-popup-option-title">Copier le lien</p>
          <p class="wf-popup-option-desc">Partager via un lien direct</p>
        </span>
        <span data-icon="chevron-right" data-icon-type="outline" data-icon-size="24"></span>
      </button>
      <button class="wf-popup-option">
        <span class="wf-popup-option-icon">
          <span data-icon="envelope" data-icon-type="outline" data-icon-size="24"></span>
        </span>
        <span class="wf-popup-option-content">
          <p class="wf-popup-option-title">Email</p>
          <p class="wf-popup-option-desc">Envoyer par email</p>
        </span>
        <span data-icon="chevron-right" data-icon-type="outline" data-icon-size="24"></span>
      </button>
      <button class="wf-popup-option">
        <span class="wf-popup-option-icon">
          <span data-icon="adjustments-horizontal" data-icon-type="outline" data-icon-size="24"></span>
        </span>
        <span class="wf-popup-option-content">
          <p class="wf-popup-option-title">Reseaux sociaux</p>
          <p class="wf-popup-option-desc">Partager sur les réseaux</p>
        </span>
        <span data-icon="chevron-right" data-icon-type="outline" data-icon-size="24"></span>
      </button>
    </div>
    <button class="btn btn--primary">Confirmer</button>
  </div>
</div>
