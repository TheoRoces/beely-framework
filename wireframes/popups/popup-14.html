<!-- popup-14.html | Announcement Popup (New Feature) | Wireframe -->
<style>
  .wf-popup-preview--14 {
    --popup-bg: var(--color-bg);
    --popup-overlay: rgba(0, 0, 0, 0.55);
    --popup-radius: 12px;
    --popup-padding: 2.5rem;
    --popup-max-width: 480px;
    --popup-text: var(--color-text);
    --popup-muted: var(--color-text-light);
    --popup-border: var(--color-border);
    --popup-accent: var(--color-text);
    --popup-accent-text: var(--color-bg);
    --popup-placeholder: var(--color-neutral-100);

    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 560px;
    background: var(--popup-overlay);
    padding: 1.5rem;
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-popup-preview--14 .wf-popup-box {
    background: var(--popup-bg);
    border-radius: var(--popup-radius);
    max-width: var(--popup-max-width);
    width: 100%;
    position: relative;
    box-shadow: var(--shadow-xl);
    overflow: hidden;
  }

  .wf-popup-preview--14 .wf-popup-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: var(--popup-bg);
    border: 1px solid var(--popup-border);
    border-radius: 50%;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--popup-muted);
    z-index: 1;
  }

  .wf-popup-preview--14 .wf-popup-image {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: var(--popup-placeholder);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wf-popup-preview--14 .wf-popup-image svg {
    width: 48px;
    height: 48px;
    color: var(--color-text-light);
  }

  .wf-popup-preview--14 .wf-popup-body {
    padding: var(--popup-padding);
  }

  .wf-popup-preview--14 .wf-popup-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    background: var(--color-neutral-100);
    color: var(--color-neutral-800);
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    padding: 0.3125rem 0.75rem;
    border-radius: 100px;
    margin-bottom: 1rem;
  }

  .wf-popup-preview--14 .wf-popup-badge-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--color-bg-dark);
  }

  .wf-popup-preview--14 .wf-popup-title {
    font-size: 1.375rem;
    font-weight: 700;
    color: var(--popup-text);
    margin: 0 0 0.625rem 0;
    line-height: 1.3;
  }

  .wf-popup-preview--14 .wf-popup-desc {
    font-size: 0.9375rem;
    color: var(--popup-muted);
    line-height: 1.6;
    margin: 0 0 1rem 0;
  }

  .wf-popup-preview--14 .wf-popup-features {
    list-style: none;
    padding: 0;
    margin: 0 0 1.75rem 0;
    display: flex;
    flex-direction: column;
    gap: 0.625rem;
  }

  .wf-popup-preview--14 .wf-popup-feature {
    display: flex;
    align-items: center;
    gap: 0.625rem;
    font-size: 0.9375rem;
    color: var(--popup-text);
  }

  .wf-popup-preview--14 .wf-popup-feature-icon {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--color-bg-alt);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .wf-popup-preview--14 .wf-popup-feature-icon svg {
    width: 12px;
    height: 12px;
    color: var(--color-text);
  }

  .wf-popup-preview--14 .wf-popup-actions {
    display: flex;
    gap: 0.75rem;
  }

  .wf-popup-preview--14 .wf-popup-btn {
    flex: 1;
    padding: 0.8125rem 1.25rem;
    border-radius: var(--radius-md, 0.5rem);
    font-size: 0.9375rem;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    border: none;
  }

  .wf-popup-preview--14 .wf-popup-btn--primary {
    background: var(--popup-accent);
    color: var(--popup-accent-text);
  }

  .wf-popup-preview--14 .wf-popup-btn--secondary {
    background: none;
    color: var(--popup-text);
    border: 1px solid var(--popup-border);
  }

  @media (max-width: 480px) {
    .wf-popup-preview--14 .wf-popup-body {
      padding: 1.5rem;
    }
    .wf-popup-preview--14 .wf-popup-actions {
      flex-direction: column;
    }
  }
</style>

<div class="wf-popup-preview wf-popup-preview--14">
  <div class="wf-popup-box">
    <button class="wf-popup-close" aria-label="Fermer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <div class="wf-popup-image">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
    </div>
    <div class="wf-popup-body">
      <span class="wf-popup-badge"><span class="wf-popup-badge-dot"></span>Nouveau !</span>
      <h2 class="wf-popup-title">Découvrez notre nouvelle fonctionnalite</h2>
      <p class="wf-popup-desc">Nous avons ajoute des outils puissants pour simplifier votre quotidien.</p>
      <ul class="wf-popup-features">
        <li class="wf-popup-feature">
          <span class="wf-popup-feature-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg></span>
          Tableau de bord repense
        </li>
        <li class="wf-popup-feature">
          <span class="wf-popup-feature-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg></span>
          Rapports en temps reel
        </li>
        <li class="wf-popup-feature">
          <span class="wf-popup-feature-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg></span>
          Collaboration amelioree
        </li>
      </ul>
      <div class="wf-popup-actions">
        <button class="wf-popup-btn wf-popup-btn--primary">Découvrir</button>
        <button class="wf-popup-btn wf-popup-btn--secondary">Plus tard</button>
      </div>
    </div>
  </div>
</div>
