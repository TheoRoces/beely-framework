<!-- popup-01.html | Newsletter Signup Popup | Wireframe -->
<style>
  .wf-popup-preview--01 {
    --popup-bg: var(--color-bg);
    --popup-overlay: rgba(0, 0, 0, 0.55);
    --popup-radius: 12px;
    --popup-padding: 2.5rem;
    --popup-max-width: 480px;
    --popup-text: var(--color-text);
    --popup-muted: var(--color-text-light);
    --popup-border: var(--color-border);
    --popup-accent: var(--color-text);
    --popup-accent-text: var(--color-bg);
    --popup-input-bg: var(--color-bg-alt);

    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 500px;
    background: var(--popup-overlay);
    padding: 1.5rem;
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-popup-preview--01 .wf-popup-box {
    background: var(--popup-bg);
    border-radius: var(--popup-radius);
    padding: var(--popup-padding);
    max-width: var(--popup-max-width);
    width: 100%;
    position: relative;
    box-shadow: var(--shadow-xl);
  }

  .wf-popup-preview--01 .wf-popup-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: none;
    border: 1px solid var(--popup-border);
    border-radius: 50%;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--popup-muted);
  }

  .wf-popup-preview--01 .wf-popup-tag {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--popup-muted);
    margin-bottom: 0.75rem;
  }

  .wf-popup-preview--01 .wf-popup-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--popup-text);
    margin: 0 0 0.75rem 0;
    line-height: 1.3;
  }

  .wf-popup-preview--01 .wf-popup-desc {
    font-size: 1rem;
    color: var(--popup-muted);
    line-height: 1.6;
    margin: 0 0 1.5rem 0;
  }

  .wf-popup-preview--01 .wf-popup-form {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .wf-popup-preview--01 .wf-popup-input {
    width: 100%;
    padding: 0.875rem 1rem;
    border: 1px solid var(--popup-border);
    border-radius: var(--radius-md, 0.5rem);
    font-size: 0.9375rem;
    background: var(--popup-input-bg);
    color: var(--popup-text);
    box-sizing: border-box;
  }

  .wf-popup-preview--01 .wf-popup-btn {
    width: 100%;
    padding: 0.875rem 1rem;
    background: var(--popup-accent);
    color: var(--popup-accent-text);
    border: none;
    border-radius: var(--radius-md, 0.5rem);
    font-size: 0.9375rem;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
  }

  .wf-popup-preview--01 .wf-popup-note {
    font-size: 0.8125rem;
    color: var(--popup-muted);
    text-align: center;
    margin-top: 0.75rem;
  }

  @media (max-width: 480px) {
    .wf-popup-preview--01 .wf-popup-box {
      padding: 1.5rem;
    }
    .wf-popup-preview--01 .wf-popup-title {
      font-size: 1.25rem;
    }
  }
</style>

<div class="wf-popup-preview wf-popup-preview--01">
  <div class="wf-popup-box">
    <button class="wf-popup-close" aria-label="Fermer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <span class="wf-popup-tag">Newsletter</span>
    <h2 class="wf-popup-title">Inscrivez-vous a notre newsletter</h2>
    <p class="wf-popup-desc">Recevez nos dernières actualites et offres exclusives directement dans votre boite mail.</p>
    <form class="wf-popup-form">
      <input type="email" class="wf-popup-input" placeholder="Votre email" />
      <button type="submit" class="wf-popup-btn">S'inscrire</button>
    </form>
    <p class="wf-popup-note">Aucun spam. Desabonnez-vous a tout moment.</p>
  </div>
</div>
