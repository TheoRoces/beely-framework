<!-- popup-12.html | Image Gallery / Lightbox Popup | Wireframe -->
<style>
  .wf-popup-preview--12 {
    --popup-overlay: rgba(0, 0, 0, 0.88);
    --popup-radius: 8px;
    --popup-max-width: 800px;
    --popup-text: var(--color-bg);
    --popup-muted: rgba(255, 255, 255, 0.55);
    --popup-border: rgba(255, 255, 255, 0.12);
    --popup-placeholder: var(--color-bg-dark);

    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 560px;
    background: var(--popup-overlay);
    padding: 1.5rem;
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-popup-preview--12 .wf-popup-close {
    position: absolute;
    top: 1.25rem;
    right: 1.25rem;
    background: none;
    border: 1px solid var(--popup-border);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--popup-muted);
    z-index: 2;
  }

  .wf-popup-preview--12 .wf-popup-box {
    max-width: var(--popup-max-width);
    width: 100%;
  }

  .wf-popup-preview--12 .wf-popup-main-image {
    width: 100%;
    aspect-ratio: 16 / 10;
    background: var(--popup-placeholder);
    border-radius: var(--popup-radius);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    margin-bottom: 1rem;
  }

  .wf-popup-preview--12 .wf-popup-main-image svg {
    width: 48px;
    height: 48px;
    color: rgba(255, 255, 255, 0.3);
  }

  .wf-popup-preview--12 .wf-popup-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid var(--popup-border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--popup-muted);
    backdrop-filter: blur(4px);
  }

  .wf-popup-preview--12 .wf-popup-nav--prev {
    left: 1rem;
  }

  .wf-popup-preview--12 .wf-popup-nav--next {
    right: 1rem;
  }

  .wf-popup-preview--12 .wf-popup-nav svg {
    width: 20px;
    height: 20px;
  }

  .wf-popup-preview--12 .wf-popup-thumbs {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
  }

  .wf-popup-preview--12 .wf-popup-thumb {
    width: 64px;
    height: 48px;
    background: var(--popup-placeholder);
    border-radius: var(--radius-md, 0.5rem);
    border: 2px solid transparent;
    cursor: pointer;
    opacity: 0.5;
  }

  .wf-popup-preview--12 .wf-popup-thumb--active {
    border-color: var(--popup-text);
    opacity: 1;
  }

  .wf-popup-preview--12 .wf-popup-counter {
    text-align: center;
    font-size: 0.8125rem;
    color: var(--popup-muted);
    margin-top: 0.75rem;
  }

  @media (max-width: 600px) {
    .wf-popup-preview--12 .wf-popup-thumb {
      width: 48px;
      height: 36px;
    }
  }
</style>

<div class="wf-popup-preview wf-popup-preview--12">
  <button class="wf-popup-close" aria-label="Fermer">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
  </button>
  <div class="wf-popup-box">
    <div class="wf-popup-main-image">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
      <button class="wf-popup-nav wf-popup-nav--prev" aria-label="Precedent">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
      </button>
      <button class="wf-popup-nav wf-popup-nav--next" aria-label="Suivant">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
      </button>
    </div>
    <div class="wf-popup-thumbs">
      <div class="wf-popup-thumb wf-popup-thumb--active"></div>
      <div class="wf-popup-thumb"></div>
      <div class="wf-popup-thumb"></div>
      <div class="wf-popup-thumb"></div>
      <div class="wf-popup-thumb"></div>
      <div class="wf-popup-thumb"></div>
    </div>
    <p class="wf-popup-counter">1 / 6</p>
  </div>
</div>
