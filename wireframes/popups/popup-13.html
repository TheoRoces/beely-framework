<!-- popup-13.html | Survey / Feedback Popup | Wireframe -->
<style>
  .wf-popup-preview--13 {
    --popup-bg: var(--color-bg);
    --popup-overlay: rgba(0, 0, 0, 0.55);
    --popup-radius: 12px;
    --popup-padding: 2.5rem;
    --popup-max-width: 480px;
    --popup-text: var(--color-text);
    --popup-muted: var(--color-text-light);
    --popup-border: var(--color-border);
    --popup-accent: var(--color-text);
    --popup-accent-text: var(--color-bg);
    --popup-input-bg: var(--color-bg-alt);
    --popup-star: var(--color-text-light);
    --popup-star-empty: var(--color-neutral-300);

    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 560px;
    background: var(--popup-overlay);
    padding: 1.5rem;
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-popup-preview--13 .wf-popup-box {
    background: var(--popup-bg);
    border-radius: var(--popup-radius);
    padding: var(--popup-padding);
    max-width: var(--popup-max-width);
    width: 100%;
    position: relative;
    box-shadow: var(--shadow-xl);
  }

  .wf-popup-preview--13 .wf-popup-title {
    font-size: 1.375rem;
    font-weight: 700;
    color: var(--popup-text);
    margin: 0 0 0.375rem 0;
    line-height: 1.3;
  }

  .wf-popup-preview--13 .wf-popup-desc {
    font-size: 0.9375rem;
    color: var(--popup-muted);
    line-height: 1.6;
    margin: 0 0 1.5rem 0;
  }

  .wf-popup-preview--13 .wf-popup-rating-label {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--popup-text);
    margin-bottom: 0.625rem;
    display: block;
  }

  .wf-popup-preview--13 .wf-popup-stars {
    display: flex;
    gap: 0.375rem;
    margin-bottom: 1.5rem;
  }

  .wf-popup-preview--13 .wf-popup-star {
    width: 32px;
    height: 32px;
    cursor: pointer;
  }

  .wf-popup-preview--13 .wf-popup-star--filled {
    color: var(--popup-star);
  }

  .wf-popup-preview--13 .wf-popup-star--empty {
    color: var(--popup-star-empty);
  }

  .wf-popup-preview--13 .wf-popup-field-label {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--popup-text);
    margin-bottom: 0.5rem;
    display: block;
  }

  .wf-popup-preview--13 .wf-popup-actions {
    display: flex;
    gap: 0.75rem;
    justify-content: flex-end;
  }

  .wf-popup-preview--13 .wf-popup-btn--primary {
    background: var(--popup-accent);
    color: var(--popup-accent-text);
  }

  .wf-popup-preview--13 .wf-popup-btn--secondary {
    background: none;
    color: var(--popup-text);
    border: 1px solid var(--popup-border);
  }

  @media (max-width: 480px) {
    .wf-popup-preview--13 .wf-popup-box {
      padding: 1.5rem;
    }
    .wf-popup-preview--13 .wf-popup-actions {
      flex-direction: column-reverse;
    }
  }
</style>

<div class="wf-popup-preview wf-popup-preview--13">
  <div class="wf-popup-box">
    <button class="popup__close" data-popup-close aria-label="Fermer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <h2 class="wf-popup-title">Votre avis compte</h2>
    <p class="wf-popup-desc">Aidez-nous a améliorer notre service en partageant votre expérience.</p>
    <span class="wf-popup-rating-label">Quelle note donneriez-vous ?</span>
    <div class="wf-popup-stars">
      <svg class="wf-popup-star wf-popup-star--filled" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <svg class="wf-popup-star wf-popup-star--filled" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <svg class="wf-popup-star wf-popup-star--filled" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <svg class="wf-popup-star wf-popup-star--filled" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <svg class="wf-popup-star wf-popup-star--empty" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    </div>
    <label class="wf-popup-field-label">Commentaire (optionnel)</label>
    <textarea class="form__textarea" placeholder="Partagez vos impressions..."></textarea>
    <div class="wf-popup-actions">
      <button class="btn btn--secondary">Annuler</button>
      <button class="btn btn--primary">Envoyer</button>
    </div>
  </div>
</div>
