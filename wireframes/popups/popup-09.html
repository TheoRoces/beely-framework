<!-- popup-09.html | Full-Screen Overlay Popup | Wireframe -->
<style>
  .wf-popup-preview--09 {
    --popup-bg: var(--color-neutral-900);
    --popup-text: var(--color-bg);
    --popup-muted: rgba(255, 255, 255, 0.55);
    --popup-border: rgba(255, 255, 255, 0.12);
    --popup-accent: var(--color-bg);
    --popup-accent-text: var(--color-neutral-900);
    --popup-input-bg: rgba(255, 255, 255, 0.08);

    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 600px;
    background: var(--popup-bg);
    padding: 2rem;
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  }

  .wf-popup-preview--09 .wf-popup-close {
    position: absolute;
    top: 1.5rem;
    right: 1.5rem;
    background: none;
    border: 1px solid var(--popup-border);
    border-radius: 50%;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--popup-muted);
  }

  .wf-popup-preview--09 .wf-popup-box {
    max-width: 560px;
    width: 100%;
    text-align: center;
  }

  .wf-popup-preview--09 .wf-popup-tag {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--popup-muted);
    margin-bottom: 1.5rem;
    border: 1px solid var(--popup-border);
    padding: 0.375rem 1rem;
    border-radius: 100px;
  }

  .wf-popup-preview--09 .wf-popup-title {
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--popup-text);
    margin: 0 0 1rem 0;
    line-height: 1.15;
    letter-spacing: -0.02em;
  }

  .wf-popup-preview--09 .wf-popup-desc {
    font-size: 1.0625rem;
    color: var(--popup-muted);
    line-height: 1.7;
    margin: 0 auto 2.5rem;
    max-width: 440px;
  }

  .wf-popup-preview--09 .wf-popup-form {
    display: flex;
    gap: 0.75rem;
    max-width: 420px;
    margin: 0 auto;
  }

  .wf-popup-preview--09 .wf-popup-input {
    flex: 1;
    padding: 0.9375rem 1.25rem;
    border: 1px solid var(--popup-border);
    border-radius: var(--radius-md, 0.5rem);
    font-size: 0.9375rem;
    background: var(--popup-input-bg);
    color: var(--popup-text);
    box-sizing: border-box;
  }

  .wf-popup-preview--09 .wf-popup-input::placeholder {
    color: var(--popup-muted);
  }

  .wf-popup-preview--09 .wf-popup-btn {
    padding: 0.9375rem 1.75rem;
    background: var(--popup-accent);
    color: var(--popup-accent-text);
    border: none;
    border-radius: var(--radius-md, 0.5rem);
    font-size: 0.9375rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }

  .wf-popup-preview--09 .wf-popup-note {
    font-size: 0.8125rem;
    color: var(--popup-muted);
    margin-top: 1.25rem;
  }

  @media (max-width: 600px) {
    .wf-popup-preview--09 .wf-popup-title {
      font-size: 1.75rem;
    }
    .wf-popup-preview--09 .wf-popup-form {
      flex-direction: column;
    }
  }
</style>

<div class="wf-popup-preview wf-popup-preview--09">
  <button class="wf-popup-close" aria-label="Fermer">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
  </button>
  <div class="wf-popup-box">
    <span class="wf-popup-tag">Exclusif</span>
    <h2 class="wf-popup-title">Rejoignez notre communaute</h2>
    <p class="wf-popup-desc">Inscrivez-vous a notre newsletter et beneficiez d'un acces anticipe a nos contenus et evenements exclusifs.</p>
    <form class="wf-popup-form">
      <input type="email" class="wf-popup-input" placeholder="Votre email" />
      <button type="submit" class="wf-popup-btn">S'inscrire</button>
    </form>
    <p class="wf-popup-note">Rejoignez plus de 10 000 abonnes.</p>
  </div>
</div>
