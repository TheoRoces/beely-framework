<!-- Banner 02: Promotional Banner with Badge + Text + CTA Button -->
<!-- Colored banner featuring a small badge/tag, descriptive text, and a call-to-action button -->

<style>
  .wf-banner-02 {
    --wf-banner-bg: var(--color-bg-dark);
    --wf-banner-text: var(--color-border);
    --wf-banner-badge-bg: var(--color-text-light);
    --wf-banner-badge-text: var(--color-bg-dark);
    --wf-banner-btn-bg: var(--color-bg);
    --wf-banner-btn-text: var(--color-bg-dark);
    --wf-banner-btn-hover-bg: var(--color-border, #E2E4F0);
    --wf-banner-padding-y: 0.875rem;
    --wf-banner-font-size: 0.9375rem;
    --wf-banner-radius: 0;

    background-color: var(--wf-banner-bg);
    color: var(--wf-banner-text);
    padding: var(--wf-banner-padding-y) 1.5rem;
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    font-size: var(--wf-banner-font-size);
    line-height: 1.5;
    width: 100%;
    border-radius: var(--wf-banner-radius);
  }

  .wf-banner-02__inner {
    max-width: 80rem;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .wf-banner-02__badge {
    display: inline-block;
    background-color: var(--wf-banner-badge-bg);
    color: var(--wf-banner-badge-text);
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 0.2rem 0.625rem;
    border-radius: var(--radius-full, 9999px);
    white-space: nowrap;
  }

  .wf-banner-02__text {
    margin: 0;
    font-weight: 400;
  }

  .wf-banner-02__cta {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    background-color: var(--wf-banner-btn-bg);
    color: var(--wf-banner-btn-text);
    font-size: 0.8125rem;
    font-weight: 600;
    text-decoration: none;
    padding: 0.4rem 1rem;
    border-radius: var(--radius-md, 0.5rem);
    border: none;
    cursor: pointer;
    white-space: nowrap;
    transition: background-color 0.2s ease;
  }

  .wf-banner-02__cta:hover {
    background-color: var(--wf-banner-btn-hover-bg);
  }

  @media (max-width: 48rem) {
    .wf-banner-02 {
      --wf-banner-font-size: 0.875rem;
      --wf-banner-padding-y: 0.75rem;
    }

    .wf-banner-02__inner {
      flex-direction: column;
      gap: 0.625rem;
      text-align: center;
    }
  }
</style>

<div class="wf-banner-02">
  <div class="wf-banner-02__inner">
    <span class="wf-banner-02__badge">Nouveau</span>
    <p class="wf-banner-02__text">Découvrez notre offre de lancement ! Profitez de -20% sur tous nos plans.</p>
    <a href="#" class="wf-banner-02__cta">
      Découvrir l'offre &rarr;
    </a>
  </div>
</div>
