<!-- Banner 13: Webinar/Event Promotion Banner with Date -->
<!-- Event promotion banner with date badge, event details, and registration CTA -->

<style>
  .wf-banner-13 {
    --wf-banner-bg: var(--color-bg-dark);
    --wf-banner-text: var(--color-border);
    --wf-banner-muted: var(--color-neutral-400, #94A3B8);
    --wf-banner-accent: var(--color-text-light);
    --wf-banner-date-bg: var(--color-bg-dark);
    --wf-banner-date-border: var(--color-neutral-700, #334155);
    --wf-banner-date-accent: var(--color-text-light);
    --wf-banner-badge-bg: color-mix(in srgb, var(--color-neutral-500) 15%, transparent);
    --wf-banner-badge-text: var(--color-text-light);
    --wf-banner-btn-bg: var(--color-text-light);
    --wf-banner-btn-text: var(--color-bg-dark);
    --wf-banner-btn-hover-bg: var(--color-border);
    --wf-banner-padding: 1.5rem;
    --wf-banner-font-size: 0.9375rem;
    --wf-banner-radius: 0;

    background-color: var(--wf-banner-bg);
    color: var(--wf-banner-text);
    padding: var(--wf-banner-padding);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    font-size: var(--wf-banner-font-size);
    line-height: 1.5;
    width: 100%;
    border-radius: var(--wf-banner-radius);
  }

  .wf-banner-13__inner {
    max-width: 80rem;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .wf-banner-13__date {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 4.5rem;
    height: 4.5rem;
    background-color: var(--wf-banner-date-bg);
    border: 1px solid var(--wf-banner-date-border);
    border-radius: var(--radius-lg, 0.75rem);
    text-align: center;
  }

  .wf-banner-13__date-month {
    font-size: 0.625rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--wf-banner-date-accent);
    line-height: 1;
    margin-bottom: 0.125rem;
  }

  .wf-banner-13__date-day {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--color-text-on-dark, #fff);
    line-height: 1;
  }

  .wf-banner-13__content {
    flex: 1;
    min-width: 0;
  }

  .wf-banner-13__badge {
    display: inline-block;
    font-size: 0.6875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    background-color: var(--wf-banner-badge-bg);
    color: var(--wf-banner-badge-text);
    padding: 0.15rem 0.5rem;
    border-radius: var(--radius-sm, 0.25rem);
    margin-bottom: 0.375rem;
  }

  .wf-banner-13__title {
    margin: 0 0 0.25rem;
    font-size: 1.125rem;
    font-weight: 600;
    color: var(--color-text-on-dark, #fff);
  }

  .wf-banner-13__meta {
    margin: 0;
    font-size: 0.8125rem;
    color: var(--wf-banner-muted);
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .wf-banner-13__meta-item {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
  }

  .wf-banner-13__actions {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .wf-banner-13__btn {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    font-family: inherit;
    font-size: 0.875rem;
    font-weight: 600;
    text-decoration: none;
    padding: 0.625rem 1.5rem;
    border-radius: var(--radius-md, 0.5rem);
    cursor: pointer;
    white-space: nowrap;
    transition: background-color 0.2s ease;
    background-color: var(--wf-banner-btn-bg);
    color: var(--wf-banner-btn-text);
    border: none;
  }

  .wf-banner-13__btn:hover {
    background-color: var(--wf-banner-btn-hover-bg);
  }

  @media (max-width: 48rem) {
    .wf-banner-13__inner {
      flex-direction: column;
      text-align: center;
      gap: 1rem;
    }

    .wf-banner-13__meta {
      justify-content: center;
    }

    .wf-banner-13__btn {
      width: 100%;
      justify-content: center;
    }
  }
</style>

<div class="wf-banner-13">
  <div class="wf-banner-13__inner">
    <div class="wf-banner-13__date">
      <span class="wf-banner-13__date-month">Mars</span>
      <span class="wf-banner-13__date-day">15</span>
    </div>

    <div class="wf-banner-13__content">
      <span class="wf-banner-13__badge">Webinaire gratuit</span>
      <p class="wf-banner-13__title">Webinaire gratuit le 15 mars</p>
      <p class="wf-banner-13__meta">
        <span class="wf-banner-13__meta-item">
          <span data-icon="clock" data-icon-type="outline" data-icon-size="14"></span>
          14h00 - 15h30
        </span>
        <span class="wf-banner-13__meta-item">
          <span data-icon="user-group" data-icon-type="outline" data-icon-size="14"></span>
          Places limitées
        </span>
        <span class="wf-banner-13__meta-item">
          <span data-icon="computer-desktop" data-icon-type="outline" data-icon-size="14"></span>
          En ligne
        </span>
      </p>
    </div>

    <div class="wf-banner-13__actions">
      <a href="#" class="wf-banner-13__btn">S'inscrire gratuitement &rarr;</a>
    </div>
  </div>
</div>
