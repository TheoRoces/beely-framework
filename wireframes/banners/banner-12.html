<!-- Banner 12: Info/Alert Banner (Icon + Text, Warning Style) -->
<!-- Alert-style banner with a warning icon, bold title, description, and optional action link -->

<style>
  .wf-banner-12 {
    --wf-banner-bg: var(--color-bg-alt, #f3f4f6);
    --wf-banner-text: var(--color-text, #374151);
    --wf-banner-title-color: var(--color-text, #374151);
    --wf-banner-border: var(--color-border, #d1d5db);
    --wf-banner-icon-bg: var(--color-border, #e5e7eb);
    --wf-banner-icon-color: var(--color-text-light, #6b7280);
    --wf-banner-link-color: var(--color-text, #374151);
    --wf-banner-link-hover: var(--color-text, #374151);
    --wf-banner-padding: 1rem 1.5rem;
    --wf-banner-font-size: 0.875rem;
    --wf-banner-radius: 10px;

    background-color: var(--wf-banner-bg);
    color: var(--wf-banner-text);
    padding: var(--wf-banner-padding);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    font-size: var(--wf-banner-font-size);
    line-height: 1.5;
    width: 100%;
    border: 1px solid var(--wf-banner-border);
    border-radius: var(--wf-banner-radius);
  }

  .wf-banner-12__inner {
    max-width: 80rem;
    margin: 0 auto;
    display: flex;
    align-items: flex-start;
    gap: 0.875rem;
  }

  .wf-banner-12__icon {
    flex-shrink: 0;
    width: 2.25rem;
    height: 2.25rem;
    border-radius: var(--radius-md, 0.5rem);
    background-color: var(--wf-banner-icon-bg);
    color: var(--wf-banner-icon-color);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 0.0625rem;
  }

  .wf-banner-12__content {
    flex: 1;
    min-width: 0;
  }

  .wf-banner-12__title {
    margin: 0 0 0.25rem;
    font-size: 0.9375rem;
    font-weight: 600;
    color: var(--wf-banner-title-color);
  }

  .wf-banner-12__text {
    margin: 0;
  }

  .wf-banner-12__link {
    color: var(--wf-banner-link-color);
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 2px;
    transition: color 0.2s ease;
  }

  .wf-banner-12__link:hover {
    color: var(--wf-banner-link-hover);
    text-decoration: none;
  }

  /* Variant: Info style */
  .wf-banner-12--info {
    --wf-banner-bg: var(--color-bg-alt, #f3f4f6);
    --wf-banner-text: var(--color-neutral-800, #1f2937);
    --wf-banner-title-color: var(--color-neutral-800, #1f2937);
    --wf-banner-border: var(--color-text-light, #6b7280);
    --wf-banner-icon-bg: var(--color-neutral-100, #e5e7eb);
    --wf-banner-icon-color: var(--color-text, #374151);
    --wf-banner-link-color: var(--color-neutral-800, #1f2937);
    --wf-banner-link-hover: var(--color-neutral-800, #1f2937)
  }

  /* Variant: Error style */
  .wf-banner-12--error {
    --wf-banner-bg: var(--color-bg-alt, #f9fafb);
    --wf-banner-text: var(--color-neutral-700, #374151);
    --wf-banner-title-color: var(--color-neutral-800, #1f2937);
    --wf-banner-border: var(--color-neutral-200, #e5e7eb);
    --wf-banner-icon-bg: var(--color-bg-alt, #f3f4f6);
    --wf-banner-icon-color: var(--color-text-light, #6b7280);
    --wf-banner-link-color: var(--color-neutral-700, #374151);
    --wf-banner-link-hover: var(--color-neutral-800, #1f2937)
  }

  /* Variant: Success style */
  .wf-banner-12--success {
    --wf-banner-bg: var(--color-bg-alt, #f3f4f6);
    --wf-banner-text: var(--color-neutral-700, #374151);
    --wf-banner-title-color: var(--color-neutral-800, #1f2937);
    --wf-banner-border: var(--color-border, #d1d5db);
    --wf-banner-icon-bg: var(--color-neutral-100, #e5e7eb);
    --wf-banner-icon-color: var(--color-text, #374151);
    --wf-banner-link-color: var(--color-neutral-700, #374151);
    --wf-banner-link-hover: var(--color-neutral-800, #1f2937)
  }

  @media (max-width: 48rem) {
    .wf-banner-12 {
      --wf-banner-font-size: 0.8125rem;
    }

    .wf-banner-12__icon {
      width: 2rem;
      height: 2rem;
    }
  }
</style>

<div class="wf-banner-12">
  <div class="wf-banner-12__inner">
    <div class="wf-banner-12__icon">
      <span data-icon="exclamation-triangle" data-icon-type="outline" data-icon-size="18"></span>
    </div>

    <div class="wf-banner-12__content">
      <p class="wf-banner-12__title">Attention : Maintenance prévue</p>
      <p class="wf-banner-12__text">
        Notre plateforme sera indisponible le 15 mars de 2h a 4h du matin pour une mise à jour importante.
        <a href="#" class="wf-banner-12__link">Voir les details</a>
      </p>
    </div>
  </div>
</div>
