<!-- Banner 15: Slim Bar with Scrolling/Rotating Messages -->
<!-- Thin top bar that cycles through multiple messages using CSS-only animation (fade rotation) -->

<style>
  .wf-banner-15 {
    --wf-banner-bg: var(--color-bg-dark);
    --wf-banner-text: var(--color-neutral-100, #F3F4F6);
    --wf-banner-accent: var(--color-text-light, #9ca3af);
    --wf-banner-link-color: var(--color-text-light, #9ca3af);
    --wf-banner-link-hover: var(--color-bg, #FFFFFF);
    --wf-banner-padding-y: 0.5rem;
    --wf-banner-font-size: 0.8125rem;
    --wf-banner-height: 2.25rem;
    --wf-banner-message-count: 5;
    --wf-banner-cycle-duration: 15s;

    background-color: var(--wf-banner-bg);
    color: var(--wf-banner-text);
    padding: var(--wf-banner-padding-y) 1rem;
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    font-size: var(--wf-banner-font-size);
    line-height: 1.4;
    width: 100%;
    height: var(--wf-banner-height);
    overflow: hidden;
    position: relative;
  }

  .wf-banner-15__inner {
    max-width: 80rem;
    margin: 0 auto;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .wf-banner-15__track {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wf-banner-15__message {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    opacity: 0;
    animation: wf-banner-15-fade var(--wf-banner-cycle-duration) infinite;
    white-space: nowrap;
  }

  .wf-banner-15__message:nth-child(1) {
    animation-delay: 0s;
  }

  .wf-banner-15__message:nth-child(2) {
    animation-delay: 3s;
  }

  .wf-banner-15__message:nth-child(3) {
    animation-delay: 6s;
  }

  .wf-banner-15__message:nth-child(4) {
    animation-delay: 9s;
  }

  .wf-banner-15__message:nth-child(5) {
    animation-delay: 12s;
  }

  .wf-banner-15__dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background-color: var(--wf-banner-accent);
    flex-shrink: 0;
  }

  .wf-banner-15__text {
    margin: 0;
  }

  .wf-banner-15__link {
    color: var(--wf-banner-link-color);
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 2px;
    transition: color 0.2s ease;
  }

  .wf-banner-15__link:hover {
    color: var(--wf-banner-link-hover);
  }

  /* Navigation dots */
  .wf-banner-15__dots {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    gap: 0.375rem;
  }

  .wf-banner-15__nav-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background-color: rgba(255, 255, 255, 0.2);
  }

  .wf-banner-15__nav-dot--active {
    background-color: var(--wf-banner-accent);
  }

  /*
   * Fade animation for 5 messages over 15s:
   * Each message visible for ~2.4s, transitions ~0.6s
   * 0%   = fade in start
   * 4%   = fully visible
   * 16%  = still visible
   * 20%  = faded out
   * 100% = remain hidden
   */
  @keyframes wf-banner-15-fade {
    0% {
      opacity: 0;
      transform: translateY(4px);
    }
    2% {
      opacity: 1;
      transform: translateY(0);
    }
    16% {
      opacity: 1;
      transform: translateY(0);
    }
    20% {
      opacity: 0;
      transform: translateY(-4px);
    }
    100% {
      opacity: 0;
    }
  }

  @media (max-width: 48rem) {
    .wf-banner-15 {
      --wf-banner-font-size: 0.75rem;
    }

    .wf-banner-15__dots {
      display: none;
    }
  }
</style>

<div class="wf-banner-15">
  <div class="wf-banner-15__inner">
    <div class="wf-banner-15__track">
      <div class="wf-banner-15__message">
        <span class="wf-banner-15__dot"></span>
        <p class="wf-banner-15__text">
          Nouveau : Découvrez notre offre de lancement !
          <a href="#" class="wf-banner-15__link">En savoir plus</a>
        </p>
      </div>

      <div class="wf-banner-15__message">
        <span class="wf-banner-15__dot"></span>
        <p class="wf-banner-15__text">
          Webinaire gratuit le 15 mars
          <a href="#" class="wf-banner-15__link">S'inscrire</a>
        </p>
      </div>

      <div class="wf-banner-15__message">
        <span class="wf-banner-15__dot"></span>
        <p class="wf-banner-15__text">
          Offre speciale -20% avec le code WELCOME
          <a href="#" class="wf-banner-15__link">Appliquer le code</a>
        </p>
      </div>

      <div class="wf-banner-15__message">
        <span class="wf-banner-15__dot"></span>
        <p class="wf-banner-15__text">
          Telechargez notre application sur iOS et Android
          <a href="#" class="wf-banner-15__link">Telecharger</a>
        </p>
      </div>

      <div class="wf-banner-15__message">
        <span class="wf-banner-15__dot"></span>
        <p class="wf-banner-15__text">
          Inscrivez-vous à notre newsletter
          <a href="#" class="wf-banner-15__link">S'inscrire</a>
        </p>
      </div>
    </div>

    <div class="wf-banner-15__dots">
      <span class="wf-banner-15__nav-dot wf-banner-15__nav-dot--active"></span>
      <span class="wf-banner-15__nav-dot"></span>
      <span class="wf-banner-15__nav-dot"></span>
      <span class="wf-banner-15__nav-dot"></span>
      <span class="wf-banner-15__nav-dot"></span>
    </div>
  </div>
</div>
