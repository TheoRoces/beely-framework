<!-- Banner 08: Full-Width Image Banner with Text Overlay -->
<!-- Large hero-style banner with a background image placeholder and centered text overlay -->

<style>
  .wf-banner-08 {
    --wf-banner-bg: var(--color-bg-dark);
    --wf-banner-overlay: rgba(15, 23, 42, 0.65);
    --wf-banner-text: var(--color-text-on-dark, #ffffff);
    --wf-banner-muted: var(--color-neutral-300, #CBD5E1);
    --wf-banner-btn-bg: var(--color-bg);
    --wf-banner-btn-text: var(--color-bg-dark);
    --wf-banner-btn-hover-bg: var(--color-neutral-50, #F1F5F9);
    --wf-banner-height: 20rem;
    --wf-banner-font-size: 1rem;

    position: relative;
    width: 100%;
    min-height: var(--wf-banner-height);
    background-color: var(--wf-banner-bg);
    /* Replace with actual image: background-image: url('...'); */
    background-size: cover;
    background-position: center;
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    font-size: var(--wf-banner-font-size);
    line-height: 1.5;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .wf-banner-08__overlay {
    position: absolute;
    inset: 0;
    background: var(--wf-banner-overlay);
  }

  .wf-banner-08__placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.08;
  }

  .wf-banner-08__placeholder svg {
    width: 6rem;
    height: 6rem;
    color: var(--color-text-on-dark, #fff);
  }

  .wf-banner-08__inner {
    position: relative;
    z-index: 1;
    max-width: 48rem;
    margin: 0 auto;
    padding: 3rem 1.5rem;
    text-align: center;
    color: var(--wf-banner-text);
  }

  .wf-banner-08__badge {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--wf-banner-muted);
    margin-bottom: 0.75rem;
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 0.2rem 0.75rem;
    border-radius: var(--radius-full, 9999px);
  }

  .wf-banner-08__title {
    margin: 0 0 0.75rem;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.02em;
  }

  .wf-banner-08__subtitle {
    margin: 0 0 1.5rem;
    font-size: 1.0625rem;
    color: var(--wf-banner-muted);
    max-width: 36rem;
    margin-left: auto;
    margin-right: auto;
  }

  .wf-banner-08__cta {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background-color: var(--wf-banner-btn-bg);
    color: var(--wf-banner-btn-text);
    font-size: 0.9375rem;
    font-weight: 600;
    text-decoration: none;
    padding: 0.75rem 2rem;
    border-radius: var(--radius-md, 0.5rem);
    transition: background-color 0.2s ease;
  }

  .wf-banner-08__cta:hover {
    background-color: var(--wf-banner-btn-hover-bg);
  }

  @media (max-width: 48rem) {
    .wf-banner-08 {
      --wf-banner-height: 16rem;
    }

    .wf-banner-08__title {
      font-size: 1.5rem;
    }

    .wf-banner-08__subtitle {
      font-size: 0.9375rem;
    }

    .wf-banner-08__inner {
      padding: 2rem 1.25rem;
    }
  }
</style>

<div class="wf-banner-08">
  <div class="wf-banner-08__overlay"></div>

  <div class="wf-banner-08__placeholder">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
  </div>

  <div class="wf-banner-08__inner">
    <span class="wf-banner-08__badge">Offre limitee</span>
    <h2 class="wf-banner-08__title">Decouvrez notre offre de lancement !</h2>
    <p class="wf-banner-08__subtitle">
      Profitez d'une remise exceptionnelle sur tous nos services. Offre valable jusqu'au 31 mars 2026.
    </p>
    <a href="#" class="wf-banner-08__cta">En profiter maintenant &rarr;</a>
  </div>
</div>
