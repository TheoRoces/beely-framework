<!-- Banner 14: Newsletter Signup Banner (Input + Button Inline) -->
<!-- Full-width banner with a headline, subtitle, and inline email input + submit button -->

<style>
  .wf-banner-14 {
    --wf-banner-bg: var(--color-bg-alt, #F8FAFC);
    --wf-banner-text: var(--color-neutral-800, #1E293B);
    --wf-banner-muted: var(--color-neutral-500, #64748B);
    --wf-banner-border: var(--color-border, #E2E8F0);
    --wf-banner-input-bg: var(--color-bg, #FFFFFF);
    --wf-banner-input-border: var(--color-neutral-300, #CBD5E1);
    --wf-banner-input-focus: var(--color-text, #374151);
    --wf-banner-input-text: var(--color-neutral-800, #1E293B);
    --wf-banner-input-placeholder: var(--color-neutral-400, #94A3B8);
    --wf-banner-btn-bg: var(--color-text, #374151);
    --wf-banner-btn-text: var(--color-bg, #ffffff);
    --wf-banner-btn-hover-bg: var(--color-primary-hover);
    --wf-banner-padding: 2.5rem 1.5rem;
    --wf-banner-font-size: 1rem;

    background-color: var(--wf-banner-bg);
    color: var(--wf-banner-text);
    padding: var(--wf-banner-padding);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    font-size: var(--wf-banner-font-size);
    line-height: 1.5;
    width: 100%;
    border-top: 1px solid var(--wf-banner-border);
    border-bottom: 1px solid var(--wf-banner-border);
  }

  .wf-banner-14__inner {
    max-width: 40rem;
    margin: 0 auto;
    text-align: center;
  }

  .wf-banner-14__icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 3rem;
    height: 3rem;
    border-radius: var(--radius-lg, 0.75rem);
    background-color: var(--color-bg-alt, #f3f4f6);
    color: var(--color-text, #374151);
    margin-bottom: 1rem;
  }

  .wf-banner-14__title {
    margin: 0 0 0.375rem;
    font-size: 1.375rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .wf-banner-14__subtitle {
    margin: 0 0 1.5rem;
    color: var(--wf-banner-muted);
    font-size: 0.9375rem;
  }

  .wf-banner-14__form {
    display: flex;
    gap: 0.5rem;
    max-width: 28rem;
    margin: 0 auto;
  }

  .wf-banner-14__input {
    flex: 1;
    min-width: 0;
    padding: 0.6875rem 1rem;
    font-family: inherit;
    font-size: 0.875rem;
    color: var(--wf-banner-input-text);
    background-color: var(--wf-banner-input-bg);
    border: 1px solid var(--wf-banner-input-border);
    border-radius: var(--radius-md, 0.5rem);
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  .wf-banner-14__input::placeholder {
    color: var(--wf-banner-input-placeholder);
  }

  .wf-banner-14__input:focus {
    border-color: var(--wf-banner-input-focus);
    box-shadow: 0 0 0 3px rgba(107, 114, 128, 0.15);
  }

  .wf-banner-14__btn {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    background-color: var(--wf-banner-btn-bg);
    color: var(--wf-banner-btn-text);
    font-family: inherit;
    font-size: 0.875rem;
    font-weight: 600;
    padding: 0.6875rem 1.5rem;
    border: none;
    border-radius: var(--radius-md, 0.5rem);
    cursor: pointer;
    white-space: nowrap;
    transition: background-color 0.2s ease;
  }

  .wf-banner-14__btn:hover {
    background-color: var(--wf-banner-btn-hover-bg);
  }

  .wf-banner-14__disclaimer {
    margin: 0.75rem 0 0;
    font-size: 0.75rem;
    color: var(--wf-banner-muted);
  }

  .wf-banner-14__disclaimer a {
    color: var(--wf-banner-muted);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .wf-banner-14__disclaimer a:hover {
    color: var(--wf-banner-text);
  }

  @media (max-width: 48rem) {
    .wf-banner-14 {
      --wf-banner-padding: 2rem 1.25rem;
    }

    .wf-banner-14__title {
      font-size: 1.125rem;
    }

    .wf-banner-14__form {
      flex-direction: column;
    }

    .wf-banner-14__btn {
      justify-content: center;
    }
  }
</style>

<div class="wf-banner-14">
  <div class="wf-banner-14__inner">
    <div class="wf-banner-14__icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
    </div>
    <h2 class="wf-banner-14__title">Inscrivez-vous a notre newsletter</h2>
    <p class="wf-banner-14__subtitle">Recevez nos dernieres actualites et offres exclusives directement dans votre boite mail.</p>

    <form class="wf-banner-14__form" action="#" method="post">
      <input
        type="email"
        class="wf-banner-14__input"
        placeholder="Votre adresse email"
        aria-label="Adresse email"
        required
      />
      <button type="submit" class="wf-banner-14__btn">S'inscrire</button>
    </form>

    <p class="wf-banner-14__disclaimer">
      En vous inscrivant, vous acceptez notre <a href="#">politique de confidentialite</a>. Desabonnement possible a tout moment.
    </p>
  </div>
</div>
