<!-- Banner 09: Split Banner - Left Text + Right Illustration -->
<!-- Two-column layout: promotional text on the left, illustration placeholder on the right -->

<style>
  .wf-banner-09 {
    --wf-banner-bg: var(--color-bg-alt, #F8FAFC);
    --wf-banner-text: var(--color-neutral-800, #1E293B);
    --wf-banner-muted: var(--color-neutral-500, #64748B);
    --wf-banner-accent: var(--color-text, #374151);
    --wf-banner-border: var(--color-border, #E2E8F0);
    --wf-banner-illus-bg: var(--color-bg-alt, #f3f4f6);
    --wf-banner-illus-accent: var(--color-text-light, #6b7280);
    --wf-banner-btn-bg: var(--color-text, #374151);
    --wf-banner-btn-text: var(--color-bg, #ffffff);
    --wf-banner-btn-hover-bg: var(--color-primary-hover);
    --wf-banner-padding: 0;
    --wf-banner-font-size: 1rem;

    background-color: var(--wf-banner-bg);
    color: var(--wf-banner-text);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    font-size: var(--wf-banner-font-size);
    line-height: 1.5;
    width: 100%;
    border-bottom: 1px solid var(--wf-banner-border);
    overflow: hidden;
  }

  .wf-banner-09__inner {
    max-width: 80rem;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 14rem;
  }

  .wf-banner-09__content {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 2.5rem 2rem 2.5rem 1.5rem;
  }

  .wf-banner-09__eyebrow {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--wf-banner-accent);
    margin-bottom: 0.5rem;
  }

  .wf-banner-09__title {
    margin: 0 0 0.5rem;
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1.25;
    letter-spacing: -0.01em;
  }

  .wf-banner-09__text {
    margin: 0 0 1.25rem;
    color: var(--wf-banner-muted);
    font-size: 0.9375rem;
    max-width: 28rem;
  }

  .wf-banner-09__cta {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    background-color: var(--wf-banner-btn-bg);
    color: var(--wf-banner-btn-text);
    font-size: 0.875rem;
    font-weight: 600;
    text-decoration: none;
    padding: 0.625rem 1.5rem;
    border-radius: var(--radius-md, 0.5rem);
    width: fit-content;
    transition: background-color 0.2s ease;
  }

  .wf-banner-09__cta:hover {
    background-color: var(--wf-banner-btn-hover-bg);
  }

  .wf-banner-09__illustration {
    background-color: var(--wf-banner-illus-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
  }

  .wf-banner-09__illus-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    color: var(--wf-banner-illus-accent);
    opacity: 0.6;
  }

  .wf-banner-09__illus-placeholder svg {
    width: 5rem;
    height: 5rem;
  }

  .wf-banner-09__illus-label {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--wf-banner-illus-accent);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* Decorative shapes */
  .wf-banner-09__illustration::before,
  .wf-banner-09__illustration::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    background-color: var(--wf-banner-illus-accent);
    opacity: 0.08;
  }

  .wf-banner-09__illustration::before {
    width: 8rem;
    height: 8rem;
    top: -2rem;
    right: -2rem;
  }

  .wf-banner-09__illustration::after {
    width: 5rem;
    height: 5rem;
    bottom: -1rem;
    left: 1rem;
  }

  @media (max-width: 48rem) {
    .wf-banner-09__inner {
      grid-template-columns: 1fr;
      min-height: auto;
    }

    .wf-banner-09__content {
      padding: 2rem 1.25rem;
      text-align: center;
      align-items: center;
    }

    .wf-banner-09__illustration {
      min-height: 10rem;
    }
  }
</style>

<div class="wf-banner-09">
  <div class="wf-banner-09__inner">
    <div class="wf-banner-09__content">
      <span class="wf-banner-09__eyebrow">Nouveau</span>
      <h2 class="wf-banner-09__title">Decouvrez notre offre de lancement !</h2>
      <p class="wf-banner-09__text">
        Profitez de fonctionnalites exclusives et d'un accompagnement personnalise pour lancer votre projet.
      </p>
      <a href="#" class="wf-banner-09__cta">Commencer gratuitement &rarr;</a>
    </div>

    <div class="wf-banner-09__illustration">
      <div class="wf-banner-09__illus-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <span class="wf-banner-09__illus-label">Illustration</span>
      </div>
    </div>
  </div>
</div>
