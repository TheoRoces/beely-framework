<!-- Banner 05: App Download Banner -->
<!-- Icon placeholder + descriptive text + two store download buttons (App Store / Google Play) -->

<style>
  .wf-banner-05 {
    --wf-banner-bg: var(--color-bg-alt, #f3f4f6);
    --wf-banner-text: var(--color-neutral-800, #1E293B);
    --wf-banner-muted: var(--color-neutral-500, #64748B);
    --wf-banner-border: var(--color-border, #E2E8F0);
    --wf-banner-icon-bg: var(--color-text, #374151);
    --wf-banner-icon-text: var(--color-text-on-dark, #ffffff);
    --wf-banner-btn-bg: var(--color-bg-dark);
    --wf-banner-btn-text: var(--color-text-on-dark, #ffffff);
    --wf-banner-btn-hover-bg: var(--color-primary-hover);
    --wf-banner-padding: 1.25rem 1.5rem;
    --wf-banner-font-size: 0.9375rem;

    background-color: var(--wf-banner-bg);
    color: var(--wf-banner-text);
    padding: var(--wf-banner-padding);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    font-size: var(--wf-banner-font-size);
    line-height: 1.5;
    width: 100%;
    border-bottom: 1px solid var(--wf-banner-border);
  }

  .wf-banner-05__inner {
    max-width: 80rem;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 1.25rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .wf-banner-05__icon {
    width: 3rem;
    height: 3rem;
    border-radius: var(--radius-lg, 0.75rem);
    background-color: var(--wf-banner-icon-bg);
    color: var(--wf-banner-icon-text);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.25rem;
    font-weight: 700;
    flex-shrink: 0;
  }

  .wf-banner-05__content {
    flex: 1;
    min-width: 0;
  }

  .wf-banner-05__title {
    margin: 0;
    font-size: 0.9375rem;
    font-weight: 600;
  }

  .wf-banner-05__subtitle {
    margin: 0.125rem 0 0;
    font-size: 0.8125rem;
    color: var(--wf-banner-muted);
  }

  .wf-banner-05__buttons {
    display: flex;
    gap: 0.625rem;
    flex-shrink: 0;
  }

  .wf-banner-05__btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background-color: var(--wf-banner-btn-bg);
    color: var(--wf-banner-btn-text);
    text-decoration: none;
    padding: 0.5rem 1rem;
    border-radius: var(--radius-md, 0.5rem);
    font-size: 0.8125rem;
    font-weight: 500;
    transition: background-color 0.2s ease;
    white-space: nowrap;
  }

  .wf-banner-05__btn:hover {
    background-color: var(--wf-banner-btn-hover-bg);
  }

  .wf-banner-05__btn-icon {
    font-size: 1.125rem;
    line-height: 1;
  }

  .wf-banner-05__btn-label {
    display: flex;
    flex-direction: column;
    line-height: 1.2;
  }

  .wf-banner-05__btn-small {
    font-size: 0.5625rem;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    opacity: 0.8;
  }

  .wf-banner-05__btn-store {
    font-size: 0.8125rem;
    font-weight: 600;
  }

  @media (max-width: 48rem) {
    .wf-banner-05__inner {
      flex-direction: column;
      text-align: center;
      gap: 0.75rem;
    }

    .wf-banner-05__buttons {
      flex-direction: column;
      width: 100%;
    }

    .wf-banner-05__btn {
      justify-content: center;
    }
  }
</style>

<div class="wf-banner-05">
  <div class="wf-banner-05__inner">
    <div class="wf-banner-05__icon">
      <!-- App icon placeholder -->
      <span data-icon="device-phone-mobile" data-icon-type="outline" data-icon-size="24"></span>
    </div>

    <div class="wf-banner-05__content">
      <p class="wf-banner-05__title">Telechargez notre application</p>
      <p class="wf-banner-05__subtitle">Disponible gratuitement sur iOS et Android</p>
    </div>

    <div class="wf-banner-05__buttons">
      <a href="#" class="wf-banner-05__btn">
        <span class="wf-banner-05__btn-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5C17.88 20.74 17 21.95 15.66 21.97C14.32 22 13.89 21.18 12.37 21.18C10.84 21.18 10.37 21.95 9.1 22C7.79 22.05 6.8 20.68 5.96 19.47C4.25 16.56 2.93 11.3 4.7 7.72C5.57 5.94 7.36 4.86 9.28 4.84C10.56 4.81 11.78 5.72 12.56 5.72C13.34 5.72 14.83 4.62 16.39 4.8C17.07 4.83 18.9 5.09 20.07 6.82C19.97 6.89 17.63 8.27 17.66 11.07C17.69 14.39 20.6 15.47 20.63 15.48C20.6 15.56 20.17 17.07 19.1 18.61L18.71 19.5Z"/></svg>
        </span>
        <span class="wf-banner-05__btn-label">
          <span class="wf-banner-05__btn-small">Telecharger sur</span>
          <span class="wf-banner-05__btn-store">App Store</span>
        </span>
      </a>
      <a href="#" class="wf-banner-05__btn">
        <span class="wf-banner-05__btn-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3.609 1.814L13.792 12 3.61 22.186a.996.996 0 0 1-.61-.92V2.734a1 1 0 0 1 .609-.92zM14.852 13.06l2.36 2.36-9.87 5.63 7.51-7.99zm3.91-2.2l2.14 1.22a1 1 0 0 1 0 1.74l-2.14 1.22-2.59-2.09 2.59-2.09zM7.342 2.95l9.87 5.63-2.36 2.36-7.51-7.99z"/></svg>
        </span>
        <span class="wf-banner-05__btn-label">
          <span class="wf-banner-05__btn-small">Disponible sur</span>
          <span class="wf-banner-05__btn-store">Google Play</span>
        </span>
      </a>
    </div>
  </div>
</div>
