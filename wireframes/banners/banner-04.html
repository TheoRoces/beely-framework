<!-- Banner 04: Sale/Discount Banner with Countdown Placeholders -->
<!-- Bold promotional banner with discount info and placeholder countdown timer boxes -->

<style>
  .wf-banner-04 {
    --wf-banner-bg: var(--color-text-light);
    --wf-banner-bg-accent: var(--color-bg-dark);
    --wf-banner-text: var(--color-text-on-dark, #ffffff);
    --wf-banner-muted: var(--color-border);
    --wf-banner-countdown-bg: rgba(255, 255, 255, 0.15);
    --wf-banner-countdown-text: var(--color-text-on-dark, #ffffff);
    --wf-banner-btn-bg: var(--color-bg);
    --wf-banner-btn-text: var(--color-text);
    --wf-banner-padding: 1.25rem 1.5rem;
    --wf-banner-font-size: 0.9375rem;

    background: linear-gradient(135deg, var(--wf-banner-bg), var(--wf-banner-bg-accent));
    color: var(--wf-banner-text);
    padding: var(--wf-banner-padding);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    font-size: var(--wf-banner-font-size);
    line-height: 1.5;
    width: 100%;
  }

  .wf-banner-04__inner {
    max-width: 80rem;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .wf-banner-04__content {
    text-align: center;
  }

  .wf-banner-04__title {
    margin: 0 0 0.125rem;
    font-size: 1.125rem;
    font-weight: 700;
  }

  .wf-banner-04__subtitle {
    margin: 0;
    color: var(--wf-banner-muted);
    font-size: 0.8125rem;
  }

  .wf-banner-04__countdown {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .wf-banner-04__countdown-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    background-color: var(--wf-banner-countdown-bg);
    border-radius: var(--radius-md, 0.5rem);
    padding: 0.5rem 0.75rem;
    min-width: 3.5rem;
    backdrop-filter: blur(4px);
  }

  .wf-banner-04__countdown-number {
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1;
    color: var(--wf-banner-countdown-text);
  }

  .wf-banner-04__countdown-label {
    font-size: 0.625rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--wf-banner-muted);
    margin-top: 0.2rem;
  }

  .wf-banner-04__separator {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--wf-banner-muted);
  }

  .wf-banner-04__cta {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    background-color: var(--wf-banner-btn-bg);
    color: var(--wf-banner-btn-text);
    font-size: 0.875rem;
    font-weight: 700;
    text-decoration: none;
    padding: 0.5rem 1.5rem;
    border-radius: var(--radius-md, 0.5rem);
    border: none;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s ease;
  }

  .wf-banner-04__cta:hover {
    opacity: 0.9;
  }

  @media (max-width: 48rem) {
    .wf-banner-04__inner {
      flex-direction: column;
      gap: 1rem;
    }

    .wf-banner-04__countdown-block {
      min-width: 2.75rem;
      padding: 0.375rem 0.5rem;
    }

    .wf-banner-04__countdown-number {
      font-size: 1.25rem;
    }
  }
</style>

<div class="wf-banner-04">
  <div class="wf-banner-04__inner">
    <div class="wf-banner-04__content">
      <p class="wf-banner-04__title">Offre speciale -20% avec le code WELCOME</p>
      <p class="wf-banner-04__subtitle">L'offre se termine bientot</p>
    </div>

    <div class="wf-banner-04__countdown">
      <div class="wf-banner-04__countdown-block">
        <span class="wf-banner-04__countdown-number">02</span>
        <span class="wf-banner-04__countdown-label">Jours</span>
      </div>
      <span class="wf-banner-04__separator">:</span>
      <div class="wf-banner-04__countdown-block">
        <span class="wf-banner-04__countdown-number">14</span>
        <span class="wf-banner-04__countdown-label">Heures</span>
      </div>
      <span class="wf-banner-04__separator">:</span>
      <div class="wf-banner-04__countdown-block">
        <span class="wf-banner-04__countdown-number">36</span>
        <span class="wf-banner-04__countdown-label">Min</span>
      </div>
      <span class="wf-banner-04__separator">:</span>
      <div class="wf-banner-04__countdown-block">
        <span class="wf-banner-04__countdown-number">52</span>
        <span class="wf-banner-04__countdown-label">Sec</span>
      </div>
    </div>

    <a href="#" class="wf-banner-04__cta">En profiter &rarr;</a>
  </div>
</div>
