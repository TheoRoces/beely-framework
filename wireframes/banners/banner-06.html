<!-- Banner 06: Notification Bar with Close Button (X) -->
<!-- Top notification strip with icon, message text, and a dismiss/close button -->

<style>
  .wf-banner-06 {
    --wf-banner-bg: var(--color-bg-alt, #f9fafb);
    --wf-banner-text: var(--color-text, #374151);
    --wf-banner-border: var(--color-border, #e5e7eb);
    --wf-banner-icon-color: var(--color-text-light, #6b7280);
    --wf-banner-close-color: var(--color-text, #374151);
    --wf-banner-close-hover-bg: rgba(107, 114, 128, 0.1);
    --wf-banner-link-color: var(--color-text, #374151);
    --wf-banner-padding: 0.75rem 1.5rem;
    --wf-banner-font-size: 0.875rem;

    background-color: var(--wf-banner-bg);
    color: var(--wf-banner-text);
    padding: var(--wf-banner-padding);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    font-size: var(--wf-banner-font-size);
    line-height: 1.5;
    width: 100%;
    border-bottom: 1px solid var(--wf-banner-border);
  }

  .wf-banner-06__inner {
    max-width: 80rem;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .wf-banner-06__icon {
    flex-shrink: 0;
    color: var(--wf-banner-icon-color);
    display: flex;
    align-items: center;
  }

  .wf-banner-06__content {
    flex: 1;
    min-width: 0;
  }

  .wf-banner-06__text {
    margin: 0;
  }

  .wf-banner-06__link {
    color: var(--wf-banner-link-color);
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .wf-banner-06__link:hover {
    text-decoration: none;
  }

  .wf-banner-06__close {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 2rem;
    height: 2rem;
    border: none;
    background: none;
    color: var(--wf-banner-close-color);
    cursor: pointer;
    border-radius: var(--radius-md, 0.5rem);
    transition: background-color 0.2s ease;
    padding: 0;
  }

  .wf-banner-06__close:hover {
    background-color: var(--wf-banner-close-hover-bg);
  }

  @media (max-width: 48rem) {
    .wf-banner-06 {
      --wf-banner-font-size: 0.8125rem;
    }
  }
</style>

<div class="wf-banner-06">
  <div class="wf-banner-06__inner">
    <span class="wf-banner-06__icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </span>

    <div class="wf-banner-06__content">
      <p class="wf-banner-06__text">
        Nouveau : Découvrez notre offre de lancement !
        <a href="#" class="wf-banner-06__link">Voir les details</a>
      </p>
    </div>

    <button class="wf-banner-06__close" aria-label="Fermer">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
</div>
