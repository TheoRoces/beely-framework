<!-- Banner 10: Floating Bottom-Right Corner Banner (Card Style) -->
<!-- Small card-style popup anchored to the bottom-right corner with shadow and close button -->

<style>
  .wf-banner-10 {
    --wf-banner-bg: var(--color-bg, #FFFFFF);
    --wf-banner-text: var(--color-neutral-800, #1E293B);
    --wf-banner-muted: var(--color-neutral-500, #64748B);
    --wf-banner-border: var(--color-border, #E2E8F0);
    --wf-banner-shadow: 0 12px 40px rgba(0, 0, 0, 0.12), 0 4px 12px rgba(0, 0, 0, 0.06);
    --wf-banner-accent: var(--color-text, #374151);
    --wf-banner-btn-bg: var(--color-text, #374151);
    --wf-banner-btn-text: var(--color-bg, #ffffff);
    --wf-banner-btn-hover-bg: var(--color-primary-hover);
    --wf-banner-close-color: var(--color-neutral-400, #94A3B8);
    --wf-banner-close-hover: var(--color-neutral-600, #475569);
    --wf-banner-radius: 12px;
    --wf-banner-width: 22rem;

    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 9998;
    width: var(--wf-banner-width);
    max-width: calc(100vw - 2rem);
    background-color: var(--wf-banner-bg);
    border: 1px solid var(--wf-banner-border);
    border-radius: var(--wf-banner-radius);
    box-shadow: var(--wf-banner-shadow);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    line-height: 1.5;
    overflow: hidden;
  }

  .wf-banner-10__header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 1.25rem 1.25rem 0;
  }

  .wf-banner-10__icon {
    width: 2.5rem;
    height: 2.5rem;
    border-radius: var(--radius-lg, 0.75rem);
    background-color: var(--color-bg-alt, #f3f4f6);
    color: var(--wf-banner-accent);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .wf-banner-10__close {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 1.75rem;
    height: 1.75rem;
    border: none;
    background: none;
    color: var(--wf-banner-close-color);
    cursor: pointer;
    border-radius: var(--radius-md, 0.5rem);
    padding: 0;
    transition: color 0.2s ease;
  }

  .wf-banner-10__close:hover {
    color: var(--wf-banner-close-hover);
  }

  .wf-banner-10__body {
    padding: 0.75rem 1.25rem 1rem;
  }

  .wf-banner-10__title {
    margin: 0 0 0.25rem;
    font-size: 0.9375rem;
    font-weight: 600;
    color: var(--wf-banner-text);
  }

  .wf-banner-10__text {
    margin: 0;
    font-size: 0.8125rem;
    color: var(--wf-banner-muted);
  }

  .wf-banner-10__footer {
    padding: 0 1.25rem 1.25rem;
    display: flex;
    gap: 0.5rem;
  }

  .wf-banner-10__btn {
    flex: 1;
    text-align: center;
    font-family: inherit;
    font-size: 0.8125rem;
    font-weight: 600;
    padding: 0.5rem 1rem;
    border-radius: var(--radius-md, 0.5rem);
    cursor: pointer;
    text-decoration: none;
    transition: background-color 0.2s ease, opacity 0.2s ease;
    display: inline-block;
  }

  .wf-banner-10__btn--primary {
    background-color: var(--wf-banner-btn-bg);
    color: var(--wf-banner-btn-text);
    border: none;
  }

  .wf-banner-10__btn--primary:hover {
    background-color: var(--wf-banner-btn-hover-bg);
  }

  .wf-banner-10__btn--secondary {
    background-color: transparent;
    color: var(--wf-banner-muted);
    border: 1px solid var(--wf-banner-border);
  }

  .wf-banner-10__btn--secondary:hover {
    background-color: var(--color-bg-alt, #F8FAFC);
  }

  @media (max-width: 30rem) {
    .wf-banner-10 {
      bottom: 0.75rem;
      right: 0.75rem;
      --wf-banner-width: calc(100vw - 1.5rem);
    }
  }
</style>

<div class="wf-banner-10">
  <div class="wf-banner-10__header">
    <div class="wf-banner-10__icon">
      <span data-icon="square-3-stack-3d" data-icon-type="outline" data-icon-size="20"></span>
    </div>
    <button class="wf-banner-10__close" aria-label="Fermer">
      <span data-icon="x-mark" data-icon-type="outline" data-icon-size="16"></span>
    </button>
  </div>

  <div class="wf-banner-10__body">
    <p class="wf-banner-10__title">Nouveau : Découvrez notre offre de lancement !</p>
    <p class="wf-banner-10__text">Offre speciale -20% avec le code WELCOME. Valable jusqu'au 31 mars.</p>
  </div>

  <div class="wf-banner-10__footer">
    <a href="#" class="wf-banner-10__btn wf-banner-10__btn--secondary">Plus tard</a>
    <a href="#" class="wf-banner-10__btn wf-banner-10__btn--primary">En profiter</a>
  </div>
</div>
