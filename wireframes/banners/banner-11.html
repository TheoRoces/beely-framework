<!-- Banner 11: Gradient Banner with Centered Text and Two CTAs -->
<!-- Vibrant gradient background with centered headline, subtitle, and two action buttons -->

<style>
  .wf-banner-11 {
    --wf-banner-gradient-start: var(--color-bg-dark);
    --wf-banner-gradient-end: var(--color-text-light);
    --wf-banner-text: var(--color-text-on-dark, #ffffff);
    --wf-banner-muted: rgba(255, 255, 255, 0.8);
    --wf-banner-btn-primary-bg: var(--color-bg, #FFFFFF);
    --wf-banner-btn-primary-text: var(--color-text, #374151);
    --wf-banner-btn-primary-hover: var(--color-bg-alt, #f3f4f6);
    --wf-banner-btn-secondary-bg: transparent;
    --wf-banner-btn-secondary-text: var(--color-text-on-dark, #ffffff);
    --wf-banner-btn-secondary-border: rgba(255, 255, 255, 0.4);
    --wf-banner-btn-secondary-hover-bg: rgba(255, 255, 255, 0.1);
    --wf-banner-padding: 3.5rem 1.5rem;
    --wf-banner-font-size: 1rem;

    background: linear-gradient(135deg, var(--wf-banner-gradient-start), var(--wf-banner-gradient-end));
    color: var(--wf-banner-text);
    padding: var(--wf-banner-padding);
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    font-size: var(--wf-banner-font-size);
    line-height: 1.5;
    width: 100%;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  /* Decorative background circles */
  .wf-banner-11::before,
  .wf-banner-11::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.06);
  }

  .wf-banner-11::before {
    width: 20rem;
    height: 20rem;
    top: -8rem;
    right: -4rem;
  }

  .wf-banner-11::after {
    width: 14rem;
    height: 14rem;
    bottom: -6rem;
    left: -3rem;
  }

  .wf-banner-11__inner {
    max-width: 48rem;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .wf-banner-11__title {
    margin: 0 0 0.75rem;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.02em;
  }

  .wf-banner-11__subtitle {
    margin: 0 0 2rem;
    font-size: 1.0625rem;
    color: var(--wf-banner-muted);
    max-width: 36rem;
    margin-left: auto;
    margin-right: auto;
  }

  .wf-banner-11__actions {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .wf-banner-11__btn {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    font-family: inherit;
    font-size: 0.9375rem;
    font-weight: 600;
    text-decoration: none;
    padding: 0.75rem 1.75rem;
    border-radius: var(--radius-md, 0.5rem);
    cursor: pointer;
    white-space: nowrap;
    transition: background-color 0.2s ease, opacity 0.2s ease;
  }

  .wf-banner-11__btn--primary {
    background-color: var(--wf-banner-btn-primary-bg);
    color: var(--wf-banner-btn-primary-text);
    border: 2px solid transparent;
  }

  .wf-banner-11__btn--primary:hover {
    background-color: var(--wf-banner-btn-primary-hover);
  }

  .wf-banner-11__btn--secondary {
    background-color: var(--wf-banner-btn-secondary-bg);
    color: var(--wf-banner-btn-secondary-text);
    border: 2px solid var(--wf-banner-btn-secondary-border);
  }

  .wf-banner-11__btn--secondary:hover {
    background-color: var(--wf-banner-btn-secondary-hover-bg);
  }

  @media (max-width: 48rem) {
    .wf-banner-11 {
      --wf-banner-padding: 2.5rem 1.25rem;
    }

    .wf-banner-11__title {
      font-size: 1.5rem;
    }

    .wf-banner-11__subtitle {
      font-size: 0.9375rem;
      margin-bottom: 1.5rem;
    }

    .wf-banner-11__actions {
      flex-direction: column;
    }

    .wf-banner-11__btn {
      width: 100%;
      justify-content: center;
    }
  }
</style>

<div class="wf-banner-11">
  <div class="wf-banner-11__inner">
    <h2 class="wf-banner-11__title">Decouvrez notre offre de lancement !</h2>
    <p class="wf-banner-11__subtitle">
      Offre speciale -20% avec le code WELCOME. Lancez votre projet avec des outils puissants et un accompagnement sur mesure.
    </p>
    <div class="wf-banner-11__actions">
      <a href="#" class="wf-banner-11__btn wf-banner-11__btn--primary">Commencer gratuitement</a>
      <a href="#" class="wf-banner-11__btn wf-banner-11__btn--secondary">En savoir plus &rarr;</a>
    </div>
  </div>
</div>
