<!-- error-14.html - 404 with contact form for reporting -->
<style>
  .wf-error-14 {
    --wf-bg: var(--color-bg, #ffffff);
    --wf-text: var(--color-text, #1a1a1a);
    --wf-text-muted: var(--color-text-light, #6b7280);
    --wf-primary: var(--color-text, #1a1a1a);
    --wf-primary-hover: var(--color-neutral-700, #333333);
    --wf-input-bg: var(--color-bg-alt, #f9fafb);
    --wf-input-border: var(--color-border, #e5e7eb);
    --wf-input-focus: var(--color-text, #1a1a1a);
    --wf-border: var(--color-border, #e5e7eb);
    --wf-font: var(--font-body);

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background-color: var(--wf-bg);
    font-family: var(--wf-font);
    color: var(--wf-text);
    padding: 2rem;
    box-sizing: border-box;
  }

  .wf-error-14__header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .wf-error-14__number {
    font-size: clamp(3.5rem, 8vw, 5rem);
    font-weight: 900;
    line-height: 1;
    margin: 0;
    color: var(--wf-border);
    letter-spacing: -0.04em;
  }

  .wf-error-14__title {
    font-size: clamp(1.5rem, 2.5vw, 2rem);
    font-weight: 700;
    margin: 0.5rem 0 0.5rem;
  }

  .wf-error-14__text {
    font-size: 1rem;
    color: var(--wf-text-muted);
    max-width: 28rem;
    line-height: 1.6;
    margin: 0;
  }

  .wf-error-14__form {
    width: 100%;
    max-width: 28rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .wf-error-14__form-group {
    display: flex;
    flex-direction: column;
    gap: 0.375rem;
  }

  .wf-error-14__label {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--wf-text);
  }

  .wf-error-14__input,
  .wf-error-14__textarea {
    padding: 0.75rem 1rem;
    font-size: 0.9375rem;
    font-family: var(--wf-font);
    border: 1px solid var(--wf-input-border);
    border-radius: var(--radius-md, 0.5rem);
    background-color: var(--wf-input-bg);
    color: var(--wf-text);
    outline: none;
    transition: border-color 0.2s ease;
  }

  .wf-error-14__input:focus,
  .wf-error-14__textarea:focus {
    border-color: var(--wf-input-focus);
  }

  .wf-error-14__textarea {
    resize: vertical;
    min-height: 6rem;
  }

  .wf-error-14__row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .wf-error-14__actions {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    margin-top: 0.5rem;
  }

  .wf-error-14__btn {
    padding: 0.875rem 1.75rem;
    background-color: var(--wf-primary);
    color: var(--color-text-on-dark);
    font-size: 0.9375rem;
    font-weight: 600;
    font-family: var(--wf-font);
    border: none;
    border-radius: var(--radius-md, 0.5rem);
    cursor: pointer;
    transition: background-color 0.2s ease;
  }

  .wf-error-14__btn:hover {
    background-color: var(--wf-primary-hover);
  }

  .wf-error-14__link {
    display: inline-flex;
    align-items: center;
    padding: 0.875rem 1.75rem;
    color: var(--wf-text-muted);
    text-decoration: none;
    font-size: 0.9375rem;
    font-weight: 500;
    transition: color 0.2s ease;
  }

  .wf-error-14__link:hover {
    color: var(--wf-text);
  }

  @media (max-width: 480px) {
    .wf-error-14__row {
      grid-template-columns: 1fr;
    }
  }
</style>

<section class="wf-error-14">
  <div class="wf-error-14__header">
    <p class="wf-error-14__number">404</p>
    <h1 class="wf-error-14__title">Page introuvable</h1>
    <p class="wf-error-14__text">Vous pensez qu'il s'agit d'une erreur ? Signalez-la et nous verifierons.</p>
  </div>

  <form class="wf-error-14__form" action="#" method="post">
    <div class="wf-error-14__row">
      <div class="wf-error-14__form-group">
        <label class="wf-error-14__label" for="wf14-name">Nom</label>
        <input type="text" id="wf14-name" name="name" class="wf-error-14__input" placeholder="Votre nom" />
      </div>
      <div class="wf-error-14__form-group">
        <label class="wf-error-14__label" for="wf14-email">Courriel</label>
        <input type="email" id="wf14-email" name="email" class="wf-error-14__input" placeholder="votre@email.com" />
      </div>
    </div>

    <div class="wf-error-14__form-group">
      <label class="wf-error-14__label" for="wf14-url">URL visitee</label>
      <input type="text" id="wf14-url" name="url" class="wf-error-14__input" placeholder="https://..." />
    </div>

    <div class="wf-error-14__form-group">
      <label class="wf-error-14__label" for="wf14-message">Description du probleme</label>
      <textarea id="wf14-message" name="message" class="wf-error-14__textarea" placeholder="Decrivez ce que vous cherchiez..."></textarea>
    </div>

    <div class="wf-error-14__actions">
      <button type="submit" class="wf-error-14__btn">Envoyer le signalement</button>
      <a href="#" class="wf-error-14__link">Retour a l'accueil</a>
    </div>
  </form>
</section>
