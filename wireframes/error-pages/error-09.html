<!-- error-09.html - 404 with animated number (CSS pulse/bounce) -->
<style>
  @keyframes wf-bounce {
    0%, 100% {
      transform: translateY(0);
    }
    50% {
      transform: translateY(-1rem);
    }
  }

  @keyframes wf-pulse {
    0%, 100% {
      opacity: 1;
    }
    50% {
      opacity: 0.6;
    }
  }

  .wf-error-09 {
    --wf-bg: var(--color-bg, #ffffff);
    --wf-text: var(--color-text, #1a1a1a);
    --wf-text-muted: var(--color-text-light, #6b7280);
    --wf-primary: var(--color-text, #1a1a1a);
    --wf-primary-hover: var(--color-neutral-700, #333333);
    --wf-accent: var(--color-text, #374151);
    --wf-accent-light: var(--color-bg-alt, #f3f4f6);
    --wf-font: var(--font-body);

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background-color: var(--wf-bg);
    font-family: var(--wf-font);
    color: var(--wf-text);
    text-align: center;
    padding: 2rem;
    box-sizing: border-box;
  }

  .wf-error-09__numbers {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    margin-bottom: 2rem;
  }

  .wf-error-09__digit {
    font-size: clamp(5rem, 14vw, 10rem);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.03em;
    display: inline-block;
  }

  .wf-error-09__digit:nth-child(1) {
    animation: wf-bounce 2s ease-in-out infinite;
    animation-delay: 0s;
  }

  .wf-error-09__digit:nth-child(2) {
    animation: wf-bounce 2s ease-in-out infinite;
    animation-delay: 0.15s;
    color: var(--wf-accent);
  }

  .wf-error-09__digit:nth-child(3) {
    animation: wf-bounce 2s ease-in-out infinite;
    animation-delay: 0.3s;
  }

  .wf-error-09__title {
    font-size: clamp(1.5rem, 3vw, 2.25rem);
    font-weight: 700;
    margin: 0 0 0.75rem;
  }

  .wf-error-09__text {
    font-size: 1rem;
    color: var(--wf-text-muted);
    max-width: 26rem;
    line-height: 1.6;
    margin: 0 0 2.5rem;
  }

  .wf-error-09__btn {
    display: inline-block;
    padding: 0.875rem 2rem;
    background-color: var(--wf-primary);
    color: var(--color-text-on-dark);
    text-decoration: none;
    font-size: 1rem;
    font-weight: 600;
    border-radius: var(--radius-md, 0.5rem);
    transition: background-color 0.2s ease;
  }

  .wf-error-09__btn:hover {
    background-color: var(--wf-primary-hover);
  }

  @media (prefers-reduced-motion: reduce) {
    .wf-error-09__digit {
      animation: none !important;
    }
  }
</style>

<section class="wf-error-09">
  <div class="wf-error-09__numbers">
    <span class="wf-error-09__digit">4</span>
    <span class="wf-error-09__digit">0</span>
    <span class="wf-error-09__digit">4</span>
  </div>
  <h1 class="wf-error-09__title">Page introuvable</h1>
  <p class="wf-error-09__text">La page que vous cherchez n'existe pas ou a ete déplacée.</p>
  <a href="#" class="wf-error-09__btn">Retour a l'accueil</a>
</section>
