<!-- error-12.html - Under maintenance page (tools icon + message) -->
<style>
  .wf-error-12 {
    --wf-bg: var(--color-bg-alt, #f9fafb);
    --wf-text: var(--color-text, #1a1a1a);
    --wf-text-muted: var(--color-text-light, #6b7280);
    --wf-primary: var(--color-text, #1a1a1a);
    --wf-accent: var(--color-text-light, #6b7280);
    --wf-accent-bg: var(--color-bg-alt, #f9fafb);
    --wf-accent-border: var(--color-border, #e5e7eb);
    --wf-border: var(--color-border, #e5e7eb);
    --wf-font: var(--font-body);

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background-color: var(--wf-bg);
    font-family: var(--wf-font);
    color: var(--wf-text);
    text-align: center;
    padding: 2rem;
    box-sizing: border-box;
  }

  .wf-error-12__icon {
    width: 5rem;
    height: 5rem;
    background-color: var(--wf-accent-bg);
    border: 1px solid var(--wf-accent-border);
    border-radius: var(--radius-xl, 1rem);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2rem;
  }

  .wf-error-12__icon-symbol {
    font-size: 2.25rem;
    line-height: 1;
  }

  .wf-error-12__title {
    font-size: clamp(1.75rem, 3.5vw, 2.75rem);
    font-weight: 800;
    margin: 0 0 0.75rem;
    line-height: 1.15;
  }

  .wf-error-12__subtitle {
    font-size: clamp(1.0625rem, 1.5vw, 1.25rem);
    font-weight: 500;
    color: var(--wf-text-muted);
    margin: 0 0 1.5rem;
  }

  .wf-error-12__text {
    font-size: 1rem;
    color: var(--wf-text-muted);
    max-width: 30rem;
    line-height: 1.6;
    margin: 0 0 2.5rem;
  }

  .wf-error-12__progress-wrap {
    width: 100%;
    max-width: 20rem;
    margin-bottom: 2.5rem;
  }

  .wf-error-12__progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.8125rem;
    font-weight: 500;
    color: var(--wf-text-muted);
    margin-bottom: 0.5rem;
  }

  .wf-error-12__progress-bar {
    width: 100%;
    height: 0.5rem;
    background-color: var(--wf-border);
    border-radius: var(--radius-xl, 1rem);
    overflow: hidden;
  }

  .wf-error-12__progress-fill {
    width: 65%;
    height: 100%;
    background-color: var(--wf-accent);
    border-radius: var(--radius-xl, 1rem);
  }

  .wf-error-12__contact {
    font-size: 0.875rem;
    color: var(--wf-text-muted);
    margin: 0;
  }

  .wf-error-12__contact-link {
    color: var(--wf-primary);
    text-decoration: underline;
    text-underline-offset: 0.2em;
    font-weight: 500;
  }

  .wf-error-12__contact-link:hover {
    text-decoration-thickness: 2px;
  }
</style>

<section class="wf-error-12">
  <div class="wf-error-12__icon">
    <span class="wf-error-12__icon-symbol" aria-hidden="true">&#128295;</span>
  </div>
  <h1 class="wf-error-12__title">Site en maintenance</h1>
  <p class="wf-error-12__subtitle">Nous revenons bientot</p>
  <p class="wf-error-12__text">Nous effectuons actuellement une mise a jour pour améliorer votre expérience. Le site sera de nouveau disponible dans quelques instants.</p>

  <div class="wf-error-12__progress-wrap">
    <div class="wf-error-12__progress-label">
      <span>Progression</span>
      <span>65%</span>
    </div>
    <div class="wf-error-12__progress-bar">
      <div class="wf-error-12__progress-fill"></div>
    </div>
  </div>

  <p class="wf-error-12__contact">
    En cas d'urgence, contactez-nous a
    <a href="mailto:support@example.com" class="wf-error-12__contact-link">support@example.com</a>
  </p>
</section>
