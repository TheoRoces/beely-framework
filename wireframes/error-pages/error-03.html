<!-- error-03.html - 404 with illustration placeholder + playful text -->
<style>
  .wf-error-03 {
    --wf-bg: var(--color-bg-alt, #fafafa);
    --wf-text: var(--color-text, #1a1a1a);
    --wf-text-muted: var(--color-text-light, #6b7280);
    --wf-primary: var(--color-text, #1a1a1a);
    --wf-primary-hover: var(--color-neutral-700, #333333);
    --wf-illust-bg: var(--color-border, #e5e7eb);
    --wf-illust-border: var(--color-border, #e5e7eb);
    --wf-font: var(--font-body);

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background-color: var(--wf-bg);
    font-family: var(--wf-font);
    color: var(--wf-text);
    text-align: center;
    padding: 2rem;
    box-sizing: border-box;
  }

  .wf-error-03__illust {
    width: clamp(12rem, 30vw, 20rem);
    aspect-ratio: 4 / 3;
    background-color: var(--wf-illust-bg);
    border: 2px dashed var(--wf-illust-border);
    border-radius: var(--radius-xl, 1rem);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2.5rem;
  }

  .wf-error-03__illust-text {
    font-size: 0.8125rem;
    color: var(--wf-text-muted);
    font-weight: 500;
  }

  .wf-error-03__title {
    font-size: clamp(1.75rem, 3.5vw, 2.75rem);
    font-weight: 800;
    margin: 0 0 0.75rem;
    line-height: 1.15;
  }

  .wf-error-03__text {
    font-size: clamp(1rem, 1.5vw, 1.125rem);
    color: var(--wf-text-muted);
    max-width: 30rem;
    line-height: 1.6;
    margin: 0 0 2rem;
  }

  .wf-error-03__btn {
    display: inline-block;
    padding: 0.875rem 2rem;
    background-color: var(--wf-primary);
    color: var(--color-text-on-dark);
    text-decoration: none;
    font-size: 1rem;
    font-weight: 600;
    border-radius: var(--radius-md, 0.5rem);
    transition: background-color 0.2s ease;
  }

  .wf-error-03__btn:hover {
    background-color: var(--wf-primary-hover);
  }
</style>

<section class="wf-error-03">
  <div class="wf-error-03__illust">
    <span class="wf-error-03__illust-text">[Illustration 404]</span>
  </div>
  <h1 class="wf-error-03__title">Oups ! On s'est perdus...</h1>
  <p class="wf-error-03__text">Cette page a peut-etre pris des vacances. En attendant, retournez sur un terrain connu.</p>
  <a href="#" class="wf-error-03__btn">Retour a l'accueil</a>
</section>
