<!-- error-07.html - 403 forbidden page -->
<style>
  .wf-error-07 {
    --wf-bg: var(--color-bg, #ffffff);
    --wf-text: var(--color-text, #1a1a1a);
    --wf-text-muted: var(--color-text-light, #6b7280);
    --wf-primary: var(--color-text, #1a1a1a);
    --wf-primary-hover: var(--color-neutral-700, #333333);
    --wf-warn: var(--color-text-light, #6b7280);
    --wf-warn-bg: var(--color-bg-alt, #f9fafb);
    --wf-warn-border: var(--color-border, #e5e7eb);
    --wf-icon-bg: var(--color-neutral-100, #f3f4f6);
    --wf-font: var(--font-body);

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background-color: var(--wf-bg);
    font-family: var(--wf-font);
    color: var(--wf-text);
    text-align: center;
    padding: 2rem;
    box-sizing: border-box;
  }

  .wf-error-07__icon {
    width: 4.5rem;
    height: 4.5rem;
    background-color: var(--wf-warn-bg);
    border: 1px solid var(--wf-warn-border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.75rem;
  }

  .wf-error-07__icon-lock {
    font-size: 1.75rem;
    line-height: 1;
    color: var(--wf-warn);
  }

  .wf-error-07__number {
    font-size: clamp(3rem, 6vw, 4.5rem);
    font-weight: 900;
    line-height: 1;
    margin: 0 0 0.5rem;
    letter-spacing: -0.03em;
  }

  .wf-error-07__title {
    font-size: clamp(1.5rem, 2.5vw, 2rem);
    font-weight: 700;
    margin: 0 0 0.75rem;
    line-height: 1.2;
  }

  .wf-error-07__text {
    font-size: 1rem;
    color: var(--wf-text-muted);
    max-width: 28rem;
    line-height: 1.6;
    margin: 0 0 1.5rem;
  }

  .wf-error-07__notice {
    width: 100%;
    max-width: 28rem;
    background-color: var(--wf-warn-bg);
    border: 1px solid var(--wf-warn-border);
    border-radius: var(--radius-lg, 0.75rem);
    padding: 1rem 1.25rem;
    text-align: left;
    margin-bottom: 2rem;
  }

  .wf-error-07__notice-text {
    font-size: 0.875rem;
    color: var(--wf-warn);
    margin: 0;
    line-height: 1.5;
  }

  .wf-error-07__actions {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .wf-error-07__btn {
    display: inline-block;
    padding: 0.875rem 1.75rem;
    background-color: var(--wf-primary);
    color: var(--color-text-on-dark);
    text-decoration: none;
    font-size: 0.9375rem;
    font-weight: 600;
    border-radius: var(--radius-md, 0.5rem);
    transition: background-color 0.2s ease;
  }

  .wf-error-07__btn:hover {
    background-color: var(--wf-primary-hover);
  }

  .wf-error-07__btn--outline {
    background-color: transparent;
    color: var(--wf-text);
    border: 1px solid var(--color-border, #e5e7eb);
  }

  .wf-error-07__btn--outline:hover {
    background-color: var(--color-bg-alt, #f9fafb);
  }
</style>

<section class="wf-error-07">
  <div class="wf-error-07__icon">
    <span class="wf-error-07__icon-lock" aria-hidden="true">&#128274;</span>
  </div>
  <p class="wf-error-07__number">403</p>
  <h1 class="wf-error-07__title">Acces interdit</h1>
  <p class="wf-error-07__text">Vous n'avez pas les autorisations necessaires pour acceder a cette page.</p>

  <div class="wf-error-07__notice">
    <p class="wf-error-07__notice-text">Si vous pensez qu'il s'agit d'une erreur, veuillez contacter l'administrateur ou vous connecter avec un compte autorise.</p>
  </div>

  <div class="wf-error-07__actions">
    <a href="#" class="wf-error-07__btn">Retour a l'accueil</a>
    <a href="#" class="wf-error-07__btn wf-error-07__btn--outline">Se connecter</a>
  </div>
</section>
