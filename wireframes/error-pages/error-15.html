<!-- error-15.html - Creative: broken/glitch text effect (CSS) -->
<style>
  @keyframes wf-glitch-1 {
    0%, 100% {
      clip-path: inset(0 0 95% 0);
      transform: translate(0);
    }
    10% {
      clip-path: inset(20% 0 60% 0);
      transform: translate(-4px, 2px);
    }
    20% {
      clip-path: inset(50% 0 30% 0);
      transform: translate(4px, -1px);
    }
    30% {
      clip-path: inset(10% 0 75% 0);
      transform: translate(-2px, 1px);
    }
    40% {
      clip-path: inset(60% 0 10% 0);
      transform: translate(3px, -2px);
    }
    50% {
      clip-path: inset(30% 0 50% 0);
      transform: translate(-3px, 0);
    }
    60% {
      clip-path: inset(80% 0 5% 0);
      transform: translate(2px, 2px);
    }
    70% {
      clip-path: inset(5% 0 85% 0);
      transform: translate(-1px, -1px);
    }
    80% {
      clip-path: inset(40% 0 40% 0);
      transform: translate(4px, 1px);
    }
    90% {
      clip-path: inset(70% 0 15% 0);
      transform: translate(-2px, -2px);
    }
  }

  @keyframes wf-glitch-2 {
    0%, 100% {
      clip-path: inset(95% 0 0 0);
      transform: translate(0);
    }
    10% {
      clip-path: inset(60% 0 20% 0);
      transform: translate(3px, -2px);
    }
    20% {
      clip-path: inset(30% 0 50% 0);
      transform: translate(-3px, 1px);
    }
    30% {
      clip-path: inset(75% 0 10% 0);
      transform: translate(2px, -1px);
    }
    40% {
      clip-path: inset(10% 0 60% 0);
      transform: translate(-4px, 2px);
    }
    50% {
      clip-path: inset(50% 0 30% 0);
      transform: translate(3px, 0);
    }
    60% {
      clip-path: inset(5% 0 80% 0);
      transform: translate(-2px, -2px);
    }
    70% {
      clip-path: inset(85% 0 5% 0);
      transform: translate(1px, 1px);
    }
    80% {
      clip-path: inset(40% 0 40% 0);
      transform: translate(-4px, -1px);
    }
    90% {
      clip-path: inset(15% 0 70% 0);
      transform: translate(2px, 2px);
    }
  }

  @keyframes wf-scanline {
    0% {
      top: -10%;
    }
    100% {
      top: 110%;
    }
  }

  .wf-error-15 {
    --wf-bg: var(--color-bg-dark, #0a0a0a);
    --wf-text: var(--color-neutral-100, #f5f5f5);
    --wf-text-muted: var(--color-neutral-500, #71717a);
    --wf-primary: var(--color-text-on-dark, #ffffff);
    --wf-primary-hover: var(--color-border, #e5e7eb);
    --wf-glitch-r: var(--color-text-light, #6b7280);
    --wf-glitch-b: var(--color-neutral-400, #9ca3af);
    --wf-font: var(--font-body);

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background-color: var(--wf-bg);
    font-family: var(--wf-font);
    color: var(--wf-text);
    text-align: center;
    padding: 2rem;
    box-sizing: border-box;
    position: relative;
    overflow: hidden;
  }

  .wf-error-15__scanline {
    position: absolute;
    top: -10%;
    left: 0;
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
    animation: wf-scanline 4s linear infinite;
    pointer-events: none;
  }

  .wf-error-15__glitch-wrap {
    position: relative;
    margin-bottom: 1.5rem;
  }

  .wf-error-15__number {
    font-size: clamp(7rem, 20vw, 14rem);
    font-weight: 900;
    line-height: 1;
    margin: 0;
    letter-spacing: -0.04em;
    color: var(--wf-text);
    position: relative;
  }

  .wf-error-15__number::before,
  .wf-error-15__number::after {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  .wf-error-15__number::before {
    color: var(--wf-glitch-r);
    animation: wf-glitch-1 3s infinite linear;
    z-index: -1;
  }

  .wf-error-15__number::after {
    color: var(--wf-glitch-b);
    animation: wf-glitch-2 3s infinite linear;
    animation-delay: 0.1s;
    z-index: -1;
  }

  .wf-error-15__title {
    font-size: clamp(1.25rem, 2.5vw, 1.75rem);
    font-weight: 600;
    margin: 0 0 0.75rem;
    color: var(--wf-text);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .wf-error-15__text {
    font-size: 1rem;
    color: var(--wf-text-muted);
    max-width: 26rem;
    line-height: 1.6;
    margin: 0 0 2.5rem;
  }

  .wf-error-15__btn {
    display: inline-block;
    padding: 0.875rem 2rem;
    background-color: transparent;
    color: var(--wf-primary);
    text-decoration: none;
    font-size: 1rem;
    font-weight: 600;
    border-radius: 0;
    border: 1px solid var(--wf-primary);
    letter-spacing: 0.05em;
    transition: background-color 0.2s ease, color 0.2s ease;
  }

  .wf-error-15__btn:hover {
    background-color: var(--wf-primary);
    color: var(--wf-bg);
  }

  @media (prefers-reduced-motion: reduce) {
    .wf-error-15__number::before,
    .wf-error-15__number::after {
      animation: none;
      display: none;
    }
    .wf-error-15__scanline {
      animation: none;
      display: none;
    }
  }
</style>

<section class="wf-error-15">
  <div class="wf-error-15__scanline"></div>

  <div class="wf-error-15__glitch-wrap">
    <p class="wf-error-15__number" data-text="404">404</p>
  </div>
  <h1 class="wf-error-15__title">Page introuvable</h1>
  <p class="wf-error-15__text">La page que vous cherchez n'existe pas ou a ete déplacée. Il semble que quelque chose se soit casse en chemin.</p>
  <a href="#" class="wf-error-15__btn">Retour a l'accueil</a>
</section>
