<!-- error-10.html - Split: left illustration + right text and button -->
<style>
  .wf-error-10 {
    --wf-bg: var(--color-bg, #ffffff);
    --wf-text: var(--color-text, #1a1a1a);
    --wf-text-muted: var(--color-text-light, #6b7280);
    --wf-primary: var(--color-text, #1a1a1a);
    --wf-primary-hover: var(--color-neutral-700, #333333);
    --wf-illust-bg: var(--color-neutral-100, #f3f4f6);
    --wf-illust-border: var(--color-border, #e5e7eb);
    --wf-font: var(--font-body);

    min-height: 100vh;
    background-color: var(--wf-bg);
    font-family: var(--wf-font);
    color: var(--wf-text);
    box-sizing: border-box;
  }

  .wf-error-10__left {
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: var(--wf-illust-bg);
    padding: 2rem;
  }

  .wf-error-10__illust {
    width: 80%;
    max-width: 24rem;
    aspect-ratio: 1 / 1;
    border: 2px dashed var(--wf-illust-border);
    border-radius: var(--radius-xl, 1rem);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wf-error-10__illust-text {
    font-size: 0.8125rem;
    color: var(--wf-text-muted);
    font-weight: 500;
  }

  .wf-error-10__right {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 3rem clamp(2rem, 5vw, 5rem);
  }

  .wf-error-10__label {
    font-size: 0.8125rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--wf-text-muted);
    margin: 0 0 0.75rem;
  }

  .wf-error-10__title {
    font-size: clamp(2rem, 3.5vw, 3rem);
    font-weight: 800;
    margin: 0 0 1rem;
    line-height: 1.1;
  }

  .wf-error-10__text {
    font-size: 1.0625rem;
    color: var(--wf-text-muted);
    max-width: 24rem;
    line-height: 1.6;
    margin: 0 0 2rem;
  }

  .wf-error-10__btn {
    display: inline-block;
    padding: 0.875rem 2rem;
    background-color: var(--wf-primary);
    color: var(--color-text-on-dark);
    text-decoration: none;
    font-size: 1rem;
    font-weight: 600;
    border-radius: var(--radius-md, 0.5rem);
    transition: background-color 0.2s ease;
  }

  .wf-error-10__btn:hover {
    background-color: var(--wf-primary-hover);
  }

  @media (max-width: 768px) {
    .wf-error-10 {
      grid-template-rows: auto 1fr;
    }

    .wf-error-10__left {
      min-height: 40vh;
    }

    .wf-error-10__right {
      align-items: center;
      text-align: center;
      padding: 2.5rem 1.5rem;
    }
  }
</style>

<section class="wf-error-10 grid" data-cols="2" data-gap="md">
  <div class="wf-error-10__left">
    <div class="wf-error-10__illust">
      <span class="wf-error-10__illust-text">[Illustration 404]</span>
    </div>
  </div>
  <div class="wf-error-10__right">
    <p class="wf-error-10__label">Erreur 404</p>
    <h1 class="wf-error-10__title">Page introuvable</h1>
    <p class="wf-error-10__text">La page que vous cherchez n'existe pas ou a ete déplacée. Verifiez l'adresse ou retournez à la page d'accueil.</p>
    <a href="#" class="wf-error-10__btn">Retour a l'accueil</a>
  </div>
</section>
