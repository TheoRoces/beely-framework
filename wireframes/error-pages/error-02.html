<!-- error-02.html - 404 with search bar to find the right page -->
<style>
  .wf-error-02 {
    --wf-bg: var(--color-bg, #ffffff);
    --wf-text: var(--color-text, #1a1a1a);
    --wf-text-muted: var(--color-text-light, #6b7280);
    --wf-primary: var(--color-text, #1a1a1a);
    --wf-primary-hover: var(--color-neutral-700, #333333);
    --wf-input-bg: var(--color-bg-alt, #f9fafb);
    --wf-input-border: var(--color-border, #e5e7eb);
    --wf-input-focus: var(--color-text, #1a1a1a);
    --wf-font: var(--font-body);

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background-color: var(--wf-bg);
    font-family: var(--wf-font);
    color: var(--wf-text);
    text-align: center;
    padding: 2rem;
    box-sizing: border-box;
  }

  .wf-error-02__label {
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--wf-text-muted);
    margin: 0 0 1rem;
  }

  .wf-error-02__title {
    font-size: clamp(2rem, 4vw, 3.5rem);
    font-weight: 800;
    margin: 0 0 1rem;
    line-height: 1.1;
  }

  .wf-error-02__text {
    font-size: clamp(1rem, 1.5vw, 1.125rem);
    color: var(--wf-text-muted);
    max-width: 28rem;
    line-height: 1.6;
    margin: 0 0 2.5rem;
  }

  .wf-error-02__search {
    display: flex;
    width: 100%;
    max-width: 28rem;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .wf-error-02__input {
    flex: 1;
    padding: 0.875rem 1rem;
    font-size: 1rem;
    font-family: var(--wf-font);
    border: 1px solid var(--wf-input-border);
    border-radius: var(--radius-md, 0.5rem);
    background-color: var(--wf-input-bg);
    color: var(--wf-text);
    outline: none;
    transition: border-color 0.2s ease;
  }

  .wf-error-02__input:focus {
    border-color: var(--wf-input-focus);
  }

  .wf-error-02__search-btn {
    padding: 0.875rem 1.5rem;
    background-color: var(--wf-primary);
    color: var(--color-text-on-dark);
    font-size: 1rem;
    font-weight: 600;
    font-family: var(--wf-font);
    border: none;
    border-radius: var(--radius-md, 0.5rem);
    cursor: pointer;
    transition: background-color 0.2s ease;
    white-space: nowrap;
  }

  .wf-error-02__search-btn:hover {
    background-color: var(--wf-primary-hover);
  }

  .wf-error-02__link {
    font-size: 0.9375rem;
    color: var(--wf-text-muted);
    text-decoration: none;
    border-bottom: 1px solid var(--wf-input-border);
    transition: color 0.2s ease, border-color 0.2s ease;
  }

  .wf-error-02__link:hover {
    color: var(--wf-text);
    border-color: var(--wf-text);
  }

  @media (max-width: 480px) {
    .wf-error-02__search {
      flex-direction: column;
    }
  }
</style>

<section class="wf-error-02">
  <p class="wf-error-02__label">Erreur 404</p>
  <h1 class="wf-error-02__title">Page introuvable</h1>
  <p class="wf-error-02__text">La page que vous cherchez n'existe pas ou a ete deplacee. Essayez une recherche pour trouver ce que vous cherchez.</p>
  <form class="wf-error-02__search" action="#" method="get">
    <input type="text" class="wf-error-02__input" name="q" placeholder="Rechercher sur le site..." />
    <button type="submit" class="wf-error-02__search-btn">Rechercher</button>
  </form>
  <a href="#" class="wf-error-02__link">Retour a l'accueil</a>
</section>
