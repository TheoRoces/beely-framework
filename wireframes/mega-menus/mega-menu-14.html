<!-- mega-menu-14: Mega-menu with user profile/account section -->
<style>
  .wf-megamenu-14 {
    --wf-mm-bg: var(--color-bg);
    --wf-mm-border: var(--color-border);
    --wf-mm-text: var(--color-text);
    --wf-mm-text-muted: var(--color-text-light);
    --wf-mm-hover: var(--color-neutral-100);
    --wf-mm-accent: var(--color-text);
    --wf-mm-accent-hover: var(--color-neutral-800);
    --wf-mm-avatar-bg: var(--color-neutral-100);
    --wf-mm-badge-bg: var(--color-neutral-100);
    --wf-mm-badge-text: var(--color-neutral-700);
    --wf-mm-radius: 12px;
    --wf-mm-shadow: 0 20px 60px rgba(0,0,0,0.1), 0 4px 16px rgba(0,0,0,0.05);
    --wf-mm-padding: 0;

    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    background: var(--wf-mm-bg);
    border: 1px solid var(--wf-mm-border);
    border-radius: var(--wf-mm-radius);
    box-shadow: var(--wf-mm-shadow);
    max-width: 820px;
    width: 100%;
    box-sizing: border-box;
    overflow: hidden;
  }

  .wf-megamenu-14 .wf-megamenu__profile {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1.25rem 2rem;
    background: var(--color-bg-alt);
    border-bottom: 1px solid var(--wf-mm-border);
  }

  .wf-megamenu-14 .wf-megamenu__avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--wf-mm-avatar-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.125rem;
    font-weight: 700;
    color: var(--wf-mm-accent);
    flex-shrink: 0;
  }

  .wf-megamenu-14 .wf-megamenu__profile-info {
    flex: 1;
    min-width: 0;
  }

  .wf-megamenu-14 .wf-megamenu__profile-name {
    font-size: 0.9375rem;
    font-weight: 600;
    color: var(--wf-mm-text);
    margin: 0;
  }

  .wf-megamenu-14 .wf-megamenu__profile-email {
    font-size: 0.8125rem;
    color: var(--wf-mm-text-muted);
    margin: 0;
  }

  .wf-megamenu-14 .wf-megamenu__profile-badge {
    font-size: 0.6875rem;
    font-weight: 600;
    color: var(--wf-mm-badge-text);
    background: var(--wf-mm-badge-bg);
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    white-space: nowrap;
  }

  .wf-megamenu-14 .wf-megamenu {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem;
    padding: 1.5rem 2rem;
  }

  .wf-megamenu-14 .wf-megamenu__group-title {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--wf-mm-text-muted);
    margin: 0 0 0.6rem 0;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--wf-mm-border);
  }

  .wf-megamenu-14 .wf-megamenu__link {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 0.5rem;
    color: var(--wf-mm-text);
    text-decoration: none;
    font-size: 0.875rem;
    border-radius: var(--radius-md, 0.5rem);
    transition: background 0.15s ease, color 0.15s ease;
  }

  .wf-megamenu-14 .wf-megamenu__link:hover {
    background: var(--wf-mm-hover);
    color: var(--wf-mm-accent);
  }

  .wf-megamenu-14 .wf-icon {
    color: var(--wf-mm-text-muted);
    flex-shrink: 0;
  }

  .wf-megamenu-14 .wf-megamenu__link:hover .wf-icon {
    color: var(--wf-mm-accent);
  }

  .wf-megamenu-14 .wf-megamenu__actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    border-top: 1px solid var(--wf-mm-border);
    background: var(--color-bg-alt);
  }

  .wf-megamenu-14 .wf-megamenu__action-link {
    font-size: 0.8125rem;
    color: var(--wf-mm-text-muted);
    text-decoration: none;
    transition: color 0.15s ease;
  }

  .wf-megamenu-14 .wf-megamenu__action-link:hover {
    color: var(--wf-mm-text);
  }

  .wf-megamenu-14 .wf-megamenu__action-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.5rem 1rem;
    background: var(--wf-mm-accent);
    color: var(--color-text-on-dark);
    text-decoration: none;
    font-size: 0.8125rem;
    font-weight: 600;
    border-radius: var(--radius-md, 0.5rem);
    transition: background 0.15s ease;
  }

  .wf-megamenu-14 .wf-megamenu__action-btn:hover {
    background: var(--wf-mm-accent-hover);
  }

  @media (max-width: 700px) {
    .wf-megamenu-14 .wf-megamenu {
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      padding: 1.25rem;
    }
  }

  @media (max-width: 480px) {
    .wf-megamenu-14 .wf-megamenu {
      grid-template-columns: 1fr;
    }
    .wf-megamenu-14 .wf-megamenu__profile {
      padding: 1rem 1.25rem;
    }
    .wf-megamenu-14 .wf-megamenu__actions {
      padding: 0.75rem 1.25rem;
      flex-direction: column;
      gap: 0.75rem;
      align-items: stretch;
      text-align: center;
    }
  }
</style>
