<!-- mega-menu-12: Sidebar-style - categories left panel + detail right -->
<style>
  .wf-megamenu-12 {
    --wf-mm-bg: var(--color-bg);
    --wf-mm-border: var(--color-border);
    --wf-mm-text: var(--color-text);
    --wf-mm-text-muted: var(--color-text-light);
    --wf-mm-hover: var(--color-neutral-100);
    --wf-mm-accent: var(--color-text);
    --wf-mm-sidebar-bg: var(--color-bg-alt);
    --wf-mm-active-bg: var(--color-bg-alt);
    --wf-mm-radius: 12px;
    --wf-mm-shadow: 0 20px 60px rgba(0,0,0,0.1), 0 4px 16px rgba(0,0,0,0.05);

    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    background: var(--wf-mm-bg);
    border: 1px solid var(--wf-mm-border);
    border-radius: var(--wf-mm-radius);
    box-shadow: var(--wf-mm-shadow);
    max-width: 820px;
    width: 100%;
    box-sizing: border-box;
    overflow: hidden;
  }

  .wf-megamenu-12 .wf-megamenu {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: 360px;
  }

  .wf-megamenu-12 .wf-megamenu__sidebar {
    background: var(--wf-mm-sidebar-bg);
    border-right: 1px solid var(--wf-mm-border);
    padding: 1rem 0.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.125rem;
  }

  .wf-megamenu-12 .wf-megamenu__sidebar-label {
    font-size: 0.6875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--wf-mm-text-muted);
    padding: 0.25rem 0.75rem 0.5rem;
    margin: 0;
  }

  .wf-megamenu-12 .wf-megamenu__sidebar-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 0.75rem;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--wf-mm-text);
    text-decoration: none;
    border-radius: var(--radius-md, 0.5rem);
    transition: all 0.15s ease;
  }

  .wf-megamenu-12 .wf-megamenu__sidebar-item:hover {
    background: var(--wf-mm-hover);
  }

  .wf-megamenu-12 .wf-megamenu__sidebar-item--active {
    background: var(--wf-mm-active-bg);
    color: var(--wf-mm-accent);
    font-weight: 600;
  }

  .wf-megamenu-12 .wf-megamenu__sidebar-icon {
    color: var(--wf-mm-text-muted);
  }

  .wf-megamenu-12 .wf-megamenu__sidebar-item--active .wf-megamenu__sidebar-icon {
    color: var(--wf-mm-accent);
  }

  .wf-megamenu-12 .wf-megamenu__detail {
    padding: 1.5rem 2rem;
  }

  .wf-megamenu-12 .wf-megamenu__group-title {
    font-size: 1.125rem;
    font-weight: 700;
    color: var(--wf-mm-text);
    margin: 0 0 0.25rem 0;
  }

  .wf-megamenu-12 .wf-megamenu__detail-desc {
    font-size: 0.8125rem;
    color: var(--wf-mm-text-muted);
    margin: 0 0 1.25rem 0;
    line-height: 1.5;
  }

  .wf-megamenu-12 .wf-megamenu__detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.25rem;
  }

  .wf-megamenu-12 .wf-megamenu__link {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.6rem 0.6rem;
    color: var(--wf-mm-text);
    text-decoration: none;
    font-size: 0.875rem;
    border-radius: var(--radius-md, 0.5rem);
    transition: background 0.15s ease, color 0.15s ease;
  }

  .wf-megamenu-12 .wf-megamenu__link:hover {
    background: var(--wf-mm-hover);
    color: var(--wf-mm-accent);
  }

  .wf-megamenu-12 .wf-icon {
    color: var(--wf-mm-accent);
    flex-shrink: 0;
  }

  .wf-megamenu-12 .wf-megamenu__detail-footer {
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 1px solid var(--wf-mm-border);
  }

  .wf-megamenu-12 .wf-megamenu__detail-cta {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--wf-mm-accent);
    text-decoration: none;
  }

  .wf-megamenu-12 .wf-megamenu__detail-cta:hover {
    text-decoration: underline;
  }

  @media (max-width: 640px) {
    .wf-megamenu-12 .wf-megamenu {
      grid-template-columns: 1fr;
    }
    .wf-megamenu-12 .wf-megamenu__sidebar {
      border-right: none;
      border-bottom: 1px solid var(--wf-mm-border);
      flex-direction: row;
      overflow-x: auto;
      padding: 0.5rem;
      gap: 0.25rem;
    }
    .wf-megamenu-12 .wf-megamenu__sidebar-label {
      display: none;
    }
    .wf-megamenu-12 .wf-megamenu__sidebar-item {
      white-space: nowrap;
      padding: 0.5rem 0.75rem;
    }
    .wf-megamenu-12 .wf-megamenu__sidebar-icon {
      display: none;
    }
    .wf-megamenu-12 .wf-megamenu__detail-grid {
      grid-template-columns: 1fr;
    }
    .wf-megamenu-12 .wf-megamenu__detail {
      padding: 1.25rem;
    }
  }
</style>
