<!-- mega-menu-02: 3-column link lists + 1 featured image/promo card -->
<style>
  .wf-megamenu-02 {
    --wf-mm-bg: var(--color-bg);
    --wf-mm-border: var(--color-border);
    --wf-mm-text: var(--color-text);
    --wf-mm-text-muted: var(--color-text-light);
    --wf-mm-hover: var(--color-neutral-100);
    --wf-mm-accent: var(--color-text);
    --wf-mm-radius: 12px;
    --wf-mm-shadow: 0 20px 60px rgba(0,0,0,0.1), 0 4px 16px rgba(0,0,0,0.05);
    --wf-mm-gap: 2rem;
    --wf-mm-padding: 2rem;
    --wf-mm-promo-bg: var(--color-bg-alt);

    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    background: var(--wf-mm-bg);
    border: 1px solid var(--wf-mm-border);
    border-radius: var(--wf-mm-radius);
    box-shadow: var(--wf-mm-shadow);
    padding: var(--wf-mm-padding);
    max-width: 960px;
    width: 100%;
    box-sizing: border-box;
  }

  .wf-megamenu-02 .wf-megamenu {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1.2fr;
    gap: var(--wf-mm-gap);
  }

  .wf-megamenu-02 .wf-megamenu__group-title {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--wf-mm-text-muted);
    margin: 0 0 0.75rem 0;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--wf-mm-border);
  }

  .wf-megamenu-02 .wf-megamenu__link {
    display: block;
    padding: 0.4rem 0.5rem;
    color: var(--wf-mm-text);
    text-decoration: none;
    font-size: 0.875rem;
    border-radius: var(--radius-md, 0.5rem);
    transition: background 0.15s ease, color 0.15s ease;
  }

  .wf-megamenu-02 .wf-megamenu__link:hover {
    background: var(--wf-mm-hover);
    color: var(--wf-mm-accent);
  }

  .wf-megamenu-02 .wf-megamenu__promo {
    background: var(--wf-mm-promo-bg);
    border-radius: var(--radius-lg, 0.75rem);
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .wf-megamenu-02 .wf-megamenu__promo-image {
    width: 100%;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, var(--color-bg-alt), var(--color-border));
    border-radius: var(--radius-md, 0.5rem);
  }

  .wf-megamenu-02 .wf-megamenu__promo-title {
    font-size: 0.9375rem;
    font-weight: 600;
    color: var(--wf-mm-text);
    margin: 0;
  }

  .wf-megamenu-02 .wf-megamenu__promo-desc {
    font-size: 0.8125rem;
    color: var(--wf-mm-text-muted);
    margin: 0;
    line-height: 1.5;
  }

  .wf-megamenu-02 .wf-megamenu__promo-cta {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--wf-mm-accent);
    text-decoration: none;
    margin-top: auto;
  }

  .wf-megamenu-02 .wf-megamenu__promo-cta:hover {
    text-decoration: underline;
  }

  @media (max-width: 768px) {
    .wf-megamenu-02 .wf-megamenu {
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    .wf-megamenu-02 .wf-megamenu__promo {
      grid-column: 1 / -1;
    }
  }

  @media (max-width: 480px) {
    .wf-megamenu-02 .wf-megamenu {
      grid-template-columns: 1fr;
    }
    .wf-megamenu-02 {
      padding: 1.25rem;
    }
  }
</style>

<div class="wf-megamenu-02">

      <h3 class="wf-megamenu__group-title">Produits</h3>
      <a href="#" class="wf-megamenu__link">Design UI/UX</a>

    <div class="wf-megamenu__column">

      <a href="#" class="wf-megamenu__link">Documentation</a>
    </div>
    <div class="wf-megamenu__column">
      <h3 class="wf-megamenu__group-title">Entreprise</h3>
      <a href="#" class="wf-megamenu__link">A propos</a>

      </a>
    </div>
  </nav>
</div>
