<!-- mega-menu-01: 4-column dropdown with catégories and link lists -->
<style>
  .wf-megamenu-01 {
    --wf-mm-bg: var(--color-bg);
    --wf-mm-border: var(--color-border);
    --wf-mm-text: var(--color-text);
    --wf-mm-text-muted: var(--color-text-light);
    --wf-mm-hover: var(--color-neutral-100);
    --wf-mm-accent: var(--color-text);
    --wf-mm-radius: 12px;
    --wf-mm-shadow: 0 20px 60px rgba(0,0,0,0.1), 0 4px 16px rgba(0,0,0,0.05);
    --wf-mm-gap: 2rem;
    --wf-mm-padding: 2rem;

    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    background: var(--wf-mm-bg);
    border: 1px solid var(--wf-mm-border);
    border-radius: var(--wf-mm-radius);
    box-shadow: var(--wf-mm-shadow);
    padding: var(--wf-mm-padding);
    max-width: 900px;
    width: 100%;
    box-sizing: border-box;
  }

  .wf-megamenu-01 .wf-megamenu {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--wf-mm-gap);
  }

  .wf-megamenu-01 .wf-megamenu__group-title {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--wf-mm-text-muted);
    margin: 0 0 0.75rem 0;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--wf-mm-border);
  }

  .wf-megamenu-01 .wf-megamenu__link {
    display: block;
    padding: 0.4rem 0.5rem;
    color: var(--wf-mm-text);
    text-decoration: none;
    font-size: 0.875rem;
    border-radius: var(--radius-md, 0.5rem);
    transition: background 0.15s ease, color 0.15s ease;
  }

  .wf-megamenu-01 .wf-megamenu__link:hover {
    background: var(--wf-mm-hover);
    color: var(--wf-mm-accent);
  }

  @media (max-width: 768px) {
    .wf-megamenu-01 .wf-megamenu {
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }
  }

  @media (max-width: 480px) {
    .wf-megamenu-01 .wf-megamenu {
      grid-template-columns: 1fr;
      gap: 1.25rem;
    }
    .wf-megamenu-01 {
      padding: 1.25rem;
    }
  }
</style>

<div class="wf-megamenu-01">
