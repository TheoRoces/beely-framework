<!-- mega-menu-13: Minimal 2-column link list, no icons -->
<style>
  .wf-megamenu-13 {
    --wf-mm-bg: var(--color-bg);
    --wf-mm-border: var(--color-border);
    --wf-mm-text: var(--color-text);
    --wf-mm-text-muted: var(--color-text-light);
    --wf-mm-hover: var(--color-neutral-100);
    --wf-mm-accent: var(--color-text);
    --wf-mm-radius: 12px;
    --wf-mm-shadow: 0 20px 60px rgba(0,0,0,0.1), 0 4px 16px rgba(0,0,0,0.05);
    --wf-mm-padding: 1.5rem 2rem;

    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    background: var(--wf-mm-bg);
    border: 1px solid var(--wf-mm-border);
    border-radius: var(--wf-mm-radius);
    box-shadow: var(--wf-mm-shadow);
    padding: var(--wf-mm-padding);
    max-width: 480px;
    width: 100%;
    box-sizing: border-box;
  }

  .wf-megamenu-13 .wf-megamenu {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }

  .wf-megamenu-13 .wf-megamenu__group-title {
    font-size: 0.6875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--wf-mm-text-muted);
    margin: 0 0 0.6rem 0;
  }

  .wf-megamenu-13 .wf-megamenu__links {
    display: flex;
    flex-direction: column;
    gap: 0.0625rem;
  }

  .wf-megamenu-13 .wf-megamenu__link {
    display: block;
    padding: 0.35rem 0.4rem;
    color: var(--wf-mm-text);
    text-decoration: none;
    font-size: 0.875rem;
    border-radius: var(--radius-md, 0.5rem);
    transition: background 0.15s ease, color 0.15s ease;
    line-height: 1.4;
  }

  .wf-megamenu-13 .wf-megamenu__link:hover {
    background: var(--wf-mm-hover);
    color: var(--wf-mm-accent);
  }

  @media (max-width: 400px) {
    .wf-megamenu-13 .wf-megamenu {
      grid-template-columns: 1fr;
      gap: 1.25rem;
    }
    .wf-megamenu-13 {
      padding: 1.25rem;
    }
  }
</style>

<div class="wf-megamenu-13">

      </div>
    </div>
    <div class="wf-megamenu__column">

      <div class="wf-megamenu__links">
        <a href="#" class="wf-megamenu__link">À propos</a>
