<!-- mega-menu-07: Simple dropdown list with icons -->
<style>
  .wf-megamenu-07 {
    --wf-mm-bg: var(--color-bg);
    --wf-mm-border: var(--color-border);
    --wf-mm-text: var(--color-text);
    --wf-mm-text-muted: var(--color-text-light);
    --wf-mm-hover: var(--color-neutral-100);
    --wf-mm-accent: var(--color-text);
    --wf-mm-radius: 12px;
    --wf-mm-shadow: 0 20px 60px rgba(0,0,0,0.1), 0 4px 16px rgba(0,0,0,0.05);
    --wf-mm-padding: 0.5rem;

    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    background: var(--wf-mm-bg);
    border: 1px solid var(--wf-mm-border);
    border-radius: var(--wf-mm-radius);
    box-shadow: var(--wf-mm-shadow);
    padding: var(--wf-mm-padding);
    max-width: 280px;
    width: 100%;
    box-sizing: border-box;
  }

  .wf-megamenu-07 .wf-megamenu {
    display: flex;
    flex-direction: column;
    gap: 0.125rem;
  }

  .wf-megamenu-07 .wf-megamenu__group-title {
    font-size: 0.6875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--wf-mm-text-muted);
    margin: 0;
    padding: 0.5rem 0.75rem 0.25rem;
  }

  .wf-megamenu-07 .wf-megamenu__divider {
    height: 1px;
    background: var(--wf-mm-border);
    margin: 0.375rem 0.5rem;
  }

  .wf-megamenu-07 .wf-megamenu__link {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.5rem 0.75rem;
    color: var(--wf-mm-text);
    text-decoration: none;
    font-size: 0.875rem;
    border-radius: var(--radius-md, 0.5rem);
    transition: background 0.15s ease, color 0.15s ease;
  }

  .wf-megamenu-07 .wf-megamenu__link:hover {
    background: var(--wf-mm-hover);
    color: var(--wf-mm-accent);
  }

  .wf-megamenu-07 .wf-icon {
    color: var(--wf-mm-text-muted);
    flex-shrink: 0;
    transition: color 0.15s ease;
  }

  .wf-megamenu-07 .wf-megamenu__link:hover .wf-icon {
    color: var(--wf-mm-accent);
  }
</style>
