<!-- mega-menu-09: Mega-menu with search bar at top -->
<style>
  .wf-megamenu-09 {
    --wf-mm-bg: var(--color-bg);
    --wf-mm-border: var(--color-border);
    --wf-mm-text: var(--color-text);
    --wf-mm-text-muted: var(--color-text-light);
    --wf-mm-hover: var(--color-neutral-100);
    --wf-mm-accent: var(--color-text);
    --wf-mm-search-bg: var(--color-bg-alt);
    --wf-mm-radius: 12px;
    --wf-mm-shadow: 0 20px 60px rgba(0,0,0,0.1), 0 4px 16px rgba(0,0,0,0.05);
    --wf-mm-padding: 0;

    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    background: var(--wf-mm-bg);
    border: 1px solid var(--wf-mm-border);
    border-radius: var(--wf-mm-radius);
    box-shadow: var(--wf-mm-shadow);
    max-width: 860px;
    width: 100%;
    box-sizing: border-box;
    overflow: hidden;
  }

  .wf-megamenu-09 .wf-megamenu__search {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 1rem 1.5rem;
    background: var(--wf-mm-search-bg);
    border-bottom: 1px solid var(--wf-mm-border);
  }

  .wf-megamenu-09 .wf-megamenu__search-icon {
    color: var(--wf-mm-text-muted);
    flex-shrink: 0;
  }

  .wf-megamenu-09 .wf-megamenu__search-input {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 0.9375rem;
    color: var(--wf-mm-text);
    outline: none;
    font-family: inherit;
  }

  .wf-megamenu-09 .wf-megamenu__search-input::placeholder {
    color: var(--wf-mm-text-muted);
  }

  .wf-megamenu-09 .wf-megamenu__search-shortcut {
    font-size: 0.6875rem;
    color: var(--wf-mm-text-muted);
    border: 1px solid var(--wf-mm-border);
    border-radius: var(--radius-sm, 0.25rem);
    padding: 0.15rem 0.4rem;
    background: var(--wf-mm-bg);
  }

  .wf-megamenu-09 .wf-megamenu {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem;
    padding: 1.5rem 2rem 2rem;
  }

  .wf-megamenu-09 .wf-megamenu__group-title {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--wf-mm-text-muted);
    margin: 0 0 0.75rem 0;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--wf-mm-border);
  }

  .wf-megamenu-09 .wf-megamenu__link {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 0.5rem;
    color: var(--wf-mm-text);
    text-decoration: none;
    font-size: 0.875rem;
    border-radius: var(--radius-md, 0.5rem);
    transition: background 0.15s ease, color 0.15s ease;
  }

  .wf-megamenu-09 .wf-megamenu__link:hover {
    background: var(--wf-mm-hover);
    color: var(--wf-mm-accent);
  }

  .wf-megamenu-09 .wf-icon {
    color: var(--wf-mm-text-muted);
    flex-shrink: 0;
  }

  .wf-megamenu-09 .wf-megamenu__link:hover .wf-icon {
    color: var(--wf-mm-accent);
  }

  .wf-megamenu-09 .wf-megamenu__popular {
    grid-column: 1 / -1;
    padding-top: 1rem;
    border-top: 1px solid var(--wf-mm-border);
  }

  .wf-megamenu-09 .wf-megamenu__popular-title {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--wf-mm-text-muted);
    margin: 0 0 0.5rem 0;
  }

  .wf-megamenu-09 .wf-megamenu__tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .wf-megamenu-09 .wf-megamenu__tag {
    font-size: 0.8125rem;
    color: var(--wf-mm-text);
    text-decoration: none;
    padding: 0.3rem 0.75rem;
    border: 1px solid var(--wf-mm-border);
    border-radius: 20px;
    transition: all 0.15s ease;
  }

  .wf-megamenu-09 .wf-megamenu__tag:hover {
    border-color: var(--wf-mm-accent);
    color: var(--wf-mm-accent);
    background: var(--color-neutral-100);
  }

  @media (max-width: 700px) {
    .wf-megamenu-09 .wf-megamenu {
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      padding: 1.25rem;
    }
  }

  @media (max-width: 480px) {
    .wf-megamenu-09 .wf-megamenu {
      grid-template-columns: 1fr;
    }
  }
</style>
