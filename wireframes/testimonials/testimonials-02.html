<!-- Testimonials 02 : Single large centered testimonial with big quote marks -->
<style>
.wf-testimonials-02 {
  padding: var(--space-20, 5rem) var(--space-4, 1rem);
  max-width: 800px;
  margin: 0 auto;
  text-align: center;
}
.wf-testimonials-02 .wf-quote-mark {
  font-size: 6rem;
  line-height: 1;
  color: var(--color-text, #374151);
  font-family: Georgia, serif;
  margin-bottom: var(--space-2, 0.5rem);
  opacity: 0.3;
}
.wf-testimonials-02 .wf-stars {
  display: flex;
  justify-content: center;
  gap: 4px;
  color: var(--color-text, #374151);
  margin-bottom: var(--space-6, 1.5rem);
}
.wf-testimonials-02 .wf-quote {
  font-size: 1.5rem;

  color: var(--color-text, #1a1a1a);

  margin: 0 0 var(--space-8, 2rem);
}
.wf-testimonials-02 .wf-author {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-3, 0.75rem);
}
.wf-testimonials-02 .wf-avatar {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: var(--color-muted, #e5e7eb);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--color-text-muted, #6b7280);
}
.wf-testimonials-02 .wf-name {
  font-weight: 700;
  font-size: 1.125rem;
  color: var(--color-text, #1a1a1a);
}
.wf-testimonials-02 .wf-role {
  font-size: 0.9375rem;
  color: var(--color-text-muted, #6b7280);
}
.wf-testimonials-02 .wf-divider {
  width: 48px;
  height: 2px;
  background: var(--color-text, #374151);
  margin: 0 auto var(--space-6, 1.5rem);
}
</style>
