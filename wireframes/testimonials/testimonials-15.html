<!-- Testimonials 15 : Full-width testimonial with background image placeholder + overlay -->
<style>
.wf-testimonials-15 {
  position: relative;
  min-height: 500px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.wf-testimonials-15 .wf-bg {
  position: absolute;
  inset: 0;
  background: var(--color-muted, #d1d5db);
  z-index: 0;
}
.wf-testimonials-15 .wf-bg-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--color-text-muted, #9ca3af);
  font-size: 0.875rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.wf-testimonials-15 .wf-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.65);
  z-index: 1;
}
.wf-testimonials-15 .wf-content {
  position: relative;
  z-index: 2;
  max-width: 800px;
  padding: var(--space-16, 4rem) var(--space-6, 1.5rem);
  text-align: center;
  color: var(--color-text-on-dark);
}
.wf-testimonials-15 .wf-quote-mark {
  font-size: 5rem;
  line-height: 1;
  font-family: Georgia, serif;
  opacity: 0.4;
  margin-bottom: var(--space-2, 0.5rem);
}
.wf-testimonials-15 .wf-stars {
  display: flex;
  justify-content: center;
  gap: 4px;
  color: var(--color-text-on-dark);
  margin-bottom: var(--space-6, 1.5rem);
}
.wf-testimonials-15 .wf-quote {
  font-size: 1.5rem;
  line-height: 1.7;
  font-weight: 400;
  margin: 0 0 var(--space-8, 2rem);
}
.wf-testimonials-15 .wf-avatar {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: 2px solid rgba(255,255,255,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.8);
  margin: 0 auto var(--space-4, 1rem);
}
.wf-testimonials-15 .wf-name {
  font-weight: 700;
  font-size: 1.125rem;
  margin-bottom: 4px;
}
.wf-testimonials-15 .wf-role {
  font-size: 0.9375rem;
  opacity: 0.75;
}
@media (max-width: 640px) {
  .wf-testimonials-15 .wf-quote {
    font-size: 1.125rem;
  }
}
</style>
