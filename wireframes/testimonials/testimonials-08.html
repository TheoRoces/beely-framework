<!-- Testimonials 08 : Single testimonial with large avatar, company logo placeholder, and stats -->
<style>
.wf-testimonials-08 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  padding: var(--space-16, 4rem) var(--space-4, 1rem);
  max-width: 1000px;
  margin: 0 auto;
}
.wf-testimonials-08 .wf-wrapper {
  background: var(--color-surface, #ffffff);
  border: 1px solid var(--color-border, #e5e7eb);
  border-radius: var(--radius-xl, 16px);
  padding: var(--space-10, 2.5rem);
  display: flex;
  gap: var(--space-10, 2.5rem);
  align-items: center;
}
.wf-testimonials-08 .wf-left {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-4, 1rem);
}
.wf-testimonials-08 .wf-avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: var(--color-muted, #e5e7eb);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--color-text-muted, #6b7280);
}
.wf-testimonials-08 .wf-company-logo {
  width: 120px;
  height: 40px;
  background: var(--color-muted, #e5e7eb);
  border-radius: var(--radius-sm, 6px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  color: var(--color-text-muted, #6b7280);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.wf-testimonials-08 .wf-right {
  flex: 1;
}
.wf-testimonials-08 .wf-stars {
  display: flex;
  gap: 2px;
  color: var(--color-text, #374151);
  margin-bottom: var(--space-4, 1rem);
}
.wf-testimonials-08 .wf-quote {
  font-size: 1.25rem;
  line-height: 1.7;
  color: var(--color-text, #1a1a1a);
  margin: 0 0 var(--space-6, 1.5rem);
}
.wf-testimonials-08 .wf-name {
  font-weight: 700;
  font-size: 1.125rem;
  color: var(--color-text, #1a1a1a);
}
.wf-testimonials-08 .wf-role {
  font-size: 0.9375rem;
  color: var(--color-text-muted, #6b7280);
  margin-bottom: var(--space-6, 1.5rem);
}
.wf-testimonials-08 .wf-stats {
  display: flex;
  gap: var(--space-8, 2rem);
  border-top: 1px solid var(--color-border, #e5e7eb);
  padding-top: var(--space-6, 1.5rem);
}
.wf-testimonials-08 .wf-stat-value {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--color-text, #374151);
}
.wf-testimonials-08 .wf-stat-label {
  font-size: 0.8125rem;
  color: var(--color-text-muted, #6b7280);
}
@media (max-width: 768px) {
  .wf-testimonials-08 .wf-wrapper {
    flex-direction: column;
    text-align: center;
  }
  .wf-testimonials-08 .wf-stars { justify-content: center; }
  .wf-testimonials-08 .wf-stats { justify-content: center; }
}
</style>

<section class="wf-testimonials-08">
  <div class="wf-wrapper">
    <div class="wf-left">
      <div class="wf-avatar">
        <span data-icon="user" data-icon-type="outline" data-icon-size="24"></span>
      </div>
      <div class="wf-company-logo">Acme Corp</div>
    </div>
    <div class="wf-right">
      <div class="wf-stars">
        <span data-icon="star" data-icon-type="solid" data-icon-size="16"></span>
        <span data-icon="star" data-icon-type="solid" data-icon-size="16"></span>
        <span data-icon="star" data-icon-type="solid" data-icon-size="16"></span>
        <span data-icon="star" data-icon-type="solid" data-icon-size="16"></span>
        <span data-icon="star" data-icon-type="solid" data-icon-size="16"></span>

      <blockquote class="wf-quote">"Un service exceptionnel qui a transformé notre présence en ligne. Leur approche stratégique et leur créativité nous ont permis d'atteindre des résultats remarquables."</blockquote>

      <div class="wf-role">Directrice Marketing, Acme Corp</div>
      <div class="wf-stats">

          <div class="wf-stat-label">Trafic organique</div>
        </div>
        <div>
          <div class="wf-stat-value">+40%</div>
          <div class="wf-stat-label">Taux de conversion</div>
        </div>
        <div>
          <div class="wf-stat-value">3x</div>
          <div class="wf-stat-label">ROI en 6 mois</div>
        </div>
      </div>
    </div>
  </div>
</section>
