<!-- Testimonials 08 : Single testimonial with large avatar, company logo placeholder, and stats -->
<style>
.wf-testimonials-08 {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
  padding: var(--space-16, 4rem) var(--space-4, 1rem);
  max-width: 1000px;
  margin: 0 auto;
}
.wf-testimonials-08 .wf-wrapper {
  background: var(--color-surface, #ffffff);
  border: 1px solid var(--color-border, #e5e7eb);
  border-radius: var(--radius-xl, 16px);
  padding: var(--space-10, 2.5rem);
  display: flex;
  gap: var(--space-10, 2.5rem);
  align-items: center;
}
.wf-testimonials-08 .wf-left {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-4, 1rem);
}
.wf-testimonials-08 .wf-avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: var(--color-muted, #e5e7eb);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--color-text-muted, #6b7280);
}
.wf-testimonials-08 .wf-company-logo {
  width: 120px;
  height: 40px;
  background: var(--color-muted, #e5e7eb);
  border-radius: var(--radius-sm, 6px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  color: var(--color-text-muted, #6b7280);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.wf-testimonials-08 .wf-right {
  flex: 1;
}
.wf-testimonials-08 .wf-stars {
  display: flex;
  gap: 2px;
  color: var(--color-text, #374151);
  margin-bottom: var(--space-4, 1rem);
}
.wf-testimonials-08 .wf-quote {
  font-size: 1.25rem;
  line-height: 1.7;
  color: var(--color-text, #1a1a1a);
  margin: 0 0 var(--space-6, 1.5rem);
}
.wf-testimonials-08 .wf-name {
  font-weight: 700;
  font-size: 1.125rem;
  color: var(--color-text, #1a1a1a);
}
.wf-testimonials-08 .wf-role {
  font-size: 0.9375rem;
  color: var(--color-text-muted, #6b7280);
  margin-bottom: var(--space-6, 1.5rem);
}
.wf-testimonials-08 .wf-stats {
  display: flex;
  gap: var(--space-8, 2rem);
  border-top: 1px solid var(--color-border, #e5e7eb);
  padding-top: var(--space-6, 1.5rem);
}
.wf-testimonials-08 .wf-stat-value {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--color-text, #374151);
}
.wf-testimonials-08 .wf-stat-label {
  font-size: 0.8125rem;
  color: var(--color-text-muted, #6b7280);
}
@media (max-width: 768px) {
  .wf-testimonials-08 .wf-wrapper {
    flex-direction: column;
    text-align: center;
  }
  .wf-testimonials-08 .wf-stars { justify-content: center; }
  .wf-testimonials-08 .wf-stats { justify-content: center; }
}
</style>
